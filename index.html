    { letter: "e", text: "CA 19-9 erhöht die Aussagefähigkeit bezüglich des Vorliegens eines Rezidivs im Vergleich zu einer alleinigen CEA-Wert-Bestimmung.", correct: false, explanation: "Falsch. CA 19-9 erhöht die Aussagefähigkeit bezüglich des Vorliegens eines Rezidivs im Vergleich zu einer alleinigen CEA-Wert-Bestimmung nicht." },
  ]},
  { id: 104, chapter: 10, number: 6, text: "Welche Untersuchungen zur präoperativen Abklärung von Fernmetastasen eines Kolonkarzinoms werden in der aktuellen Leitlinie empfohlen?", statements: [
    { letter: "a", text: "Abdomensonographie.", correct: true, explanation: "Richtig. Zur Klärung von Lebermetastasen soll primär die Abdomensonographie eingesetzt werden (Sensitivität 63–86 %, Spezifität 98 %)." },
    { letter: "b", text: "Computertomographie Abdomen.", correct: false, explanation: "Falsch. Nur bei verdächtigen Befunden oder unzureichender Beurteilbarkeit der Leber in der Sonographie ist ein Mehrzeilen-CT des Abdomens durchzuführen (Sensitivität 75–83 %, Spezifität 95–98 %). Aufgrund der Verfügbarkeit werden aber häufig standardisiert CT-Untersuchungen des Abdomens durchgeführt." },
    { letter: "c", text: "Röntgen-Thorax p.a.", correct: false, explanation: "Falsch. Die Röntgen-Aufnahme des Thorax sollte in zwei Ebenen erfolgen. Sollten Herdbefunde nachweisbar sein, muss im Anschluss eine Kontrastmittel-Computertomographie des Thorax erfolgen." },
    { letter: "d", text: "Magnetresonanztomographie (MRT).", correct: false, explanation: "Falsch. Nur bei Nachweis von Herdbefunden der Leber, die auch nach CT-Untersuchung unklarer Dignität bleiben, kann eine kontrastmittelverstärkte Sonographie oder ein MRT von Nutzen sein." },
    { letter: "e", text: "Positronen-Emissions-Tomographie (PET/PET-CT).", correct: false, explanation: "Falsch. Die PET/PET-CT hat keinen Stellenwert in der Ausbreitungsdiagnostik bei Erstdiagnose eines kolorektalen Karzinoms." },
  ]},
  { id: 105, chapter: 10, number: 7, text: "Welche Aussagen zu den Operationsprinzipien des Kolonkarzinoms sind zutreffend?", statements: [
    { letter: "a", text: "Es sind weitere Studien zum onkologischen Outcome notwendig, um der Complete Mesocolic Excision (CME) für Kolonkarzinome den gleichen Stellenwert wie der totalen mesorektalen Exzision (TME) für Rektumkarzinome zuschreiben zu können.", correct: true, explanation: "Richtig. Die aktuelle Datenlage zeigt, dass Präparate nach CME-Resektionen bessere histopathologische Qualitätskriterien (höhere Anzahl von Lymphknoten, bessere Dissektionsrate in der korrekten mesokolischen Schicht) aufweisen. Dennoch besteht aufgrund heterogener Studienlage noch limitierte Evidenz für das onkologische Ergebnis und den Vergleich zwischen offener und laparoskopischer CME." },
    { letter: "b", text: "Die Durchführung einer CME wird empfohlen.", correct: true, explanation: "Richtig. Da in der Kolonkarzinomchirurgie die Anzahl der resezierten Lymphknoten auch bei nodal negativen Karzinomen mit der Prognose korreliert, wurde analog zum TME-Konzept beim Rektumkarzinom das CME-Konzept für das Kolonkarzinom implementiert. Es beinhaltet die En-bloc-Entfernung des onkologisch relevanten Mesokolons unter Beachtung der anatomischen Schichten sowie das zentrale, stammnahe Absetzen der Gefäße mit radikaler Lymphknotendissektion." },
    { letter: "c", text: "Zur histologischen Beurteilung des N-Status werden mindestens 15 Lymphknoten benötigt.", correct: false, explanation: "Falsch. Die Lymphknotenbeurteilung ist anhand von 12 Lymphknoten ausreichend gewährleistet. Dennoch gilt: je mehr Lymphknoten desto besser." },
    { letter: "d", text: "Eine intraoperative Inspektion und, bei offener Operation, die Palpation der Leber sollte in jedem Fall, d. h. auch bei unauffälligem präoperativen Staging, erfolgen.", correct: true, explanation: "Richtig. Eine intraoperative Inspektion und Palpation der Leber (rechter und linker Leberlappen) sollte standardmäßig erfolgen. Eine intraoperative Sonographie ist bei ausreichender präoperativer Diagnostik nicht standardmäßig notwendig." },
    { letter: "e", text: "Bei Befall umliegender Organe ist eine Multiviszeralresektion en bloc gerechtfertigt.", correct: true, explanation: "Richtig. Adhärenz eines Tumors an Nachbarorganen begründet die En-bloc-Resektion in allen Fällen von Tumoradhärenzen zu benachbarten Organen oder sonstigen Strukturen. Palpation des Tumors, Biopsien und Schnellschnittuntersuchungen sollten vermieden werden, da die Gefahr einer Tumorzelldissemination besteht." },
  ]},
  { id: 106, chapter: 10, number: 8, text: "Welche Aussagen bezüglich folgender Behandlungsprinzipien sind richtig?", statements: [
    { letter: "a", text: "Kolonkarzinome ohne Fernmetastasierung werden neoadjuvant vorbehandelt.", correct: false, explanation: "Falsch. Die primäre chirurgische Resektion stellt beim nicht-metastasierten Kolonkarzinom die Standardtherapie dar." },
    { letter: "b", text: "Der zirkumferentielle Sicherheitsabstand beim Rektumkarzinom ist negativ, wenn er 1 mm oder mehr beträgt.", correct: true, explanation: "Richtig. Der zirkumferentielle Sicherheitsabstand ist negativ, wenn er 1 mm oder mehr beträgt (R0 'wide', CRM negativ). Ein positiver CRM liegt vor, wenn der Abstand weniger als 1 mm beträgt (R0 'narrow') oder Tumorgewebe direkt an ihn heranreicht (R1). Studien aus den Niederlanden und Großbritannien zeigten, dass bei < 1 mm das Lokalrezidivrisiko bei Rektumkarzinomen deutlich ansteigt." },
    { letter: "c", text: "Die Transversumresektion ist der Standardeingriff bei einem Transversumkarzinom.", correct: false, explanation: "Falsch. Eine Transversumresektion erfolgt nur in Ausnahmen unter Absetzung der A. colica media aus der A. mesenterica superior als Transversotransversostomie (z. B. bei hohem Patientenalter und hohem perioperativem Risiko). Üblicherweise erfolgt je nach Lage des Tumors eine erweiterte Hemikolektomie rechts bzw. links oder die subtotale Kolektomie." },
    { letter: "d", text: "Bei der onkologischen Sigmaresektion muss standardmäßig die A. mesenterica inferior (AMI) unmittelbar am aortalen Abgang abgesetzt werden.", correct: false, explanation: "Falsch. Zum Erhalt des Plexus hypogastricus sollte die AMI zwar radikulär, jedoch ca. 1 cm nach dem aortalen Abgang abgesetzt werden." },
    { letter: "e", text: "Ein tumorbefallener Lymphknoten am Abgang der AMI wird als M1-Stadium eingestuft.", correct: true, explanation: "Richtig. Ein positiver Lymphknoten am Abgang der AMI ist als Fernmetastase zu werten. Der Lymphknotenstatus der TNM-Klassifikation bezieht sich nur auf die regionalen Lymphknoten." },
  ]},
  { id: 107, chapter: 10, number: 9, text: "Welche Operation mit Unterbindung welcher Arterien wird bei den folgenden Tumorlokalisationen durchgeführt?", statements: [
    { letter: "a", text: "Zökum / Colon ascendens → Hemikolektomie rechts mit radikulärer Ligatur der A. ileocolica und A. colica dextra aus der A. mesenterica superior.", correct: true, explanation: "Richtig. Hemikolektomie rechts mit Ligatur der A. ileocolica und A. colica dextra aus der A. mesenterica superior, Anlage einer Ileotransversostomie. Es erfolgt die Entfernung des Colon ascendens, der rechten Kolonflexur und der Bauhin'schen Klappe mit einem kurzen Ileumabschnitt (10–15 cm)." },
    { letter: "b", text: "Rechte Kolonflexur / rechtes Colon transversum → Erweiterte Hemikolektomie rechts mit radikulärer Ligatur der A. ileocolica, A. colica dextra und A. colica media.", correct: true, explanation: "Richtig. Erweiterte Hemikolektomie rechts mit Ligatur von A. ileocolica, A. colica dextra und A. colica media, Anlage einer Ileotransversostomie nahe der linken Flexur." },
    { letter: "c", text: "Colon descendens / Colon sigmoideum → Hemikolektomie links mit radikulärer Ligatur der A. mesenterica inferior.", correct: true, explanation: "Richtig. Hemikolektomie links mit radikulärer Ligatur der A. mesenterica inferior, Anlage einer Transversorektostomie." },
    { letter: "d", text: "Linke Kolonflexur / linkes Colon transversum → Erweiterte Hemikolektomie links mit radikulärer Ligatur der A. colica media und A. mesenterica inferior.", correct: true, explanation: "Richtig. Erweiterte Hemikolektomie links mit Ligatur der A. colica media und A. mesenterica inferior, Anlage einer Transversorektostomie bzw. Ascendorektostomie." },
    { letter: "e", text: "Multifokale Tumoren des Kolons → Subtotale Kolektomie mit radikulärer Ligatur der A. colica dextra, A. colica media und A. mesenterica inferior.", correct: true, explanation: "Richtig. Bei multifokalen Kolontumoren erfolgt die subtotale Kolektomie mit Ligatur der A. colica dextra, A. colica media und A. mesenterica inferior." },
  ]},
  { id: 108, chapter: 10, number: 10, text: "Welche spezifischen Operationsrisiken bestehen bei den folgenden Eingriffen?", statements: [
    { letter: "a", text: "Hemikolektomie rechts → Verletzung des rechten Ureters, Duodenums und der V. mesenterica superior, Einreißen von Venen am Pankreaskopf.", correct: true, explanation: "Richtig. Typische Risiken: Verletzung des rechten Ureters, Duodenums und der V. mesenterica superior sowie Einreißen von Venen am Pankreaskopf." },
    { letter: "b", text: "Hemikolektomie links → Verletzung des unteren Milzpols bei der Mobilisation, Blutungen aus dem Ligamentum splenocolicum, Verletzungen des linken Ureters oder des Pankreasschwanzes.", correct: true, explanation: "Richtig. Typische Risiken sind Verletzungen des unteren Milzpols bei der Mobilisation, Blutungen aus dem Ligamentum splenocolicum, sowie Verletzungen des linken Ureters oder des Pankreasschwanzes." },
    { letter: "c", text: "Transversumresektion → Verletzung des Duodenums, Verletzung des unteren Milzpols bei der Mobilisation.", correct: true, explanation: "Richtig. Bei der Transversumresektion drohen Verletzung des Duodenums und des unteren Milzpols bei der Mobilisation." },
    { letter: "d", text: "Sigmaresektion → Verletzung des linken Ureters, Verletzung autonomer Nerven, unzureichende Anastomosendurchblutung.", correct: true, explanation: "Richtig. Risiken der Sigmaresektion: Verletzung des linken Ureters, Verletzung autonomer Nerven, unzureichende Anastomosendurchblutung." },
    { letter: "e", text: "Rektumresektion → Verletzung der Harnleiter, des präsakralen Venenplexus, der Blase sowie Stuhl- und Harninkontinenz. Beim Mann: erektile Dysfunktion, Verletzung von Prostata und Samenbläschen. Bei der Frau: Verletzungen der vaginalen Hinterwand.", correct: true, explanation: "Richtig. Umfangreiche Risiken bei der Rektumresektion: Verletzung der Harnleiter, des präsakralen Venenplexus, der Blase sowie Stuhl- und Harninkontinenz. Beim Mann: erektile Dysfunktion, Verletzung von Prostata und Samenbläschen. Bei der Frau: Verletzungen der vaginalen Hinterwand." },
  ]},
  { id: 109, chapter: 10, number: 11, text: "Welche Aussagen zur Anastomoseninsuffizienz nach Kolon- oder Rektumresektion sind korrekt?", statements: [
    { letter: "a", text: "Postoperatives Fieber nach Darmresektion ist ein typisches Symptom der Anastomoseninsuffizienz.", correct: true, explanation: "Richtig. Postoperatives Fieber nach Darmresektion ist ein typisches Symptom der Anastomoseninsuffizienz. Nach Rektumresektion beträgt die durchschnittliche Insuffizienzrate ca. 10 %, nach Kolonresektionen ca. 1–2 %." },
    { letter: "b", text: "Einer Anastomoseninsuffizienz liegt häufig eine Durchblutungsstörung zugrunde.", correct: true, explanation: "Richtig. Durchblutungsstörungen können häufig bei Spätinsuffizienzen nachgewiesen werden. Weitere Ursachen: erhöhte Spannung der Anastomose oder Undichtigkeit der Naht (Frühinsuffizienzen)." },
    { letter: "c", text: "Ein postoperativ erhöhtes CRP ist ein Marker für das Vorliegen einer Anastomoseninsuffizienz.", correct: true, explanation: "Richtig. Studien konnten ein signifikant erhöhtes CRP bis zum 3. postoperativen Tag bei Anastomoseninsuffizienzen nachweisen. Natürlich sollte auch eine Umfelddiagnostik für Harnwegsinfekte, Katheterinfekte, Pneumonien und Wundinfektionen durchgeführt werden." },
    { letter: "d", text: "Tritt eine Insuffizienz innerhalb der ersten drei Tage nach der Operation auf, liegt dem oft eine technische Ursache zugrunde.", correct: true, explanation: "Richtig. Tritt eine Anastomoseninsuffizienz am 1.–3. postoperativen Tag auf, wird sie üblicherweise als Frühinsuffizienz (meist technisch bedingt) gewertet. Eine Insuffizienz ab dem 5.–7. postoperativen Tag bezeichnet man als Spätinsuffizienz mit Störung der Anastomosenheilung (z. B. durch Minderperfusion, Spannung der Anastomose). Auch kataboler Stoffwechsel, Immunsuppression, Diabetes mellitus Typ II, Nikotinkonsum und Adipositas können Anastomoseninsuffizienzen begünstigen." },
    { letter: "e", text: "Besteht der Verdacht auf eine Anastomoseninsuffizienz, so sollte eine Diagnostik schnellstmöglich durchgeführt werden.", correct: true, explanation: "Richtig. Standard sind die Durchführung eines CT mit oraler und intravenöser Kontrastierung oder eine diagnostische Laparoskopie. Die Therapie ist abhängig von Größe und Lage der Insuffizienz (konservativ, endoskopisch, operativ). CT und Laparoskopie bieten ferner die Möglichkeit, interenterische Abszesse zu diagnostizieren und ermöglichen eine perkutane Drainage." },
  ]},
  { id: 110, chapter: 10, number: 12, text: "Welche Aussagen zur Nachsorge nach kurativ reseziertem Kolonkarzinom treffen zu?", statements: [
    { letter: "a", text: "Bei einem stenosierenden, nicht passierbaren Tumor sollte die komplette Koloskopie in einem Zeitraum von einem Jahr nach der Operation nachgeholt werden.", correct: false, explanation: "Falsch. Falls präoperativ keine komplette Koloskopie erfolgt ist (Stenose / Notoperation), sollte diese drei bis sechs Monate nach der Operation erfolgen." },
    { letter: "b", text: "Ist präoperativ eine komplette Koloskopie erfolgt, die bis auf den Primärtumor unauffällig war, sollte die nächste Koloskopie postoperativ in einem Jahr erfolgen.", correct: false, explanation: "Falsch. Das postoperative Koloskopieintervall ist abhängig vom UICC-Stadium. Bei UICC I wird eine Koloskopie nach 36 Monaten, bei UICC II und III nach 12 Monaten postoperativ empfohlen (bei präoperativ komplettierter Koloskopie)." },
    { letter: "c", text: "Anamnese, klinische Untersuchung, Abdomensonographie und CEA-Bestimmung gehören zum Standard der Tumornachsorge.", correct: true, explanation: "Richtig. Anamnese, klinische Untersuchung, Abdomensonographie und CEA-Bestimmung gehören zum Standard der Tumornachsorge." },
    { letter: "d", text: "Nach kurativer Therapie eines KRK besteht für 5 Jahre ein erhöhtes Rezidiv-/Tumorrisiko.", correct: true, explanation: "Richtig. Es besteht für 5 Jahre ein erhöhtes Risiko für ein Lokalrezidiv (ca. 3–24 %), Fernmetastasen (ca. 25 %) oder einen metachronen Zweittumor (ca. 1,5–10 %). 80 % der Rezidive treten innerhalb der ersten zwei Jahre auf." },
    { letter: "e", text: "Die 5-Jahresüberlebensrate bei UICC I beträgt über 90 %.", correct: false, explanation: "Falsch. Die kumulativen relativen 5-Jahresüberlebensraten betragen ca. 60 % insgesamt:\n• UICC I: 85 %\n• UICC II: 50–60 %\n• UICC III: 30 %\n• UICC IV: ca. 5 %\n\nInsgesamt ca. 50 % der Patienten entwickeln nach kurativer Resektion Lokalrezidive oder Fernmetastasen, oft im Rahmen einer bestehenden Mikrometastasierung. Nodal positive Karzinome sind besonders für hepatische Metastasierung gefährdet (N1: 26 %, N2: 58 % innerhalb von 5 Jahren)." },
  ]},
  { id: 111, chapter: 10, number: 13, text: "Welche Aussagen zur adjuvanten Therapie beim Kolonkarzinom sind korrekt?", statements: [
    { letter: "a", text: "Bei Tumoren des UICC-Stadiums 0 und I ist nach R0-Resektion eine onkologische Nachsorge ohne adjuvante chemotherapeutische Therapie empfohlen.", correct: true, explanation: "Richtig. In diesen Fällen ist eine onkologische Nachsorge ausreichend.\n\nUICC-Stadien:\n• 0: Tis N0 M0\n• IA: T1 N0 M0\n• IB: T2 N0 M0\n• IIA: T3 N0 M0\n• IIB: T4 N0 M0\n• IIIA: jedes T, N1 M0\n• IIIB: jedes T, N2 M0\n• IV: jedes T, jedes N, M1" },
    { letter: "b", text: "Bei UICC II wird immer eine adjuvante Therapie empfohlen.", correct: false, explanation: "Falsch. Für UICC II ohne Risikofaktoren besteht eine Kann-Situation, die individuell im interdisziplinären Tumorboard besprochen werden sollte. Eine adjuvante Therapie ist nicht zwingend notwendig. Bei Risikofaktoren wie Notoperation, Perforation oder weniger als 12 Lymphknoten im Präparat ist dennoch eine adjuvante Therapie indiziert." },
    { letter: "c", text: "Bei einer Mikrosatelliteninstabilität sollte keine adjuvante Chemotherapie durchgeführt werden.", correct: true, explanation: "Richtig. Bei Vorliegen einer Mikrosatelliteninstabilität (MSI) ist der Vorteil einer adjuvanten Chemotherapie gering und die Prognose insgesamt günstiger. Beim Vorliegen einer MSI wird der Vorteil einer adjuvanten Chemotherapie als größer eingeschätzt und kann auch bei UICC II diskutiert werden. Ergebnisse prospektiv randomisierter Studien auf Basis einer MSI liegen nicht vor.", note: "Update seit 2021: Bei MSI-high/dMMR metastasiertem KRK ist Pembrolizumab als Erstlinien-Monotherapie neuer Standard (KEYNOTE-177-Studie, 2020). Für das neoadjuvante Setting bei lokal fortgeschrittenem dMMR-Rektumkarzinom zeigte Dostarlimab beeindruckende pathologische Komplettremissionen (100 % in der NYU-Pilot-Studie 2022). MSI-Testung sollte daher bei allen KRK routinemäßig erfolgen." },
    { letter: "d", text: "Bei vorliegender Indikation sollte eine adjuvante Chemotherapie postoperativ zeitnah begonnen werden.", correct: true, explanation: "Richtig. Eine adjuvante Chemotherapie sollte nach Abschluss der Heilung innerhalb der ersten acht Wochen nach der Operation durchgeführt werden.\n\nKontraindikationen: schwere KHK/Herzinsuffizienz, terminale Niereninsuffizienz, Leberzirrhose (Child B oder C), Blutbildungsstörung, eingeschränkte Lebenserwartung, ECOG > 2. Das Alter gilt nicht als Einschränkung; bei Patienten über 75 Jahren besteht jedoch keine eindeutige Evidenz zum Nutzen einer Chemotherapie." },
    { letter: "e", text: "Bei UICC III werden Chemotherapeutika als Kombinationsschemata empfohlen.", correct: true, explanation: "Richtig. Bei UICC III führt die adjuvante Chemotherapie zu einer signifikanten Reduktion der Rezidivrate und einer signifikanten Erhöhung der Überlebensrate nach 5 Jahren. Meist wird entweder das FOLFOX-Schema (5-FU, Folinsäure, Oxaliplatin) oder XELOX-Schema (Capecitabin und Oxaliplatin) empfohlen. Bei Kolonkarzinom UICC II mit fakultativer Chemotherapie erfolgt meist eine Monotherapie mit Fluoropyrimidinen (Capecitabin oder 5-FU). Eine Radiatio wird am Kolon nicht durchgeführt." },
  ]},
  { id: 112, chapter: 10, number: 14, text: "Welche Aussagen zum Kolonkarzinom mit synchroner Leber- oder Lungenmetastasierung treffen zu?", statements: [
    { letter: "a", text: "Die Lebermetastasen sollten zeitgleich zum Primärtumor entfernt werden.", correct: false, explanation: "Falsch. Die simultane Resektion von Lebermetastasen beeinflusst das Langzeitüberleben im Vergleich zu einem zweizeitigen Vorgehen bei geeigneter Patientenselektion nicht. Sie führt jedoch bei Komorbidität oder höherem Lebensalter (> 70 Jahre) zu einer höheren postoperativen Letalität. Bei multiplen synchronen Lebermetastasen sollte ein zweizeitiges und multimodales Vorgehen gewählt werden. Eine perkutane Radiofrequenzablation (RFA) kann erwogen werden, wenn Lebermetastasen nicht resektabel sind oder der AZ eine Resektion nicht zulässt." },
    { letter: "b", text: "Die Behandlung solcher Fälle ist in den Leitlinien klar definiert.", correct: false, explanation: "Falsch. Bei der Behandlung eines Kolonkarzinoms mit synchronen Lebermetastasen ist in den Leitlinien nicht klar definiert, ob das Kolonkarzinom oder die Lebermetastasektomie zuerst durchgeführt werden sollte. Es gibt keinen Konsens — eine interdisziplinäre und individuelle Entscheidung wird empfohlen." },
    { letter: "c", text: "Bei 25 % der Patienten mit synchroner Lebermetastasierung eines kolorektalen Karzinoms besteht kuratives Potential.", correct: true, explanation: "Richtig. Bei bis zu 25 % der Patienten mit synchron hepatisch metastasiertem KRK besteht ein kuratives Potential — auch bei Patienten mit einem hepatischen Metastasenrezidiv." },
    { letter: "d", text: "Je länger der Patient nach Kolonresektion metastasenfrei bleibt, desto besser ist die Langzeitprognose.", correct: true, explanation: "Richtig. Bei einem krankheitsfreien Intervall über 12 Monate kann von einer günstigeren Prognose ausgegangen werden. Eine synchrone hepatische Metastasierung wird als prognostisch ungünstig betrachtet." },
    { letter: "e", text: "Bei primär resektablen Lebermetastasen sollte eine neoadjuvante Therapie erfolgen.", correct: false, explanation: "Falsch. Die Resektion der Metastasen ist zentraler Bestandteil des kurativen Konzeptes. Eine neoadjuvante Therapie von primär resektablen Lebermetastasen wird nur im Ausnahmefall durchgeführt.\n\nVoraussetzungen für die Resektion:\n• Ausschluss nicht resektabler extrahepatischer Metastasen\n• > 30 % funktionsfähiges residuales Lebergewebe postoperativ\n• ausreichender Sicherheitsabstand zu kritischen Lebergefäßen\n• keine hepatische Insuffizienz, keine Leberzirrhose Child B/C\n• ECOG 0–2, keine schweren Komorbiditäten\n\nDie Entscheidung über die Resektabilität erfolgt im interdisziplinären Tumorboard — das gilt auch für isolierte Lungenmetastasen." },
  ]},
  { id: 113, chapter: 10, number: 15, text: "Welche Aussage zu den Amsterdam-Kriterien ist korrekt?", statements: [
    { letter: "a", text: "Wenn alle fünf Punkte der Amsterdam-Kriterien zutreffen, besteht ein hochgradiger Verdacht auf das Vorliegen eines HNPCC- oder eines Lynch-Syndroms.", correct: true, explanation: "Richtig. Treffen trotz HNPCC-Verdachts nicht alle Amsterdam-Kriterien zu, werden die Bethesda-Kriterien herangezogen.\n\nAmsterdam-Kriterien (Merksatz: 3-2-1-Regel):\n• Mindestens 3 Familienmitglieder mit HNPCC-assoziierten Karzinomen (Kolon/Rektum, Endometrium, Dünndarm, Urothel)\n• Mindestens 2 aufeinanderfolgende Generationen betroffen\n• 1 Familienmitglied erstgradig verwandt mit den beiden anderen\n• Ein Erkrankter < 50 Jahre bei Diagnose\n• Ausschluss einer FAP" },
    { letter: "b", text: "Bei positiven Amsterdam-Kriterien sollte eine Testung auf Mikrosatelliteninstabilität (MSI) zur Abklärung eines Mismatch-Reparatur-Defektes erfolgen.", correct: true, explanation: "Richtig. Bei positiven Amsterdam-Kriterien sollte eine Testung auf MSI und Mutation der DNA-Reparaturgene zur Abklärung eines Mismatch-Reparatur-Defektes und somit zur Diagnose eines Lynch- oder HNPCC-Syndroms erfolgen. Treffen Amsterdam- oder Bethesda-Kriterien mit MSI zu, so besteht der Verdacht auf ein Lynch- oder HNPCC-Syndrom." },
    { letter: "c", text: "Bei Verwandten ersten Grades von Patienten mit KRK, bei denen das Tumorgewebe eine Mikrosatellitenstabilität (MSS) oder niedriggradige Mikrosatelliteninstabilität zeigt, sollte das Koloskopie-Intervall 3–5 Jahre betragen.", correct: true, explanation: "Richtig. Bei Verwandten 1. Grades mit MSS oder niedriggradiger MSI im Tumorgewebe des Indexpatienten sollte das Koloskopie-Intervall 3–5 Jahre betragen." },
    { letter: "d", text: "Bei Verwandten ersten Grades von Patienten mit KRK sollten in einem Lebensalter, das 10 Jahre vor dem Alterszeitpunkt des Auftretens des Karzinoms beim Indexpatienten liegt, erstmals komplett koloskopiert werden.", correct: true, explanation: "Richtig. Eine Koloskopie sollte 10 Jahre vor dem Karzinomauftreten des Indexpatienten, jedoch spätestens im Alter von 40–45 Jahren erfolgen. Auch unauffällige Koloskopien müssen mindestens alle 10 Jahre wiederholt werden." },
    { letter: "e", text: "Wird im Tumorgewebe eines KRK eine Mutation in einem DNA-Reparaturgen mit einer Keimbahnmutation nachgewiesen, so hat dies keine Auswirkung auf Verwandte des Patienten.", correct: false, explanation: "Falsch. Wird im Tumorgewebe eines KRK eine Mutation in einem DNA-Reparaturgen nachgewiesen, ist eine Prüfung auf eine Keimbahnmutation notwendig. Bei nachgewiesenen Keimbahnmutationen ist eine gezielte Untersuchung und ggf. Prävention von Verwandten 1. Grades notwendig." },
  ]},
  { id: 114, chapter: 10, number: 16, text: "Welche Aussagen zu den überarbeiteten Bethesda-Kriterien sind zutreffend?", statements: [
    { letter: "a", text: "Treffen ein oder mehrere Bethesda-Kriterien zu, sollten die betroffenen Patienten eine molekulargenetische Beratung erhalten.", correct: true, explanation: "Richtig. Tumoren von Patienten, die ein oder mehrere Bethesda-Kriterien erfüllen, sollten auf eine Mikrosatelliteninstabilität untersucht werden. Bethesda-Kriterien weisen im Vergleich zu den Amsterdam-Kriterien eine höhere Sensitivität auf." },
    { letter: "b", text: "Eines der Kriterien ist die Diagnose eines kolorektalen Karzinoms vor dem 40. Lebensjahr.", correct: false, explanation: "Falsch. Eines der Kriterien ist die Diagnose eines KRK vor dem 50. Lebensjahr oder vor dem 60. Lebensjahr mit Vorliegen typischer Histologie eines MSI-H-Tumors.\n\nRevidierte Bethesda-Kriterien:\n• Patient mit KRK vor dem 50. Lebensjahr\n• Patient mit syn-/metachronen KRK oder anderen HNPCC-assoziierten Tumoren (Kolon, Rektum, Endometrium, Magen, Ovar, Pankreas, Ureter, Nierenbecken, biliäres System, Gehirn, Haut, Dünndarm) unabhängig vom Alter\n• Patient mit KRK vor dem 60. Lebensjahr mit MSI-H-Histologie (TILs, Crohn's-like Lesions, muzinöse/siegelringzellige Differenzierung, medulläres Karzinom)\n• Patient mit KRK und einem Verwandten 1. Grades mit KRK/HNPCC-Tumor vor dem 50. Lebensjahr\n• Patient mit KRK (unabhängig vom Alter), der ≥ 2 Verwandte 1./2. Grades mit KRK/HNPCC-Tumor hat" },
    { letter: "c", text: "Patienten, bei denen die Bethesda-Kriterien zutreffen, haben den Verdacht auf Lynch- oder HNPCC-Syndrom.", correct: true, explanation: "Richtig. Bethesda-Kriterien weisen im Vergleich zu den Amsterdam-Kriterien eine höhere Sensitivität auf." },
    { letter: "d", text: "Bei erstgradig Verwandten von Patienten mit KRK aus Familien, in denen die Bethesda-Kriterien, nicht aber die Amsterdam-Kriterien erfüllt sind, sollte in kürzeren Intervallen koloskopiert werden.", correct: true, explanation: "Richtig. Insbesondere wenn kein Tumorgewebe zur Untersuchung auf HNPCC-typische Auffälligkeiten zur Verfügung steht, sollte das Koloskopie-Intervall für erstgradige Verwandte drei Jahre nicht überschreiten." },
    { letter: "e", text: "Die Feststellung, ob bei einem Patienten die Bethesda- oder Amsterdam-Kriterien für HNPCC erfüllt sind, erfolgt durch die Anamnese der behandelnden Ärzte.", correct: true, explanation: "Richtig. In onkologischen Zentren können die Evaluationen auch durch die onkologischen Schwestern/Pfleger erfolgen. Wichtig ist, dass die Feststellung, Information und ggf. genetische Beratung des Betroffenen und Familienmitglieder erfolgen." },
  ]},
  { id: 115, chapter: 10, number: 17, text: "Welche Aussagen zum hereditären nicht-polypösen Kolonkarzinom (HNPCC)-Syndrom sind richtig?", statements: [
    { letter: "a", text: "Es handelt sich um eine autosomal-rezessiv vererbte Erkrankung.", correct: false, explanation: "Falsch. Es handelt sich um eine autosomal-dominant vererbte Erkrankung mit einer Penetranz von bis zu 80 %. HNPCC ist die häufigste Form familiärer kolorektaler Karzinome. Ursächlich ist meist eine Mutation der DNA-Mismatch-Reparaturgene, die zu einer Mikrosatelliteninstabilität führt." },
    { letter: "b", text: "Das durchschnittliche Manifestationsalter liegt bei 45 Jahren.", correct: true, explanation: "Richtig. Bis zu 80 % der Mutationsträger entwickeln über ihre Lebenszeit ein kolorektales Karzinom. Das durchschnittliche Manifestationsalter liegt bei 45 Jahren." },
    { letter: "c", text: "Es besteht ein erhöhtes Risiko für HNPCC-assoziierte Karzinome in anderen Organen.", correct: true, explanation: "Richtig. Für Betroffene besteht ein erhöhtes Risiko für Magenkarzinome (ca. 10 %), Urothelkarzinome (ca. 2 %), Dünndarmkarzinome (ca. 1–4 %) und Gallengangskarzinome (ca. 1–4 %). Bei betroffenen Frauen zusätzlich erhöhtes Risiko für Endometriumkarzinome (ca. 40–60 %) und Ovarialkarzinome (ca. 10 %)." },
    { letter: "d", text: "Zwischen dem HNPCC-Syndrom und dem Lynch-Syndrom besteht kein Unterschied.", correct: false, explanation: "Falsch. HNPCC-Syndrom: Zutreffen der anamnestischen Kriterien ohne notwendigen Nachweis einer Keimbahnmutation. Lynch-Syndrom: HNPCC, bei dem eindeutig eine Keimbahnmutation der beschriebenen Gene nachgewiesen werden konnte." },
    { letter: "e", text: "Die Karzinome entstehen in etwa 30 % der Fälle im Kolon ascendens.", correct: false, explanation: "Falsch. Beim HNPCC-Syndrom ist in ca. 60 % das Kolon ascendens oder das Zökum betroffen." },
  ]},
  { id: 116, chapter: 10, number: 18, text: "Welche Aussagen zur Vorsorge bei HNPCC-Syndrom sind richtig?", statements: [
    { letter: "a", text: "HNPCC-Patienten sollten ab dem 15. Lebensjahr jährlich koloskopiert und abdominell sonographiert werden.", correct: false, explanation: "Falsch. HNPCC-Patienten sollten an einem lebenslangen Früherkennungsprogramm teilnehmen. In der Regel erfolgt ab dem 25. Lebensjahr (bzw. fünf Jahre vor dem jüngsten familiären Karzinom) jährlich eine Koloskopie und abdominelle Sonographie. Die Erkrankungswahrscheinlichkeit steigt ab dem 30. Lebensjahr deutlich an. Eine genetische Beratung sollte vor dem 25. Lebensjahr erfolgen." },
    { letter: "b", text: "Die Indikation zur prophylaktischen Kolektomie bzw. Proktokolektomie bei HNPCC-Mutationsträgern sollte großzügig gestellt werden.", correct: false, explanation: "Falsch. Eine prophylaktische Kolektomie bzw. Proktokolektomie ist bei HNPCC-Mutationsträgern nicht primär indiziert. Durch regelmäßige Kontrolluntersuchungen werden die Karzinome frühzeitig entdeckt, sodass eine prophylaktische Kolektomie in der Regel nicht erforderlich ist." },
    { letter: "c", text: "Bei weiblichen HNPCC-Patienten sollte ab dem 25. Lebensjahr zusätzlich zur jährlichen gynäkologischen Untersuchung eine transvaginale Sonographie durchgeführt werden.", correct: true, explanation: "Richtig. Etwa 50 % der Patientinnen mit HNPCC entwickeln bis zum 70. Lebensjahr ein Endometriumkarzinom und 15 % ein Ovarialkarzinom. Daher werden jährliche transvaginale Sonographien ab dem 25. Lebensjahr und jährliche Endometriumbiopsien ab dem 35. Lebensjahr empfohlen." },
    { letter: "d", text: "Prophylaktische Gastroskopien sind bei HNPCC-Patienten nicht sinnvoll.", correct: false, explanation: "Falsch. Etwa 10 % der Patienten entwickeln Magenkarzinome. HNPCC-assoziierte Magenkarzinome treten zumeist zwischen dem 50. und 60. Lebensjahr auf. Betroffene sollten daher ab dem 35. Lebensjahr regelmäßig gastroskopiert werden." },
    { letter: "e", text: "Bei Frauen mit HNPCC sollte aufgrund des erhöhten Endometriumkarzinomrisikos immer eine prophylaktische Hysterektomie erfolgen.", correct: false, explanation: "Falsch. Eine Hysterektomie kann nach abgeschlossenem Kinderwunsch üblicherweise ab dem 40. Lebensjahr erwogen werden. Das Endometriumkarzinomrisiko bis zum 70. Lebensjahr beträgt ca. 40–60 %." },
  ]},
  { id: 117, chapter: 10, number: 19, text: "Welche Aussagen zur familiären adenomatösen Polyposis (FAP) treffen zu?", statements: [
    { letter: "a", text: "Bei der FAP kommt es zu einem massenhaften Befall des Gastrointestinaltraktes mit Polypen, insbesondere des Kolons.", correct: true, explanation: "Richtig. Die FAP befällt vor allem das Kolon. Es bilden sich in der Regel mehr als 100 Polypen. Es können auch Polypen im Magen oder Duodenum mit erhöhtem Malignitätsrisiko auftreten, sodass spätestens ab dem 25.–30. Lebensjahr regelmäßig Gastroskopien durchgeführt werden sollten." },
    { letter: "b", text: "Bei der FAP handelt es sich um eine häufige Präkanzerose des Darmtraktes.", correct: false, explanation: "Falsch. Die Erkrankung ist selten. Geschätzt sind 5–10 von 100.000 Menschen von der Genmutation betroffen." },
    { letter: "c", text: "Ursächlich ist eine Mutation des APC-Genes (Adenomatous Polyposis of the Colon), wobei es sich hier um ein Tumorsuppressorgen handelt.", correct: true, explanation: "Richtig. Das APC-Gen ist ein Tumorsuppressorgen auf Chromosom 5." },
    { letter: "d", text: "Die Polypen bei FAP treten typischerweise im Kindesalter auf und werden früh symptomatisch.", correct: false, explanation: "Falsch. Typischerweise treten die Polypen im dritten Lebensjahrzehnt auf, werden meist erst in der vierten Lebensdekade symptomatisch durch peranale Blut- oder Schleimabgänge sowie abdominelle Schmerzen." },
    { letter: "e", text: "Therapie der Wahl ist die totale/subtotale Kolektomie.", correct: true, explanation: "Richtig. Da es sich bei der FAP um eine obligate Präkanzerose handelt, ist die Operation die Therapie der Wahl. Nach einer Proktokolektomie sollte regelmäßig eine Pouchoskopie erfolgen. Bei Patienten mit erhaltenem Rektumstumpf muss regelmäßig eine Rektoskopie durchgeführt werden." },
  ]},
  { id: 118, chapter: 10, number: 20, text: "Welche Antworten zu hereditären gastrointestinalen Polyposis-Syndromen sind richtig?", statements: [
    { letter: "a", text: "Die autosomal-dominant vererbte FAP besitzt ein Lebenszeitrisiko von 100 %.", correct: true, explanation: "Richtig. Oft finden sich über 100 Polypen vor allem im Kolon. Daher werden jährliche Rektosigmoidoskopien bzw. bei Adenomnachweis jährliche Koloskopien ab dem 10. Lebensjahr empfohlen. Ebenfalls kann eine prophylaktische Proktokolektomie erwogen werden." },
    { letter: "b", text: "FAP-Patienten haben ein erhöhtes Risiko, Schilddrüsenkarzinome auszubilden.", correct: true, explanation: "Richtig. Patienten mit einer FAP haben ein Lebenszeitrisiko von 1–12 %, an einem Schilddrüsenkarzinom zu erkranken. Hauptsächlich sind Frauen betroffen (95 % der Fälle). Das Hauptalter ist dabei das 24.–33. Lebensjahr. Histologisch dominiert das papilläre Schilddrüsenkarzinom." },
    { letter: "c", text: "Das Peutz-Jeghers-Syndrom zeichnet sich vor allem durch Dünndarm-Polypen aus.", correct: true, explanation: "Richtig. Oft finden sich > 20 Polypen im Dünndarm. Das Lebenszeitrisiko für ein kolorektales Karzinom beträgt 40 %. Ebenfalls erhöht ist das Risiko für Ovarial-, Mamma- und Pankreaskarzinom. Klinisch auffällig ist eine periorale Hyperpigmentierung." },
    { letter: "d", text: "Das Peutz-Jeghers-Syndrom wird autosomal-rezessiv vererbt.", correct: false, explanation: "Falsch. Es wird zu 50 % autosomal-dominant vererbt. Zu 50 % treten Neumutationen auf." },
    { letter: "e", text: "Bei der familiären juvenilen Polyposis besteht ein Lebenszeitrisiko von 90 % für kolorektale Karzinome.", correct: false, explanation: "Falsch. Das Lebenszeitrisiko beträgt zwischen 20–70 %." },
  ]},
  { id: 119, chapter: 10, number: 21, text: "Welche Aussagen zur Sigmadivertikulitis treffen zu?", statements: [
    { letter: "a", text: "Die Divertikulose bezeichnet Ausstülpungen der Serosa.", correct: false, explanation: "Falsch. Als Divertikulose werden erworbene Ausstülpungen der Mukosa und Submukosa durch muskelschwache Lücken der Darmwand bezeichnet." },
    { letter: "b", text: "Aus der Divertikulose kann eine Divertikulitis entstehen.", correct: true, explanation: "Richtig. Als symptomatische unkomplizierte Divertikulitis gelten persistierende oder rezidivierende Symptome durch Entzündung der Pseudodivertikel und angrenzender Strukturen ohne Abszess, Perforation oder Fisteln. Als komplizierte Divertikulitis gilt eine Divertikulitis mit Perforation, Blutung, Fistel oder Abszess." },
    { letter: "c", text: "Nach CDD werden vier Typen der Sigmadivertikulitis unterschieden.", correct: true, explanation: "Richtig. Klassifikation der Sigmadivertikulitis (CDD), Typ 0–4:\n• Typ 0: Asymptomatische Divertikulose (Zufallsbefund)\n• Typ 1: Akute unkomplizierte Divertikulitis\n  – 1a: ohne Umgebungsreaktion\n  – 1b: mit phlegmonöser Umgebungsreaktion\n• Typ 2: Akute komplizierte Divertikulitis\n  – 2a: Mikroabszess (gedeckte Perforation, < 1 cm)\n  – 2b: Makroabszess (para-/mesokolisch, > 1 cm)\n  – 2c: Freie Perforation (2c1: eitrig / 2c2: fäkal)\n• Typ 3: Chronische Divertikulitis\n  – 3a: sympt. unkomplizierte Divertikulose\n  – 3b: rez. Divertikulitis ohne Komplikation\n  – 3c: rez. Divertikulitis mit Komplikation (Stenosen, Fisteln, Konglomerat)\n• Typ 4: Divertikelblutung" },
    { letter: "d", text: "Die typische Lokalisation ist das Kolon sigmoideum.", correct: true, explanation: "Richtig. Die Divertikulitis tritt häufig linksseitig im Kolon sigmoideum auf, kann jedoch auch rechtsseitig im Kolon ascendens oder Zökum auftreten (bei bis zu 10 % der asiatischen Bevölkerung; DD Appendizitis)." },
    { letter: "e", text: "Als Risikofaktoren gelten vor allem die Ernährung und die Lebensführung.", correct: true, explanation: "Richtig. Risikofaktoren:\n• Ernährung (Ballaststoffarm, Nüsse, Körner, Mais, Popcorn, rotes Fleisch)\n• Lebensführung (Rauchen, Alkohol, Adipositas, körperliche Inaktivität)\n• Hohes Alter\n• Genetische Prädisposition\n• Medikamente (NSAR, Aspirin, Acetaminophen, Coxibe, Corticosteroide, Opioide, Statine)\n\nPrimärprophylaxe: regelmäßige körperliche Aktivität, Normalgewicht, ballaststoffreiche, wenig fleischlastige Kost." },
  ]},
  { id: 120, chapter: 10, number: 22, text: "Zu welchen Komplikationen kann es bei einer Sigmadivertikulitis kommen?", statements: [
    { letter: "a", text: "Zur Perforation.", correct: true, explanation: "Richtig. Die Perforation kann gedeckt (Typ 2a/b) oder in die freie Bauchhöhle (Typ 2c) erfolgen." },
    { letter: "b", text: "Zur Blutung.", correct: true, explanation: "Richtig. Divertikelblutungen (Typ 4) sind endoskopisch schwer nachzuweisen und erfordern bei fehlendem Sistieren eine radiologische Intervention oder eine chirurgische Resektion." },
    { letter: "c", text: "Zur Karzinombildung.", correct: false, explanation: "Falsch. Ein erhöhtes Vorkommen von kolorektalen Karzinomen bei Patienten mit Divertikulose lässt sich nicht belegen." },
    { letter: "d", text: "Zur Stenose.", correct: true, explanation: "Richtig. Bei rezidivierenden Entzündungen kann es zu Stenosen mit Passagestörungen kommen (Typ 3)." },
    { letter: "e", text: "Zur Fistelung in benachbarte Organe.", correct: true, explanation: "Richtig. Die häufigste Fistel ist die Sigma-Blasen-Fistel, die durch Pneumaturie/Fäkalurie auffällt. Es sind auch Fisteln zum Dünndarm, zum Uterus, zur Scheide (insbesondere nach Hysterektomie), zur Bauchdecke oder zum Ureter möglich." },
  ]},
  { id: 121, chapter: 10, number: 23, text: "Welche Aussagen zur operativen Therapie der Sigmadivertikulitis sind zutreffend?", statements: [
    { letter: "a", text: "Die laparoskopisch-assistierte Sigmaresektion sollte auch bei frei/gedeckter Perforation einer offenen Resektion vorgezogen werden.", correct: true, explanation: "Richtig. Ziel ist die Herstellung einer spannungsfreien, gut durchbluteten, dichten Anastomose. Ggf. ist die Mobilisation der linken Flexur nötig. Erforderlich ist die Resektion des Sigmaanteils mit akut/chronisch-entzündlich veränderten Darmabschnitten, nicht jedoch aller divertikeltragenden Abschnitte. Der orale Absetzungsrand sollte proximal des entzündlich veränderten Abschnitts gewählt werden. Der aborale Absetzungsrand sollte im oberen Rektum liegen (End-zu-End- oder Seit-zu-End-Descendorektostomie)." },
    { letter: "b", text: "Bei perforierter Sigmadivertikulitis ist eine Operation nach Hartmann Standard.", correct: false, explanation: "Falsch. Die aktuellen Leitlinien empfehlen (wenn möglich) bei der perforierten Sigmadivertikulitis (Typ 2c) eine Sigmaresektion mit primärer Kontinuitätswiederherstellung mit Anastomose und Vorschaltung eines doppelläufigen Ileostomas. Bei hochseptischen und instabilen Patienten mit erschwerter Mobilisation der linken Flexur oder kotiger Vier-Quadranten-Peritonitis sollte eine Hartmann-Operation durchgeführt werden." },
    { letter: "c", text: "In Ausnahmefällen kann eine Peritoneallavage ohne Resektion diskutiert werden.", correct: true, explanation: "Richtig. Die laparoskopische Peritoneallavage und Drainage ohne Resektion kommt in Ausnahmefällen als alternative Therapiestrategie bei der perforierten Divertikulitis mit eitriger Peritonitis (Typ 2c1) in Frage, ist allerdings als Therapieoption umstritten." },
    { letter: "d", text: "Bei Hb-relevanten Divertikelblutungen sollte eine Sigmaresektion durchgeführt werden.", correct: true, explanation: "Richtig. Bei Divertikelblutungen (Typ 4) aus dem Sigma sollte bei Versagen der endoskopischen Therapie und persistierender Blutung eine Sigmaresektion durchgeführt werden. In sehr seltenen Fällen einer nicht lokalisierbaren Blutung kann eine subtotale Kolektomie mit Ileorektostomie diskutiert werden." },
    { letter: "e", text: "Wenn die Indikation zur elektiven Sigmaresektion gestellt wurde, sollte diese 6–8 Wochen nach dem letzten Schub erfolgen.", correct: true, explanation: "Richtig. Innerhalb von 4–6 Wochen nach dem Schub sollte im entzündungsfreien Intervall eine vollständige Koloskopie erfolgen (Typ 2a/b). Die Operation sollte in einem Intervall von 6–8 Wochen durchgeführt werden, sodass eine laparoskopische Operation mit primärer Anastomose bei abgeklungener Entzündung möglich wird." },
  ]},
  { id: 122, chapter: 11, number: 1, text: "Welche Aussagen zur Anatomie des Rektums sind zutreffend?", statements: [
    { letter: "a", text: "Die UICC definiert Rektumkarzinome als Tumoren, deren Unterrand bei der Messung mit dem starren Rektoskop 16 cm oder weniger von der Anokutanlinie entfernt ist.", correct: true, explanation: "Richtig. Die UICC definiert Rektumkarzinome als Tumoren mit Unterrand bei starrer Rektoskopie ≤ 16 cm von der Anokutanlinie. Einteilung in drei Etagen:\n• Unteres Drittel: bis 6 cm ab ano\n• Mittleres Drittel: 6–12 cm\n• Oberes Drittel: 12–16 cm\n\nIn den USA gelten alle Tumoren > 12 cm ab Anokutanlinie als Kolonkarzinome." },
    { letter: "b", text: "Die versorgende Hauptarterie des Rektums ist die A. rectalis superior.", correct: true, explanation: "Richtig. Neben der A. rectalis superior (aus der A. mesenterica inferior) kommen inkonstant die Aa. rectales mediae (aus der A. iliaca interna) und inferiores (aus der A. pudenda interna) vor." },
    { letter: "c", text: "Nach tiefer anteriorer Rektumresektion wird der proximale Stumpf über die Riolan-Anastomose versorgt.", correct: true, explanation: "Richtig. Das distale Rektum wird über die Aa. rectales inferiores versorgt. Je länger der Rektumstumpf, desto gefährdeter die Blutversorgung.\n\n• Riolan-Arkade: inkonstante Verbindung zwischen A. colica media (AMS) und A. colica sinistra (AMI) — wichtige Kollateralversorgung\n• Drummond-Arkade: Verbindung zwischen A. colica sinistra und Ramus sinister der A. colica media — darmnahe Äste" },
    { letter: "d", text: "Das distale Rektum besitzt eine ausgeprägte Innervation zur Aufrechterhaltung des anorektalen Reflexes.", correct: true, explanation: "Richtig. Bei der Rektumresektion sollte besonders schonend präpariert werden, um die Kontinenz nicht zu gefährden." },
    { letter: "e", text: "Der venöse Hauptabstrom erfolgt über die V. rectalis superior in die Lunge.", correct: false, explanation: "Falsch. Der venöse Hauptabstrom erfolgt zwar über die V. rectalis superior, aber über das Pfortadersystem in die Leber (hepatische Metastasierung — insbesondere beim mittleren und oberen Rektum). Über die inkonstant ausgeprägten Vv. rectales mediae und inferiores kann ein Abfluss in die V. cava und damit in die Lunge erfolgen (pulmonale Metastasen — insbesondere beim unteren Rektum)." },
  ]},
  { id: 123, chapter: 11, number: 2, text: "Welche Aussagen zur Ausbreitung und zum Staging des Rektumkarzinoms sind korrekt?", statements: [
    { letter: "a", text: "Die Durchführung einer starren Rektoskopie ist obligat.", correct: false, explanation: "Falsch. Die Messung mit dem starren Rektoskop ist zwar zur Beurteilung der Tumorhöhe unentbehrlich (da ein hohes Rektumkarzinom onkologisch wie ein Kolonkarzinom behandelt wird). Aber die Aussage ist umgekehrt zu bewerten: sie ist 'falsch' im Kontext des zusätzlichen Stagings. Neben der Rektoskopie gehören dazu: Sonographie/CT des Abdomens, vollständige Koloskopie (Zweittumor-Ausschluss), Röntgen-Thorax (ggf. CT bei tiefsitzenden Tumoren), Tumormarker (CEA, CA 19-9), Endosonographie zur Tumorausdehnung und MRT des Beckens." },
    { letter: "b", text: "Das untere Rektum ist am häufigsten durch Karzinome betroffen.", correct: false, explanation: "Falsch. Verteilungsmuster nach UICC-Einteilung:\n• Unteres Rektum (< 6 cm): ca. 36 %\n• Mittleres Rektum (6–12 cm): ca. 43 %\n• Oberes Rektum (12–16 cm): ca. 21 %" },
    { letter: "c", text: "Die Metastasierung erfolgt lymphogen zu den paraaortalen Lymphknoten oder hämatogen in die Leber.", correct: true, explanation: "Richtig. Hämatogen: über die Pfortader in die Leber; bei distalen Karzinomen in seltenen Fällen auch über die V. cava in die Lunge. Lymphogen: entlang der paraaortalen Lymphknoten entlang der A. rectalis superior. Bei distalen Karzinomen können auch die iliakalen Lymphknoten betroffen sein." },
    { letter: "d", text: "Eine Infiltration zu umliegenden Organen ist selten.", correct: false, explanation: "Falsch. Eine Infiltration umliegender Organe kommt aufgrund der fehlenden Frühsymptomatik und des oft fortgeschrittenen Lokalbefundes vor. Bei Verdacht auf Infiltration gynäkologischer Organe wird eine gynäkologische Untersuchung empfohlen, bei Verdacht auf Blasenbeteiligung die Zystoskopie. Eine präoperative Schienung der Ureteren kann bei fortgeschrittenen Tumoren sinnvoll sein." },
    { letter: "e", text: "Rektumkarzinome des oberen Drittels ohne Risikokonstellation für ein Lokalrezidiv sollten primär operiert und adjuvant analog zu Kolonkarzinomen behandelt werden.", correct: true, explanation: "Richtig. Rektumkarzinome des oberen Drittels (12–16 cm ab ano) werden wie Kolonkarzinome behandelt. Bei UICC I–III: Operation, gefolgt von postoperativer adjuvanter Chemotherapie (UICC II = 'Kann-Entscheidung'; UICC III = 'Soll-Entscheidung')." },
  ]},
  { id: 124, chapter: 11, number: 3, text: "Karzinome des mittleren und unteren Rektums werden nach einem stadienadaptierten Therapiealgorithmus behandelt. Welche Aussagen zur stadienadaptierten Therapie des Rektumkarzinoms treffen zu?", statements: [
    { letter: "a", text: "Patienten mit einem Tumorstadium cT1, N0, M0 mit niedrigem Risiko kommen für eine lokale Exzision in Frage.", correct: true, explanation: "Richtig. Indikation: T1, N0-Karzinome mit niedrigem Risikoprofil (Durchmesser < 3 cm, G1–2, L0, V0, M0). Lymphknotenmetastasen sind in dieser Konstellation bei ca. 2 % der Patienten zu erwarten. Die Exzision kann transanal als mikrochirurgische Vollwandexzision (z. B. nach Buess) oder als direkte Tumorexzision (z. B. nach Parks) erfolgen." },
    { letter: "b", text: "Patienten mit einem Tumorstadium cT1, N0, M0 mit einem hohen Risiko können ebenfalls lokal exzidiert werden.", correct: false, explanation: "Falsch. Bei cT1, N0, M0 mit hohem Risiko (G3/4, Lymphgefäßinvasion, Größe > 3 cm) besteht die Empfehlung zur PME (Partielle Mesorektumexzision) oder TME. Bei T1-Karzinomen mit Risikofaktoren und bei T2-Karzinomen liegen in 10–20 % Lymphknotenmetastasen vor — die lokale Exzision wird nicht empfohlen. Nach histopathologischer Untersuchung: bei pT1/T2, N0 → onkologische Nachsorge; bei pT3/4 oder N+ → postoperative (Radio-)Chemotherapie." },
    { letter: "c", text: "Sobald ein Lymphknotenbefall vorliegt, besteht selbst bei einem cT1-Rektumkarzinom die Indikation für eine präoperative Kurzzeitbestrahlung oder eine präoperative Radiochemotherapie.", correct: true, explanation: "Richtig. Sobald ein Lymphknotenbefall vorliegt, besteht sowohl im cT1/2- als auch im cT3/4-Stadium die Indikation zur neoadjuvanten Radiochemotherapie (Einzeldosen 1,8–2,0 Gy bis Gesamtdosis 45–50 Gy, mit 5-FU; alternativ Irinotecan, Capecitabin, Oxaliplatin) oder zur Kurzzeit-Radiotherapie (5 × 5 Gy). Die präoperative Strahlenchemotherapie ist der postoperativen adjuvanten gleichwertig. Zur Verringerung der Lokalrezidive und Toxizität wird sie bei cT3/T4 standardisiert empfohlen." },
    { letter: "d", text: "Die Resektion eines Rektumkarzinoms des mittleren und unteren Drittels sollte als TME oder PME durchgeführt werden.", correct: false, explanation: "Falsch. Standard für das mittlere und untere Rektumdrittel ist die TME. Die Qualität des chirurgischen Eingriffs hat deutlichen Einfluss auf die Prognose. Durch präoperative Radiochemotherapie und qualitätsgesicherte Chirurgie kann die Lokalrezidivrate auf 5–10 % gesenkt werden. Eine perioperative Zytostatikatherapie trägt zur Reduktion der Lokalrezidivrate bei und wird mit dem Ziel der Verhinderung von Fernmetastasen empfohlen." },
    { letter: "e", text: "Nach Beendigung einer präoperativen Radiochemotherapie sollte die Operation möglichst innerhalb von vier Wochen erfolgen.", correct: false, explanation: "Falsch. Nach Beendigung einer präoperativen Radiochemotherapie sollten die Reevaluation und Operation frühestens nach sechs Wochen erfolgen." },
  ]},
  { id: 125, chapter: 11, number: 4, text: "Welche Aussagen zu Grundsätzen der operativen Therapie des Rektumkarzinoms des mittleren und unteren Drittels treffen zu?", statements: [
    { letter: "a", text: "Bei Karzinomen des mittleren und unteren Drittels soll eine totale mesorektale Exzision (TME) erfolgen.", correct: true, explanation: "Richtig. Die TME ist Standard bei Karzinomen des mittleren und unteren Rektumdrittels. Eine PME oder TME wird bei Karzinomen des oberen Rektumdrittels empfohlen. Die TME erfolgt durch scharfe Dissektion entlang anatomischer Strukturen zwischen Fascia pelvis visceralis und parietalis." },
    { letter: "b", text: "Die Qualität der TME hat einen signifikanten Einfluss auf die Lokalrezidivrate.", correct: true, explanation: "Richtig. Bei intaktem Mesorektum beträgt die 5-Jahres-Überlebensrate 65 % vs. 47 % bei Mesorektum-Defekten. Nach 3 Jahren Follow-up Lokalrezidivrate:\n• Intakte mesorektale Faszie: ca. 4 %\n• Intramesorektale Einrisse: ca. 7 %\n• Erreichen der Muscularis-propria-Ebene: ca. 13 %" },
    { letter: "c", text: "Die Dissektion der lateralen Lymphknoten entlang der A. iliaca interna und ihrer Äste sollte immer durchgeführt werden.", correct: false, explanation: "Falsch. Die Dissektion lateraler Lymphknoten entlang der A. iliaca interna und ihrer Äste sollte ohne Metastasenverdacht nicht durchgeführt werden, da sie die perioperative Morbidität erhöht und keine Überlebensvorteile gezeigt wurden." },
    { letter: "d", text: "Besteht eine lokale Infiltration von anliegenden Organen, sollten diese en bloc mitreseziert werden.", correct: true, explanation: "Richtig. Bei lokaler Infiltration anliegender Organe sollte eine multiviszerale Resektion en bloc erfolgen, um eine örtliche Tumorzelldissemination zu vermeiden." },
    { letter: "e", text: "Die Durchführung der TME sollte unter Schonung der autonomen Beckennerven (Nn. hypogastrici, Plexus hypogastrici inferiores et superior) erfolgen.", correct: true, explanation: "Richtig. Schonung der autonomen Beckennerven (Nn. hypogastrici, Plexus hypogastrici inferiores et superior) zur Kontinenzerhaltung und Vermeidung urogenitaler Funktionsstörungen.\n\nLARS (Low Anterior Resection Syndrome) — Funktionsstörungen nach tiefer Rektumresektion:\n• Schmerzhafte und fraktionierte unvollständige Stuhlentleerung\n• Inkontinenz für Winde und flüssigen Stuhl\n• Erhöhte Stuhlfrequenz" },
  ]},
  { id: 126, chapter: 11, number: 5, text: "Welche Aussagen zum Sicherheitsabstand in der onkologischen Rektumchirurgie treffen zu?", statements: [
    { letter: "a", text: "Bei gut bis mäßig differenzierten Tumoren (G1–2) des unteren Rektumdrittels ist ein aboraler Sicherheitsabstand von 1–2 cm ausreichend.", correct: true, explanation: "Richtig. Bei Rektumkarzinomen guter oder mäßiger Differenzierung (G1–2) des unteren Rektumdrittels ist ein aboraler Sicherheitsabstand von 1–2 cm (vom makroskopischen Tumorrand gemessen) ausreichend." },
    { letter: "b", text: "Bei schlechter differenzierten Tumoren des mittleren und unteren Rektumdrittels sind 1–2 cm Sicherheitsabstand gemessen vom makroskopischen Tumorrand ebenfalls ausreichend.", correct: false, explanation: "Falsch. Bei undifferenzierten High-grade-Tumoren (G3–4) besteht ein höheres Rezidivrisiko — daher größerer Sicherheitsabstand:\n• Unteres Rektumdrittel: TME mit minimalem aboralem Abstand ≥ 5 cm\n• Oberes Rektumdrittel: PME oder TME mit aboralem Abstand ≥ 5 cm" },
    { letter: "c", text: "Der geforderte Sicherheitsabstand nach neoadjuvanter Radiochemotherapie bei Operationen des unteren Rektumdrittels beträgt 0,1 cm.", correct: false, explanation: "Falsch. Nach neoadjuvanter Radiochemotherapie kann zur Abwendung einer ansonsten notwendigen Exstirpation auch ein aboraler Abstand von 0,5 cm akzeptiert werden." },
    { letter: "d", text: "Ein intraoperativer Schnellschnitt des aboralen Resektionsrandes muss nicht erfolgen.", correct: false, explanation: "Falsch. Laut den aktuellen Leitlinien sollte die Tumorfreiheit des aboralen Resektionsrandes durch intraoperativen Schnellschnitt gesichert werden." },
    { letter: "e", text: "Das Mesorektum sollte horizontal ohne Ausdünnung nach proximal durchtrennt werden.", correct: true, explanation: "Richtig. Das Mesorektum sollte horizontal ohne Ausdünnung nach proximal durchtrennt werden." },
  ]},
  { id: 127, chapter: 11, number: 6, text: "Die Qualität des Resektats unter Berücksichtigung bestimmter Kategorien lässt Rückschlüsse auf die Prognose und die Entwicklung eines Lokalrezidivs zu. Welche Aussagen zur Qualitätsbeurteilung eines TME-Präparates treffen zu?", statements: [
    { letter: "a", text: "Die makroskopische Beurteilung der Qualität der TME erfolgt durch den Pathologen am fixierten Präparat.", correct: true, explanation: "Richtig. Die makroskopische Beurteilung der TME-Qualität erfolgt durch den Pathologen am fixierten Präparat und muss im histologischen Befund erwähnt werden." },
    { letter: "b", text: "Die Qualität des Präparates wird unter anderem an der Intaktheit der mesorektalen Faszie beurteilt.", correct: true, explanation: "Richtig. Beurteilung der Intaktheit der mesorektalen Faszie:\n• Grad 1 (gut): Mesorektale Faszie erhalten\n• Grad 2 (moderat): Intramesorektale Einrisse\n• Grad 3 (schlecht): Erreichen der Muscularis propria oder Tumor" },
    { letter: "c", text: "Im histopathologischen Befund ist die Beschreibung bezüglich der Radikalität im Bereich der Levatormuskulatur im Falle einer Rektumexstirpation obligat.", correct: true, explanation: "Richtig. Bei vollständiger Resektion der Levatormuskulatur sind Präparateinrisse und tumorpositiver CRM seltener. Beurteilung:\n• Grad 1 (gut): Levatormuskulatur mitreseziert, keine Eröffnung von Darm oder Tumor\n• Grad 2 (moderat): Muscularis propria erhalten, keine Eröffnung\n• Grad 3 (schlecht): Teile der Muscularis propria fehlen oder Eröffnung von Darm/Tumor" },
    { letter: "d", text: "Wenn das Karzinom bis an den Resektionsrand heranreicht, besteht eine R0-'narrow'-Situation.", correct: false, explanation: "Falsch. Wenn das Karzinom histologisch bis an den Resektionsrand heranreicht, besteht eine R1-Situation." },
    { letter: "e", text: "Das Verhältnis von untersuchten zu befallenen Lymphknoten sollte im histopathologischen Befund angegeben werden.", correct: true, explanation: "Richtig. Das Verhältnis von untersuchten zu befallenen Lymphknoten sollte angegeben werden. Je größer die Zahl der entfernten und untersuchten Lymphknoten, desto besser die Prognose bei UICC II und III." },
  ]},
  { id: 128, chapter: 11, number: 7, text: "Welche Aussagen zu Operationstechniken der tiefen anterioren Rektumresektion sind korrekt?", statements: [
    { letter: "a", text: "Bei der Mobilisation des Colon sigmoideum sollte der linke Ureter dargestellt werden.", correct: true, explanation: "Richtig. Bei der Mobilisation des Colon sigmoideum sollte der linke Ureter dargestellt werden. Der Ureter überkreuzt die A. iliaca an der Teilung interna/externa. Anschließend erfolgt die weitere Mobilisation des Colon descendens bis zur linken Flexur." },
    { letter: "b", text: "Die A. mesenterica superior wird 1–2 cm distal ihres Abgangs abgesetzt.", correct: false, explanation: "Falsch. Die A. mesenterica inferior (nicht superior) wird 1–2 cm distal ihres Abgangs ligiert." },
    { letter: "c", text: "Unterhalb des Promontoriums ist dorsal des Rektums der Waldeyer-Raum zwischen den Hüllfaszien des Rektums und des Beckens.", correct: true, explanation: "Richtig. In dieser Schicht ist oft eine stumpfe Präparation möglich, welche die dorsal verlaufenden autonomen Nerven und Präsakralvenen schont." },
    { letter: "d", text: "Bei der Entnahme des Präparates ist eine linksseitige/rechtsseitige Inzision im Mittelbauch dem suprapubischen Pfannenstielschnitt vorzuziehen.", correct: false, explanation: "Falsch. Pfannenstielschnitte haben im Vergleich zu Inzisionen im Mittelbauch eine deutlich geringere Inzidenz von Narbenhernien und sind daher zu bevorzugen." },
    { letter: "e", text: "Um ein adäquates postoperatives N-Stadium angeben zu können, müssen mindestens acht Lymphknoten im Rektumresektat vorhanden sein.", correct: false, explanation: "Falsch. Nach den Leitlinien ist beim KRK die Untersuchung von mindestens zwölf Lymphknoten notwendig, um ein adäquates N-Stadium angeben zu können, sonst ist der Tumor als Nx einzustufen. Allerdings kann die Anzahl der Lymphknoten im Resektat nach neoadjuvanter Therapie um bis zu 30 % sinken." },
  ]},
  { id: 129, chapter: 11, number: 8, text: "Nach TME mit sphinkternaher Anastomose sind funktionelle Störungen möglich. Diese sind abhängig von der Wahl des Rekonstruktionsverfahrens. Welche Aussagen zu Pouchanastomosen sind richtig?", statements: [
    { letter: "a", text: "Die koloanale End-zu-End-Anastomose ist der Seit-zu-End-Anastomose überlegen.", correct: false, explanation: "Falsch. Bei der Rekonstruktion nach tiefer anteriorer Resektion sollte wenn möglich keine gerade koloanale Anastomose angelegt werden. Postoperativ werden aufgrund des fehlenden Pouchreservoirs bei End-zu-End-Anastomosen häufigere imperative Stuhlfrequenzen beschrieben — Seit-zu-End-Anastomosen werden bevorzugt." },
    { letter: "b", text: "Die Anlage von Pouchanastomosen kann die Kontinenzergebnisse verbessern.", correct: true, explanation: "Richtig. In Frage kommen der J-Pouch und der transverse Kolonplastikpouch. Bei Sphinkterschädigungen oder Verletzung autonomer Nerven kann der Abfall des Sphinkterruhedrucks ausgeglichen werden. Von den verschiedenen Rekonstruktionsformen sind die Vorteile im funktionellen Ergebnis des Kolon-J-Pouches am besten belegt." },
    { letter: "c", text: "Der Kolon-J-Pouch ist dem Ileum-Pouch in der Länge sehr ähnlich.", correct: false, explanation: "Falsch. Kolon-Pouch und Ileum-Pouch sind in der J-Form zwar ähnlich, unterscheiden sich aber in der Länge:\n• Ileum-Pouch: muss 15–18 cm lang sein, um die Stuhlfrequenz signifikant zu reduzieren\n• Kolon-J-Pouch: sollte nicht länger als 5–6 cm sein, da sonst Pouchentleerungsprobleme auftreten können" },
    { letter: "d", text: "Bei einem dünnen Mesorektum kann der J-Pouch nicht realisiert werden.", correct: false, explanation: "Falsch. Bei einem dicken Mesorektum kann der Pouch nicht realisiert werden. Ebenso gestaltet sich die Anlage bei einem engen (männlichen) Becken oft schwierig." },
    { letter: "e", text: "Die Anlage des transversen Kolonplastikpouch erfolgt ca. 10 cm proximal der Anastomose.", correct: false, explanation: "Falsch. Bei der Anlage eines transversen Kolonplastikpouches erfolgt ca. 4–6 cm proximal der Anastomose die Eröffnung und eine quere Naht." },
  ]},
  { id: 130, chapter: 11, number: 9, text: "Welche Aussage zur abdominoperinealen Rektumamputation sind richtig?", statements: [
    { letter: "a", text: "Die abdominoperineale Rektumamputation wird bei fehlender Möglichkeit der kontinenzerhaltenden Resektion bei R0-Resektabilität empfohlen.", correct: true, explanation: "Richtig. Indikation: Karzinome des Analkanals oder des unteren Rektumdrittels (bei fehlender Möglichkeit der Kontinenzerhaltung). Weitere Gründe: komplexes Fistelleiden, Zustand nach Bestrahlung oder Traumata mit geschädigtem/funktionslosem Kontinenzapparat." },
    { letter: "b", text: "Die postoperative Impotenzrate beträgt bis zu 80 %.", correct: false, explanation: "Falsch. Die postoperative Impotenzrate beträgt zwischen 20–60 % und sollte in der Aufklärung besprochen werden. Für den Potenzerhalt ist die Schonung der Nervi erigentes im Bereich der Samenbläschen und des Plexus hypogastricus an der posterolateralen Beckenwand wichtig.\n\nWeitere OP-spezifische Risiken:\n• Blasenfunktionsstörungen (20–100 %)\n• Verletzung von Harnblase, Ureter, Urethra (ca. 6 %)\n• Stomakomplikationen (Prolaps, Ausriss, Nekrose in 10–30 %)\n• Perineale Wundheilungsstörungen (ca. 50 %)" },
    { letter: "c", text: "Intraoperativ erfolgt die Ausräumung des Fettkörpers der Fossa ischiorectalis und der Lymphknoten.", correct: true, explanation: "Richtig. Die Ausräumung sollte großzügig erfolgen. Kompromisse in der Radikalität infolge eines zu knappen Seitenabstandes sollten vermieden werden." },
    { letter: "d", text: "Intraoperativ erfolgt die Durchtrennung des M. sphincter ani.", correct: false, explanation: "Falsch. Der M. levator ani wird am Übergang in den M. sphincter ani externus durchtrennt." },
    { letter: "e", text: "Die perineale Wunde sollte aufgrund der hohen Infektionsrate nicht primär verschlossen werden.", correct: false, explanation: "Falsch. Es sollte der primäre Wundverschluss durch schichtweisen Verschluss von Muskel, Faszie und Haut sowie Einlage einer Drainage in die Sakralhöhle erfolgen." },
  ]},
  { id: 131, chapter: 12, number: 1, text: "Welche Aussagen zur Epidemiologie des Morbus Crohn treffen zu?", statements: [
    { letter: "a", text: "Die Entzündungsreaktion kann transmural den gesamten Gastrointestinaltrakt befallen.", correct: true, explanation: "Richtig. Es handelt sich um eine granulomatöse Entzündungsreaktion, die transmural den gesamten Gastrointestinaltrakt von den Lippen bis zum Anus befallen kann. Typisch ist ein diskontinuierlicher segmentaler Befall." },
    { letter: "b", text: "Männer sind häufiger betroffen als Frauen.", correct: false, explanation: "Falsch. Es sind Frauen und Männer zu gleichen Anteilen betroffen." },
    { letter: "c", text: "Am häufigsten tritt eine Entzündung im Bereich des terminalen Ileums auf.", correct: true, explanation: "Richtig. Befallsverteilung:\n• Terminales Ileum: 80 %\n• Zökum und Kolon: je 30 %\n• Rektum: 20 %\n• Proximaler Dünndarm: ca. 10 %\n• Magen, Duodenum, Ösophagus: je 1–3 %" },
    { letter: "d", text: "Das Hauptmanifestationsalter ist zwischen dem 30. und 40. Lebensjahr, die Prävalenz der Erkrankung ist allerdings sinkend.", correct: false, explanation: "Falsch. Das Hauptmanifestationsalter ist zwischen dem 16. und 35. Lebensjahr sowie nach dem 60. Lebensjahr. Die Prävalenz in Deutschland ist tendenziell steigend mit 200/100.000 Einwohnern." },
    { letter: "e", text: "Dunkelhäutige Menschen haben ein niedrigeres Erkrankungsrisiko für CED.", correct: true, explanation: "Richtig. Dunkelhäutige Menschen erkranken nur halb so oft wie hellhäutige." },
  ]},
  { id: 132, chapter: 12, number: 2, text: "Welche Aussagen zur Symptomatik des Morbus Crohn ist korrekt?", statements: [
    { letter: "a", text: "Proktologische Beschwerdebilder sind häufig erste Symptome des M. Crohn.", correct: true, explanation: "Richtig. In 40 % der Fälle treten zunächst Fisteln auf, davon in 10 % der Fälle als isoliertes Symptom." },
    { letter: "b", text: "Subfebrile Temperaturen und Unterbauchschmerzen treten häufig auf.", correct: true, explanation: "Richtig. In fortgeschrittenen Fällen kann auch ein Konglomerattumor im Unterbauch palpabel werden." },
    { letter: "c", text: "Auftretende Diarrhöen sind meist schleimig-blutig.", correct: false, explanation: "Falsch. Meist sind die Diarrhöen zwar schleimig, jedoch eher nicht blutig (im Gegensatz zur Colitis ulcerosa)." },
    { letter: "d", text: "Die Hälfte der Patienten leidet unter intestinalen Fisteln.", correct: false, explanation: "Falsch. Intestinale Fisteln treten bei ca. einem Drittel der Patienten auf. Am häufigsten sind enteroenterale (70 %), enterokutane (16 %) oder enterovesikale (12 %) Fisteln." },
    { letter: "e", text: "Durch Malabsorption kann es im Kindesalter zu Wachstumsstörungen kommen.", correct: true, explanation: "Richtig. Auch bei Erwachsenen kann es zu erheblichen Gewichtsverlusten, Anämie, Vitaminmangelerscheinungen und Steatorrhö kommen." },
  ]},
  { id: 133, chapter: 12, number: 3, text: "Welche Aussage zur Diagnostik des Morbus Crohn ist richtig?", statements: [
    { letter: "a", text: "Eine laborchemische Basisdiagnostik sollte neben Entzündungsparametern und Eisenstatus auch Cholestaseparameter umfassen.", correct: true, explanation: "Richtig. Im Wesentlichen sollte eine umfassende laborchemische Diagnostik und Ausschluss von Mangelsyndromen bei Diagnosestellung erfolgen." },
    { letter: "b", text: "Fäkale Entzündungsparameter haben keine diagnostische Aussagekraft.", correct: false, explanation: "Falsch. Fäkale Entzündungsparameter wie Calprotectin und Lactoferrin weisen eine hohe Sensitivität (93 %) und Spezifität (96 %) für die Diagnose einer CED auf. Sie können auch bei Verlaufsbeurteilung oder bei Verdacht auf ein Rezidiv eingesetzt werden. In der klinischen Praxis spielen sie im Zeitalter der Endoskopie/Biopsie eine marginale Rolle." },
    { letter: "c", text: "Eine Stuhlprobe auf pathogene Keime und Clostridium difficile ist bei jungen Patienten nicht notwendig.", correct: false, explanation: "Falsch. Bei Stellung der Diagnose M. Crohn wird immer ein Stuhltest auf pathogene Keime und Clostridium difficile empfohlen. Positive Reiseanamnese kann zusätzliche Tests (z. B. Lamblien nach Indienreise) notwendig machen. Eine Stuhluntersuchung auf C. difficile sollte auch bei jedem schweren akuten Schub oder therapierefraktärem Verlauf erfolgen." },
    { letter: "d", text: "Ein CT-Abdomen gehört zur Standarddiagnostik.", correct: false, explanation: "Falsch. Im Rahmen der Diagnosestellung wird eine abdominelle Sonographie empfohlen. Entzündete oder stenotische Darmabschnitte können mit Kontrastmittelsonographie (CEUS) mit Sensitivität und Spezifität > 90 % identifiziert werden. Zusätzlich MRT und ggf. Videokapselendoskopie des Dünndarms." },
    { letter: "e", text: "Eine Ileokoloskopie mit Stufenbiopsien ist Standard bei der Diagnosestellung.", correct: true, explanation: "Richtig. Zur Identifizierung des Befallsmusters: Ileokoloskopie mit Stufenbiopsie-Entnahme aus Dünn- und Dickdarm, ÖGD und Dünndarm-MRT." },
  ]},
  { id: 134, chapter: 12, number: 4, text: "Welche Aussagen zur Klassifikation des Morbus Crohn sind zutreffend?", statements: [
    { letter: "a", text: "Die Krankheitsaktivität wird anhand des Crohn's Disease Activity Index (CDAI) bestimmt.", correct: true, explanation: "Richtig. CDAI-Berechnung aus:\n• Anzahl ungeformter Stühle/Woche (×2)\n• Bauchschmerzen 0–3 (×5)\n• Allgemeinbefinden (×7)\n• Komplikationen (Arthritis, Iritis/Uveitis, Erythema nodosum/Pyoderma gangraenosum/orale Aphten, peranaler Befall, Fisteln/Abszesse, Fieber > 37,7 °C) (×20)\n• Symptomatische Diarrhö-Behandlung (×30)\n• Abdominelle Resistenz 0–5 (×10)\n• Abweichung Hämatokrit (×6)\n• Abweichung Standardgewicht in % (×1)" },
    { letter: "b", text: "Bei einem CDAI unter 100 Punkten wird von einer Remission ausgegangen.", correct: false, explanation: "Falsch. Bei einem CDAI unter 150 Punkten wird von einem Ansprechen/Remission ausgegangen. Von einem Rezidiv wird bei einem CDAI-Anstieg von mehr als 70 Punkten oder einer Gesamtsumme über 150 Punkten gesprochen." },
    { letter: "c", text: "Ein CDAI von über 350 Punkten spricht für eine sehr schwere Entzündungsaktivität.", correct: false, explanation: "Falsch. Ab einem CDAI über 450 Punkten wird von schwerer Entzündungsaktivität ausgegangen. Bei 220–450 Punkten: mittlere bis schwere Entzündung." },
    { letter: "d", text: "Bei einem Punkteabfall von 50 wird von einem Ansprechen auf die Therapie ausgegangen.", correct: false, explanation: "Falsch. Bei einem Punkteabfall von über 100 wird von einem positiven Ansprechen ausgegangen. Der Behandlungserfolg kann anhand der klinischen Symptome, nicht jedoch anhand der intestinalen Morphologie abgeschätzt werden." },
    { letter: "e", text: "Der Verlauf wird in vier typische Stadien unterteilt.", correct: true, explanation: "Richtig. Die Verlaufsformen werden unterschieden in: chronisch-rezidivierend, aktiv, kompliziert und steroidrefraktär." },
  ]},
  { id: 135, chapter: 12, number: 5, text: "Welche Aussagen zu den extraintestinalen Manifestationen beim Morbus Crohn treffen zu?", statements: [
    { letter: "a", text: "Extraintestinale Manifestationen sind bei der Hälfte der Patienten vorhanden.", correct: false, explanation: "Falsch. 30 % der M.-Crohn-Patienten haben extraintestinale Manifestationen." },
    { letter: "b", text: "Die primär sklerosierende Cholangitis (PSC) kommt gleich häufig bei M. Crohn und Colitis ulcerosa vor.", correct: false, explanation: "Falsch. Die PSC kommt bei der Colitis ulcerosa deutlich häufiger vor als beim M. Crohn." },
    { letter: "c", text: "Das Erythema nodosum tritt meist im Rahmen eines akuten Crohn-Schubes auf.", correct: true, explanation: "Richtig. Das Erythema nodosum tritt vorwiegend im Rahmen von Schüben des M. Crohn auf. Andere extraintestinale Manifestationen sind weitgehend unabhängig vom Verlauf der Grunderkrankung (z. B. Typ-II-Arthritis)." },
    { letter: "d", text: "Bei der Crohn-assoziierten axialen Arthritis sind TNF-α-Antikörper wirksam.", correct: true, explanation: "Richtig. Die axiale Arthritis schließt Spondylitis und Sakroileitis ein. Traditionelle Basistherapeutika (Sulfasalazin, Methotrexat, Leflunomid) sind bei axialer Erkrankung mit Spondyloarthritis ineffektiv. NSAR sind wirksam. TNF-α-Antikörper sind bei ankylosierender Spondylitis die wirksamste Therapie — auch bei Patienten mit M. Crohn nachgewiesen." },
    { letter: "e", text: "Beim Erythema nodosum treten typischerweise erhabene, rot-violett verfärbte subkutane Hautknötchen auf.", correct: true, explanation: "Richtig. Am häufigsten manifestiert sich das Erythema nodosum an den distalen Streckseiten der Extremitäten." },
  ]},
  { id: 136, chapter: 12, number: 6, text: "Welche Aussagen zur chirurgischen Therapie des Morbus Crohn sind richtig?", statements: [
    { letter: "a", text: "Prednisolon sollte vor Darmoperationen bei erhöhtem Risiko für Anastomoseninsuffizienzen präoperativ ausgeschlichen werden.", correct: true, explanation: "Richtig. Bei elektiver OP-Indikation sollte (falls möglich) Prednisolon in Schritten von 5 mg/Woche reduziert werden. Azathioprin kann perioperativ in den bei M. Crohn verabreichten Dosierungen beibehalten werden." },
    { letter: "b", text: "Bei Darmresektionen bei Crohn-Patienten sollten Seit-zu-End-Anastomosen angelegt werden, da diese eine bessere Heilungstendenz haben.", correct: false, explanation: "Falsch. End-zu-Seit-Anastomosen können zu Blindsacksyndromen und dortigem Crohn-Befall führen. Es werden daher End-zu-End-Anastomosen präferiert. Ein makroskopischer Abstand von 2 cm zum Entzündungsrand ist bei Darmresektionen ausreichend. Ein histologischer Befall des Resektionsrandes ist prognostisch irrelevant." },
    { letter: "c", text: "Um intestinale Fistelbildungen zu vermeiden, sollten fortlaufend-handgenähte Anastomosen mit einem monofilen Faden angelegt werden.", correct: true, explanation: "Richtig. Fortlaufende Nähte reduzieren die intestinale Fistelbildung bei Crohn-Patienten. Auf die Anwendung von Staplern und intraabdominellen Drainagen zur Vermeidung von Fisteln sollte verzichtet werden." },
    { letter: "d", text: "Interenterische, enterovesikale und enterokutane Fisteln stellen immer eine Operationsindikation dar.", correct: false, explanation: "Falsch.\n• Interenterische Fisteln in einem Dünndarmkonglomerat ohne Kurzdarmsyndrom können medikamentös behandelt werden. Bei OP ist meist die Resektion längerer Darmabschnitte erforderlich → erhöhtes Kurzdarm-Risiko.\n• Blind endende, retroperitoneal abszedierende Fisteln sollten operativ angegangen werden (Sepsisgefahr).\n• Enterovesikale Fisteln sollten wegen chronischer Zystitis und Urosepsis-Gefahr immer chirurgisch saniert werden.\n• Enterokutane Fisteln: je nach Symptomatik konservativ oder operativ (bei gering fördernden Fisteln und langstreckigem Crohn-Befall zunächst medikamentös)." },
    { letter: "e", text: "Die Strikturoplastik ist eine Therapieoption bei kurzstreckigen Stenosen.", correct: true, explanation: "Richtig. Die Strikturoplastik ist analog zur Pyloroplastik eine darmerhaltende Methode zur Behebung von Stenosen. Verschiedene Techniken: Heineke-Mikulicz, Finney oder Michelassi." },
  ]},
  { id: 137, chapter: 12, number: 7, text: "Welche Aussagen zum Morbus Crohn im Rahmen von proktologischen Erkrankungen sind zutreffend?", statements: [
    { letter: "a", text: "Eine anale Mitbeteiligung bei M. Crohn tritt bei bis zu 40 % der Patienten auf.", correct: true, explanation: "Richtig. Bei 10 % der Patienten manifestiert sich der M. Crohn zunächst ausschließlich in der Analregion ohne Mitbeteiligung des Magen-Darm-Traktes." },
    { letter: "b", text: "Atypische Analfissuren, periproktitische Abszesse und Fisteln sind typische Krankheitsbilder bei M. Crohn.", correct: true, explanation: "Richtig. Häufige anale Mitbeteiligungen: Fisteln ca. 35 %, Abszesse ca. 24 %, Fissuren ca. 8 %. Seltener: Kontinenzstörungen, Analstenosen (insbesondere nach multiplen chirurgischen Eingriffen), Analekzeme und Ulcera." },
    { letter: "c", text: "Bei der Colitis ulcerosa kommen perianale Läsionen genauso häufig vor wie bei Morbus Crohn.", correct: false, explanation: "Falsch. Bei der Colitis ulcerosa sind perianale Läsionen mit ca. 13 % deutlich seltener als beim M. Crohn mit ca. 40 %." },
    { letter: "d", text: "Perianale Fisteln bei M. Crohn sollten primär chirurgisch therapiert werden.", correct: false, explanation: "Falsch. Beim M. Crohn bestehen häufig multiple und komplexe perianale Fisteln. Primär steht die konservative Therapie im Vordergrund. Die Rezidivhäufigkeit nach Fisteloperationen ist sehr hoch. Ischiorektale Fisteln haben die größte Rezidivrate (ca. 70 %), gefolgt von transsphinktären Fisteln (ca. 50 %). Nur symptomatische perianale Fisteln sollten mit dem kleinstmöglichen chirurgischen Eingriff operativ versorgt werden." },
    { letter: "e", text: "Eine etablierte Methode bei Fistelleiden im Rahmen von M. Crohn ist die Fisteldrainage.", correct: true, explanation: "Richtig. Empfohlen wird ein Gummizügel (Seton), der die Fistel offenhält und eine drainierende Funktion hat." },
  ]},
  { id: 138, chapter: 12, number: 8, text: "Welche Aussage zur Colitis ulcerosa ist korrekt?", statements: [
    { letter: "a", text: "Der Häufigkeitsgipfel ist zwischen dem 20. und 35. Lebensjahr.", correct: true, explanation: "Richtig. Der erste Häufigkeitsgipfel ist zwischen dem 20.–35. Lebensjahr; ein zweiter tritt zwischen dem 60.–80. Lebensjahr auf." },
    { letter: "b", text: "Der Truelove/Witt-Index bemisst die Krankheitsaktivität.", correct: true, explanation: "Richtig. Alternativ kann eine vereinfachte Einteilung verwendet werden, die auf Körpertemperatur, Anzahl der blutigen Durchfälle, subjektivem Krankheitsgefühl und Herzfrequenz basiert." },
    { letter: "c", text: "Die Ausbreitung erfolgt vom Kolon ins Rektum.", correct: false, explanation: "Falsch. Der Beginn ist vom distalen Rektum kontinuierlich bis ins Kolon (im Gegensatz zum diskontinuierlichen Befall beim M. Crohn)." },
    { letter: "d", text: "Das Leitsymptom der Colitis ulcerosa sind blutig-schleimige Diarrhöen.", correct: true, explanation: "Richtig. Neben blutig-schleimigen Diarrhöen sind Fieber, abdominelle Schmerzen und extraintestinale Symptome charakteristisch." },
    { letter: "e", text: "Bei der Colitis ulcerosa steigt das Risiko der malignen Entartung mit der Erkrankungsdauer an.", correct: true, explanation: "Richtig. Malignitätsrisiko:\n• Nach 10 Jahren: 2 %\n• Nach 20 Jahren: 8 %\n• Nach 30 Jahren: 18 %\n\nDie Schwierigkeit der Risikoabschätzung besteht darin, dass die Krankheit zum Diagnosezeitpunkt möglicherweise bereits seit Jahren bestehen kann." },
  ]},
  { id: 139, chapter: 12, number: 9, text: "Welche Aussagen zur extraintestinalen Beteiligung bei Colitis ulcerosa sind richtig?", statements: [
    { letter: "a", text: "Die häufigste extraintestinale Manifestation ist die Gelenkbeteiligung.", correct: true, explanation: "Richtig. Die Gelenkbeteiligung stellt die häufigste extraintestinale Manifestation bei Colitis ulcerosa dar. Unterschieden wird zwischen Befall des Achsenskeletts (Spondylarthropathien) und peripherem Gelenkbefall (Arthralgien)." },
    { letter: "b", text: "Die häufigsten Gelenkmanifestationen sind periphere Arthritiden.", correct: false, explanation: "Falsch. Der Befall des Achsenskeletts (Spondylarthropathien) ist am häufigsten." },
    { letter: "c", text: "Die PSC tritt bei bis zu 10 % der Colitis ulcerosa-Patienten auf.", correct: true, explanation: "Richtig. Bis zu 10 % der Colitis ulcerosa-Patienten erkranken an einer PSC. Umgekehrt leiden ca. 75 % der Patienten mit PSC an Colitis ulcerosa." },
    { letter: "d", text: "Colitis-ulcerosa-Patienten mit einer PSC haben ein höheres Kolonkarzinomrisiko als Colitis-ulcerosa-Patienten ohne PSC.", correct: true, explanation: "Richtig. Eine Metaanalyse ergab, dass Patienten mit PSC ein fünffach erhöhtes Kolonkarzinomrisiko haben." },
    { letter: "e", text: "Arthritiden bei Patienten mit Colitis ulcerosa werden im Rahmen der HLA-B27-assoziierten seronegativen Spondylarthropathien klassifiziert.", correct: true, explanation: "Richtig. HLA-B27 ist eine Variante des Human Leukocyte Antigen-B Komplexes. Mutationen im HLA-B-Gen sind mit bestimmten Autoimmunerkrankungen assoziiert." },
  ]},
  { id: 140, chapter: 12, number: 10, text: "Welche Aussage zum Therapiekonzept der Colitis ulcerosa ist richtig?", statements: [
    { letter: "a", text: "5-Aminosalicylsäure (5-ASA) wie Mesalazin kann topisch oder oral bei leichten und mäßigen Schüben eingesetzt werden.", correct: true, explanation: "Richtig. Beim leichten Schub wird 5-ASA topisch als Zäpfchen, Klysma, Schaum oder Einlauf empfohlen. Bei mäßigen Schüben kann eine Kombination aus topischer und oraler Gabe erfolgen. Auch zur Remissionserhaltung eignet sich 5-ASA." },
    { letter: "b", text: "Glukokortikoide werden topisch oder systemisch bei mäßigem oder schwerem Schub empfohlen.", correct: true, explanation: "Richtig. Z. B. Budesonid als Zäpfchen oder Schaum additiv bei mäßigem Schub; Prednisolon 0,5–1 mg/kg KG bei schwerem Schub als systemische Gabe." },
    { letter: "c", text: "Bei schweren Schüben ohne Ansprechen auf Glukokortikoide werden Immunsuppressiva verabreicht.", correct: true, explanation: "Richtig. In Frage kommen TNF-α-Antikörper (Infliximab), der Purinantagonist Azathioprin oder Calcineurininhibitoren (Ciclosporin A, Tacrolimus). Zunächst sollte auf Calcineurininhibitoren zurückgegriffen werden, im Falle von Therapieversagen durch TNF-α-Antikörper ersetzt werden." },

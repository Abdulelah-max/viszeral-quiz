  // ─────────────────────────────────────────────────────────────────────────
  // SESSION BUILDERS
  // ─────────────────────────────────────────────────────────────────────────

  const startChapter = (chapterId, resume = true) => {
    const chQs = QUESTIONS.filter((q) => q.chapter === chapterId).sort((a, b) => a.number - b.number);
    if (chQs.length === 0) return;
    let order = chQs.map((q) => q.id);
    if (shuffle) order = [...order].sort(() => Math.random() - 0.5);

    // Smarter resume: find first question where not all 5 statements have been attempted
    let startIdx = 0;
    if (resume && !shuffle) {
      const chData = storage.chapters[chapterId] || { attempted: [] };
      const attemptedSet = new Set(chData.attempted || []);
      const firstUnfinished = order.findIndex((qid) => {
        const q = chQs.find((x) => x.id === qid);
        if (!q) return false;
        // Check if all 5 statements (a-e) attempted for this question
        return !q.statements.every((stmt) => attemptedSet.has(stmtKey(qid, stmt.letter)));
      });
      // If all questions in chapter are complete, start from beginning
      startIdx = firstUnfinished === -1 ? 0 : firstUnfinished;
    }

    setActiveChapter(chapterId);
    setSessionMode("chapter");
    setQueue(order);
    setQIndex(startIdx);
    setStmtIndex(0);
    setRevealed(false);
    setLastGuess(null);
    setSessionStats({ correct: 0, wrong: 0 });
    setView("quiz");
  };

  const startWrongReview = () => {
    if (storage.wrongPile.length === 0) return;
    // Get unique question ids from wrong pile, then use all 5 stmts (or just the wrong ones?)
    // User said: "The False answers should be also in seperate section always there until I solve them correctly"
    // So we want to drill specifically on the wrong statements. We'll build a virtual queue per wrong stmt.
    const wrongQIds = [...new Set(storage.wrongPile.map((k) => Number(k.split(".")[0])))];
    const order = shuffle ? [...wrongQIds].sort(() => Math.random() - 0.5) : wrongQIds;
    setActiveChapter(null);
    setSessionMode("wrong");
    setQueue(order);
    setQIndex(0);
    // Start at first wrong statement in first question
    const firstQ = QUESTIONS.find((q) => q.id === order[0]);
    const firstWrongLetter = firstQ.statements.find((s) => storage.wrongPile.includes(stmtKey(firstQ.id, s.letter)))?.letter || "a";
    const firstStmtIdx = firstQ.statements.findIndex((s) => s.letter === firstWrongLetter);
    setStmtIndex(firstStmtIdx);
    setRevealed(false);
    setLastGuess(null);
    setSessionStats({ correct: 0, wrong: 0 });
    setView("quiz");
  };

  // ─────────────────────────────────────────────────────────────────────────
  // ANSWER HANDLING
  // ─────────────────────────────────────────────────────────────────────────

  const handleGuess = (guess) => {
    if (revealed || !currentStatement) return;
    const isCorrect = (guess === "richtig") === currentStatement.correct;
    const key = stmtKey(currentQuestion.id, currentStatement.letter);
    setLastGuess(guess);
    setRevealed(true);
    setSessionStats((s) => ({ correct: s.correct + (isCorrect ? 1 : 0), wrong: s.wrong + (isCorrect ? 0 : 1) }));

    // Update persistent storage
    setStorage((prev) => {
      const next = { ...prev, chapters: { ...prev.chapters } };
      const chId = currentQuestion.chapter;
      const chData = { correctIds: [], attempted: [], lastQIndex: 0, ...(next.chapters[chId] || {}) };
      chData.correctIds = [...(chData.correctIds || [])];
      chData.attempted = [...(chData.attempted || [])];

      if (!chData.attempted.includes(key)) chData.attempted.push(key);

      if (isCorrect) {
        if (!chData.correctIds.includes(key)) chData.correctIds.push(key);
        // Remove from wrong pile if present (mastered)
        next.wrongPile = prev.wrongPile.filter((k) => k !== key);
      } else {
        // Add to wrong pile
        if (!prev.wrongPile.includes(key)) next.wrongPile = [...prev.wrongPile, key];
        else next.wrongPile = prev.wrongPile;
        // If previously marked correct, remove that too (re-learning)
        chData.correctIds = chData.correctIds.filter((k) => k !== key);
      }

      next.chapters[chId] = chData;
      next.lastActive = chId;

      // Analytics
      next.attemptsByStmt = { ...(prev.attemptsByStmt || {}) };
      next.attemptsByStmt[key] = (next.attemptsByStmt[key] || 0) + 1;
      next.correctByStmt = { ...(prev.correctByStmt || {}) };
      if (isCorrect) next.correctByStmt[key] = (next.correctByStmt[key] || 0) + 1;

      // Track active day
      const today = new Date().toISOString().slice(0, 10);
      next.daysActive = prev.daysActive || [];
      if (!next.daysActive.includes(today)) next.daysActive = [...next.daysActive, today];

      return next;
    });
  };

  const handleNext = () => {
    if (sessionMode === "wrong") {
      // In wrong review, find next wrong statement
      const allWrong = storage.wrongPile;
      if (allWrong.length === 0) {
        setView("summary");
        return;
      }
      // Find next wrong stmt in current question
      let q = currentQuestion;
      for (let s = stmtIndex + 1; s < 5; s++) {
        if (allWrong.includes(stmtKey(q.id, q.statements[s].letter))) {
          setStmtIndex(s);
          setRevealed(false);
          setLastGuess(null);
          return;
        }
      }
      // Next question in queue that has any wrong
      for (let i = qIndex + 1; i < queue.length; i++) {
        const nq = QUESTIONS.find((x) => x.id === queue[i]);
        const idx = nq.statements.findIndex((s) => allWrong.includes(stmtKey(nq.id, s.letter)));
        if (idx >= 0) {
          setQIndex(i);
          setStmtIndex(idx);
          setRevealed(false);
          setLastGuess(null);
          return;
        }
      }
      setView("summary");
      return;
    }

    // Chapter mode
    if (stmtIndex < 4) {
      setStmtIndex(stmtIndex + 1);
      setRevealed(false);
      setLastGuess(null);
    } else if (qIndex < queue.length - 1) {
      const nextIdx = qIndex + 1;
      setQIndex(nextIdx);
      setStmtIndex(0);
      setRevealed(false);
      setLastGuess(null);
      // Update resume position
      setStorage((prev) => {
        const next = { ...prev, chapters: { ...prev.chapters } };
        const chData = { correctIds: [], attempted: [], ...(next.chapters[activeChapter] || {}) };
        chData.lastQIndex = nextIdx;
        next.chapters[activeChapter] = chData;
        return next;
      });
    } else {
      // Chapter complete — reset resume
      setStorage((prev) => {
        const next = { ...prev, chapters: { ...prev.chapters } };
        const chData = { correctIds: [], attempted: [], ...(next.chapters[activeChapter] || {}) };
        chData.lastQIndex = 0;
        next.chapters[activeChapter] = chData;
        return next;
      });
      setView("summary");
    }
  };

  const toggleBookmark = (qid) => {
    setStorage((prev) => ({
      ...prev,
      bookmarks: prev.bookmarks.includes(qid) ? prev.bookmarks.filter((x) => x !== qid) : [...prev.bookmarks, qid],
    }));
  };

  const [confirmingReset, setConfirmingReset] = useState(false);
  const resetAllProgress = () => {
    if (confirmingReset) {
      setStorage(defaultStorage());
      setConfirmingReset(false);
    } else {
      setConfirmingReset(true);
      setTimeout(() => setConfirmingReset(false), 4000);
    }
  };

  const progress = queue.length > 0 ? ((qIndex * 5 + stmtIndex + 1) / (queue.length * 5)) * 100 : 0;
  const totalAnswered = sessionStats.correct + sessionStats.wrong;
  const accuracy = totalAnswered > 0 ? Math.round((sessionStats.correct / totalAnswered) * 100) : 0;

  // ─────────────────────────────────────────────────────────────────────────
  return (
    <div className="min-h-screen bg-stone-50 text-stone-900" style={{ fontFamily: "'Source Serif 4', 'Source Serif Pro', Georgia, serif" }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,300..900;1,8..60,300..900&family=JetBrains+Mono:wght@400;500;600&display=swap');
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .anim-in { animation: fadeInUp 0.3s ease-out both; }
        .anim-fade { animation: fadeIn 0.25s ease-out both; }
        .font-mono-ui { font-family: 'JetBrains Mono', ui-monospace, monospace; }
        .tap-highlight { -webkit-tap-highlight-color: transparent; }
      `}</style>

      <div className="mx-auto max-w-xl px-5 pb-28 pt-safe">
        {view === "home" && (
          <HomeScreen
            storage={storage}
            chapterStats={chapterStats}
            weakChapters={weakChapters}
            shuffle={shuffle}
            setShuffle={setShuffle}
            onStartChapter={startChapter}
            onStartWrongReview={startWrongReview}
            onOpenWeakScreen={() => setView("weak")}
            onOpenAnalytics={() => setView("analytics")}
            onResetProgress={resetAllProgress}
            confirmingReset={confirmingReset}
          />
        )}

        {view === "weak" && (
          <WeakScreen
            chapterStats={chapterStats}
            weakChapters={weakChapters}
            onBack={() => setView("home")}
            onStartChapter={(id) => startChapter(id, true)}
          />
        )}

        {view === "analytics" && (
          <AnalyticsScreen
            storage={storage}
            chapterStats={chapterStats}
            setStorage={setStorage}
            onBack={() => setView("home")}
          />
        )}

        {view === "quiz" && currentQuestion && (
          <QuizScreen
            question={currentQuestion}
            qIndex={qIndex}
            qTotal={queue.length}
            stmtIndex={stmtIndex}
            statement={currentStatement}
            revealed={revealed}
            lastGuess={lastGuess}
            onGuess={handleGuess}
            onNext={handleNext}
            progress={progress}
            sessionStats={sessionStats}
            bookmarked={storage.bookmarks.includes(currentQuestion.id)}
            onToggleBookmark={() => toggleBookmark(currentQuestion.id)}
            onExit={() => setView("home")}
            sessionMode={sessionMode}
            remainingWrong={storage.wrongPile.length}
          />
        )}

        {view === "summary" && (
          <SummaryScreen
            stats={sessionStats}
            accuracy={accuracy}
            questionCount={queue.length}
            sessionMode={sessionMode}
            remainingWrong={storage.wrongPile.length}
            onHome={() => setView("home")}
            onAgain={() => sessionMode === "wrong" ? startWrongReview() : activeChapter && startChapter(activeChapter, false)}
          />
        )}
      </div>
    </div>
  );
}

function ChapterCard({ chapter, isActive, stats, onClick }) {
  if (!isActive) {
    return (
      <div className="flex items-center gap-3 px-4 py-3.5 bg-stone-100/50 rounded-2xl opacity-50">
        <div className="font-mono-ui text-[11px] text-stone-400 w-6">{String(chapter.id).padStart(2, "0")}</div>
        <div className="flex-1">
          <div className="text-[14px] text-stone-500 leading-snug">{chapter.name}</div>
          <div className="font-mono-ui text-[10px] text-stone-400 italic uppercase tracking-wider mt-0.5">Demnächst</div>
        </div>
      </div>
    );
  }

  const inProgress = stats.lastQIndex > 0 && stats.attempted < stats.totalStmts;
  const completed = stats.attempted >= stats.totalStmts;

  return (
    <button onClick={onClick} className="tap-highlight w-full flex items-center gap-3 px-4 py-3.5 bg-white border border-stone-200 rounded-2xl active:bg-stone-100 transition text-left">
      <div className="font-mono-ui text-[11px] text-stone-400 w-6">{String(chapter.id).padStart(2, "0")}</div>
      <div className="flex-1 min-w-0">
        <div className="text-[14px] font-medium text-stone-900 leading-snug">{chapter.name}</div>
        <div className="flex items-center gap-2 mt-1">
          <div className="flex-1 h-[3px] bg-stone-100 rounded-full overflow-hidden">
            <div className="h-full bg-stone-900 transition-all duration-500" style={{ width: `${stats.pct}%` }} />
          </div>
          <div className="font-mono-ui text-[10px] tabular-nums text-stone-500 flex-shrink-0">{stats.pct}%</div>
        </div>
        <div className="font-mono-ui text-[10px] text-stone-400 mt-1 flex items-center gap-2">
          <span>{stats.correct}/{stats.totalStmts}</span>
          {inProgress && <span className="text-rose-700 italic">· Fortsetzen</span>}
          {completed && <span className="text-emerald-700">· ✓ abgeschlossen</span>}
          {stats.wrong > 0 && <span className="text-amber-700">· {stats.wrong} zu wdh.</span>}
        </div>
      </div>
      <ChevronRight size={16} className="text-stone-300 flex-shrink-0" />
    </button>
  );
}

        </div>
        <button onClick={onToggleBookmark} className="tap-highlight -mr-2 p-2 rounded-full active:bg-stone-200">
          {bookmarked ? <BookmarkCheck size={20} className="text-amber-700" /> : <Bookmark size={20} className="text-stone-400" />}
        </button>
      </div>

      {/* Progress bar (only chapter mode) */}
      {sessionMode !== "wrong" && (
        <div className="h-[3px] bg-stone-200 rounded-full overflow-hidden mb-5">
          <div className="h-full bg-stone-900 transition-all duration-500 ease-out" style={{ width: `${progress}%` }} />
        </div>
      )}

      {/* Score chips */}
      <div className="flex items-center gap-2 mb-5">
        <div className="flex items-center gap-1.5 px-2.5 py-1 bg-emerald-50 rounded-full border border-emerald-200">
          <Check size={12} strokeWidth={3} className="text-emerald-700" />
          <span className="font-mono-ui text-[11px] tabular-nums text-emerald-800 font-semibold">{sessionStats.correct}</span>
        </div>
        <div className="flex items-center gap-1.5 px-2.5 py-1 bg-rose-50 rounded-full border border-rose-200">
          <X size={12} strokeWidth={3} className="text-rose-700" />
          <span className="font-mono-ui text-[11px] tabular-nums text-rose-800 font-semibold">{sessionStats.wrong}</span>
        </div>
        {sessionMode === "wrong" && (
          <div className="ml-auto font-mono-ui text-[10px] text-amber-800">
            Noch {remainingWrong} offen
          </div>
        )}
      </div>

      {/* Question (stays visible) */}
      <div key={`q-${question.id}`} className="anim-in">
        <div className="font-mono-ui text-[10px] uppercase tracking-[0.2em] text-rose-800 mb-2">
          Kap. {chapter.id} — {chapter.name}
        </div>
        <h2 className="text-[21px] leading-[1.3] font-semibold text-stone-900 tracking-tight">
          <span className="text-stone-400 font-normal">{question.number}.</span> {question.text}
        </h2>
      </div>

      {/* Statement — shows immediately */}
      <div key={`s-${question.id}-${stmtIndex}`} className="mt-7 anim-in">
        <div className={`relative rounded-2xl p-5 border-2 transition-all duration-500 ${
          revealed
            ? userMatchedBook
              ? "bg-emerald-50 border-emerald-300"
              : "bg-rose-50 border-rose-300"
            : "bg-white border-stone-200"
        }`}>
          <div className="flex gap-3">
            <div className={`flex-shrink-0 w-9 h-9 rounded-xl flex items-center justify-center font-mono-ui font-bold text-[14px] ${
              revealed
                ? userMatchedBook ? "bg-emerald-600 text-white" : "bg-rose-600 text-white"
                : "bg-stone-900 text-stone-50"
            }`}>
              {statement.letter.toUpperCase()}
            </div>
            <p className="flex-1 text-[16px] leading-[1.5] text-stone-900 pt-1">{statement.text}</p>
          </div>

          {revealed && (
            <div className="mt-4 pt-4 border-t border-stone-900/10 flex items-center gap-2 anim-fade">
              {userMatchedBook ? (
                <>
                  <div className="w-7 h-7 rounded-full bg-emerald-600 flex items-center justify-center">
                    <Check size={16} strokeWidth={3} className="text-white" />
                  </div>
                  <span className="font-mono-ui text-[11px] uppercase tracking-[0.2em] text-emerald-800 font-bold">Korrekt</span>
                </>
              ) : (
                <>
                  <div className="w-7 h-7 rounded-full bg-rose-600 flex items-center justify-center">
                    <X size={16} strokeWidth={3} className="text-white" />
                  </div>
                  <span className="font-mono-ui text-[11px] uppercase tracking-[0.2em] text-rose-800 font-bold">Falsch</span>
                </>
              )}
              <span className="ml-auto font-mono-ui text-[10px] uppercase tracking-wider text-stone-500">
                Laut Buch: {statement.correct ? "Richtig" : "Falsch"}
              </span>
            </div>
          )}
        </div>

        {/* Explanation */}
        {revealed && (
          <div className="mt-5 anim-in">
            <div className="font-mono-ui text-[10px] uppercase tracking-[0.2em] text-stone-500 mb-2">Erklärung</div>
            <div className="bg-stone-900 text-stone-100 rounded-2xl p-5 text-[14.5px] leading-[1.6] whitespace-pre-wrap">
              {statement.explanation}
            </div>
            {statement.note && (
              <div className="mt-3 bg-white border-2 border-orange-400 rounded-2xl p-4 anim-fade">
                <div className="font-mono-ui text-[10px] uppercase tracking-[0.2em] text-orange-600 font-bold mb-2">Hinweis / Update</div>
                <div className="text-[14px] leading-[1.55] text-stone-800 whitespace-pre-wrap">
                  {statement.note}
                </div>
              </div>
            )}
          </div>
        )}

        {/* Actions */}
        {!revealed ? (
          <div className="mt-5 grid grid-cols-2 gap-3">
            <button
              onClick={() => onGuess("richtig")}
              className="tap-highlight py-5 rounded-2xl bg-white border-2 border-emerald-600 text-emerald-800 font-medium text-[15px] active:bg-emerald-50 transition flex items-center justify-center gap-2"
            >
              <Check size={18} strokeWidth={2.5} />
              Richtig
            </button>
            <button
              onClick={() => onGuess("falsch")}
              className="tap-highlight py-5 rounded-2xl bg-white border-2 border-rose-600 text-rose-800 font-medium text-[15px] active:bg-rose-50 transition flex items-center justify-center gap-2"
            >
              <X size={18} strokeWidth={2.5} />
              Falsch
            </button>
          </div>
        ) : (
          <button
            onClick={onNext}
            className="tap-highlight w-full mt-5 py-5 rounded-2xl bg-stone-900 text-stone-50 font-medium text-[15px] active:bg-stone-800 transition flex items-center justify-center gap-2"
          >
            Weiter
            <ChevronRight size={18} />
          </button>
        )}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// SUMMARY
// ─────────────────────────────────────────────────────────────────────────────
function SummaryScreen({ stats, accuracy, questionCount, sessionMode, remainingWrong, onHome, onAgain }) {
  const total = stats.correct + stats.wrong;
  let verdict, verdictColor;
  if (sessionMode === "wrong" && remainingWrong === 0) {
    verdict = "Alle gemeistert";
    verdictColor = "text-emerald-800";
  } else if (accuracy >= 80) {
    verdict = "Ausgezeichnet";
    verdictColor = "text-emerald-800";
  } else if (accuracy >= 60) {
    verdict = "Solide Leistung";
    verdictColor = "text-stone-800";
  } else {
    verdict = "Weiter üben";
    verdictColor = "text-rose-800";
  }

  return (
    <div className="anim-in pt-10">
      <div className="text-center">
        <div className="font-mono-ui text-[10px] uppercase tracking-[0.2em] text-stone-500 mb-2">
          {sessionMode === "wrong" ? "Wiederholungsrunde abgeschlossen" : "Session abgeschlossen"}
        </div>
        <h2 className={`text-[2.5rem] leading-tight font-semibold italic tracking-tight ${verdictColor}`}>{verdict}</h2>
      </div>

      <div className="my-10 text-center">
        <div className="text-[6rem] leading-none font-semibold text-stone-900 tabular-nums">
          {accuracy}<span className="text-[3rem] text-stone-400 align-top">%</span>
        </div>
        <div className="mt-2 font-mono-ui text-[11px] text-stone-500 uppercase tracking-[0.2em]">
          {stats.correct} von {total} richtig
        </div>
      </div>

      {sessionMode === "wrong" && remainingWrong > 0 && (
        <div className="mb-5 bg-amber-50 border border-amber-200 rounded-2xl p-4 text-center">
          <div className="font-mono-ui text-[11px] uppercase tracking-[0.15em] text-amber-800">
            Noch {remainingWrong} {remainingWrong === 1 ? "Aussage" : "Aussagen"} offen
          </div>
        </div>
      )}

      <button
        onClick={onHome}
        className="tap-highlight w-full py-5 bg-stone-900 text-stone-50 rounded-2xl font-medium text-[15px] active:bg-stone-800 transition flex items-center justify-center gap-2"
      >
        <Home size={18} />
        Zurück zur Übersicht
      </button>
      {onAgain && (
        <button
          onClick={onAgain}
          className="tap-highlight w-full mt-3 py-4 bg-white border border-stone-200 text-stone-700 rounded-2xl font-medium text-[15px] active:bg-stone-100 transition flex items-center justify-center gap-2"
        >
          <RotateCcw size={16} />
          Nochmal
        </button>
      )}
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// ANALYTICS
// ─────────────────────────────────────────────────────────────────────────────
function AnalyticsScreen({ storage, chapterStats, setStorage, onBack }) {
  const [importOpen, setImportOpen] = useState(false);
  const [importText, setImportText] = useState("");
  const [importMsg, setImportMsg] = useState(null);
  const [copied, setCopied] = useState(false);

  // ─── Time formatting ─────────────────────────────────────────────────────
  const formatDuration = (ms) => {
    if (!ms || ms < 60000) return "< 1 Min";
    const totalMin = Math.floor(ms / 60000);
    const h = Math.floor(totalMin / 60);
    const m = totalMin % 60;
    if (h === 0) return `${m} Min`;
    if (m === 0) return `${h} h`;
    return `${h} h ${m} Min`;
  };

  const daysSinceFirst = storage.firstOpenedAt
    ? Math.max(1, Math.ceil((Date.now() - new Date(storage.firstOpenedAt).getTime()) / (1000 * 60 * 60 * 24)))
    : 0;

  // ─── Chapter weakness ranking (by % falsch) ──────────────────────────────
  const chapterWeaknessRanking = useMemo(() => {
    const rows = [];
    for (const chId of ACTIVE_CHAPTER_IDS) {
      const chQs = QUESTIONS.filter((q) => q.chapter === chId);
      let totalAttempts = 0;
      let wrongAttempts = 0;
      for (const q of chQs) {
        for (const s of q.statements) {
          const k = stmtKey(q.id, s.letter);
          const attempts = storage.attemptsByStmt?.[k] || 0;
          const correct = storage.correctByStmt?.[k] || 0;
          totalAttempts += attempts;
          wrongAttempts += (attempts - correct);
        }
      }
      if (totalAttempts > 0) {
        rows.push({
          id: chId,
          name: CHAPTERS.find((c) => c.id === chId).name,
          totalAttempts,
          wrongAttempts,
          wrongPct: Math.round((wrongAttempts / totalAttempts) * 100),
        });
      }
    }
    return rows.sort((a, b) => b.wrongAttempts - a.wrongAttempts);
  }, [storage]);

  // ─── Most-attempted questions ────────────────────────────────────────────
  const mostAttempted = useMemo(() => {
    // Aggregate by question (sum statement attempts)
    const byQ = {};
    for (const [key, count] of Object.entries(storage.attemptsByStmt || {})) {
      const qid = Number(key.split(".")[0]);
      byQ[qid] = (byQ[qid] || 0) + count;
    }
    return Object.entries(byQ)
      .map(([qid, count]) => {
        const q = QUESTIONS.find((x) => x.id === Number(qid));
        if (!q) return null;
        const ch = CHAPTERS.find((c) => c.id === q.chapter);
        return { qid: Number(qid), count, q, chapterName: ch.name };
      })
      .filter(Boolean)
      .sort((a, b) => b.count - a.count)
      .slice(0, 5);
  }, [storage]);

  // ─── Session/day stats ───────────────────────────────────────────────────
  const totalAnswered = Object.values(storage.attemptsByStmt || {}).reduce((a, b) => a + b, 0);
  const totalCorrect = Object.values(storage.correctByStmt || {}).reduce((a, b) => a + b, 0);
  const overallAcc = totalAnswered > 0 ? Math.round((totalCorrect / totalAnswered) * 100) : 0;
  const avgSessionMs = storage.sessionCount > 0 ? (storage.totalActiveMs || 0) / storage.sessionCount : 0;

  // ─── Export / Import ─────────────────────────────────────────────────────
  const handleExport = async () => {
    const data = JSON.stringify(storage);
    try {
      await navigator.clipboard.writeText(data);
      setCopied(true);
      setTimeout(() => setCopied(false), 2500);
    } catch {
      // Fallback: show the text in a textarea
      setImportText(data);
      setImportOpen(true);
    }
  };

  const handleImport = () => {
    try {
      const parsed = JSON.parse(importText);
      if (!parsed || typeof parsed !== "object") throw new Error();
      setStorage({ ...defaultStorage(), ...parsed });
      setImportMsg({ type: "ok", text: "Fortschritt erfolgreich importiert." });
      setTimeout(() => {
        setImportOpen(false);
        setImportText("");
        setImportMsg(null);
      }, 1500);
    } catch {
      setImportMsg({ type: "err", text: "Ungültige Daten. Bitte den exportierten JSON-Text einfügen." });
    }
  };

  return (
    <div className="anim-in">
      <div className="flex items-center gap-3 pt-6 pb-5 border-b border-stone-300">
        <button onClick={onBack} className="tap-highlight -ml-2 p-2 rounded-full active:bg-stone-200">
          <ArrowLeft size={22} />
        </button>
        <h2 className="text-[22px] font-semibold tracking-tight">Lernanalyse</h2>
      </div>

      {/* Overall numbers */}
      <div className="mt-5 grid grid-cols-2 gap-3">
        <div className="bg-white border border-stone-200 rounded-2xl p-4">
          <div className="font-mono-ui text-[10px] uppercase tracking-[0.15em] text-stone-500 mb-1">Lernzeit gesamt</div>
          <div className="flex items-baseline gap-1.5">
            <Clock size={15} className="text-stone-400" />
            <div className="text-[1.75rem] leading-none font-semibold tabular-nums text-stone-900">
              {formatDuration(storage.totalActiveMs)}
            </div>
          </div>
          <div className="font-mono-ui text-[10px] text-stone-400 mt-2">
            über {daysSinceFirst} {daysSinceFirst === 1 ? "Tag" : "Tage"}
          </div>
        </div>
        <div className="bg-white border border-stone-200 rounded-2xl p-4">
          <div className="font-mono-ui text-[10px] uppercase tracking-[0.15em] text-stone-500 mb-1">Genauigkeit</div>
          <div className="flex items-baseline gap-1.5">
            <Target size={15} className="text-stone-400" />
            <div className="text-[1.75rem] leading-none font-semibold tabular-nums text-stone-900">
              {overallAcc}<span className="text-[1rem] text-stone-400">%</span>
            </div>
          </div>
          <div className="font-mono-ui text-[10px] text-stone-400 mt-2">
            {totalCorrect} von {totalAnswered} richtig
          </div>
        </div>
        <div className="bg-white border border-stone-200 rounded-2xl p-4">
          <div className="font-mono-ui text-[10px] uppercase tracking-[0.15em] text-stone-500 mb-1">Sitzungen</div>
          <div className="flex items-baseline gap-1.5">
            <Flame size={15} className="text-stone-400" />
            <div className="text-[1.75rem] leading-none font-semibold tabular-nums text-stone-900">
              {storage.sessionCount || 0}
            </div>
          </div>
          <div className="font-mono-ui text-[10px] text-stone-400 mt-2">
            ⌀ {formatDuration(avgSessionMs)} / Sitzung
          </div>
        </div>
        <div className="bg-white border border-stone-200 rounded-2xl p-4">
          <div className="font-mono-ui text-[10px] uppercase tracking-[0.15em] text-stone-500 mb-1">Aktive Tage</div>
          <div className="flex items-baseline gap-1.5">
            <Zap size={15} className="text-stone-400" />
            <div className="text-[1.75rem] leading-none font-semibold tabular-nums text-stone-900">
              {(storage.daysActive || []).length}
            </div>
          </div>
          <div className="font-mono-ui text-[10px] text-stone-400 mt-2">
            {daysSinceFirst > 0 ? `${Math.round(((storage.daysActive || []).length / daysSinceFirst) * 100)}% der Tage` : "—"}
          </div>
        </div>
      </div>

      {/* Weakness ranking */}
      <div className="mt-8">
        <div className="font-mono-ui text-[10px] uppercase tracking-[0.2em] text-stone-500 mb-3 px-1">
          Kapitel mit den meisten Fehlern
        </div>
        {chapterWeaknessRanking.length === 0 ? (
          <div className="bg-white border border-stone-200 rounded-2xl p-5 text-center">
            <div className="text-[13px] text-stone-500 italic">Noch keine Daten — beantworte ein paar Fragen, um die Analyse zu sehen.</div>
          </div>
        ) : (
          <div className="space-y-2">
            {chapterWeaknessRanking.slice(0, 10).map((row, i) => (
              <div key={row.id} className="bg-white border border-stone-200 rounded-2xl p-4">
                <div className="flex items-baseline justify-between gap-3 mb-2">
                  <div className="flex items-center gap-2 min-w-0 flex-1">
                    <div className="font-mono-ui text-[10px] text-stone-400 w-5">{String(i + 1).padStart(2, "0")}</div>
                    <div className="text-[14px] font-medium text-stone-900 truncate">{row.name}</div>
                  </div>
                  <div className={`font-mono-ui text-[12px] tabular-nums font-semibold ${row.wrongPct >= 50 ? "text-rose-700" : row.wrongPct >= 30 ? "text-amber-700" : "text-stone-600"}`}>
                    {row.wrongPct}% falsch
                  </div>
                </div>
                <div className="h-[3px] bg-stone-100 rounded-full overflow-hidden">
                  <div className={`h-full transition-all duration-500 ${row.wrongPct >= 50 ? "bg-rose-500" : row.wrongPct >= 30 ? "bg-amber-500" : "bg-stone-400"}`} style={{ width: `${row.wrongPct}%` }} />
                </div>
                <div className="font-mono-ui text-[10px] text-stone-400 mt-1.5">
                  {row.wrongAttempts} Fehler bei {row.totalAttempts} Versuchen
                </div>
              </div>
            ))}
          </div>
        )}
      </div>

      {/* Most attempted questions */}
      <div className="mt-8">
        <div className="font-mono-ui text-[10px] uppercase tracking-[0.2em] text-stone-500 mb-3 px-1">
          Am häufigsten beantwortet
        </div>
        {mostAttempted.length === 0 ? (
          <div className="bg-white border border-stone-200 rounded-2xl p-5 text-center">
            <div className="text-[13px] text-stone-500 italic">Noch keine Daten.</div>
          </div>
        ) : (
          <div className="space-y-2">
            {mostAttempted.map((m) => (
              <div key={m.qid} className="bg-white border border-stone-200 rounded-2xl p-4">
                <div className="flex items-baseline justify-between gap-3 mb-1">
                  <div className="font-mono-ui text-[10px] uppercase tracking-[0.15em] text-rose-800">
                    Kap. {m.q.chapter} · Frage {m.q.number}
                  </div>
                  <div className="font-mono-ui text-[12px] tabular-nums font-semibold text-stone-700">
                    {m.count}×
                  </div>
                </div>
                <div className="text-[13px] text-stone-700 leading-snug line-clamp-2">{m.q.text}</div>
              </div>
            ))}
          </div>
        )}
      </div>

      {/* Backup section */}
      <div className="mt-8 pt-6 border-t border-stone-200">
        <div className="font-mono-ui text-[10px] uppercase tracking-[0.2em] text-stone-500 mb-3 px-1">
          Backup
        </div>
        <p className="text-[12px] text-stone-500 leading-relaxed mb-3 px-1">
          Bevor die App aktualisiert wird: Fortschritt exportieren und sicher aufbewahren. Nach dem Update wieder importieren.
        </p>
        <div className="grid grid-cols-2 gap-2">
          <button
            onClick={handleExport}
            className="tap-highlight flex items-center justify-center gap-2 py-4 bg-white border border-stone-200 rounded-2xl text-[14px] font-medium text-stone-800 active:bg-stone-100 transition"
          >
            <Download size={16} />
            {copied ? "Kopiert ✓" : "Exportieren"}
          </button>
          <button
            onClick={() => { setImportOpen(true); setImportMsg(null); }}
            className="tap-highlight flex items-center justify-center gap-2 py-4 bg-white border border-stone-200 rounded-2xl text-[14px] font-medium text-stone-800 active:bg-stone-100 transition"
          >
            <Upload size={16} />
            Importieren
          </button>
        </div>

        {importOpen && (
          <div className="mt-4 bg-stone-900 rounded-2xl p-4 anim-in">
            <div className="font-mono-ui text-[10px] uppercase tracking-[0.15em] text-stone-400 mb-2">
              {importText && !copied ? "Kopiere diesen Text und speichere ihn sicher:" : "Exportierten Text einfügen:"}
            </div>
            <textarea
              value={importText}
              onChange={(e) => setImportText(e.target.value)}
              placeholder='{"chapters":...}'
              rows={5}
              className="w-full bg-stone-800 text-stone-100 text-[11px] font-mono-ui p-3 rounded-xl border border-stone-700 focus:outline-none focus:border-stone-500"
            />
            {importMsg && (
              <div className={`mt-2 text-[11px] font-mono-ui ${importMsg.type === "ok" ? "text-emerald-400" : "text-rose-400"}`}>
                {importMsg.text}
              </div>
            )}
            <div className="grid grid-cols-2 gap-2 mt-3">
              <button
                onClick={() => { setImportOpen(false); setImportText(""); setImportMsg(null); }}
                className="tap-highlight py-3 text-[13px] text-stone-400 rounded-xl active:bg-stone-800"
              >
                Abbrechen
              </button>
              <button
                onClick={handleImport}
                disabled={!importText.trim()}
                className="tap-highlight py-3 text-[13px] font-medium text-stone-900 bg-stone-100 rounded-xl active:bg-stone-300 disabled:opacity-40 transition"
              >
                Importieren
              </button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);

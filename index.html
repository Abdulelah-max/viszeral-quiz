    { letter: "e", text: "Bei Patienten mit medullärem Schilddrüsenkarzinom sollte eine Genanalyse durchgeführt werden.", correct: true, explanation: "Richtig. Bei Patienten mit medullären Schilddrüsenkarzinomen sollte eine Genanalyse auf eine Mutation im RET-Protoonkogen und ein Familienscreening mit genetischer Beratung durchgeführt werden (Auftreten mit familiärer Häufung in 15 % im Rahmen des MEN-Syndroms)." },
  ]},
  { id: 179, chapter: 15, number: 4, text: "Welche Aussagen zu den nervalen Strukturen treffen zu?", statements: [
    { letter: "a", text: "Der Nervus laryngeus recurrens ist insbesondere für die Phonation wichtig.", correct: true, explanation: "Richtig. Der N. laryngeus recurrens versorgt die intrinsische Muskulatur des Kehlkopfes (mit Ausnahme des M. cricothyreoideus) und ist für die Stimmbandfunktion verantwortlich." },
    { letter: "b", text: "Eine beidseitige Schädigung des Nervus laryngeus recurrens kann durch eine geeignete Sprachtherapie gut behoben werden.", correct: false, explanation: "Falsch. Eine einseitige Schädigung führt zu einem einseitigen Stimmbandfunktionsausfall (Heiserkeit) — hier ist logopädische Therapie sinnvoll, und bei intraoperativer Überdehnung oft partiell oder vollständig reversibel. Eine BEIDSEITIGE vollständige Schädigung macht jedoch in der Regel eine Tracheotomie erforderlich. Daher wird bei der Thyreoidektomie auf der prominenteren Seite begonnen — die kontralaterale Seite wird nicht in derselben Sitzung entfernt, falls eine Schädigung vorliegt." },
    { letter: "c", text: "Der N. laryngeus superior spielt bei Schilddrüsenoperationen keine Rolle.", correct: false, explanation: "Falsch. Der Ramus externus des Nervs versorgt den M. cricothyreoideus, der für die Bildung hoher Töne verantwortlich ist. Der Nerv hat eine Lagebeziehung zur A. thyreoidea superior und kann bei der Präparation des oberen Poles verletzt werden. Daher ist die schilddrüsennahe Absetzung der A. thyreoidea superior wichtig." },
    { letter: "d", text: "Ein N. laryngeus recurrens non recurrens bezeichnet einen hohen Abgang des Nerven aus dem N. vagus ohne die A. subclavia zu umschlingen.", correct: true, explanation: "Richtig. Diese seltene Variante kommt in ca. 1 % der Fälle vor. Anstatt von kaudal zieht der Nerv von lateral an den Kehlkopf — muss intraoperativ berücksichtigt werden. Häufiger auf der rechten Seite." },
    { letter: "e", text: "Aufgrund der Gefahr einer Recurrensschädigung sollte die intraoperative Darstellung des Nervs nur bei Primäroperationen und nicht bei Rezidiveingriffen erfolgen.", correct: false, explanation: "Falsch. Eine vorsichtige und schonende Darstellung des N. laryngeus recurrens ist sowohl bei Primär- als auch bei Rezidiveingriffen unabdingbar. Dadurch wird das Risiko einer Nervenschädigung deutlich verringert." },
  ]},
  { id: 180, chapter: 15, number: 5, text: "Welche Aussagen zu Lymphknotenregionen im Bereich der Schilddrüse treffen zu?", statements: [
    { letter: "a", text: "Es liegt eine international einheitliche Nomenklatur zu Lymphknotenregionen der Schilddrüse vor.", correct: false, explanation: "Falsch. Es liegen international vier Klassifikationen zur Einteilung lokoregionärer Lymphknoten vor. Die in Deutschland gebräuchliche Kompartment-Klassifikation teilt die Lymphknoten in vier Kompartimente:\n• Zentral\n• Ipsilateral zervikolateral\n• Kontralateral zervikolateral\n• Infrabrachiozephal" },
    { letter: "b", text: "Bei einem minimal-invasiven follikulären Karzinom ist eine Lymphadenektomie nicht indiziert.", correct: true, explanation: "Richtig. Beim minimal-invasiven follikulären Karzinom ohne Gefäßinvasion werden keine Lymphknotenmetastasen beobachtet — nur Hemithyreoidektomie (unter Mitnahme des Isthmus) ohne Komplettierungsoperation oder Lymphadenektomie notwendig. Ebenfalls beim papillären Mikrokarzinom (< 1 cm, pT1a N0 M0) ohne Risikofaktoren nur Hemithyreoidektomie." },
    { letter: "c", text: "Beim papillären Schilddrüsenkarzinom finden sich häufiger laterale als mediastinale Lymphknotenmetastasen.", correct: true, explanation: "Richtig. Mediastinale Lymphknotenmetastasen finden sich bei < 5 % der Patienten. Laterale Lymphknotenmetastasen sind mit ca. 25 % deutlich häufiger — hier sollte bei Verdacht eine primäre laterale Kompartmentresektion erfolgen." },
    { letter: "d", text: "Bei intraoperativ nachgewiesenem onkozytären Karzinom sollten eine Thyreoidektomie sowie eine zentrale Kompartmentresektion erfolgen.", correct: true, explanation: "Richtig. Das onkozytäre Schilddrüsenkarzinom ist eine zytologische Variante differenzierter Schilddrüsenkarzinome und tritt selten auf (< 5 %). Die Diagnose wird durch den Nachweis von > 75 % onkozytären Tumorzellen gestellt. Aggressive Tumorbiologie → erhöhte Lymphknoten- und Fernmetastasen → Thyreoidektomie mit zentraler Kompartmentresektion." },
    { letter: "e", text: "Die totale Thyreoidektomie mit lokaler Lymphadenektomie ist bei Karzinomnachweis meist Mittel der Wahl.", correct: true, explanation: "Richtig. Bis auf wenige Ausnahmen (nodal negatives papilläres bzw. follikuläres Karzinom) ist die totale Thyreoidektomie mit lokaler Lymphadenektomie primäre Therapie der Wahl. Standardmäßig Lymphadenektomie des zentralen Kompartiments; bei Lymphknotenmetastasen ebenfalls das laterale Kompartiment entfernen." },
  ]},
  { id: 181, chapter: 15, number: 6, text: "Welche Aussagen zu operativen Therapieverfahren und Strategien der Schilddrüse treffen zu?", statements: [
    { letter: "a", text: "Die intraoperative Schnellschnittuntersuchung ist bei kalten Knoten nicht relevant.", correct: false, explanation: "Falsch. Insgesamt haben intraoperative Schnellschnittuntersuchungen zwar eine eingeschränkte Aussagekraft, jedoch bei einer Hemithyreoidektomie bei suspekten kalten Knoten ihren Stellenwert — bei Malignität kann ggf. eine Komplettierungsoperation oder Lymphadenektomie sofort durchgeführt werden." },
    { letter: "b", text: "Beim Morbus Basedow ist primär die chirurgische Therapie indiziert.", correct: false, explanation: "Falsch. Die Therapie der Wahl ist die medikamentöse Therapie mit Thyreostatika mit dem Ziel einer euthyreoten Stoffwechsellage. Bei erfolgloser medikamentöser Therapie besteht die Indikation zur Thyreoidektomie oder Radiojodtherapie. Vor einer Operation bzw. Radiojodtherapie muss eine euthyreote Stoffwechsellage vorliegen — sonst Gefahr der thyreotoxischen Krise." },
    { letter: "c", text: "Bei papillären Karzinomen mit einer Größe von über 1 cm sollte eine totale Thyreoidektomie durchgeführt werden.", correct: true, explanation: "Richtig. Beim papillären Schilddrüsenkarzinom > 10 mm sollte eine totale Thyreoidektomie durchgeführt werden. Grund: Häufigkeit von multifokalen Tumorherden und lymphangischer Tumorausbreitung." },
    { letter: "d", text: "Die Komplettierungsoperation bei postoperativem Nachweis eines papillären Schilddrüsenkarzinoms sollte in den ersten vier Wochen erfolgen.", correct: false, explanation: "Falsch. Wenn die Indikation zur Komplettierungsoperation besteht, sollte diese innerhalb der ersten VIER TAGE nach Primäroperation erfolgen. Erfolgt der histologische Karzinomnachweis erst später, sollte aufgrund des Risikos von Nervenschädigungen ein Intervall von drei MONATEN abgewartet werden. Bei unvollständig entferntem Primärtumor muss die Komplettierung zum schnellstmöglichen Zeitpunkt erfolgen." },
    { letter: "e", text: "Unabhängig von der Tumorgröße sollte beim onkozytären Schilddrüsenkarzinom eine totale Thyreoidektomie durchgeführt werden.", correct: true, explanation: "Richtig. Aufgrund der ungünstigen Prognose des onkozytären Karzinoms sollte unabhängig von der Tumorgröße eine totale Thyreoidektomie erfolgen. Bei follikulären und papillären Karzinomen ist hingegen die Tumorgröße für das Resektionsausmaß entscheidend." },
  ]},
  { id: 182, chapter: 15, number: 7, text: "Welche Aussagen zum Hyperparathyreoidismus treffen zu?", statements: [
    { letter: "a", text: "Der primäre Hyperparathyreoidismus kann laborchemisch durch eine Erhöhung des Parathormons (PTH) und eine Hypercalcämie nachgewiesen werden.", correct: true, explanation: "Richtig. Ein erhöhtes Serum-Calcium bei erhöhter PTH-Serumkonzentration sichert die Diagnose eines primären Hyperparathyreoidismus.\n\n**Wichtig:** Immer an MEN2 denken! Dieses hereditäre Syndrom umfasst:\n• Medulläres Schilddrüsenkarzinom\n• Phäochromozytom\n• Nebenschilddrüsenhyperplasie oder Adenome\n\nBei bis zu 20 % der Patienten treten Symptome eines Hyperparathyreoidismus auf." },
    { letter: "b", text: "Die Anzahl der Nebenschilddrüsen ist variabel, häufig sind nur zwei oder drei Nebenschilddrüsen vorhanden.", correct: false, explanation: "Falsch. In den meisten Fällen sind VIER Nebenschilddrüsen ausgebildet. Nur selten sind weniger vorhanden.\n\nEmbryologie:\n• Obere NSD: aus der 4. Schlundtasche, meist in Höhe des Ringknorpels\n• Untere NSD: aus der 3. Schlundtasche, lagevariabler" },
    { letter: "c", text: "Der primäre Hyperparathyreoidismus ist häufig symptomatisch.", correct: true, explanation: "Richtig. Leitsymptome: Nephrocalcinose/Nephrolithiasis, Übelkeit, Erbrechen, Polyurie, Knochenschmerzen, Muskelschwäche, Obstipation. Auch unspezifische und kardiovaskuläre Symptome. Nierensteine in ca. 20 % der Fälle." },
    { letter: "d", text: "Beim primären Hyperparathyreoidismus besteht im Regelfall die Indikation zur Operation.", correct: true, explanation: "Richtig. Bei symptomatischen, aber auch bei asymptomatischen Patienten besteht die Indikation zur Operation. Grund ist das deutlich erhöhte Langzeitrisiko, insbesondere kardiovaskulärer Erkrankungen (Arteriosklerose). In Einzelfällen kann bei fehlender Symptomatik eine konservative Therapie diskutiert werden." },
    { letter: "e", text: "Präoperativ sollte eine Lokalisationsdiagnostik erfolgen.", correct: true, explanation: "Richtig. Es sollte eine Sonographie oder Radionukleotid-Szintigraphie, ggf. auch erweiterte Diagnostik mittels CT oder MRT erfolgen — insbesondere um ektope Adenome zu lokalisieren." },
  ]},
  { id: 183, chapter: 15, number: 8, text: "Welche Aussagen zur Nebenniere treffen zu?", statements: [
    { letter: "a", text: "Die Nebennieren liegen retroperitoneal.", correct: true, explanation: "Richtig. Das paarig angelegte Organ liegt retroperitoneal in Höhe des 11.–12. Brustwirbelkörpers. Die Nebennieren liegen der Niere kranial auf und sind von der Gerotafaszie umgeben." },
    { letter: "b", text: "Die Nebennieren beinhalten je zwei Organanteile, die anatomisch und funktionell unterschieden werden können.", correct: true, explanation: "Richtig. Die Nebenniere spielt eine wichtige Rolle in der Stressanpassung des Organismus. Sie wird in Nebennierenmark und Nebennierenrinde unterteilt, welche unterschiedlichen embryonalen Ursprungs sind." },
    { letter: "c", text: "Katecholamine werden in der Nebennierenrinde produziert.", correct: false, explanation: "Falsch. Das Nebennieren-MARK produziert Katecholamine (Adrenalin und Noradrenalin). In der Nebennieren-RINDE werden Glukokortikoide, Mineralokortikoide und Androgene synthetisiert." },
    { letter: "d", text: "Die arterielle Versorgung der Nebenniere erfolgt über mehrere Gefäße.", correct: true, explanation: "Richtig. Die arterielle Versorgung erfolgt durch:\n• Aa. suprarenales superiores aus der A. phrenica\n• Aa. suprarenales mediae aus der Aorta\n• Aa. suprarenales inferiores aus den Aa. renales" },
    { letter: "e", text: "Besteht der Verdacht auf einen Nebennierentumor ist die Sonographie die Bildgebung der Wahl.", correct: false, explanation: "Falsch. Bei Verdacht auf einen Nebennierentumor ist eine Dünnschicht-CT der Nebennieren Mittel der Wahl. Die transabdominelle Sonographie kann sich zur Darstellung schwierig gestalten." },
  ]},
  { id: 184, chapter: 15, number: 9, text: "Welche Aussagen zum Phäochromozytom treffen zu?", statements: [
    { letter: "a", text: "Das Phäochromozytom zählt zu den hormonaktiven Nebennierentumoren.", correct: true, explanation: "Richtig. Phäochromozytome entstehen aus chromaffinen Zellen des Nebennierenmarks und bilden, speichern und sezernieren Katecholamine." },
    { letter: "b", text: "Die Diagnostik beinhaltet die Untersuchung eines 24 h-Sammelurins.", correct: true, explanation: "Richtig. Eine 24-Stunden-Urinsammlung mit Metanephrin-Bestimmung dient der Diagnostik eines Phäochromozytoms. Weitere diagnostische Möglichkeiten: Metanephrinbestimmung im Plasma und Meta-Jodobenzylguanidin-Szintigraphie (MIBG-Szintigraphie)." },
    { letter: "c", text: "Die Symptome sind unspezifisch.", correct: true, explanation: "Richtig. Insgesamt eher unspezifische Symptome: Kopfschmerzen, Schwitzen, Palpitationen im Rahmen einer Hypertonie. Ein weiteres Symptom ist blasse Haut durch periphere Vasokonstriktion." },
    { letter: "d", text: "Maligne Phäochromozytome machen 50 % aller Phäochromozytome aus.", correct: false, explanation: "Falsch. Maligne Phäochromozytome sind selten. Bei Malignität ist ein aggressives chirurgisches Vorgehen indiziert. Die 5-Jahres-Überlebensrate liegt bei ca. 50 %." },
    { letter: "e", text: "Vor einer operativen Behandlung des Phäochromozytoms muss eine medikamentöse Vorbehandlung durchgeführt werden.", correct: true, explanation: "Richtig. Die Alphablockade (mit Phenoxybenzamin oder Doxazosin) ist präoperativer Standard. Eine Betablockade ist nur bei Tachykardie erforderlich.\n\n**Wichtig:** Die Vorbehandlung dient der Prävention einer kreislaufrelevanten postoperativen Hypotonie bei Wegfall des erhöhten Katecholaminspiegels und gleichzeitig bestehender Downregulation der Rezeptoren.\n\n**Reihenfolge:** Immer ALPHA-Blockade VOR Betablockade! Eine alleinige Betablockade kann zur hypertensiven Krise führen (ungehinderte Alpha-Wirkung)." },
  ]},
  { id: 185, chapter: 15, number: 10, text: "Welche Aussagen zur Indikationsstellung der Adrenalektomie treffen zu?", statements: [
    { letter: "a", text: "Zum Ausschluss eines Malignoms sollten alle Inzidentalome einer operativen Therapie zugeführt werden.", correct: false, explanation: "Falsch. Inzidentalome sind Raumforderungen der Nebenniere, die zufällig bei Schnittbilduntersuchungen entdeckt werden. Sie finden sich bei bis zu 8 % aller Schnittbilduntersuchungen — häufiger bei älteren Patienten mit Adipositas, Diabetes mellitus und arterieller Hypertonie. Nur bei Nachweis einer Hormonaktivität sowie ab einer Größe von 6 cm besteht die Indikation zur Adrenalektomie." },
    { letter: "b", text: "Das Conn-Syndrom kann in den meisten Fällen gut durch eine Adrenalektomie therapiert werden.", correct: true, explanation: "Richtig. Das Conn-Syndrom bezeichnet einen primären Hyperaldosteronismus mit Hypertonie, gelegentlich Hypokaliämie und metabolischer Alkalose. In 80 % der Fälle wird dies durch ein adrenales Adenom hervorgerufen und kann somit operativ durch eine Adrenalektomie gut therapiert werden." },
    { letter: "c", text: "Bei einem hypophysären Cushing-Syndrom kann eine Adrenalektomie indiziert sein.", correct: true, explanation: "Richtig. Die Therapie der Wahl bei ACTH-produzierendem Hypophysenadenom ist dessen neurochirurgische Resektion. Im Langzeitverlauf Rezidivrate von 40–50 % — nach erfolgloser Hypophysen-OP kann die Indikation zur bilateralen Adrenalektomie gestellt werden. Die bilaterale Entfernung macht eine lebenslange Substitution mit Gluko- und Mineralokortikoiden notwendig." },
    { letter: "d", text: "Minimalinvasive Operationen können transperitoneal oder extraperitoneal durchgeführt werden.", correct: true, explanation: "Richtig. Beide Verfahren sind gleichwertig. Das minimalinvasive Verfahren ist bei der Adrenalektomie Standardverfahren bei Tumorgrößen bis 6 cm. Bei Karzinomverdacht oder größeren Tumoren kann die Indikation zum offenen Verfahren großzügiger gestellt werden." },
    { letter: "e", text: "Auch ein endokrin-inaktives Nebennierenrindenadenom sollte operativ behandelt werden.", correct: false, explanation: "Falsch. Das endokrin-inaktive Nebennierenadenom wird meist als Zufallsbefund in der Schnittbilddiagnostik gefunden und entspricht somit einem Inzidentalom — nur bei Hormonaktivität oder Größe ≥ 6 cm OP-Indikation." },
  ]},
  { id: 186, chapter: 16, number: 1, text: "Welche der folgenden Bezeichnungen werden im Rahmen der Klassifikation neuroendokriner Tumore aktuell verwendet?", statements: [
    { letter: "a", text: "Karzinoid", correct: false, explanation: "Falsch. Der Begriff 'Karzinoid' stammt aus der Zeit der Entdeckung der NET um 1908 und wurde von Siegfried Oberndorfer geprägt. Der Begriff wird heute nur noch im Rahmen des danach benannten Karzinoidsyndroms gebraucht." },
    { letter: "b", text: "NET (neuroendokriner Tumor)", correct: true, explanation: "Richtig. Neuroendokrine Tumoren umfassen alle neuroendokrinen Neoplasien, auch mit noch nicht sicherem Grading oder G1- und G2-Tumoren." },
    { letter: "c", text: "NEC (neuroendokrines Karzinom)", correct: true, explanation: "Richtig. Tumoren mit einem G3-Grading werden als neuroendokrine Karzinome (NEC) bezeichnet." },
    { letter: "d", text: "NEN (neuroendokrine Neoplasie)", correct: true, explanation: "Richtig. Der Begriff 'neuroendokrine Neoplasie' (NEN) bezeichnet alle Formen der neuroendokrinen Tumore — Oberbegriff über NET und NEC." },
    { letter: "e", text: "Insulinom", correct: true, explanation: "Richtig. Diese spezifischen NET treten ausschließlich im Pankreas auf und sind häufig solitäre, kleiner als 2 cm große Tumoren. Klinisch besteht meist die Whipple-Trias:\n• Symptome der Hypoglykämie\n• Nachweis eines erniedrigten Blutzuckerspiegels\n• Verschwinden der Symptome nach Gabe von Glukose" },
  ]},
  { id: 187, chapter: 16, number: 2, text: "Welche immunhistochemischen Marker können bei Vorliegen eines neuroendokrinen Tumors analysiert werden?", statements: [
    { letter: "a", text: "Gastrin", correct: true, explanation: "Richtig. Gastrin ist kein genereller Marker, kann aber bei spezifischer Fragestellung zusätzlich untersucht werden. Gleiches gilt für Serotonin, Somatostatin, Insulin, Glukagon und pankreatisches Polypeptid. Gastrin kann als Hormonmarker beim Gastrinom, aber auch bei NET in Duodenum, Magen, Pankreas und Dünndarm nachgewiesen werden." },
    { letter: "b", text: "c-KIT (CD 117)", correct: false, explanation: "Falsch. c-KIT oder CD 117 ist ein Marker der Gastrointestinalen Stromatumoren (GIST). Ca. 95 % aller GIST exprimieren c-KIT, bei GIST des Dünndarms fast 100 %." },
    { letter: "c", text: "Synaptophysin", correct: true, explanation: "Richtig. Synaptophysin und Chromogranin A sind generelle neuroendokrine Marker. Deren Analyse sollte primär erfolgen." },
    { letter: "d", text: "anti-Ki-67 Antikörper", correct: true, explanation: "Richtig. Der Ki-67 Index (MIB-1) steht für die Proliferationsaktivität eines Tumors und wird in % angegeben. Er entscheidet über das Grading:\n• G1: Ki-67 ≤ 2 %\n• G2: Ki-67 2–20 %\n• G3: Ki-67 > 20 %" },
    { letter: "e", text: "Chromogranin A", correct: true, explanation: "Richtig. Chromogranin A wird in den Vesikeln der neuroendokrinen Zellen gebildet und weist eine sehr hohe Spezifität auf. Wird nicht als Screeningparameter, sondern bei gesichertem NET als Tumormarker für Therapiesteuerung und Nachsorge angewandt." },
  ]},
  { id: 188, chapter: 16, number: 3, text: "Welche Aussagen zu klinischen Symptomen bei neuroendokrinen Tumoren sind richtig?", statements: [
    { letter: "a", text: "Insulinome werden erst sehr spät symptomatisch.", correct: false, explanation: "Falsch. Insulinome werden in der Regel sehr früh symptomatisch und sind aufgrund ihrer geringen Größe nur schwer auffindbar — was die operative Versorgung oft schwierig macht." },
    { letter: "b", text: "Eine hormonelle Aktivität besteht bei 80–90 % aller neuroendokrine Neoplasien (NEN).", correct: false, explanation: "Falsch. Bei nur ca. 40–50 % der NEN besteht eine hormonelle Aktivität. Bei diesen Tumoren sollte ein besonderes Augenmerk auf das perioperative Management gelegt werden (z. B. Insulinom, Vipom, Glukagonom oder Karzinoidsyndrom → Flüssigkeitsmanagement, Elektrolythaushalt, Blutzuckerwerte)." },
    { letter: "c", text: "Das Karzinoidsyndrom ist unter anderem gekennzeichnet durch Flush und Diarrhoe.", correct: true, explanation: "Richtig. Obwohl der Begriff des Karzinoids nicht mehr verwendet wird, hat das Karzinoidsyndrom bei der symptomatischen Ausprägung der NET eine Bedeutung. Charakteristisch:\n• In Episoden auftretende Flushs\n• Diarrhoen\n• Kardiale/pulmonale Symptome durch bioaktive Substanzen (z. B. Bronchospasmus)" },
    { letter: "d", text: "Bei Karzinoidsyndrom sollte eine Echokardiographie durchgeführt werden.", correct: true, explanation: "Richtig. Zum Ausschluss eines Hedinger-Syndroms sollte eine transthorakale Echokardiographie erfolgen. Das Hedinger-Syndrom beschreibt eine rechtsventrikuläre Fibrosierung des Endokards im Rahmen des Karzinoidsyndroms." },
    { letter: "e", text: "NET des Rektums werden schon sehr früh symptomatisch.", correct: false, explanation: "Falsch. NET des Rektums entwickeln meist keine hormonellen Syndrome und bleiben daher zunächst asymptomatisch. Durch Vorsorgekoloskopien werden sie 30- bis 35-mal häufiger als vor 40 Jahren erkannt. Endoskopische Resektion bis 1 cm möglich, wenn NET auf Mukosa/Submukosa beschränkt und niedrige proliferative Aktivität." },
  ]},
  { id: 189, chapter: 16, number: 4, text: "Welche Hormone werden von den neuroendokrinen Zellen des Gastrointestinaltraktes gebildet?", statements: [
    { letter: "a", text: "Gastrin", correct: true, explanation: "Richtig. Gastrin ist ein Peptidhormon des Magen-Darm-Traktes und wird in den G-Zellen des Magenantrums und Duodenums gebildet. Die häufigste funktionelle Aktivität der duodenalen NET ist die Gastrinsekretion bei etwa 10 % der Fälle." },
    { letter: "b", text: "Somatostatin", correct: true, explanation: "Richtig. Somatostatin ist ein Peptidhormon, das vom Pankreas während der Verdauung ausgeschüttet wird. Wird auch in einzelnen Zellen des Hypothalamus und des Gastrointestinaltraktes gebildet und hat hemmende Wirkung (u. a. parakrine Hemmung der Insulinausschüttung)." },
    { letter: "c", text: "Parathormon", correct: false, explanation: "Falsch. Parathormon wird in den Hauptzellen der Nebenschilddrüsen gebildet. Seine Funktion ist die Erhöhung des Calciumspiegels im Blut." },
    { letter: "d", text: "Glukagon", correct: true, explanation: "Richtig. Glukagon wird in den Langerhans-Inseln der Bauchspeicheldrüse gebildet und ist ein Peptidhormon, das den Blutzuckerspiegel anhebt. Glukagonome treten nur im Pankreas auf. Beim Glukagonom-Syndrom (Erhöhung des Glukagon-Plasmaspiegels um das 10–1000-fache) handelt es sich meist um ein fortgeschrittenes, metastasiertes Tumorstadium." },
    { letter: "e", text: "Insulin", correct: true, explanation: "Richtig. Insulin wird in den Langerhans-Inseln des Pankreas gebildet. Insulinome treten ausschließlich im Pankreas auf und sind meist kleine NET. Zum Nachweis eines Insulinoms sollte ein 72-Stunden-Hungerversuch erfolgen." },
  ]},
  { id: 190, chapter: 16, number: 5, text: "Welche der folgenden diagnostischen Methoden sind bei der Sicherung eines NET sinnvoll?", statements: [
    { letter: "a", text: "Sonographie", correct: true, explanation: "Richtig. Durch die schnelle und kostengünstige Verfügbarkeit ist sie als Ergänzung zur Schnittbildgebung geeignet. Bei der Suche nach Lebermetastasen hat sie eine ausreichend hohe Sensitivität und stellt eine Alternative zum CT oder MRT dar. Kontrastmittelsonographie steigert die Genauigkeit der Metastasendetektion." },
    { letter: "b", text: "Tumormarker CA72-4 und CA125", correct: false, explanation: "Falsch. Als Marker für NET spielen Synaptophysin und Chromogranin A eine wichtige Rolle. Der Tumormarker CA72-4 dient zur Diagnostik von Ovarial- und Magenkarzinomen. CA125 ist bei der Diagnostik eines Ovarialkarzinoms sinnvoll." },
    { letter: "c", text: "Computertomographie (CT)", correct: true, explanation: "Richtig. Zum Staging bei NET sind CT oder Kontrastmittel-MRT Mittel der Wahl. Wichtig ist die intravenöse Kontrastmittelgabe zur Darstellung möglicher Herde in Leber und Pankreas. Auf orale KM-Gabe sollte verzichtet werden, da kleinere Herde im Bereich der Magen- und Darmwand maskiert werden könnten." },
    { letter: "d", text: "Positronen-Emissions-Tomographie (PET)", correct: true, explanation: "Richtig. Das PET kann als FDG-PET (Glucose) oder als Gallium-68-PET eingesetzt werden, welches sehr spezifisch für NET ist. Es dockt an die Somatostatinrezeptoren der Tumoren an und kann auch kleinste Tumoren bildgebend sichtbar machen. PET-CT / PET-MRT hat einen hohen Stellenwert bei der Darstellung von Fernmetastasen." },
    { letter: "e", text: "Somatostatinrezeptorszintigraphie", correct: true, explanation: "Richtig. Die Somatostatinrezeptorszintigraphie (Octreotid-Scan) bietet eine spezifische Diagnostik. Laut Leitlinie sollte sie jedoch nur durchgeführt werden, falls kein SSR-PET/CT verfügbar ist.\n\nAm häufigsten verwendete Somatostatin-Analoga: DOTATATE, DOTATOC, DOTANOC.\n\nSpezifität der Szintigraphie: 50–90 %. Bei Knochenmetastasen: SSR-PET/CT ist deutlich sensitiver als CT/MRT (95 % vs. 12 %)." },
  ]},
  { id: 191, chapter: 16, number: 6, text: "Welche Aussagen zu neuroendokrinen Tumoren der Appendix treffen zu?", statements: [
    { letter: "a", text: "Meistens handelt es sich um Zufallsbefunde.", correct: true, explanation: "Richtig. Die meisten NET der Appendix werden nach Appendektomie bei Appendizitis als Zufallsbefund bei der histopathologischen Untersuchung entdeckt." },
    { letter: "b", text: "Als Zufallsbefund diagnostizierte NET der Appendix müssen immer als Ileozökalresektion nachreseziert werden.", correct: false, explanation: "Falsch. Bei R0-resezierten Tumoren < 2 cm und ohne histologische Risikofaktoren ist die Appendektomie als Therapie ausreichend.\n\nRisikofaktoren:\n• R1-Resektion\n• Lymphknotenbefall\n• Angioinvasion\n• Infiltration der Mesoappendix\n• Ki-67 Index > 2 %\n\nBei Tumoren < 2 cm mit Risikofaktoren → Ileozökalresektion oder Hemikolektomie rechts." },
    { letter: "c", text: "In allen Fällen eines Appendix-NET > 2 cm sollte primär eine onkologische Hemikolektomie erfolgen.", correct: true, explanation: "Richtig. 5 % aller NET der Appendix sind > 2 cm groß — hier leitliniengerecht primär onkologische Hemikolektomie rechts. Gleiche Therapie gilt für Becherzell-NEN der Appendix unabhängig von ihrer Größe, da diese eine schlechtere Prognose aufweisen und häufiger metastasieren." },
    { letter: "d", text: "NET der Appendix sind nur in ca. 25 % der Fälle hormonaktiv.", correct: true, explanation: "Richtig. Neuroendokrine Tumore der Appendix sind, wie im gesamten übrigen Bauchraum, nur in 25–30 % der Fälle hormonaktiv." },
    { letter: "e", text: "Becherzellkarzinome haben eine gute Prognose.", correct: false, explanation: "Falsch. Becherzellkarzinome oder Goblet-Zell-Karzinoide (GCC) sind Sonderformen mit deutlich schlechterer Prognose als reine NET — 5-JÜR nur 18 %. In 10 % der Fälle bei Diagnosestellung bereits Metastasierung. Bei lokalisierten Becherzell-NEN → primär Hemikolektomie rechts." },
  ]},
  { id: 192, chapter: 16, number: 7, text: "Welche Aussagen zu neuroendokrinen Tumoren des Pankreas treffen zu?", statements: [
    { letter: "a", text: "Neuroendokrine Tumoren des Pankreas können sicher durch eine Sonographie diagnostiziert werden.", correct: false, explanation: "Falsch. Oftmals erfolgt initial eine Sonographie des Abdomens. Die Diagnose sollte jedoch durch CT/MRT sowie Somatostatin-Rezeptor-Nachweis mittels PET oder SSR-Szintigraphie erfolgen. In der Bildgebung zeigen sich bei NET hypervaskularisierte Läsionen." },
    { letter: "b", text: "NET des Pankreas sollten immer operiert werden.", correct: false, explanation: "Falsch. Alle nicht-funktionellen NEN des Pankreas > 2 cm ohne diffuse Fernmetastasierung sollten reseziert werden (wenn AZ es erlaubt). Asymptomatische NET des Pankreas ≤ 2 cm können bei selektionierten Patienten überwacht werden — geringes Metastasierungsrisiko (6 %)." },
    { letter: "c", text: "Die Endosonographie ist eine gute Methode zur Darstellung neuroendokriner Tumoren im Pankreas.", correct: true, explanation: "Richtig. Insbesondere kleinere Tumoren können durch Endosonographie dargestellt werden; bei guter Zugänglichkeit auch Möglichkeit einer Biopsie. Wichtige Rolle zur Verlaufskontrolle kleinerer pankreatischer Herde, insbesondere im Rahmen der MEN1-Erkrankung." },
    { letter: "d", text: "Bei Insulinomen ohne Fernmetastasierung kann eine Enukleation als Therapie ausreichend sein.", correct: true, explanation: "Richtig. Bei potentiell gutartigen Insulinomen kommen Enukleation oder limitierte Pankreasresektion in Frage. Vorteile des laparoskopischen Vorgehens: weniger Fisteln und Abszesse, geringere Mortalität." },
    { letter: "e", text: "Nach Insulinomentfernung zeigt sich unmittelbar intraoperativ ein Anstieg der Serum-Glukosewerte.", correct: true, explanation: "Richtig. Die histopathologische Schnellschnittuntersuchung des entfernten Präparates und der Anstieg der Glukosewerte nach Insulinomentfernung zeigen den Erfolg der Operation an.\n\n**Grenzwert:** Glukoseanstieg von 30 mg/dl nach 30 Minuten." },
  ]},
  { id: 193, chapter: 16, number: 8, text: "Welche Aussagen zu Kolon-NET und Rektum-NET treffen zu?", statements: [
    { letter: "a", text: "5–10 % aller neuroendokrinen Tumoren werden im Kolon und Rektum nachgewiesen.", correct: true, explanation: "Richtig. Ca. 5–10 % aller neuroendokrinen Tumoren werden im Kolon und Rektum nachgewiesen. Die Patienten haben bei Diagnosestellung ein Durchschnittsalter von 55–65 Jahren." },
    { letter: "b", text: "Die Endosonographie hat einen Stellenwert bei der Therapieplanung beim NET des Rektums.", correct: true, explanation: "Richtig. Vor einer endoskopischen Resektion sollte eine Endosonographie des Rektums erfolgen — zum Ausschluss der Infiltration tieferer Schichten, Lymphknotenmetastasen und zur exakten Größenbestimmung." },
    { letter: "c", text: "Bei fraglich inkomplett abgetragenen G1-differenzierten Rektum-NET sollte zeitnah eine onkologische Rektumresektion erfolgen.", correct: false, explanation: "Falsch. Bei nicht sicher vollständig abgetragenen G1-differenzierten NET des Rektums ohne Risikofaktoren und < 1 cm ist zunächst eine kurzfristige Kontrollbiopsie und eine weitere Kontrollbiopsie + Endosonographie nach einem Jahr ausreichend. Bei unauffälligen Kontrollen kann sogar auf weitere Kontrollen verzichtet werden. Dies gilt NICHT für Tumoren > 1 cm und G2/G3-differenzierte NET." },
    { letter: "d", text: "Eine endoskopische Therapie kommt bei NET des Kolons und Rektums nicht in Frage.", correct: false, explanation: "Falsch. NET des Rektums im Bereich der Mukosa/Submukosa mit einem maximalen Durchmesser von 1 cm und niedriger proliferativer Aktivität (Ki-67 < 2 %) können endoskopisch reseziert werden. Mögliche Verfahren: EMR (endoskopische Mukosaresektion), ESD (endoskopische Submukosadissektion) sowie modifizierte endoskopische Verfahren. Gleiches gilt für NET des Kolons (weniger Daten)." },
    { letter: "e", text: "Die meisten Kolon-NET weisen bei Diagnosestellung kein invasives Wachstum auf.", correct: false, explanation: "Falsch. Ein Großteil der Kolon-NEN weist bei Diagnosestellung bereits invasives Wachstum mit Infiltration der Muscularis propria auf und sind meist > 2 cm groß. Über 60 % der Patienten haben zum Diagnosezeitpunkt bereits Metastasen." },
  ]},
  { id: 194, chapter: 17, number: 1, text: "Welche Aussagen zur Adipositas sind zutreffend?", statements: [
    { letter: "a", text: "Ein Body-Mass-Index (BMI) von 40 kg/m² entspricht einem WHO-Adipositas-Grad III.", correct: true, explanation: "Richtig. Nach der WHO wird die Adipositas je nach BMI in drei Grade klassifiziert:\n• Grad I: BMI 30–34,9 kg/m²\n• Grad II: BMI 35–39,9 kg/m²\n• Grad III: BMI ≥ 40 kg/m²\n\nLaut WHO gibt es weltweit mehr als 300 Millionen adipöse Menschen mit steigender Tendenz." },
    { letter: "b", text: "Adipositas Grad III reduziert die Lebenserwartung um durchschnittlich ein Jahr.", correct: false, explanation: "Falsch. Adipositas wirkt sich deutlich auf die Lebenserwartung aus:\n• BMI 40–45 kg/m²: verringerte Lebenserwartung um ca. 6,5 Jahre\n• BMI 55–60 kg/m²: verringerte Lebenserwartung um ca. 14 Jahre" },
    { letter: "c", text: "Der BMI ist bezüglich der Risikoeinschätzung Adipositas-assoziierter Erkrankungen aussagekräftiger als der Taillenumfang.", correct: false, explanation: "Falsch. Der BMI wird zur Einteilung der Adipositas verwendet, korreliert jedoch nur bedingt mit möglichen Adipositas-bedingten Erkrankungen. Taillenumfang und viszerale Fettmasse sind bessere Parameter zur Risikoeinschätzung." },
    { letter: "d", text: "Diabetes mellitus Typ I kann durch metabolische Chirurgie geheilt werden.", correct: false, explanation: "Falsch. Bei Diabetes mellitus Typ I besteht ein kompletter Insulinmangel, der durch Gewichtsreduktion nicht zu beeinflussen ist. Im Gegensatz dazu: Bei Typ-II-Diabetes ist ein Adipositas-chirurgischer Eingriff zur Verbesserung der glykämischen Stoffwechsellage als 'metabolische Chirurgie' möglich." },
    { letter: "e", text: "Patienten mit einem BMI ≥ 40 kg/m² sollten nach Ausschöpfung der konservativen Therapie einer Adipositas-chirurgischen Operation zugeführt werden, auch wenn keine Begleiterkrankungen bestehen.", correct: true, explanation: "Richtig. Bei BMI ≥ 40 kg/m² besteht ein Adipositas Grad III. Ohne Kontraindikationen besteht nach konservativem Therapieversuch die Indikation zur Adipositas-chirurgischen Operation — auch ohne Begleiterkrankungen (Diabetes Typ II, KHK, Hypertonie)." },
  ]},
  { id: 195, chapter: 17, number: 2, text: "Welche Aussagen zur Adipositaschirurgie sind richtig?", statements: [
    { letter: "a", text: "Sie ist indiziert bei einem BMI von 35 kg/m² ohne bestehende Begleiterkrankungen.", correct: false, explanation: "Falsch. Eine Adipositas-chirurgische Operation ist indiziert bei:\n• BMI > 40 kg/m² ohne Begleiterkrankungen\n• BMI > 35 kg/m² mit Adipositas-assoziierten Komorbiditäten\n\nKomorbiditäten: Diabetes mellitus Typ II, gastrointestinale und kardiovaskuläre Erkrankungen (KHK, Herzinsuffizienz, arterielle Hypertonie), Nephropathie, obstruktives Schlafapnoesyndrom." },
    { letter: "b", text: "An der Entstehung aller Karzinome hat die Adipositas einen Anteil von 16 %.", correct: true, explanation: "Richtig. An der Entstehung aller Krebskrankheiten hat Adipositas einen Anteil von 16 %.\n\nRelatives Risiko pro Erhöhung des BMI um 5 kg/m²:\n• Ösophaguskarzinom: 1,52 (m) / 1,51 (w)\n• Mammakarzinom postmenopausal: 1,12 (w)\n• Kolonkarzinom: 1,24 (m) / 1,09 (w)\n• Nierenzellkarzinom: 1,24 (m) / 1,34 (w)\n• Endometriumkarzinom: 1,59 (w)" },
    { letter: "c", text: "Vor einer Operation muss mindestens ein sechsmonatiger Abnehmversuch erfolgt sein.", correct: true, explanation: "Richtig. Vor OP sollten alle konservativen Maßnahmen ausgeschöpft werden — mindestens 6-monatiger Abnehmversuch unter ärztlicher Betreuung.\n\n**Ausnahmen (primäre chirurgische Therapie ohne präoperative konservative Therapie):**\n• Besondere Schwere von Begleit-/Folgekrankheiten\n• BMI > 50 kg/m²\n• Persönliche psychosoziale Umstände\n• Extrem hoher Insulinbedarf" },
    { letter: "d", text: "Der offene Zugangsweg ist der Goldstandard in der Adipositaschirurgie.", correct: false, explanation: "Falsch. Goldstandard ist die **Laparoskopie**. Alle Adipositas-chirurgischen Eingriffe inklusive Revisionseingriffen sollten — falls möglich — laparoskopisch vorgenommen werden." },
    { letter: "e", text: "Der proximale Roux-en-Y-Magenbypass führt bei dem Großteil der Patienten zu einer Remission eines vorbestehenden Typ-II-Diabetes.", correct: true, explanation: "Richtig. Der proximale Roux-en-Y-Magenbypass führt in bis zu 75 % der Fälle zu einer Remission eines vorbestehenden Typ-II-Diabetes (mehrere Metaanalysen)." },
  ]},
  { id: 196, chapter: 17, number: 3, text: "Welche Aussagen zur laparoskopischen Sleeve-Gastrektomie (LSG) sind korrekt?", statements: [
    { letter: "a", text: "Bei dem Eingriff werden ca. zwei Drittel des Magens entfernt.", correct: false, explanation: "Falsch. Bei der LSG werden nur Korpus und Fundus des Magens entfernt. Die Magenresektion beginnt an der netzfreien großen Kurvatur und wird in Richtung His-Winkel fortgeführt. Zur Kalibrierung wird ein Bougie mit einer empfohlenen Größe von ≥ 34 French verwendet. Die Magenresektion erfolgt mit Klammernahtgeräten." },
    { letter: "b", text: "Die anatomische Transportfunktion bleibt erhalten.", correct: true, explanation: "Richtig. Durch die erhaltene Transportfunktion und geringe Resektionsmenge des Magens besteht im Vergleich zu anderen Verfahren der geringste Substitutionsaufwand." },
    { letter: "c", text: "Komplikationen sind Insuffizienzen oder Blutungen im Bereich der Klammernaht.", correct: true, explanation: "Richtig. Komplikationen sind Insuffizienzen oder Blutungen im Bereich der Klammernaht. Trotzdem handelt es sich um ein Verfahren mit einer geringen Morbiditäts- und Mortalitätsrate." },
    { letter: "d", text: "Nach der LSG ist keine lebenslange Nachsorge notwendig.", correct: false, explanation: "Falsch. Nach jeder Adipositas-chirurgischen/metabolischen Operation (außer Magenband) ist eine strukturierte lebenslange Nachsorge notwendig.\n\n**Empfohlene Nachsorge:** 1, 3, 6, 12, 18, 24 Monate, anschließend jährlich. Besseres Outcome durch strukturierte Nachsorge." },
    { letter: "e", text: "Durch die Dehnung des Magens im postoperativen Verlauf kann ein zweiter Eingriff notwendig werden.", correct: true, explanation: "Richtig. Bei manchen Patienten kommt es nach einem initialen Verlust an Übergewicht von 50–70 % im langfristigen Verlauf zu einer erneuten Gewichtszunahme. Ursache: Dehnung des Magens mit Erhöhung des Fassungsvermögens → zweiter Eingriff notwendig." },
  ]},
  { id: 197, chapter: 17, number: 4, text: "Welche Aussagen zum laparoskopischen Y-Roux-Magenbypass (LRYGB) treffen zu?", statements: [
    { letter: "a", text: "Bei gastroösophagealem Reflux wird bei morbider Adipositas der Roux-en-Y-Magenbypass bevorzugt.", correct: true, explanation: "Richtig. Bei GERD sollte möglichst KEINE Sleeve-Gastrektomie erfolgen — Symptomatik kann sich durch den pylorusabhängigen Druck verschlimmern. Studien zeigen: LRYGB hat einen günstigen Effekt auf eine GERD." },
    { letter: "b", text: "Der LRYGB ist sowohl ein malabsorptives als auch ein restriktives Verfahren.", correct: true, explanation: "Richtig. Die Restriktion geschieht durch die Bildung des Magenpouches. Der Bypass führt zu einer deutlichen Verkürzung der vorhandenen Resorptionsfläche → Malabsorption." },
    { letter: "c", text: "Es werden ca. zwei Drittel des Magens entfernt.", correct: false, explanation: "Falsch. Beim LRYGB verbleibt der GESAMTE Magen in situ. Es handelt sich um eine funktionelle Verkürzung des Dünndarms:\n• Jejunum wird 70–200 cm hinter dem Übergang zum Duodenum abgetrennt\n• Anastomose mit künstlich geschaffenem kleinem Magenpouch in der Nähe des Ösophagus\n• Rekonstruktion nach Roux-Y\n• Der Restmagen bleibt in situ" },
    { letter: "d", text: "Die Insulinregulation wird nicht beeinflusst.", correct: false, explanation: "Falsch. Hormonale Veränderungen in der Regulation (GLP-1, Ghrelin) durch Ausschaltung duodenaler Rezeptoren und des Fundus unterstützen nicht nur die Gewichtsreduktion, sondern beeinflussen auch die Insulinregulation. 80 % der Patienten mit Typ-II-Diabetes sind postoperativ ohne Therapiebedarf bei einem EWL (excess weight loss) > 70 %." },
    { letter: "e", text: "Durch Vitaminmangelerscheinungen kommt es zu einer erhöhten Osteoporoserate.", correct: true, explanation: "Richtig. Es kommt zu einer erhöhten Osteoporoserate sowie zu Eisen- und Vitaminmangel. Daher: regelmäßige Nachsorge und lebenslange Substitution." },
  ]},
  { id: 198, chapter: 17, number: 5, text: "Welche Aussagen zum Omega-Loop-Bypass sind zutreffend?", statements: [
    { letter: "a", text: "Die biliodigestive Schlinge ist beim Omega-Loop-Bypass 200 cm lang.", correct: true, explanation: "Richtig. Vergleich der Schlingenlängen:\n• **Roux-Y-Bypass:** 50 cm biliodigestive Schlinge, 150 cm alimentäre Schlinge\n• **Omega-Loop:** 200 cm lange Schlinge\n\nBeim Loop steht die Gallen- und Pankreasflüssigkeit über längeren Zeitraum in der 200 cm langen Schlinge → trägt zur Deaktivierung des Pankreassekrets bei." },
    { letter: "b", text: "Diarrhöen sind typisch.", correct: false, explanation: "Falsch. Aufgrund der Malabsorption kommt es eher zu **Steatorrhoen** als zu Diarrhoen." },
    { letter: "c", text: "Es kommt häufig zu Malabsorption.", correct: true, explanation: "Richtig. Die Wirksamkeit des Verfahrens beruht auf dem malabsorptiven Effekt und ist für eine größere Gewichtsreduktion verantwortlich (15 % höherer Gewichtsverlust versus Roux-Y-Bypass)." },
    { letter: "d", text: "Umwandlungsoperationen zum Roux-Y-Bypass sind nicht möglich.", correct: false, explanation: "Falsch. Ca. 10 % der Patienten lassen innerhalb von 2–3 Jahren eine Umwandlung vom Omega-Loop-Bypass in einen Roux-Y-Bypass durchführen. Grund ist häufig ein **Gallereflux** beim Omega-Loop-Bypass." },
    { letter: "e", text: "Eine endoskopische Blutstillung im Falle von postoperativer Anastomosenblutung ist möglich.", correct: true, explanation: "Richtig. Das Operationsrisiko ist niedrig — lediglich die Anlage einer Anastomose. Endoskopische Blutstillung bei postoperativer Anastomosenblutung ist möglich." },
  ]},
  { id: 199, chapter: 17, number: 6, text: "Welche Aussagen zum Gastric Banding sind korrekt?", statements: [
    { letter: "a", text: "Gastric Banding wird zunehmend häufiger durchgeführt.", correct: false, explanation: "Falsch. Beim Gastric Banding handelt es sich um ein seltener angewandtes Verfahren." },
    { letter: "b", text: "Die Operation ist nicht reversibel.", correct: false, explanation: "Falsch. Der Eingriff ist **vollständig reversibel** und die Anatomie des Körpers wird nicht verändert." },
    { letter: "c", text: "Sie bedarf keiner intensiven Nachbetreuung.", correct: false, explanation: "Falsch. Der Eingriff bedarf einer intensiven Nachbetreuung und einer großen Patientencompliance." },
    { letter: "d", text: "Sie hat eine sehr geringe operative Mortalitätsrate.", correct: true, explanation: "Richtig. Der Eingriff hat eine sehr geringe operative Mortalitätsrate. Komplikationen sind selten und umfassen Slipping/Migration des Magenbandes und Infektion." },
    { letter: "e", text: "Wird insbesondere für Patienten mit einem BMI ab 50 kg/m² empfohlen.", correct: false, explanation: "Falsch. Gastric Banding wird für einen BMI von 35–40 empfohlen und führt zu einem Excess Weight Loss (EWL) von durchschnittlich 45–55 %." },
  ]},
  { id: 200, chapter: 17, number: 7, text: "Welche Angaben zur biliopankreatischen Diversion (BPD) treffen zu?", statements: [
    { letter: "a", text: "Die BPD wurde von Scopinaro eingeführt.", correct: true, explanation: "Richtig. Die Operation wurde vom italienischen Chirurgen N. Scopinaro 1979 veröffentlicht und damals als offenes Verfahren beschrieben. Sie gehört zu den seltenen Verfahren und ist wenig reversibel." },
    { letter: "b", text: "Die operativen Schritte beinhalten die Anlage zweier Anastomosen.", correct: true, explanation: "Richtig. Die intraoperativen Schritte:\n• Gastroileostomie nach Bildung eines Magenpouches (200–300 cm³)\n• Durchtrennung des Dünndarmes ca. 250 cm oral der Ileozökalklappe\n• Zweite Anastomose: enteroenterale Verbindung zwischen alimentärem und biliodigestivem Schenkel ca. 50 cm vor der Ileozökalklappe\n\nOperationsprinzip: Ausschaltung des Dünndarms von gemeinsamer Passage von Nahrung und Verdauungssäften + Malassimilation von Fetten." },
    { letter: "c", text: "Die Operation beinhaltet eine Sleeve-Resektion.", correct: false, explanation: "Falsch. Bei der BPD nach Scopinaro wird ein Magenpouch mit einem Volumen von 200–500 ml gebildet — KEINE Sleeve-Resektion.\n\nDie biliopankreatische Diversion mit Duodenalswitch (BPD-DS) hingegen vereint durch die Magenschlauchbildung ein restriktives mit einem malabsorptiven Operationsverfahren." },
    { letter: "d", text: "Die biliopankreatische Diversion mit Duodenalswitch (BPD-DS) kann primär einzeitig oder zweizeitig durchgeführt werden.", correct: true, explanation: "Richtig. In höheren BMI-Bereichen kann zunächst eine Schlauchmagenbildung durchgeführt werden. Bei fehlendem Therapieziel → Umwandlungsoperation als BPD-DS.\n\nDer BPD-DS wurde 1988 von DeMeester zur Behandlung des Gallerefluxes entwickelt. Wichtige technische Details:\n• Sleeve-Magen darf nicht zu restriktiv sein (Charriere 54–60)\n• Biliodigestive Schlinge 75–100 cm vor der Bauhin'schen Klappe\n• Biliodigestive Schlinge nicht zu lang (sonst vollständige Gallensäureresorption)\n• Kein Dumping durch Pyloruserhalt\n\n**Höchste Mortalitätsrate unter den Verfahren (1–6 %).** Gefürchtete Komplikation: Duodenalstumpfinsuffizienz." },
    { letter: "e", text: "Der common channel ist nur ca. 50 cm lang.", correct: true, explanation: "Richtig. Die malabsorptive Komponente ist so drastisch, dass es zu Mangelzuständen (Vitamin D, Kalzium, Phosphat), Diarrhoen und Flatulenzen kommen kann. Regelmäßige Überwachung und Substitution müssen lebenslang erfolgen.\n\n**Ergebnisse BPD:**\n• Remissionsrate Diabetes Typ II: ca. 70 %\n• EWL: 65–75 % mit Langzeitstabilität des Gewichts" },
  ]},
  { id: 201, chapter: 2, number: 3, text: "Welche Aussagen zur Evaluierung eines Patienten mit einem Ösophaguskarzinom sind richtig?", statements: [
    { letter: "a", text: "Die Resektion eines operablen Ösophaguskarzinoms ist auch bei Vorliegen von Fernmetastasen unter einem palliativen Aspekt sinnvoll.", correct: false, explanation: "Falsch. Die Operation ist nur bei kurativem Ansatz gerechtfertigt. Palliativ kommen Chemotherapie, Stentimplantation oder Brachytherapie in Frage. Die Brachytherapie kann in 30 % der Fälle eine lokale Tumorkontrolle mit medianem Überleben von 5 Monaten erreichen." },
    { letter: "b", text: "Die diagnostische Laparoskopie beim fortgeschrittenen distalen Adenokarzinom des Ösophagus kann sinnvoll sein, um okkulte Lebermetastasen oder eine Peritonealkarzinose nachzuweisen.", correct: true, explanation: "Richtig. Mit Hilfe der diagnostischen Laparoskopie lassen sich in bis zu 30 % der Fälle Lebermetastasen oder eine peritoneale Tumoraussaat sichern." },
    { letter: "c", text: "Für das Staging ist eine Computertomographie in der Regel ausreichend.", correct: false, explanation: "Falsch. Insbesondere zur Beurteilung des lokalen Tumorstadiums ist die Endosonographie entscheidend. Die CT liefert nur in etwa 50 % eine genaue Beurteilung des T- und N-Stadiums, die Endosonographie in 80–90 %. Bei fortgeschrittenen Tumoren mit Kontakt zum Tracheobronchialsystem ist eine Bronchoskopie zum Ausschluss einer tracheobronchialen Fistel indiziert." },
    { letter: "d", text: "Die Positronen-Emissions-Tomographie (PET) hat einen Stellenwert bei der Diagnostik des Ösophaguskarzinoms.", correct: true, explanation: "Richtig. Die Verwendung von PET und vor allem PET-CT erlaubt eine bessere Patientenselektion und kann insbesondere Aussagen über das Ansprechen einer neoadjuvanten Therapie liefern." },
    { letter: "e", text: "Der Ausschluss einer Leberzirrhose ist vor einer geplanten Ösophagusresektion sinnvoll.", correct: true, explanation: "Richtig. Eine manifeste Leberzirrhose im Stadium Child B oder C stellt eine Kontraindikation für eine Ösophagektomie dar." },
  ]},
  { id: 202, chapter: 2, number: 4, text: "Welche Aussagen zur kurativen Therapie des Ösophaguskarzinoms sind zutreffend?", statements: [
    { letter: "a", text: "Für die Prognose gilt: Je weiter distal das Karzinom sitzt, desto schlechter ist die Langzeitprognose.", correct: false, explanation: "Falsch. Die Prognose ist schlechter, je weiter PROXIMAL das Karzinom sitzt. Weitere Prognosefaktoren: Tumorausdehnung, Zahl befallener Lymphknoten (Grenzwert 3), Komorbiditäten und präoperativer Gewichtsverlust." },
    { letter: "b", text: "Ab dem Stadium IIa sollte bei einem Plattenepithelkarzinom ein multimodales Konzept zur Anwendung kommen.", correct: true, explanation: "Richtig. Ab T3-Tumoren und bei resektablen T4-Karzinomen sollte beim Plattenepithelkarzinom des Ösophagus eine neoadjuvante Radiochemotherapie erfolgen, um eine kurative Therapie zu ermöglichen. Bei T2-Plattenepithelkarzinomen ist die neoadjuvante Radiochemotherapie eine relative Indikation.\n\nAdenokarzinome (T3 und resektable T4-Stadien; bei T2: relative Indikation) sollten präoperativ mit Radiochemotherapie oder perioperativer Chemotherapie (z. B. nach FLOT-Schema mit 5-FU + Cisplatin) behandelt werden." },
    { letter: "c", text: "Bei einer erfolgten neoadjuvanten Therapie kann auf eine Lymphadenektomie verzichtet werden.", correct: false, explanation: "Falsch. Die Entfernung der lokalen Lymphknoten ist auch nach neoadjuvanter Therapie ein wichtiger Schritt. D2-Lymphadenektomie umfasst:\n• Paraösophageale Lymphknoten oberhalb von Zwerchfell und V. cava\n• Lymphknoten an der Trachealbifurkation\n• Paratracheale Lymphknoten\n• Abdominelle suprapankreatische Lymphknoten am Truncus coeliacus" },
    { letter: "d", text: "Plattenepithelkarzinome bilden in der Regel erst spät im Krankheitsverlauf Lymphknotenmetastasen aus.", correct: false, explanation: "Falsch. Plattenepithelkarzinome metastasieren bereits bei Subserosainfiltration (pT1b) häufig in die regionären Lymphknoten. Da Plattenepithelkarzinome in Europa häufig spät diagnostiziert werden, ist eine systematische Lymphadenektomie für einen kurativen Ansatz oft erforderlich." },
    { letter: "e", text: "Für die Bewertung des Lymphknotenstatus müssen mindestens 12 Lymphknoten im Präparat enthalten sein.", correct: false, explanation: "Falsch. Für eine ausreichende Beurteilung sind beim Ösophaguskarzinom mindestens 6 Lymphknoten erforderlich." },
  ]},
  { id: 203, chapter: 2, number: 5, text: "Welche Aussagen zur Rekonstruktion nach Ösophagusresektion sind richtig?", statements: [
    { letter: "a", text: "Die Vorteile einer hoch-intrathorakalen Anastomose bei Ösophagusresektion und Magenhochzug sind eine bessere Durchblutung und niedrigere Insuffizienzrate sowie eine bessere Schluckfunktion.", correct: true, explanation: "Richtig. International wird die intrathorakale Anastomose präferiert: bessere Durchblutung, niedrigere Insuffizienzrate, bessere Schluckfunktion und Protektion des N. recurrens. Zusätzlich Möglichkeit der Abdichtung mit endoskopisch platziertem Stent oder Endo-VAC-Therapie." },
    { letter: "b", text: "Die Wiederherstellung der Nahrungspassage erfolgt in der Regel mit einem Kolonhochzug.", correct: false, explanation: "Falsch. Der Kolonhochzug ist technisch aufwändig und mit funktionellen Nachteilen verbunden (häufig Foetor ex ore). Standard ist der Magenhochzug." },
    { letter: "c", text: "Bei der Herstellung des Magenschlauches muss die A. gastrica dextra unbedingt erhalten werden, damit es nicht zu einer Magennekrose kommt.", correct: false, explanation: "Falsch. Die Erhaltung der A. gastrica dextra ist fakultativ und kann zur ausreichenden Mobilisierung des Magens abgesetzt werden. Der Magenschlauch wird über die A. gastroepiploica dextra aus der A. gastroduodenalis gestielt — auf diese Gefäßarkaden ist unbedingt zu achten." },
    { letter: "d", text: "Um eine ausreichende Mobilität des Magenschlauches zu gewährleisten, ist ein Kocher-Manöver hilfreich.", correct: true, explanation: "Richtig. Damit der Magenschlauch spannungsfrei nach intrathorakal platziert werden kann, ist meist ein ausgedehntes Kocher-Manöver erforderlich (Mobilisation des Duodenums aus dem Retroperitonealraum)." },
    { letter: "e", text: "Um die Entleerung des Magenschlauches zu erleichtern, sollte eine Pyloroplastik durchgeführt werden.", correct: true, explanation: "Richtig. Aufgrund der Denervierung kommt es postoperativ häufig zu einer Magenentleerungsstörung. Lösungsmöglichkeiten:\n• Extramukosale Pyloromyotomie\n• Pyloroplastie\n• Bei laparoskopischen Verfahren: präoperative endoskopische Botox-Injektion" },
  ]},
  { id: 204, chapter: 2, number: 6, text: "Welche Aussagen zur operativen Technik bei Ösophagusresektionen treffen zu?", statements: [
    { letter: "a", text: "Die Wahrscheinlichkeit für das Auftreten eines Anastomosenrezidivs ist unabhängig von der Länge des Sicherheitsabstandes bei der Resektion.", correct: false, explanation: "Falsch. Je kürzer der Sicherheitsabstand, desto größer ist die Rezidivhäufigkeit:\n• Abstand < 2 cm: Rezidiv in 13 % der Fälle\n• Abstand > 8 cm: kein Anastomosenrezidiv (in einer Untersuchung)" },
    { letter: "b", text: "Beim infrabifurkalen Ösophaguskarzinom ist eine 2-Feld-Lymphknotendissektion erforderlich.", correct: true, explanation: "Richtig. Das infrabifurkal gelegene Karzinom wird mit einer subtotalen Ösophagusresektion und einer mediastinalen sowie thorakalen Lymphadenektomie behandelt." },
    { letter: "c", text: "Beim suprabifurkalen Ösophaguskarzinom kann auf eine abdominale Lymphadenektomie verzichtet werden.", correct: false, explanation: "Falsch. Auch bei suprabifurkalen Karzinomen ist nach aktuellen Leitlinien eine abdominelle Lymphadenektomie indiziert. Zusätzlich sollte das zervikale Kompartiment einbezogen werden (3-Feld-Lymphadenektomie)." },
    { letter: "d", text: "Während die zervikale Anastomoseninsuffizienz in der Regel nicht lebensbedrohlich ist, so besteht eine hohe Mortalität bei der intrathorakalen Anastomoseninsuffizienz.", correct: true, explanation: "Richtig. Die zervikale Insuffizienz heilt bei ausreichender Drainage und Nahrungskarenz meist folgenlos aus, das Leck kann durch Stentplatzierung überbrückt werden. Bei intrathorakaler Insuffizienz besteht die Gefahr einer Mediastinitis und vor allem das Risiko der Ausbildung einer ösophagotrachealen Fistel mit hoher Mortalität." },
    { letter: "e", text: "Zur Prävention einer Anastomosenstenose sollten Zirkularstapler mit einem Durchmesser von mindestens 25 mm verwendet werden.", correct: true, explanation: "Richtig. Bei Verwendung kleinerer Zirkularstapler besteht die Gefahr einer Anastomosenstenose. Symptome: Dysphagie, rezidivierendes Erbrechen, persistierender Gewichtsverlust." },
  ]},
  { id: 205, chapter: 2, number: 7, text: "Welche Aussagen zur Diagnostik und Therapie von Anastomoseninsuffizienzen nach Ösophagusresektionen treffen zu?", statements: [
    { letter: "a", text: "Die Insuffizienzrate nach einem Magenhochzug beträgt ca. 10 %.", correct: true, explanation: "Richtig. Die Insuffizienzrate liegt bei etwa 10 %. Die Sterblichkeit nach Ösophagusresektionen beträgt in deutschen Krankenhäusern ca. 7–12 %." },
    { letter: "b", text: "Bei allen Abweichungen vom normalen Verlauf sollte eine Endoskopie durchgeführt werden.", correct: true, explanation: "Richtig. Bei postoperativen Auffälligkeiten (Klinik, Labor) sollte primär eine Endoskopie erfolgen — beurteilbar sind insbesondere die Durchblutung des Magenschlauches und die Größe einer möglichen Insuffizienz." },
    { letter: "c", text: "Auch bei kleinen Defekten in der Anastomose sollte eine chirurgische Revision und Übernähung der Anastomose durchgeführt werden, um die Ausbildung einer ösophago-trachealen Fistel zu verhindern.", correct: false, explanation: "Falsch. Therapieoptionen je nach Defektgröße:\n• Kleine Läsionen < 5 mm: konservativ mit enteraler Sonde\n• Defekte bis ca. 1 cm: OTSC (over-the-scope clip) oder ummantelter Metallstent\n• Mit Verhalt: Endo-VAC-Therapie\n• Operative Revision: nur bei Pleuraempyem oder sehr großen Insuffizienzen mit Notwendigkeit der Anastomosen-Neuanlage" },
    { letter: "d", text: "Zur wirksamen Verhinderung einer Anastomoseninsuffizienz sollte die Anastomose immer mit einem EEA-Stapler angelegt werden.", correct: false, explanation: "Falsch. Die Ösophagogastrostomie kann sowohl mit einem Stapler als auch mit einer Handnaht durchgeführt werden — die Ergebnisse sind vergleichbar." },
    { letter: "e", text: "Zervikale Insuffizienzen sind häufig interventionell nicht gut zu behandeln. In diesen Fällen sollte eine Speichelfistel angelegt werden.", correct: true, explanation: "Richtig. In diesen Fällen ist entweder die Anlage einer Speichelfistel oder eine Diskontinuitätsresektion erforderlich." },
  ]},
  { id: 206, chapter: 2, number: 8, text: "Welche Aussagen zur endoskopischen und neoadjuvanten Therapie von Ösophaguskarzinomen sind zutreffend?", statements: [
    { letter: "a", text: "Tumoren, die auf die Mukosa beschränkt sind, können auch endoskopisch behandelt werden.", correct: true, explanation: "Richtig. Bei Karzinomen bis Tis/T1, N0, M0 (UICC 0/1a) sind in der Regel noch keine Lymphknotenmetastasen zu erwarten.\n\nInfiltrationstiefe-Klassifikation: m1–3 (Mukosa) und sm1–3 (Submukosa).\n\n• Adenokarzinom m1–3: praktisch keine LK-Metastasen\n• Plattenepithelkarzinom m1: 0 % LK-Metastasen\n• Plattenepithelkarzinom m2: 3 %\n• Plattenepithelkarzinom m3: bereits 12 %\n\nBei m3-Plattenepithelkarzinom ist die Entscheidung individuell in der Tumorkonferenz zu treffen." },
    { letter: "b", text: "Tumoren mit einer oberflächlichen Submukosainfiltration müssen operiert werden.", correct: false, explanation: "Falsch. Bei oberflächlicher Submukosainfiltration ohne Risikofaktoren (pT1 sm1; < 500 μm Tiefeninvasion; L0; V0; G1/G2; < 20 mm; keine Ulzeration) kann die endoskopische Therapie eine onkologisch sinnvolle Alternative sein.\n\nBei sm1 LK-Metastasen-Risiko:\n• Adenokarzinom: bis 15 %\n• Plattenepithelkarzinom: bis 27 %\n\nDaher individuelle Entscheidung in interdisziplinärer Tumorkonferenz. Tumoren > sm1 sollten in jedem Fall operativ behandelt werden." },
    { letter: "c", text: "Eine vorhandene, nicht-neoplastische Barrett-Mukosa kann nach einer erfolgten endoskopischen Tumorresektion im Verlauf beobachtet werden. Eine Therapie ist nicht erforderlich.", correct: false, explanation: "Falsch. Nach Resektion eines Tumors in einer Barrett-Schleimhaut sollte thermisch abladiert werden, um der Entstehung weiterer Neoplasien vorzubeugen." },
    { letter: "d", text: "Fortgeschrittene Karzinome des Ösophagus sollten multimodal behandelt werden.", correct: true, explanation: "Richtig. Fortgeschrittene Plattenepithelkarzinome werden in der Regel mit kombinierter Radiochemotherapie vorbehandelt. Bei Adenokarzinomen kommt neben Radiochemotherapie auch alleinige Chemotherapie in Betracht." },
    { letter: "e", text: "Nach Abschluss der neoadjuvanten Therapie sollte vor der Durchführung der Operation eine Zeitspanne von ca. 6 Wochen abgewartet werden.", correct: true, explanation: "Richtig. Gründe:\n• Immunsystem und Wundheilung sind unmittelbar nach Radiochemotherapie noch beeinträchtigt\n• Tumor-Response benötigt einige Wochen bis zum vollständigen Ansprechen\n\nJe nach Protokoll ist eine Zeitspanne von 4–8 Wochen indiziert." },
  ]},
  { id: 207, chapter: 2, number: 9, text: "Welche Aussagen zur gastroösophagealen Refluxkrankheit treffen zu?", statements: [
    { letter: "a", text: "Die Prävalenz der Refluxkrankheit liegt bei etwa 10–20 %.", correct: true, explanation: "Richtig. Gelegentliche Refluxbeschwerden treten bei ca. 30 % der Menschen auf, eine manifeste Refluxösophagitis bei 7 %. Nur etwa 30 % der Patienten mit Refluxkrankheit haben auch eine Refluxösophagitis." },
    { letter: "b", text: "Die Ursachen für den mangelnden Verschluss des unteren Ösophagussphinkters liegen in defekten paraösophagelen Ganglien, die zu einer Fehlsteuerung führen.", correct: false, explanation: "Falsch. Wichtiger Refluxmechanismus sind transiente Sphinkter-Relaxationen außerhalb des Schluckaktes. Diese dienen physiologisch dem Aufstoßen von Luft, sind aber bei der Refluxkrankheit häufiger und länger anhaltend. Weitere Ursachen: anatomische Störungen (Hiatushernie), Erhöhung des intraabdominellen Druckes." },
    { letter: "c", text: "Eine pathologische pH-Metrie ist bei entsprechender Symptomatik beweisend für eine Refluxkrankheit.", correct: true, explanation: "Richtig. Die pH-Metrie gilt als Goldstandard für die Refluxdiagnostik. Hierbei wird die Säureexposition des Ösophagus objektiv quantifiziert." },
    { letter: "d", text: "Bei etwa 50 % der Patienten ist die Refluxösophagitis ein einmaliges Ereignis, welches danach nicht mehr auftritt.", correct: true, explanation: "Richtig. Bei der anderen Hälfte kommt es zu rezidivierenden Refluxösophagitiden, bei 20 % zu progredienten Schleimhautschäden." },
    { letter: "e", text: "In 10 % der Fälle mit erosiver Ösophagitis kommt es zu einem Ersatz des Plattenepithels des Ösophagus mit Zylinderepithel.", correct: true, explanation: "Richtig. Diese Zylinderepithelmetaplasie (Barrett-Ösophagus) ist eine typische Folge der Ausheilung von Epitheldefekten." },
  ]},
  { id: 208, chapter: 2, number: 10, text: "Welche Aussagen zur Refluxchirurgie sind richtig?", statements: [
    { letter: "a", text: "Vor einer Refluxoperation sollte ein konservativer Therapieversuch erfolgen.", correct: true, explanation: "Richtig. Empfohlen wird eine 6-monatige Therapie mit ausreichend dosiertem Protonenpumpenhemmer. Nur etwa 10 % der Patienten benötigen anschließend eine Operation." },
    { letter: "b", text: "Bei einer paraösophagealen Hernie findet sich häufig eine Anämie durch die venöse Stauung der Magenwand.", correct: true, explanation: "Richtig. Die paraösophageale Hernie ist eine der häufigsten Ursachen für eine Anämie im höheren Lebensalter (neben Tumoren)." },
    { letter: "c", text: "Eine axiale Hiatushernie stellt in der Regel eine OP-Indikation dar.", correct: false, explanation: "Falsch. Nur bei gleichzeitig bestehender höhergradiger Refluxkrankheit besteht eine Indikation zur Fundoplicatio." },
    { letter: "d", text: "Paraösophageale Hernien stellen nur selten eine OP-Indikation dar.", correct: false, explanation: "Falsch. Aufgrund der Strangulationsgefahr und möglichen Einklemmung stellen paraösophageale Hernien eine ABSOLUTE OP-Indikation dar. Operation:\n• Reposition des Bruchinhaltes\n• Hiatusplastik (ggf. mit Netzverstärkung)\n• Fundopexie" },
    { letter: "e", text: "Das bevorzugte operative Verfahren ist die Fundoplicatio nach Nissen-Rosetti.", correct: false, explanation: "Falsch. Die geläufigsten Methoden sind die 360°-Fundoplicatio nach Nissen-Rosetti und die 270°-Fundoplicatio nach Toupet, heute meist laparoskopisch. Bei der Toupet-Rekonstruktion sind geringere Raten an postoperativer Dysphagie beschrieben — daher ist diese als Standard etabliert.\n\nBei großen Hiatushernien zusätzlich: Hiatoplastik (vordere/hintere) durch Nähte oder Netzeinlage und Fundo-/Gastropexie." },
  ]},
  { id: 209, chapter: 2, number: 11, text: "Welche Aussagen zum Barrett-Ösophagus treffen zu?", statements: [
    { letter: "a", text: "Ein Barrett-Ösophagus stellt eine Präkanzerose für die Entwicklung eines Ösophagus-Karzinoms dar.", correct: true, explanation: "Richtig. In Abhängigkeit von der Länge des Barrett-Segmentes besteht ein 40–200-fach erhöhtes Karzinomrisiko. Das Adenokarzinom des Ösophagus wird daher auch als Barrett-Karzinom bezeichnet." },
    { letter: "b", text: "Nach der Los-Angeles-Klassifikation wird ein Small- und ein Long-Segment-Barrett-Ösophagus unterschieden.", correct: false, explanation: "Falsch. Die 4-stufige Los-Angeles-Klassifikation beschreibt das Ausmaß der zirkumferentiellen Mukosa-Läsionen der Reflux-Ösophagitis. Davon zu unterscheiden ist die Einteilung in Short- und Long-Segment-Barrett-Ösophagus (< 3 cm bzw. > 3 cm)." },
    { letter: "c", text: "Beim Barrett-Ösophagus kann bereits bei einer bestätigten intestinalen high-grade Metaplasie (HGIEN) die Indikation für eine Ösophagektomie bestehen.", correct: true, explanation: "Richtig. Bei Patienten mit Low-grade-Metaplasie werden regelmäßige Kontroll-ÖGDs durchgeführt. Bei HGIEN ist je nach Ausmaß eine endoskopische Mukosaresektion oder Ösophagusresektion indiziert." },
    { letter: "d", text: "Die Bestimmung der Infiltrationstiefe eines Adenokarzinoms ist prognostisch besonders wichtig.", correct: true, explanation: "Richtig. Eine Differenzierung in m- (Mukosa) und sm- (Submukosa) ist wichtig, da die Eindringtiefe ein Prädiktor für Lymphknotenmetastasen ist. Karzinome mit Submukosa-Infiltration haben in 20 % bereits LK-Metastasen → operative Behandlung indiziert." },
    { letter: "e", text: "Ein dysplastisches Barrett-Epithel sollte primär mit einer photodynamischen Therapie behandelt werden.", correct: false, explanation: "Falsch. Bei auf die Mukosa beschränkten Tumoren kann eine kurative Mukosaresektion durchgeführt werden. Die photodynamische Therapie erlaubt keine histologische Überprüfung und führt in ca. 20 % der Fälle zu einer Stenosierung des Ösophagus." },
  ]},
  { id: 210, chapter: 2, number: 12, text: "Welche Aussagen zur Dysphagie treffen zu?", statements: [
    { letter: "a", text: "Differenzialdiagnostisch unterscheidet man eine oropharyngeale und eine ösophageale Form.", correct: true, explanation: "Richtig. Bei der oropharyngealen Form kommt es gehäuft zu Aspirationen beim Schlucken flüssiger Speisen. Bei der ösophagealen Variante steht zunächst die Schluckbehinderung von festen, später auch flüssigen Speisen im Vordergrund." },
    { letter: "b", text: "Die oropharyngeale Form der Dysphagie findet sich v. a. bei Kleinhirntumoren.", correct: false, explanation: "Falsch. Mögliche Ursachen umfassen lokale Veränderungen im Oropharynxbereich (Tumoren, Entzündungen), neuromuskuläre Erkrankungen (Myasthenie) und zentralnervöse Störungen (Apoplex)." },
    { letter: "c", text: "Die ösophageale Form der Dysphagie zeichnet sich durch eine rasche Gewichtsabnahme aus.", correct: false, explanation: "Falsch. Patienten können sich häufig lange an die Passagestörung adaptieren. Insbesondere durch langsames Essen und hochkalorische Ernährung kann das Gewicht jahrelang stabil bleiben." },
    { letter: "d", text: "Die Ursachen einer Dysphagie sind in der Regel unabhängig vom Patientenalter.", correct: false, explanation: "Falsch. Bei jüngeren Patienten stehen primär Motilitätsstörungen des Ösophagus im Vordergrund, bei älteren häufiger tumoröse Veränderungen." },
    { letter: "e", text: "Zur Schweregradeinschätzung der Achalasie eignet sich beispielsweise der Dysphagie-Score nach Eckhardt.", correct: true, explanation: "Richtig. Der Eckhardt-Score bezieht die vier Hauptsymptome der Achalasie ein:\n• Dysphagie\n• Regurgitation\n• Retrosternaler Schmerz\n• Gewichtsverlust\n\nJedes Symptom erhält bis zu 3 Punkte → maximale Punktzahl 12." },
  ]},
  { id: 211, chapter: 2, number: 13, text: "Welche Aussagen zur Achalasie treffen zu?", statements: [
    { letter: "a", text: "Die Achalasie ist eine primäre Dilatation des Ösophagus aufgrund von einer erworbenen Bindegewebsschwäche der Ösophaguswand.", correct: false, explanation: "Falsch. Die Achalasie ist gekennzeichnet durch eine fehlende Relaxation des unteren Ösophagussphinkters beim Schluckakt. Hierdurch kommt es zu einer progressiven Dilatation des Ösophagus, einer Stase von Speichel und Nahrungsmitteln und einer konsekutiven Superinfektion." },
    { letter: "b", text: "Bei der Diagnostik einer Achalasie kann die Manometrie wertvolle Hinweise liefern.", correct: true, explanation: "Richtig. In Durchzugsmanometrie oder High-Resolution-Manometrie zeigt sich ein erhöhter Ruhetonus sowie eine ungenügende Relaxation des unteren Ösophagussphinkters. Die Manometrie ist Goldstandard für die Achalasie-Diagnostik." },
    { letter: "c", text: "Die Achalasie wird je nach dem Ausmaß der Dilatation in drei Stadien eingeteilt.", correct: true, explanation: "Richtig. Stadieneinteilung:\n• Stadium I: keine Dilatation\n• Stadium II: deutliche Dilatation (dekompensiert)\n• Stadium III: extreme Dilatation (dekompensiert)" },
    { letter: "d", text: "Das chirurgische Therapieprinzip der Achalasie beinhaltet die laparoskopische Spaltung der zirkulären Ringmuskelfasern des unteren Ösophagussphinkters.", correct: true, explanation: "Richtig. Zusätzlich werden auch die Ringmuskelfasern des distalen Ösophagus und proximalen Magens durchtrennt. Häufig wird der Eingriff mit einer Semifundoplicatio kombiniert." },
    { letter: "e", text: "Die Erfolgsrate der Myotomie nach Heller ist leider sehr gering.", correct: false, explanation: "Falsch. Die Heller-Myotomie ist ein sehr effektives Verfahren mit dauerhafter Erfolgsrate von 85–95 %." },
  ]},
  { id: 212, chapter: 2, number: 14, text: "Welche Aussagen zur Achalasie treffen zu?", statements: [
    { letter: "a", text: "Eine sekundäre Achalasie kann bei einer Reihe von Erkrankungen auftreten, die nicht primär den Ösophagus betreffen.", correct: true, explanation: "Richtig. Diese Erkrankungen imitieren das klinische Bild einer Achalasie:\n• Kardiakarzinome\n• Sekundär die Kardia infiltrierende Magenkarzinome\n• Bronchialkarzinom\n• Nierenkarzinom" },
    { letter: "b", text: "Die Achalasie ist eine Präkanzerose.", correct: true, explanation: "Richtig. Die durch die Stase bedingten Epithelveränderungen in der Ösophagusmukosa begünstigen das Entstehen von Dysplasien. Die Inzidenz von Plattenepithelkarzinomen ist bei Vorliegen einer Achalasie erhöht." },
    { letter: "c", text: "Das klinische Bild der Achalasie besteht vor allem aus rezidivierendem retrosternalem Vernichtungsschmerz.", correct: false, explanation: "Falsch. Die Achalasie ist gekennzeichnet durch eine Dysphagie für feste und flüssige Nahrung sowie eine Regurgitation von Nahrungsbestandteilen." },
    { letter: "d", text: "Für die Behandlung der Achalasie ist die pneumatische Dilatation die Therapie der Wahl.", correct: false, explanation: "Falsch. Prospektiv-randomisierte Studien zeigten: Die primäre chirurgische Therapie liefert bessere Ergebnisse als Dilatation oder Botulinumtoxininjektion (50 % Frührezidive)." },
    { letter: "e", text: "Auch bei weitgehender Schonung der sogenannten Sling-Muskelfasern des Magens bei der Myotomie nach Heller kann es zum postoperativen Reflux von Mageninhalt in den Ösophagus kommen.", correct: true, explanation: "Richtig. Auch bei Schonung der Sling-Fasern kann es zum Reflux nach Myotomie kommen. Daher wird empfohlen, die Myotomie mit einer Antireflux-Operation zu kombinieren." },
  ]},
  { id: 213, chapter: 2, number: 15, text: "Welche Aussagen zu Ösophagusdivertikeln sind zutreffend?", statements: [
    { letter: "a", text: "Ösophagusdivertikel sind häufig echte Divertikel.", correct: false, explanation: "Falsch. Echte Divertikel (mit Ausstülpung der gesamten Ösophaguswand) sind selten. Bei den falschen Divertikeln (Pseudodivertikel) kommt es zu umschriebenen Ausstülpungen durch eine Muscularislücke — sie bestehen nur aus Mukosa und Submukosa." },
    { letter: "b", text: "Pulsionsdivertikel entwickeln sich in der Regel auf Höhe des Aortenbogens.", correct: false, explanation: "Falsch. Pulsionsdivertikel entstehen durch intraluminale Druckerhöhung, häufig vor den Ösophagussphinktern:\n• Oberer Sphinkter: Zenker-Divertikel\n• Unterer Sphinkter: epiphrenisches Divertikel" },
    { letter: "c", text: "Das Zenker-Divertikel entsteht in der Regel oberhalb des M. cricopharyngeus am Kilian'schen Dreieck.", correct: true, explanation: "Richtig. Das Zenker-Divertikel entwickelt sich meist nach links und kann bis faustgroß werden. Bei größeren Divertikeln kommt es zur Regurgitation von Speisen. Es ist die häufigste Form der Ösophagusdivertikel." },
    { letter: "d", text: "Traktionsdivertikel sind echte Divertikel und entstehen durch Zug von außen.", correct: true, explanation: "Richtig. Sie werden meist auf Höhe der Trachealbifurkation gefunden und entstanden früher häufig durch schrumpfende Hiluslymphknoten. Heute werden sie auch auf embryonale Fehlbildungen zurückgeführt. Lokalisation: meist im mittleren Drittel der Speiseröhre." },
    { letter: "e", text: "Neben der Abtragung des Zenker-Divertikels sollte bei der Operation auch eine Myotomie des oberen Ösophagussphinkters erfolgen, um einem Rezidiv vorzubeugen.", correct: true, explanation: "Richtig. Bei kleineren Divertikeln (< 2 cm) ist eine Myotomie alleine häufig ausreichend, bei größeren sollte eine Resektion des Divertikelsacks erfolgen." },
  ]},
  { id: 214, chapter: 2, number: 16, text: "Welche Aussagen zum Zenker-Divertikel sind zutreffend?", statements: [
    { letter: "a", text: "In der Frühphase kommt es häufig zu stillen Aspirationen.", correct: false, explanation: "Falsch. Im Vordergrund stehen Dysphagie und Regurgitation von Nahrung. Ein unangenehmer Mundgeruch kann ein Frühsymptom sein. Aspirationen sind erst Spätsymptome." },
    { letter: "b", text: "Für die Diagnostik ist neben der Endoskopie auch ein Kontrastmittelbreischluck sinnvoll.", correct: true, explanation: "Richtig. Die Kontrastmitteldarstellung ist eine dynamische Untersuchung — Lokalisation und Größe des Divertikels lassen sich gut beurteilen. Die Endoskopie dient zudem dem Ausschluss weiterer pathologischer Befunde." },
    { letter: "c", text: "Die Zenker-Divertikel werden entsprechend ihrer Lage im Ösophagus klassifiziert.", correct: false, explanation: "Falsch. Zenker-Divertikel werden nach ihrer Größe nach Brombart klassifiziert (4 Stadien). Klinisch besonders relevant sind die Stadien III und IV (> 1 cm)." },
    { letter: "d", text: "Das Septum zwischen Ösophagus und Divertikel sollte bei der endoskopischen Versorgung komplett durchtrennt werden.", correct: true, explanation: "Richtig. Bei unvollständiger Spaltung kann die klinische Symptomatik fortbestehen. Die Erfolgsraten des endoskopischen Verfahrens liegen bei 90 %." },
    { letter: "e", text: "Typische Komplikationen der offenen Versorgung sind neben einer Speichelfistel auch eine Rekurrenzläsion.", correct: true, explanation: "Richtig. Bei Insuffizienz der Klammernahtreihe kann eine langwierige Speichelfistel resultieren. Eine Rekurrenzläsion ist möglich, da der Nerv in der Nähe des Ösophagus verläuft." },
  ]},
  { id: 215, chapter: 2, number: 17, text: "Welche Aussagen zur Ösophagusruptur treffen zu?", statements: [
    { letter: "a", text: "Die iatrogene Ösophagusruptur stellt immer eine dringliche Operationsindikation dar.", correct: false, explanation: "Falsch. Während früher die operative Versorgung innerhalb der ersten 24 Stunden bevorzugt wurde, wird heute primär konservativ therapiert:\n• Nulldiät\n• Parenterale Ernährung\n• Antibiotische Abschirmung\n• Kontinuierliche Absaugung von Speichel und Magensaft durch Magensonde" },
    { letter: "b", text: "Beim Boerhaave-Syndrom handelt es sich um eine emetogene Ösophagusruptur.", correct: true, explanation: "Richtig. Es handelt sich um ein intraluminales Barotrauma, welches während eines forcierten Erbrechens auftritt." },
    { letter: "c", text: "Die Rupturstelle liegt beim Boerhaave-Syndrom typischerweise im distalen Ösophagus.", correct: true, explanation: "Richtig. Typischerweise findet sich ein linkslateraler dorsaler Defekt oberhalb des Zwerchfells." },
    { letter: "d", text: "Klinisch imponiert das Boerhaave-Syndrom durch plötzlich auftretendes hohes Fieber nach heftigem Erbrechen.", correct: false, explanation: "Falsch. Das Boerhaave-Syndrom besteht klassischerweise aus einer Trias:\n• Akute thorakale Schmerzen\n• Haut- bzw. Mediastinalemphysem\n• Nach Episode heftigen Erbrechens\n\nFieber als Zeichen einer Mediastinitis tritt erst später im Verlauf auf." },
    { letter: "e", text: "Auch bei rascher Behandlung ist die Mortalität des Boerhaave-Syndroms sehr hoch.", correct: false, explanation: "Falsch. Während das unbehandelte Syndrom eine Mortalität von nahezu 100 % hat, sinkt diese nach adäquater konservativer und chirurgischer Therapie auf unter 3 %." },
  ]},
  { id: 216, chapter: 2, number: 18, text: "Welche Aussagen zu Säuren- und Laugenverletzungen des Ösophagus treffen zu?", statements: [
    { letter: "a", text: "Säure- und Laugenverletzungen unterscheiden sich hinsichtlich ihres pathophysiologischen Schädigungsmechanismus.", correct: true, explanation: "Richtig.\n• Säureverletzungen: Koagulationsnekrosen mit Verklumpung des Gewebes\n• Laugenverätzungen: Kolliquationsnekrosen mit Verflüssigung des Gewebes\n\nDie Einschmelzungen bei Laugen begünstigen die weitere Ausbreitung in tiefere Umgebung." },
    { letter: "b", text: "Säureverletzungen betreffen in erster Linie den Ösophagus, während Laugeningestionen primär durch die Kolliquation zu einer Magenperforation führen.", correct: false, explanation: "Falsch. Die Verteilung ist genau umgekehrt:\n• Säureverätzungen: primär entlang der Magenstraße\n• Laugenverätzungen: bevorzugt Ösophagus und seine physiologischen Engstellen\n\nIn höheren Konzentrationen werden beide Organe befallen." },
    { letter: "c", text: "Die Ingestion von Säuren ist prognostisch ungünstiger als die von Laugen.", correct: true, explanation: "Richtig. Die Säureningestion führt zu signifikant ausgeprägterer Gewebeschädigung, höherer Komplikationsrate und höherer Mortalität." },
    { letter: "d", text: "Das Risiko der malignen Entartung einer verätzungsbedingten Striktur ist gering.", correct: false, explanation: "Falsch. Nach einem stummen Intervall von 10–20 Jahren ist das Risiko einer Karzinomentstehung deutlich erhöht." },
    { letter: "e", text: "Eine OP-Indikation besteht bei Verätzungen in der Regel bei einer Perforation oder klinischen Instabilität.", correct: true, explanation: "Richtig.\n• Magenperforation: häufig Gastrektomie mit Anlage einer temporären Speichelfistel\n• Ösophagusperforation: Beurteilung schwieriger; bei transmuraler Nekrose transhiatale Dissektion mit Speichelfistel-Anlage\n• Im Intervall: Rekonstruktion nach Rekonvaleszenz" },
  ]},
  { id: 224, chapter: 18, number: 1, text: "Bei welchen der folgenden Erkrankungen sollte eine Evaluation zur Lebertransplantation erfolgen, da eine prinzipielle Indikation zur Transplantation vorliegt?", statements: [
    { letter: "a", text: "Akutes Leberversagen aufgrund einer Amatoxin-Intoxikation (Knollenblätterpilz).", correct: true, explanation: "Richtig. Die Intoxikation mit Amatoxin (im grünen Knollenblätterpilz) kann schon bei sehr geringen Toxin-Mengen (0,1 mg/kg KG) zum Tod führen. Das Toxin schädigt die Hepatozyten direkt und führt zum akuten Leberversagen. Die Dauer zwischen Ingestion und Tod beträgt im Mittel 6–10 Tage. In fortgeschrittenen Stadien ist die Lebertransplantation oft die einzige Überlebensmöglichkeit." },
    { letter: "b", text: "Steatosis hepatis mit einer Verfettung von > 80 % der Hepatozyten.", correct: false, explanation: "Falsch. Eine Steatosis hepatis ist eine vollständig reversible Veränderung der Leber. Die Verfettung per se hat keinen Krankheitswert und tritt auch physiologisch auf (z. B. beim Fasten/Hungern).\n\nFormen der Steatosis hepatis:\n• NASH (nicht-alkoholische Steatosis hepatis)\n• ASH (alkoholische Steatosis hepatis)\n• CASH (Chemotherapie-induzierte Steatosis hepatis)\n\nNur wenn gleichzeitig eine schwere Hepatitis besteht oder die Steatosis in eine Leberzirrhose übergegangen ist, kann eine Indikation zur Lebertransplantation bestehen." },
    { letter: "c", text: "Ethyltoxische Leberzirrhose.", correct: true, explanation: "Richtig. Die ethyltoxische Leberzirrhose ist eine der Hauptindikationen zur Lebertransplantation in Deutschland. Bei der Mehrzahl der Patienten kommt es durch langjährigen Alkoholkonsum zum Umbau über Steatosis (ASH) → Leberfibrose → Leberzirrhose.\n\nGrenzwerte (interindividuell variabel):\n• Männer: 40 g Alkohol/Tag\n• Frauen: 20 g Alkohol/Tag\n\nDie Bundesärztekammer-Richtlinien geben klare Vorgaben für Abstinenzkriterien zur Vermeidung eines Relaps nach Transplantation." },

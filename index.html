    { letter: "b", text: "Typisch sind kolikartige rechtsseitige Oberbauchbeschwerden.", correct: false, explanation: "Falsch. Häufig kann eine Anamnese früherer Koliken erhoben werden. Bei der akuten Entzündung kommt es jedoch meist zu einem persistierenden rechtsseitigen Oberbauchschmerz, häufig mit Ausstrahlung in den Rücken. Begleitend können Übelkeit und Erbrechen auftreten. Klinisch findet sich meist eine entsprechende Druckdolenz. Bei etwa einem Drittel der Fälle kann die Gallenblase als schmerzhafte Resistenz getastet werden. Randomisierte kontrollierte Studien zeigten, dass NSAR im Rahmen einer biliären Kolik die Wahrscheinlichkeit einer konsekutiven akuten Cholezystitis senken." },
    { letter: "c", text: "Die bildgebende Methode der Wahl ist die CT.", correct: false, explanation: "Falsch. Methode der Wahl ist die Sonographie. In bis zu 95 % der Fälle gelingt hiermit der Nachweis der akuten Cholezystitis. Typischerweise finden sich Steine, häufig zusätzliches echogenes Material in der Gallenblase und ein echoarmer Randsaum bei typischer Dreischichtung der Gallenblasenwand." },
    { letter: "d", text: "Bei der akuten Cholezystitis ist die Gallenblase meist groß.", correct: true, explanation: "Richtig. Durch die Obstruktion am Gallenblasenausgang ist die Gallenblase meist prall gefüllt. Sonographisch lässt sich häufig eine Länge > 10 cm und Wanddicke > 4–5 mm ausmessen." },
    { letter: "e", text: "Die akute Cholezystitis erfordert immer eine sofortige Notfalloperation.", correct: false, explanation: "Falsch. Die frühzeitige Cholezystektomie hat sich bewährt und verkürzt den Krankenhausaufenthalt ohne höhere Morbidität und Mortalität. Der Eingriff kann nach entsprechender Vorbereitung und konservativer antibiotischer Anbehandlung unter Routinebedingungen erfolgen (idealerweise innerhalb der ersten 24 Stunden nach stationärer Aufnahme). Bei Schmerzzunahme und Sepsiszeichen unter antibiotischer Therapie muss bei drohender oder stattgehabter Gallenblasenperforation eine Notfalloperation angestrebt werden." },
  ]},
  { id: 73, chapter: 5, number: 11, text: "Welche Aussagen bezüglich Gallenblasenpolypen treffen zu?", statements: [
    { letter: "a", text: "Bei Diagnose besteht immer eine OP-Indikation.", correct: false, explanation: "Falsch. Gallenblasenpolypen müssen nur operiert werden, wenn sie Beschwerden auslösen. Cholesterinpolypen können sich z. B. von der Gallenblasenwand lösen, sich wie Konkremente verhalten und Koliken verursachen. Eine weitere OP-Indikation besteht bei adenomatösen Polypen. Die Schwierigkeit liegt in der Differentialdiagnose Cholesterinpolyp / adenomatöser Polyp. Allgemein gilt: Polypen > 1 cm stellen aufgrund der Möglichkeit eines Adenoms eine OP-Indikation dar — unabhängig vom Vorhandensein von Symptomen." },
    { letter: "b", text: "Sie entstehen am häufigsten durch Cholesterinablagerungen in der Gallenblasenwand (Cholesterinpolypen).", correct: true, explanation: "Richtig. In der Regel bilden Cholesterinablagerungen die Polypen. Eine Porzellangallenblase entsteht nach dem gleichen pathophysiologischen Mechanismus." },
    { letter: "c", text: "Sie sind meistens asymptomatisch.", correct: true, explanation: "Richtig. Cholesterin- oder adenomatöse Polypen sind meist Zufallsbefunde und häufig asymptomatisch." },
    { letter: "d", text: "Sonographisch kann immer zwischen Adenom und Cholesterinpolyp unterschieden werden.", correct: false, explanation: "Falsch. Sonographisch können bei Schallschatten-werfenden Polypen Kalkablagerungen vorliegen, was für Cholesterinpolypen spricht. Ohne Verkalkungen kann ein Adenom jedoch nicht ausgeschlossen werden." },
    { letter: "e", text: "Es besteht in jedem Fall ein malignes Entartungsrisiko.", correct: false, explanation: "Falsch. Ein Entartungsrisiko besteht nur bei Adenomen." },
  ]},
  { id: 74, chapter: 5, number: 12, text: "Welche Aussagen zur laparoskopischen Cholezystektomie treffen zu?", statements: [
    { letter: "a", text: "Bei der laparoskopischen Cholezystektomie sollte der DHC immer dargestellt werden.", correct: false, explanation: "Falsch. Im Gegenteil: um Verletzungen des DHC zu vermeiden, sollte man gallenblasennah präparieren. Ein Freipräparieren des DHC kann zur Beeinträchtigung der Durchblutungsverhältnisse und zu späteren Stenosen führen." },
    { letter: "b", text: "Bei einer laparoskopischen Cholezystektomie sollte intraoperativ systematisch eine Darstellung der Gallenwege zum Ausschluss einer Choledocholithiasis erfolgen.", correct: false, explanation: "Falsch. Studien zufolge liegt das Risiko einer asymptomatischen Choledocholithiasis bei vorhandener Cholezystolithiasis bei 5–10 %. Das Risiko steigt bei vergrößertem DHC (> 10 mm in der Sonographie), erhöhten Cholestaseparametern oder Transaminasen, stattgehabtem Ikterus, Stuhlentfärbung, dunklem Urin oder nach einer Pankreatitis. In diesen Fällen sollte präoperativ der DHC mittels Endosonographie/ERCP abgeklärt werden. Bei intraoperativer atypischer Gallengangsanatomie sollte eine intraoperative Darstellung zur Vermeidung von Verletzungen erfolgen." },
    { letter: "c", text: "Bei 20 ml galligem Sekret in der Lokaldrainage am 1. Tag nach einer laparoskopischen Cholezystektomie sollte umgehend eine ERCP erfolgen.", correct: false, explanation: "Falsch. In den meisten Situationen sistiert die gallige Sekretion nach 1–2 Tagen spontan, häufig in Zusammenhang mit einem akzessorischen Luschka'schen Gang, der direkt von der Gallenblase ins Gallenblasenbett mündet. Eine ERCP sollte erfolgen, wenn die gallige Sekretion nicht sistiert oder zunimmt." },
    { letter: "d", text: "Bei akuter Cholezystitis sollte die Operation idealerweise nach 48 Stunden antibiotischer Vorbehandlung erfolgen.", correct: false, explanation: "Falsch. Das alte Dogma der 48- bis 72-stündigen Vorbehandlung ist heute nicht mehr aktuell. Eine akute Cholezystitis ist laut aktuellen Leitlinien eine Indikation zur frühzeitigen laparoskopischen Cholezystektomie innerhalb von 24 Stunden nach stationärer Aufnahme." },
    { letter: "e", text: "Aufgrund des Gallenblasenkarzinomrisikos sollte bei Diagnose einer Cholezystolithiasis die Cholezystektomie indiziert werden.", correct: false, explanation: "Falsch. Obwohl bei 75 % der Gallenblasenkarzinome eine Cholezystolithiasis mit einer chronischen Cholezystitis assoziiert ist, besteht beim Zufallsbefund einer asymptomatischen Cholezystolithiasis keine systematische Indikation zur Cholezystektomie. Die chronische Entzündung der Gallenblase bei Lithiasis ist der Risikofaktor zur malignen Entartung, nicht das Vorhandensein asymptomatischer Konkremente. Bei Konkrementen > 3 cm (Tonnenkonkrement) oder Gallenblasenwandverkalkung (Porzellangallenblase) ist das Entartungsrisiko deutlich höher — hier sollte die Cholezystektomie großzügig indiziert werden." },
  ]},
  { id: 75, chapter: 5, number: 13, text: "Welche Aussagen zur Cholezystektomie sind zutreffend?", statements: [
    { letter: "a", text: "Bei einer elektiven laparoskopischen Cholezystektomie ist eine perioperative Antibiotikaprophylaxe indiziert, um Wundinfektionen zu verhindern.", correct: false, explanation: "Falsch. Die perioperative Antibiotikaprophylaxe bei der laparoskopischen Cholezystektomie ist kontrovers diskutiert; ein eindeutiger Vorteil konnte bei der selektiven laparoskopischen Operation bisher nicht gezeigt werden. Die aktuellen Leitlinien empfehlen eine Routine-Antibiotikaprophylaxe bei Patienten mit niedrigem Risiko nicht mehr. Sinnvolle Indikationen: akute Cholezystitis, Notfalleingriffe, Operationen am Ductus hepatocholedochus, intraoperativ eröffnete Gallenblase, primär offene Cholezystektomie, Konversion." },
    { letter: "b", text: "Bei einer onkologischen Magen- oder Ösophagusresektion sollte simultan eine Cholezystektomie erfolgen.", correct: true, explanation: "Richtig. Nach Gastrektomie ist das Auftreten von Gallensteinen erhöht. Ursache ist möglicherweise eine Verletzung des N. vagus bei der Magenresektion oder die Magen-Darm-Rekonstruktion. Etwa 5 % der resezierten Patienten benötigen später eine Cholezystektomie, deren Morbidität aufgrund der Voroperation erhöht ist." },
    { letter: "c", text: "Bei einer akuten Cholezystitis sollte zunächst der akute Schub abgewartet werden, da das OP-Risiko in der Frühphase der Entzündung deutlich erhöht ist.", correct: false, explanation: "Falsch. Die akute Entzündung stellt eine Indikation für eine frühzeitige laparoskopische Cholezystektomie dar. Sie sollte innerhalb von 24 Stunden nach stationärer Aufnahme durchgeführt werden." },
    { letter: "d", text: "Der Nachweis von Gallenblasen-Sludge kann in der Regel nicht kolikartige Schmerzen im rechten Oberbauch erklären oder die Ursache für eine biliäre Pankreatitis darstellen, weil er viel zu klein ist, um Probleme auszulösen.", correct: false, explanation: "Falsch. Auch Sludge kann dieselben Beschwerden wie größere Konkremente oder eine biliäre Pankreatitis auslösen. In diesen Fällen besteht ebenfalls eine Indikation zur Cholezystektomie." },
    { letter: "e", text: "Bei immunsupprimierten oder transplantierten Patienten sollte nur bei schweren Entzündungen auf die Cholezystektomie als Ultima Ratio zurückgegriffen werden.", correct: false, explanation: "Falsch. Gerade bei immunsupprimierten Patienten sollte eine frühzeitige Cholezystektomie erfolgen, da die klinischen Beschwerden häufig verzögert auftreten und als Folge der Immunsuppression attenuiert sind." },
  ]},
  { id: 76, chapter: 5, number: 14, text: "Welche Aussagen zur Choledocholithiasis sind richtig?", statements: [
    { letter: "a", text: "Sie ist immer die Folge eines Steinabgangs aus der Gallenblase.", correct: false, explanation: "Falsch. Bei Papillenstenosen oder anderen chronischen Galleabflusshindernissen können sich auch Choledochuskonkremente vor Ort bilden. Auch Jahre nach einer Cholezystektomie können Choledochuskonkremente entstehen." },
    { letter: "b", text: "Die typischen Symptome der Choledocholithiasis werden als Charcot-Trias bezeichnet.", correct: false, explanation: "Falsch. Die Charcot-Trias (Schmerzen, Fieber, Ikterus) steht für eine Cholangitis. Die Choledocholithiasis kann asymptomatisch sein oder durch eine Cholestase (Labor, Erweiterung der Gallenwege) auffallen." },
    { letter: "c", text: "Nach Diagnose einer Choledocholithiasis muss immer eine notfallmäßige Therapiemaßnahme folgen.", correct: false, explanation: "Falsch. Eine Choledocholithiasis muss nur bei zusätzlicher Cholangitis sofort therapiert werden, ansonsten kann sie elektiv versorgt werden." },
    { letter: "d", text: "Eine biliäre Pankreatitis setzt eine vorhandene Choledocholithiasis voraus.", correct: false, explanation: "Falsch. Bei einer biliären Pankreatitis ist das Konkrement bei Diagnosestellung meistens nicht mehr im Ductus hepatocholedochus (DHC)." },
    { letter: "e", text: "Die Cholangitis ist eine lebensbedrohliche Komplikation der Choledocholithiasis.", correct: true, explanation: "Richtig. Schwere Cholangitiden können zum septischen Schock mit akutem Nierenversagen und Gerinnungsstörungen führen (Reynold'sche Pentade). Ursache ist der Übertritt hoch virulenter Darmkeime aus der infizierten gestauten Galle über die Leber in die Blutbahn. In diesen Fällen muss schnellstmöglich für den Galleabfluss gesorgt werden (ERCP, Operation, PTCD), der Schock behandelt und eine antibiotische Therapie begonnen werden." },
  ]},
  { id: 77, chapter: 5, number: 15, text: "Welche Aussagen zur biliären Pankreatitis treffen zu?", statements: [
    { letter: "a", text: "Die Prognose-Scores der akuten Pankreatitis sind bei der biliären Pankreatitis auch anzuwenden.", correct: true, explanation: "Richtig. Es gibt verschiedene Scores zur Evaluierung der Prognose einer akuten Pankreatitis (z. B. Ranson Score, Imrie Score, Blamey Score, IGS, SAPS). Ziel ist die Evaluation, wie kritisch krank ein Patient ist. Es gibt allgemeine Severity-Scores für Intensivpatienten und spezielle Scores für die biliäre Pankreatitis; sie unterscheiden sich prognostisch kaum voneinander und können alle angewandt werden." },
    { letter: "b", text: "Bei Beginn einer biliären Pankreatitis muss schnellstmöglich eine ERCP erfolgen.", correct: false, explanation: "Falsch. Eine ERCP muss nur dann erfolgen, wenn neben der Pankreatitis eine konkrementbedingte Galleabflussstörung (Choledocholithiasis) bzw. eine Cholangitis vorliegt." },
    { letter: "c", text: "Die ERCP verbessert den Verlauf der Pankreatitis, wenn sie biliärer Genese ist.", correct: false, explanation: "Falsch. Der Verlauf einer biliären Pankreatitis wird durch eine ERCP nicht verbessert. Ausnahme ist eine vorhandene konkrementbedingte Galleabflussstörung." },
    { letter: "d", text: "Nach einer biliären Pankreatitis sollte die Cholezystektomie im selben stationären Aufenthalt erfolgen.", correct: false, explanation: "Falsch. Die Cholezystektomie sollte nur bei einer ödematösen Pankreatitis im selben stationären Aufenthalt erfolgen, generell nach etwa einer Woche. Bei einer nekrotisierenden Pankreatitis sollte die 'restitutio ad integrum' des Pankreas abgewartet werden; diese kann mehrere Wochen oder Monate dauern." },
    { letter: "e", text: "Nach einer biliären Pankreatitis sollte wegen der stattgehabten Entzündung die offene Cholezystektomie bevorzugt werden.", correct: false, explanation: "Falsch. Nach einer ödematösen Pankreatitis ist nicht von postentzündlichen Verwachsungen auszugehen. Nach einer nekrotisierenden Pankreatitis kann die laparoskopische Cholezystektomie erschwert sein — das zwingt aber nicht zu einem primär offenen Verfahren." },
  ]},
  { id: 78, chapter: 5, number: 16, text: "Welche Aussage zu biliodigestiven Fisteln ist richtig?", statements: [
    { letter: "a", text: "Der Nachweis einer biliodigestiven Fistel stellt in der Regel eine Operationsindikation dar.", correct: true, explanation: "Richtig. Bei asymptomatischen Patienten im höheren Lebensalter kann allerdings auf eine primäre Operation verzichtet werden." },
    { letter: "b", text: "Die operative Versorgung ist meistens laparoskopisch problemlos möglich.", correct: false, explanation: "Falsch. Das Gegenteil ist der Fall. In Einzelfällen kann eine laparoskopische Versorgung durch einen versierten Operateur möglich sein. In der Regel sollte die Operation offen erfolgen, da es meist durch chronisch entzündliche Veränderungen mit Ausbildung einer Schrumpfgallenblase zu erheblich erschwerten Bedingungen kommt." },
    { letter: "c", text: "Bei einem Gallensteinileus ist die gleichzeitige Versorgung der biliodigestiven Fistel obligat.", correct: false, explanation: "Falsch. Zunächst sollte immer die Ileussituation versorgt werden. Das obstruierende Konkrement wird über eine Enterotomie aus einem gut durchbluteten oralwärts gelegenen Darmabschnitt geborgen. Zur Prophylaxe rezidivierender Obstruktionen sollte auch nach weiteren Steinen gesucht und diese entfernt werden. Bei stabilen Patienten kann die häufig technisch schwierige Cholezystektomie und der Fistelverschluss durchgeführt werden. Bei Risikopatienten sollte die Sanierung mit einem zweiten Eingriff geplant erfolgen; etwa ein Drittel dieser Patienten bleibt nach der Ileusoperation asymptomatisch und muss nicht zwingend operativ versorgt werden." },
    { letter: "d", text: "In der Diagnostik ist ein Luftcholangiogramm in der Röntgen-Abdomenaufnahme wegweisend.", correct: true, explanation: "Richtig. Zusätzlich zeigt sich beim Gallensteinileus typischerweise ein über 2,5 cm durchmessendes Konkrement, welches meist im Ileum zur Obstruktion führt." },
    { letter: "e", text: "In der Regel handelt es sich um cholezystokolische Fisteln.", correct: false, explanation: "Falsch. Etwa 75 % der Fisteln verbinden Gallenblase und Duodenum, etwa 15 % werden zum Dickdarm gebildet. In den übrigen Fällen sind Magen oder der Ductus choledochus betroffen." },
  ]},
  { id: 79, chapter: 5, number: 17, text: "Welche Aussagen zu Gallengangszysten und zur Caroli-Krankheit sind richtig?", statements: [
    { letter: "a", text: "Zystische Gallengangsveränderungen sind seltene angeborene Anomalien, die intra- und/oder extrahepatische Gallenwege betreffen können.", correct: true, explanation: "Richtig. Die Inzidenz wird zwischen 1:13.000 und 1:2.000.000 Geburten angegeben." },
    { letter: "b", text: "Typischerweise treten die zystischen Veränderungen im Kindes- und Jugendalter auf.", correct: true, explanation: "Richtig. Dennoch wird die Diagnose bei 20 % der Patienten erst im Erwachsenenalter gestellt." },
    { letter: "c", text: "Bei der Caroli-Krankheit treten intrahepatische Gallengangsektasien auf, die multipel oder solitär sind, aber immer auf ein Lebersegment beschränkt sind.", correct: false, explanation: "Falsch. Die Ektasien können auf ein Segment beschränkt sein, aber auch diffus die gesamte Leber betreffen." },
    { letter: "d", text: "Die Indikation zur operativen Behandlung ist typabhängig zu stellen.", correct: true, explanation: "Richtig. Es hat sich die Einteilung nach Todani in fünf Typen der Gallenwegsektasien durchgesetzt. Typ V beschreibt die Caroli-Krankheit und unterscheidet zwischen unilobulärem und diffusem Typ. Der unilobuläre Typ kann durch eine Leberresektion behandelt werden (in etwa 90 % ist der linke Leberlappen befallen), der diffuse Typ ggf. durch eine Lebertransplantation." },
    { letter: "e", text: "Häufige Komplikationen sind rezidivierende Cholangitiden, Steinbildungen und Leberabszesse.", correct: true, explanation: "Richtig. Häufige Komplikationen sind rezidivierende Cholangitiden, Steinbildungen und Leberabszesse. Darüber hinaus stellt vor allem die relativ hohe Gefahr der malignen Entartung einen Grund für die operative Behandlung dar." },
  ]},
  { id: 80, chapter: 5, number: 18, text: "Folgende Aussagen zu benignen Gallengangsstrikturen treffen zu?", statements: [
    { letter: "a", text: "Als Ursachen kommen vor allem vorangegangene Operationen, Pankreatitiden, Cholangitiden, Traumen sowie eine Radiatio in Frage.", correct: true, explanation: "Richtig. Bei den Operationen sind vor allem Cholezystektomien, Choledochotomien, biliobiliäre und biliodigestive Anastomosen sowie Leberteilresektionen zu benennen." },
    { letter: "b", text: "Die erste durchzuführende diagnostische Maßnahme ist die endoskopische retrograde Cholangiographie (ERC).", correct: false, explanation: "Falsch. Die ERC ist zwar eine sichere diagnostische Maßnahme, aber sehr invasiv. Sie sollte daher erst nach Laboruntersuchungen, Ultraschall und ggf. MRCP eingesetzt werden." },
    { letter: "c", text: "Die Unterscheidung zwischen benignen und malignen Stenosen stellt in der Regel kein Problem dar.", correct: false, explanation: "Falsch. Diese Unterscheidung ist das zentrale Problem der Diagnostik. Mit Hilfe der durch die ERC gewonnenen Zytologien lässt sich eine Sensitivität von maximal 70 % erreichen. Diese kann durch eine Biopsieentnahme unter Sicht (cholangioskopisch) oder endosonographisch gesteuert noch erhöht werden." },
    { letter: "d", text: "Eine konservative Therapie ist selten erfolgreich.", correct: false, explanation: "Falsch. Es gibt viele klinische Situationen, in denen eine endoskopische Therapie mit Papillotomie (EPT) und Stenteinlage sehr erfolgreich ist. Gelegentlich konkurrieren die Verfahren oder ergänzen sich. Die primäre Erfolgsrate der endoskopischen Therapie bei einer durch chronische Pankreatitis bedingten Choledochuseinengung liegt bei fast 100 %. Allerdings benötigen etwa 60 % der Patienten eine dauerhafte Stenttherapie mit den erforderlichen Wechseln, sodass eine entlastende Operation durchaus eine Alternative darstellt." },
    { letter: "e", text: "Für den Fall einer akzidentellen Durchtrennung des Hauptgallenganges im Rahmen einer laparoskopischen Cholezystektomie sollte immer eine End-zu-End-Anastomosierung angestrebt werden, um eine Stenosierung zu vermeiden.", correct: false, explanation: "Falsch. Diese Operation sollte nur bei sehr kleinen Defekten und bei absolut spannungsfreier Annäherung der Gallengangstümpfe sowie guter Durchblutungssituation durchgeführt werden. In allen anderen Fällen sollte einer biliodigestiven Anastomose der Vorzug gegeben werden, da die Stenosegefahr sonst sehr groß wäre." },
  ]},
];


    // ═══════════════════════════════════════════════════════════════════════════
    // APP
    // ═══════════════════════════════════════════════════════════════════════════
    
const ACTIVE_CHAPTER_IDS = [...new Set(QUESTIONS.map((q) => q.chapter))];
const STORAGE_KEY = "vc_quiz_v2";

// ─────────────────────────────────────────────────────────────────────────────
// PERSISTENCE
// Stores per-chapter stats, resume position, wrong-answer pile, bookmarks.
// ─────────────────────────────────────────────────────────────────────────────

const defaultStorage = () => ({
  // Per-chapter stats: { chapterId: { correctIds: [...stmt keys], attempted: [...keys], lastQIndex: number } }
  chapters: {},
  // Statement keys that are currently pending review (user got them wrong)
  wrongPile: [], // array of "qid.letter" strings
  bookmarks: [], // array of question ids
  lastActive: null, // chapter id last worked on
  // Analytics
  firstOpenedAt: null, // ISO timestamp of first use
  totalActiveMs: 0, // total active milliseconds across all sessions
  sessionCount: 0, // number of study sessions started
  lastSessionAt: null, // ISO timestamp of last session
  attemptsByStmt: {}, // { "qid.letter": count } - how often each statement was answered (right or wrong)
  correctByStmt: {}, // { "qid.letter": count } - correct attempts per statement
  daysActive: [], // array of ISO date strings (YYYY-MM-DD) the user studied
});

const loadStorage = () => {
  try {
    if (typeof window === "undefined" || !window.localStorage) return defaultStorage();
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return defaultStorage();
    const parsed = JSON.parse(raw);
    return { ...defaultStorage(), ...parsed };
  } catch {
    return defaultStorage();
  }
};

const saveStorage = (data) => {
  try {
    if (typeof window === "undefined" || !window.localStorage) return;
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  } catch {}
};

const stmtKey = (qid, letter) => `${qid}.${letter}`;

// ─────────────────────────────────────────────────────────────────────────────
// App
// ─────────────────────────────────────────────────────────────────────────────

function App() {
  const [view, setView] = useState("home");
  const [storage, setStorage] = useState(defaultStorage);
  const [loaded, setLoaded] = useState(false);
  const [sessionMode, setSessionMode] = useState("chapter"); // "chapter" | "wrong" | "shuffle"
  const [activeChapter, setActiveChapter] = useState(null);
  const [shuffle, setShuffle] = useState(false);

  // Session state
  const [queue, setQueue] = useState([]);
  const [qIndex, setQIndex] = useState(0);
  const [stmtIndex, setStmtIndex] = useState(0);
  const [revealed, setRevealed] = useState(false);
  const [lastGuess, setLastGuess] = useState(null);
  const [sessionStats, setSessionStats] = useState({ correct: 0, wrong: 0 });

  // Load persisted data on mount
  useEffect(() => {
    const data = loadStorage();
    setStorage(data);
    setLoaded(true);
  }, []);

  // Persist whenever storage changes (after initial load)
  useEffect(() => {
    if (loaded) saveStorage(storage);
  }, [storage, loaded]);

  // Session time tracking
  useEffect(() => {
    if (!loaded) return;
    // On load: set firstOpenedAt if null, and count this as a session
    setStorage((prev) => {
      const next = { ...prev };
      if (!next.firstOpenedAt) next.firstOpenedAt = new Date().toISOString();
      next.sessionCount = (prev.sessionCount || 0) + 1;
      next.lastSessionAt = new Date().toISOString();
      return next;
    });

    // Tick every 15 seconds while active (page visible) to add to totalActiveMs
    const TICK_MS = 15000;
    let lastTick = Date.now();
    const interval = setInterval(() => {
      if (document.visibilityState === "visible") {
        const now = Date.now();
        const elapsed = now - lastTick;
        lastTick = now;
        setStorage((prev) => ({ ...prev, totalActiveMs: (prev.totalActiveMs || 0) + elapsed }));
      } else {
        lastTick = Date.now(); // reset so we don't count inactive time
      }
    }, TICK_MS);

    const handleVisibility = () => { lastTick = Date.now(); };
    document.addEventListener("visibilitychange", handleVisibility);
    return () => {
      clearInterval(interval);
      document.removeEventListener("visibilitychange", handleVisibility);
    };
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [loaded]);

  const currentQuestion = queue.length > 0 && qIndex < queue.length ? QUESTIONS.find((q) => q.id === queue[qIndex]) : null;
  const currentStatement = currentQuestion?.statements[stmtIndex];

  // ─────────────────────────────────────────────────────────────────────────
  // CHAPTER STATS — compute counts for each chapter for UI display
  // ─────────────────────────────────────────────────────────────────────────

  const chapterStats = useMemo(() => {
    const out = {};
    for (const chId of ACTIVE_CHAPTER_IDS) {
      const chQs = QUESTIONS.filter((q) => q.chapter === chId);
      const totalStmts = chQs.length * 5;
      const chData = storage.chapters[chId] || { correctIds: [], attempted: [] };
      const correct = chData.correctIds?.length || 0;
      const attempted = chData.attempted?.length || 0;
      // Wrong in THIS chapter currently in pile
      const chStmtKeys = new Set(chQs.flatMap((q) => q.statements.map((s) => stmtKey(q.id, s.letter))));
      const wrongInCh = storage.wrongPile.filter((k) => chStmtKeys.has(k)).length;
      out[chId] = {
        totalStmts,
        correct,
        attempted,
        wrong: wrongInCh,
        pct: totalStmts > 0 ? Math.round((correct / totalStmts) * 100) : 0,
        remaining: totalStmts - attempted,
        lastQIndex: chData.lastQIndex || 0,
      };
    }
    return out;
  }, [storage]);

  // Chapters where accuracy is low (>= 3 attempted, <60% accuracy)
  const weakChapters = useMemo(() => {
    return Object.entries(chapterStats)
      .filter(([_, s]) => s.attempted >= 3 && s.correct / Math.max(s.attempted, 1) < 0.6)
      .map(([id, s]) => ({ id: Number(id), ...s, acc: Math.round((s.correct / Math.max(s.attempted, 1)) * 100) }))
      .sort((a, b) => a.acc - b.acc);
  }, [chapterStats]);

  // ─────────────────────────────────────────────────────────────────────────
  // SESSION BUILDERS
  // ─────────────────────────────────────────────────────────────────────────

  const startChapter = (chapterId, resume = true) => {
    const chQs = QUESTIONS.filter((q) => q.chapter === chapterId).sort((a, b) => a.number - b.number);
    if (chQs.length === 0) return;
    let order = chQs.map((q) => q.id);
    if (shuffle) order = [...order].sort(() => Math.random() - 0.5);
    const startIdx = resume && !shuffle ? Math.min(storage.chapters[chapterId]?.lastQIndex || 0, order.length - 1) : 0;
    setActiveChapter(chapterId);
    setSessionMode("chapter");
    setQueue(order);
    setQIndex(startIdx);
    setStmtIndex(0);
    setRevealed(false);
    setLastGuess(null);
    setSessionStats({ correct: 0, wrong: 0 });
    setView("quiz");
  };

  const startWrongReview = () => {
    if (storage.wrongPile.length === 0) return;
    // Get unique question ids from wrong pile, then use all 5 stmts (or just the wrong ones?)
    // User said: "The False answers should be also in seperate section always there until I solve them correctly"
    // So we want to drill specifically on the wrong statements. We'll build a virtual queue per wrong stmt.
    const wrongQIds = [...new Set(storage.wrongPile.map((k) => Number(k.split(".")[0])))];
    const order = shuffle ? [...wrongQIds].sort(() => Math.random() - 0.5) : wrongQIds;
    setActiveChapter(null);
    setSessionMode("wrong");
    setQueue(order);
    setQIndex(0);
    // Start at first wrong statement in first question
    const firstQ = QUESTIONS.find((q) => q.id === order[0]);
    const firstWrongLetter = firstQ.statements.find((s) => storage.wrongPile.includes(stmtKey(firstQ.id, s.letter)))?.letter || "a";
    const firstStmtIdx = firstQ.statements.findIndex((s) => s.letter === firstWrongLetter);
    setStmtIndex(firstStmtIdx);
    setRevealed(false);
    setLastGuess(null);
    setSessionStats({ correct: 0, wrong: 0 });
    setView("quiz");
  };

  // ─────────────────────────────────────────────────────────────────────────
  // ANSWER HANDLING
  // ─────────────────────────────────────────────────────────────────────────

  const handleGuess = (guess) => {
    if (revealed || !currentStatement) return;
    const isCorrect = (guess === "richtig") === currentStatement.correct;
    const key = stmtKey(currentQuestion.id, currentStatement.letter);
    setLastGuess(guess);
    setRevealed(true);
    setSessionStats((s) => ({ correct: s.correct + (isCorrect ? 1 : 0), wrong: s.wrong + (isCorrect ? 0 : 1) }));

    // Update persistent storage
    setStorage((prev) => {
      const next = { ...prev, chapters: { ...prev.chapters } };
      const chId = currentQuestion.chapter;
      const chData = { correctIds: [], attempted: [], lastQIndex: 0, ...(next.chapters[chId] || {}) };
      chData.correctIds = [...(chData.correctIds || [])];
      chData.attempted = [...(chData.attempted || [])];

      if (!chData.attempted.includes(key)) chData.attempted.push(key);

      if (isCorrect) {
        if (!chData.correctIds.includes(key)) chData.correctIds.push(key);
        // Remove from wrong pile if present (mastered)
        next.wrongPile = prev.wrongPile.filter((k) => k !== key);
      } else {
        // Add to wrong pile
        if (!prev.wrongPile.includes(key)) next.wrongPile = [...prev.wrongPile, key];
        else next.wrongPile = prev.wrongPile;
        // If previously marked correct, remove that too (re-learning)
        chData.correctIds = chData.correctIds.filter((k) => k !== key);
      }

      next.chapters[chId] = chData;
      next.lastActive = chId;

      // Analytics
      next.attemptsByStmt = { ...(prev.attemptsByStmt || {}) };
      next.attemptsByStmt[key] = (next.attemptsByStmt[key] || 0) + 1;
      next.correctByStmt = { ...(prev.correctByStmt || {}) };
      if (isCorrect) next.correctByStmt[key] = (next.correctByStmt[key] || 0) + 1;

      // Track active day
      const today = new Date().toISOString().slice(0, 10);
      next.daysActive = prev.daysActive || [];
      if (!next.daysActive.includes(today)) next.daysActive = [...next.daysActive, today];

      return next;
    });
  };

  const handleNext = () => {
    if (sessionMode === "wrong") {
      // In wrong review, find next wrong statement
      const allWrong = storage.wrongPile;
      if (allWrong.length === 0) {
        setView("summary");
        return;
      }
      // Find next wrong stmt in current question
      let q = currentQuestion;
      for (let s = stmtIndex + 1; s < 5; s++) {
        if (allWrong.includes(stmtKey(q.id, q.statements[s].letter))) {
          setStmtIndex(s);
          setRevealed(false);
          setLastGuess(null);
          return;
        }
      }
      // Next question in queue that has any wrong
      for (let i = qIndex + 1; i < queue.length; i++) {
        const nq = QUESTIONS.find((x) => x.id === queue[i]);
        const idx = nq.statements.findIndex((s) => allWrong.includes(stmtKey(nq.id, s.letter)));
        if (idx >= 0) {
          setQIndex(i);
          setStmtIndex(idx);
          setRevealed(false);
          setLastGuess(null);
          return;
        }
      }
      setView("summary");
      return;
    }

    // Chapter mode
    if (stmtIndex < 4) {
      setStmtIndex(stmtIndex + 1);
      setRevealed(false);
      setLastGuess(null);
    } else if (qIndex < queue.length - 1) {
      const nextIdx = qIndex + 1;
      setQIndex(nextIdx);
      setStmtIndex(0);
      setRevealed(false);
      setLastGuess(null);
      // Update resume position
      setStorage((prev) => {
        const next = { ...prev, chapters: { ...prev.chapters } };
        const chData = { correctIds: [], attempted: [], ...(next.chapters[activeChapter] || {}) };
        chData.lastQIndex = nextIdx;
        next.chapters[activeChapter] = chData;
        return next;
      });
    } else {
      // Chapter complete — reset resume
      setStorage((prev) => {
        const next = { ...prev, chapters: { ...prev.chapters } };
        const chData = { correctIds: [], attempted: [], ...(next.chapters[activeChapter] || {}) };
        chData.lastQIndex = 0;
        next.chapters[activeChapter] = chData;
        return next;
      });
      setView("summary");
    }
  };

  const toggleBookmark = (qid) => {
    setStorage((prev) => ({
      ...prev,
      bookmarks: prev.bookmarks.includes(qid) ? prev.bookmarks.filter((x) => x !== qid) : [...prev.bookmarks, qid],
    }));
  };

  const [confirmingReset, setConfirmingReset] = useState(false);
  const resetAllProgress = () => {
    if (confirmingReset) {
      setStorage(defaultStorage());
      setConfirmingReset(false);
    } else {
      setConfirmingReset(true);
      setTimeout(() => setConfirmingReset(false), 4000);
    }
  };

  const progress = queue.length > 0 ? ((qIndex * 5 + stmtIndex + 1) / (queue.length * 5)) * 100 : 0;
  const totalAnswered = sessionStats.correct + sessionStats.wrong;
  const accuracy = totalAnswered > 0 ? Math.round((sessionStats.correct / totalAnswered) * 100) : 0;

  // ─────────────────────────────────────────────────────────────────────────
  return (
    <div className="min-h-screen bg-stone-50 text-stone-900" style={{ fontFamily: "'Source Serif 4', 'Source Serif Pro', Georgia, serif" }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,300..900;1,8..60,300..900&family=JetBrains+Mono:wght@400;500;600&display=swap');
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .anim-in { animation: fadeInUp 0.3s ease-out both; }
        .anim-fade { animation: fadeIn 0.25s ease-out both; }
        .font-mono-ui { font-family: 'JetBrains Mono', ui-monospace, monospace; }
        .tap-highlight { -webkit-tap-highlight-color: transparent; }
      `}</style>

      <div className="mx-auto max-w-xl px-5 pb-28 pt-safe">
        {view === "home" && (
          <HomeScreen
            storage={storage}
            chapterStats={chapterStats}
            weakChapters={weakChapters}
            shuffle={shuffle}
            setShuffle={setShuffle}
            onStartChapter={startChapter}
            onStartWrongReview={startWrongReview}
            onOpenWeakScreen={() => setView("weak")}
            onOpenAnalytics={() => setView("analytics")}
            onResetProgress={resetAllProgress}
            confirmingReset={confirmingReset}
          />
        )}

        {view === "weak" && (
          <WeakScreen
            chapterStats={chapterStats}
            weakChapters={weakChapters}
            onBack={() => setView("home")}
            onStartChapter={(id) => startChapter(id, true)}
          />
        )}

        {view === "analytics" && (
          <AnalyticsScreen
            storage={storage}
            chapterStats={chapterStats}
            setStorage={setStorage}
            onBack={() => setView("home")}
          />
        )}

        {view === "quiz" && currentQuestion && (
          <QuizScreen
            question={currentQuestion}
            qIndex={qIndex}
            qTotal={queue.length}
            stmtIndex={stmtIndex}
            statement={currentStatement}
            revealed={revealed}
            lastGuess={lastGuess}
            onGuess={handleGuess}
            onNext={handleNext}
            progress={progress}
            sessionStats={sessionStats}
            bookmarked={storage.bookmarks.includes(currentQuestion.id)}
            onToggleBookmark={() => toggleBookmark(currentQuestion.id)}
            onExit={() => setView("home")}
            sessionMode={sessionMode}
            remainingWrong={storage.wrongPile.length}
          />
        )}

        {view === "summary" && (
          <SummaryScreen
            stats={sessionStats}
            accuracy={accuracy}
            questionCount={queue.length}
            sessionMode={sessionMode}
            remainingWrong={storage.wrongPile.length}
            onHome={() => setView("home")}
            onAgain={() => sessionMode === "wrong" ? startWrongReview() : activeChapter && startChapter(activeChapter, false)}
          />
        )}
      </div>
    </div>
  );
}

          <div className="text-[2.75rem] leading-none font-semibold tabular-nums text-stone-900">{overallPct}<span className="text-[1.5rem] text-stone-400 align-top">%</span></div>
        </div>
        <div className="mt-3 h-[4px] bg-stone-100 rounded-full overflow-hidden">

        </div>
      </div>

      {/* Schwachstellen banner */}
      {weakChapters.length > 0 && (
        <button
          onClick={onOpenWeakScreen}
          className="tap-highlight w-full flex items-center gap-3 px-5 py-4 bg-rose-50 border border-rose-200 rounded-2xl mb-3 active:bg-rose-100 transition text-left"

              Du hast Probleme mit {weakChapters.length === 1 ? "Kap." : `${weakChapters.length} Kapiteln`}: {weakChapters.slice(0, 2).map((w) => CHAPTERS.find((c) => c.id === w.id).name).join(", ")}

      {storage.wrongPile.length > 0 && (
        <button
          onClick={onStartWrongReview}
          className="tap-highlight w-full flex items-center gap-3 px-5 py-4 bg-amber-50 border border-amber-200 rounded-2xl mb-3 active:bg-amber-100 transition text-left"
        >
          <div className="w-9 h-9 rounded-xl bg-amber-100 flex items-center justify-center flex-shrink-0">
            <Target size={17} className="text-amber-800" />
          </div>
          <div className="flex-1">
            <div className="text-[14px] font-medium text-amber-900">Falsch beantwortete Aussagen</div>
            <div className="text-[12px] text-amber-700/80 mt-0.5 font-mono-ui">
              {storage.wrongPile.length} {storage.wrongPile.length === 1 ? "Aussage" : "Aussagen"} zu wiederholen
            </div>
          </div>

      >
        <div className="flex items-center gap-3">
          <BarChart3 size={16} className="text-stone-600" />
          <span className="text-[14px] text-stone-800">Lernanalyse</span>
        </div>
        <ChevronRight size={16} className="text-stone-400" />
      </button>

      {/* Shuffle toggle */}
      <button
        onClick={() => setShuffle(!shuffle)}
        className="tap-highlight w-full flex items-center justify-between px-5 py-3.5 bg-white border border-stone-200 rounded-2xl mb-6 active:bg-stone-100 transition"
      >

                chapter={ch}

        }`}

        {confirmingReset ? "Nochmal tippen zum Bestätigen" : "Alle Fortschritte zurücksetzen"}
      </button>
    </div>
  );
}

function ChapterCard({ chapter, isActive, stats, onClick }) {
  if (!isActive) {
    return (
      <div className="flex items-center gap-3 px-4 py-3.5 bg-stone-100/50 rounded-2xl opacity-50">
        <div className="font-mono-ui text-[11px] text-stone-400 w-6">{String(chapter.id).padStart(2, "0")}</div>
        <div className="flex-1">
          <div className="text-[14px] text-stone-500 leading-snug">{chapter.name}</div>
          <div className="font-mono-ui text-[10px] text-stone-400 italic uppercase tracking-wider mt-0.5">Demnächst</div>
        </div>
      </div>
    );
  }

  const inProgress = stats.lastQIndex > 0 && stats.attempted < stats.totalStmts;
  const completed = stats.attempted >= stats.totalStmts;

  return (
    <button onClick={onClick} className="tap-highlight w-full flex items-center gap-3 px-4 py-3.5 bg-white border border-stone-200 rounded-2xl active:bg-stone-100 transition text-left">
      <div className="font-mono-ui text-[11px] text-stone-400 w-6">{String(chapter.id).padStart(2, "0")}</div>
      <div className="flex-1 min-w-0">
        <div className="text-[14px] font-medium text-stone-900 leading-snug">{chapter.name}</div>
        <div className="flex items-center gap-2 mt-1">
          <div className="flex-1 h-[3px] bg-stone-100 rounded-full overflow-hidden">
            <div className="h-full bg-stone-900 transition-all duration-500" style={{ width: `${stats.pct}%` }} />
          </div>
          <div className="font-mono-ui text-[10px] tabular-nums text-stone-500 flex-shrink-0">{stats.pct}%</div>
        </div>
        <div className="font-mono-ui text-[10px] text-stone-400 mt-1 flex items-center gap-2">
          <span>{stats.correct}/{stats.totalStmts}</span>
          {inProgress && <span className="text-rose-700 italic">· Fortsetzen</span>}
          {completed && <span className="text-emerald-700">· ✓ abgeschlossen</span>}
          {stats.wrong > 0 && <span className="text-amber-700">· {stats.wrong} zu wdh.</span>}
        </div>
      </div>
      <ChevronRight size={16} className="text-stone-300 flex-shrink-0" />
    </button>
  );
}

          );

      </div>

  );
}

// ─────────────────────────────────────────────────────────────────────────────
// QUIZ
// ─────────────────────────────────────────────────────────────────────────────
function QuizScreen({ question, qIndex, qTotal, stmtIndex, statement, revealed, lastGuess, onGuess, onNext, progress, sessionStats, bookmarked, onToggleBookmark, onExit, sessionMode, remainingWrong }) {
  const chapter = CHAPTERS.find((c) => c.id === question.chapter);
  const userMatchedBook = revealed && (lastGuess === "richtig") === statement.correct;

  return (
    <div>
      {/* Header bar */}
      <div className="pt-4 pb-3 flex items-center justify-between">
        <button onClick={onExit} className="tap-highlight -ml-2 p-2 rounded-full active:bg-stone-200">
          <ArrowLeft size={20} />
        </button>
        <div className="font-mono-ui text-[10px] uppercase tracking-[0.2em] text-stone-500 text-center">
          {sessionMode === "wrong" ? (
            <span className="text-amber-800">Wiederholungsmodus</span>
          ) : (
            <>Frage {qIndex + 1} / {qTotal} · Aussage {stmtIndex + 1} / 5</>
          )}
        </div>
        <button onClick={onToggleBookmark} className="tap-highlight -mr-2 p-2 rounded-full active:bg-stone-200">
          {bookmarked ? <BookmarkCheck size={20} className="text-amber-700" /> : <Bookmark size={20} className="text-stone-400" />}
        </button>
      </div>

      {/* Progress bar (only chapter mode) */}
      {sessionMode !== "wrong" && (
        <div className="h-[3px] bg-stone-200 rounded-full overflow-hidden mb-5">
          <div className="h-full bg-stone-900 transition-all duration-500 ease-out" style={{ width: `${progress}%` }} />
        </div>
      )}

      {/* Score chips */}
      <div className="flex items-center gap-2 mb-5">
        <div className="flex items-center gap-1.5 px-2.5 py-1 bg-emerald-50 rounded-full border border-emerald-200">
          <Check size={12} strokeWidth={3} className="text-emerald-700" />
          <span className="font-mono-ui text-[11px] tabular-nums text-emerald-800 font-semibold">{sessionStats.correct}</span>
        </div>
        <div className="flex items-center gap-1.5 px-2.5 py-1 bg-rose-50 rounded-full border border-rose-200">
          <X size={12} strokeWidth={3} className="text-rose-700" />
          <span className="font-mono-ui text-[11px] tabular-nums text-rose-800 font-semibold">{sessionStats.wrong}</span>
        </div>
        {sessionMode === "wrong" && (
          <div className="ml-auto font-mono-ui text-[10px] text-amber-800">
            Noch {remainingWrong} offen
          </div>
        )}
      </div>

      {/* Question (stays visible) */}
      <div key={`q-${question.id}`} className="anim-in">
        <div className="font-mono-ui text-[10px] uppercase tracking-[0.2em] text-rose-800 mb-2">
          Kap. {chapter.id} — {chapter.name}
        </div>
        <h2 className="text-[21px] leading-[1.3] font-semibold text-stone-900 tracking-tight">
          <span className="text-stone-400 font-normal">{question.number}.</span> {question.text}
        </h2>
      </div>

      {/* Statement — shows immediately */}
      <div key={`s-${question.id}-${stmtIndex}`} className="mt-7 anim-in">
        <div className={`relative rounded-2xl p-5 border-2 transition-all duration-500 ${
          revealed
            ? userMatchedBook
              ? "bg-emerald-50 border-emerald-300"
              : "bg-rose-50 border-rose-300"
            : "bg-white border-stone-200"
        }`}>
          <div className="flex gap-3">
            <div className={`flex-shrink-0 w-9 h-9 rounded-xl flex items-center justify-center font-mono-ui font-bold text-[14px] ${
              revealed
                ? userMatchedBook ? "bg-emerald-600 text-white" : "bg-rose-600 text-white"
                : "bg-stone-900 text-stone-50"
            }`}>
              {statement.letter.toUpperCase()}
            </div>
            <p className="flex-1 text-[16px] leading-[1.5] text-stone-900 pt-1">{statement.text}</p>
          </div>

          {revealed && (
            <div className="mt-4 pt-4 border-t border-stone-900/10 flex items-center gap-2 anim-fade">
              {userMatchedBook ? (
                <>
                  <div className="w-7 h-7 rounded-full bg-emerald-600 flex items-center justify-center">
                    <Check size={16} strokeWidth={3} className="text-white" />
                  </div>
                  <span className="font-mono-ui text-[11px] uppercase tracking-[0.2em] text-emerald-800 font-bold">Korrekt</span>
                </>
              ) : (
                <>
                  <div className="w-7 h-7 rounded-full bg-rose-600 flex items-center justify-center">
                    <X size={16} strokeWidth={3} className="text-white" />
                  </div>
                  <span className="font-mono-ui text-[11px] uppercase tracking-[0.2em] text-rose-800 font-bold">Falsch</span>
                </>
              )}
              <span className="ml-auto font-mono-ui text-[10px] uppercase tracking-wider text-stone-500">
                Laut Buch: {statement.correct ? "Richtig" : "Falsch"}
              </span>
            </div>
          )}
        </div>

        {/* Explanation */}
        {revealed && (
          <div className="mt-5 anim-in">
            <div className="font-mono-ui text-[10px] uppercase tracking-[0.2em] text-stone-500 mb-2">Erklärung</div>
            <div className="bg-stone-900 text-stone-100 rounded-2xl p-5 text-[14.5px] leading-[1.6] whitespace-pre-wrap">
              {statement.explanation}
            </div>
          </div>
        )}

        {/* Actions */}
        {!revealed ? (
          <div className="mt-5 grid grid-cols-2 gap-3">
            <button
              onClick={() => onGuess("richtig")}
              className="tap-highlight py-5 rounded-2xl bg-white border-2 border-emerald-600 text-emerald-800 font-medium text-[15px] active:bg-emerald-50 transition flex items-center justify-center gap-2"
            >
              <Check size={18} strokeWidth={2.5} />
              Richtig
            </button>
            <button
              onClick={() => onGuess("falsch")}
              className="tap-highlight py-5 rounded-2xl bg-white border-2 border-rose-600 text-rose-800 font-medium text-[15px] active:bg-rose-50 transition flex items-center justify-center gap-2"
            >
              <X size={18} strokeWidth={2.5} />
              Falsch
            </button>
          </div>
        ) : (
          <button
            onClick={onNext}
            className="tap-highlight w-full mt-5 py-5 rounded-2xl bg-stone-900 text-stone-50 font-medium text-[15px] active:bg-stone-800 transition flex items-center justify-center gap-2"
          >
            Weiter
            <ChevronRight size={18} />
          </button>
        )}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// SUMMARY
// ─────────────────────────────────────────────────────────────────────────────
function SummaryScreen({ stats, accuracy, questionCount, sessionMode, remainingWrong, onHome, onAgain }) {
  const total = stats.correct + stats.wrong;
  let verdict, verdictColor;
  if (sessionMode === "wrong" && remainingWrong === 0) {
    verdict = "Alle gemeistert";
    verdictColor = "text-emerald-800";
  } else if (accuracy >= 80) {
    verdict = "Ausgezeichnet";
    verdictColor = "text-emerald-800";
  } else if (accuracy >= 60) {
    verdict = "Solide Leistung";
    verdictColor = "text-stone-800";
  } else {
    verdict = "Weiter üben";
    verdictColor = "text-rose-800";
  }

  return (
    <div className="anim-in pt-10">
      <div className="text-center">
        <div className="font-mono-ui text-[10px] uppercase tracking-[0.2em] text-stone-500 mb-2">
          {sessionMode === "wrong" ? "Wiederholungsrunde abgeschlossen" : "Session abgeschlossen"}
        </div>
        <h2 className={`text-[2.5rem] leading-tight font-semibold italic tracking-tight ${verdictColor}`}>{verdict}</h2>
      </div>

      <div className="my-10 text-center">
        <div className="text-[6rem] leading-none font-semibold text-stone-900 tabular-nums">
          {accuracy}<span className="text-[3rem] text-stone-400 align-top">%</span>
        </div>
        <div className="mt-2 font-mono-ui text-[11px] text-stone-500 uppercase tracking-[0.2em]">
          {stats.correct} von {total} richtig
        </div>
      </div>

      {sessionMode === "wrong" && remainingWrong > 0 && (
        <div className="mb-5 bg-amber-50 border border-amber-200 rounded-2xl p-4 text-center">
          <div className="font-mono-ui text-[11px] uppercase tracking-[0.15em] text-amber-800">
            Noch {remainingWrong} {remainingWrong === 1 ? "Aussage" : "Aussagen"} offen
          </div>
        </div>
      )}

      <button
        onClick={onHome}
        className="tap-highlight w-full py-5 bg-stone-900 text-stone-50 rounded-2xl font-medium text-[15px] active:bg-stone-800 transition flex items-center justify-center gap-2"
      >
        <Home size={18} />
        Zurück zur Übersicht
      </button>
      {onAgain && (
        <button
          onClick={onAgain}
          className="tap-highlight w-full mt-3 py-4 bg-white border border-stone-200 text-stone-700 rounded-2xl font-medium text-[15px] active:bg-stone-100 transition flex items-center justify-center gap-2"
        >
          <RotateCcw size={16} />
          Nochmal
        </button>
      )}
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// ANALYTICS
// ─────────────────────────────────────────────────────────────────────────────
function AnalyticsScreen({ storage, chapterStats, setStorage, onBack }) {
  const [importOpen, setImportOpen] = useState(false);
  const [importText, setImportText] = useState("");
  const [importMsg, setImportMsg] = useState(null);
  const [copied, setCopied] = useState(false);

  // ─── Time formatting ─────────────────────────────────────────────────────
  const formatDuration = (ms) => {
    if (!ms || ms < 60000) return "< 1 Min";
    const totalMin = Math.floor(ms / 60000);
    const h = Math.floor(totalMin / 60);
    const m = totalMin % 60;
    if (h === 0) return `${m} Min`;
    if (m === 0) return `${h} h`;
    return `${h} h ${m} Min`;
  };

  const daysSinceFirst = storage.firstOpenedAt
    ? Math.max(1, Math.ceil((Date.now() - new Date(storage.firstOpenedAt).getTime()) / (1000 * 60 * 60 * 24)))
    : 0;

  // ─── Chapter weakness ranking (by % falsch) ──────────────────────────────
  const chapterWeaknessRanking = useMemo(() => {
    const rows = [];
    for (const chId of ACTIVE_CHAPTER_IDS) {
      const chQs = QUESTIONS.filter((q) => q.chapter === chId);
      let totalAttempts = 0;
      let wrongAttempts = 0;
      for (const q of chQs) {
        for (const s of q.statements) {
          const k = stmtKey(q.id, s.letter);
          const attempts = storage.attemptsByStmt?.[k] || 0;
          const correct = storage.correctByStmt?.[k] || 0;
          totalAttempts += attempts;
          wrongAttempts += (attempts - correct);
        }
      }
      if (totalAttempts > 0) {
        rows.push({
          id: chId,
          name: CHAPTERS.find((c) => c.id === chId).name,
          totalAttempts,
          wrongAttempts,
          wrongPct: Math.round((wrongAttempts / totalAttempts) * 100),
        });
      }
    }
    return rows.sort((a, b) => b.wrongAttempts - a.wrongAttempts);
  }, [storage]);

  // ─── Most-attempted questions ────────────────────────────────────────────
  const mostAttempted = useMemo(() => {
    // Aggregate by question (sum statement attempts)
    const byQ = {};
    for (const [key, count] of Object.entries(storage.attemptsByStmt || {})) {
      const qid = Number(key.split(".")[0]);
      byQ[qid] = (byQ[qid] || 0) + count;
    }
    return Object.entries(byQ)
      .map(([qid, count]) => {
        const q = QUESTIONS.find((x) => x.id === Number(qid));
        if (!q) return null;
        const ch = CHAPTERS.find((c) => c.id === q.chapter);
        return { qid: Number(qid), count, q, chapterName: ch.name };
      })
      .filter(Boolean)
      .sort((a, b) => b.count - a.count)
      .slice(0, 5);
  }, [storage]);

  // ─── Session/day stats ───────────────────────────────────────────────────
  const totalAnswered = Object.values(storage.attemptsByStmt || {}).reduce((a, b) => a + b, 0);
  const totalCorrect = Object.values(storage.correctByStmt || {}).reduce((a, b) => a + b, 0);
  const overallAcc = totalAnswered > 0 ? Math.round((totalCorrect / totalAnswered) * 100) : 0;
  const avgSessionMs = storage.sessionCount > 0 ? (storage.totalActiveMs || 0) / storage.sessionCount : 0;

  // ─── Export / Import ─────────────────────────────────────────────────────
  const handleExport = async () => {
    const data = JSON.stringify(storage);
    try {
      await navigator.clipboard.writeText(data);
      setCopied(true);
      setTimeout(() => setCopied(false), 2500);
    } catch {
      // Fallback: show the text in a textarea
      setImportText(data);
      setImportOpen(true);
    }
  };

  const handleImport = () => {
    try {
      const parsed = JSON.parse(importText);
      if (!parsed || typeof parsed !== "object") throw new Error();
      setStorage({ ...defaultStorage(), ...parsed });
      setImportMsg({ type: "ok", text: "Fortschritt erfolgreich importiert." });
      setTimeout(() => {
        setImportOpen(false);
        setImportText("");
        setImportMsg(null);
      }, 1500);
    } catch {
      setImportMsg({ type: "err", text: "Ungültige Daten. Bitte den exportierten JSON-Text einfügen." });
    }
  };

  return (
    <div className="anim-in">
      <div className="flex items-center gap-3 pt-6 pb-5 border-b border-stone-300">
        <button onClick={onBack} className="tap-highlight -ml-2 p-2 rounded-full active:bg-stone-200">
          <ArrowLeft size={22} />
        </button>
        <h2 className="text-[22px] font-semibold tracking-tight">Lernanalyse</h2>
      </div>

      {/* Overall numbers */}
      <div className="mt-5 grid grid-cols-2 gap-3">
        <div className="bg-white border border-stone-200 rounded-2xl p-4">
          <div className="font-mono-ui text-[10px] uppercase tracking-[0.15em] text-stone-500 mb-1">Lernzeit gesamt</div>
          <div className="flex items-baseline gap-1.5">
            <Clock size={15} className="text-stone-400" />
            <div className="text-[1.75rem] leading-none font-semibold tabular-nums text-stone-900">
              {formatDuration(storage.totalActiveMs)}
            </div>
          </div>
          <div className="font-mono-ui text-[10px] text-stone-400 mt-2">
            über {daysSinceFirst} {daysSinceFirst === 1 ? "Tag" : "Tage"}
          </div>
        </div>
        <div className="bg-white border border-stone-200 rounded-2xl p-4">
          <div className="font-mono-ui text-[10px] uppercase tracking-[0.15em] text-stone-500 mb-1">Genauigkeit</div>
          <div className="flex items-baseline gap-1.5">
            <Target size={15} className="text-stone-400" />
            <div className="text-[1.75rem] leading-none font-semibold tabular-nums text-stone-900">
              {overallAcc}<span className="text-[1rem] text-stone-400">%</span>
            </div>
          </div>
          <div className="font-mono-ui text-[10px] text-stone-400 mt-2">
            {totalCorrect} von {totalAnswered} richtig
          </div>
        </div>
        <div className="bg-white border border-stone-200 rounded-2xl p-4">
          <div className="font-mono-ui text-[10px] uppercase tracking-[0.15em] text-stone-500 mb-1">Sitzungen</div>
          <div className="flex items-baseline gap-1.5">
            <Flame size={15} className="text-stone-400" />
            <div className="text-[1.75rem] leading-none font-semibold tabular-nums text-stone-900">
              {storage.sessionCount || 0}
            </div>
          </div>
          <div className="font-mono-ui text-[10px] text-stone-400 mt-2">
            ⌀ {formatDuration(avgSessionMs)} / Sitzung
          </div>
        </div>
        <div className="bg-white border border-stone-200 rounded-2xl p-4">
          <div className="font-mono-ui text-[10px] uppercase tracking-[0.15em] text-stone-500 mb-1">Aktive Tage</div>
          <div className="flex items-baseline gap-1.5">
            <Zap size={15} className="text-stone-400" />
            <div className="text-[1.75rem] leading-none font-semibold tabular-nums text-stone-900">
              {(storage.daysActive || []).length}
            </div>
          </div>
          <div className="font-mono-ui text-[10px] text-stone-400 mt-2">
            {daysSinceFirst > 0 ? `${Math.round(((storage.daysActive || []).length / daysSinceFirst) * 100)}% der Tage` : "—"}
          </div>
        </div>
      </div>

      {/* Weakness ranking */}
      <div className="mt-8">
        <div className="font-mono-ui text-[10px] uppercase tracking-[0.2em] text-stone-500 mb-3 px-1">
          Kapitel mit den meisten Fehlern
        </div>
        {chapterWeaknessRanking.length === 0 ? (
          <div className="bg-white border border-stone-200 rounded-2xl p-5 text-center">
            <div className="text-[13px] text-stone-500 italic">Noch keine Daten — beantworte ein paar Fragen, um die Analyse zu sehen.</div>
          </div>
        ) : (
          <div className="space-y-2">
            {chapterWeaknessRanking.slice(0, 10).map((row, i) => (
              <div key={row.id} className="bg-white border border-stone-200 rounded-2xl p-4">
                <div className="flex items-baseline justify-between gap-3 mb-2">
                  <div className="flex items-center gap-2 min-w-0 flex-1">
                    <div className="font-mono-ui text-[10px] text-stone-400 w-5">{String(i + 1).padStart(2, "0")}</div>
                    <div className="text-[14px] font-medium text-stone-900 truncate">{row.name}</div>
                  </div>
                  <div className={`font-mono-ui text-[12px] tabular-nums font-semibold ${row.wrongPct >= 50 ? "text-rose-700" : row.wrongPct >= 30 ? "text-amber-700" : "text-stone-600"}`}>
                    {row.wrongPct}% falsch
                  </div>
                </div>
                <div className="h-[3px] bg-stone-100 rounded-full overflow-hidden">
                  <div className={`h-full transition-all duration-500 ${row.wrongPct >= 50 ? "bg-rose-500" : row.wrongPct >= 30 ? "bg-amber-500" : "bg-stone-400"}`} style={{ width: `${row.wrongPct}%` }} />
                </div>
                <div className="font-mono-ui text-[10px] text-stone-400 mt-1.5">
                  {row.wrongAttempts} Fehler bei {row.totalAttempts} Versuchen
                </div>
              </div>
            ))}
          </div>
        )}
      </div>

      {/* Most attempted questions */}
      <div className="mt-8">
        <div className="font-mono-ui text-[10px] uppercase tracking-[0.2em] text-stone-500 mb-3 px-1">
          Am häufigsten beantwortet
        </div>
        {mostAttempted.length === 0 ? (
          <div className="bg-white border border-stone-200 rounded-2xl p-5 text-center">
            <div className="text-[13px] text-stone-500 italic">Noch keine Daten.</div>
          </div>
        ) : (
          <div className="space-y-2">
            {mostAttempted.map((m) => (
              <div key={m.qid} className="bg-white border border-stone-200 rounded-2xl p-4">
                <div className="flex items-baseline justify-between gap-3 mb-1">
                  <div className="font-mono-ui text-[10px] uppercase tracking-[0.15em] text-rose-800">
                    Kap. {m.q.chapter} · Frage {m.q.number}
                  </div>
                  <div className="font-mono-ui text-[12px] tabular-nums font-semibold text-stone-700">
                    {m.count}×
                  </div>
                </div>
                <div className="text-[13px] text-stone-700 leading-snug line-clamp-2">{m.q.text}</div>
              </div>
            ))}
          </div>
        )}
      </div>

      {/* Backup section */}
      <div className="mt-8 pt-6 border-t border-stone-200">
        <div className="font-mono-ui text-[10px] uppercase tracking-[0.2em] text-stone-500 mb-3 px-1">
          Backup
        </div>
        <p className="text-[12px] text-stone-500 leading-relaxed mb-3 px-1">
          Bevor die App aktualisiert wird: Fortschritt exportieren und sicher aufbewahren. Nach dem Update wieder importieren.
        </p>
        <div className="grid grid-cols-2 gap-2">
          <button
            onClick={handleExport}
            className="tap-highlight flex items-center justify-center gap-2 py-4 bg-white border border-stone-200 rounded-2xl text-[14px] font-medium text-stone-800 active:bg-stone-100 transition"
          >
            <Download size={16} />
            {copied ? "Kopiert ✓" : "Exportieren"}
          </button>
          <button
            onClick={() => { setImportOpen(true); setImportMsg(null); }}
            className="tap-highlight flex items-center justify-center gap-2 py-4 bg-white border border-stone-200 rounded-2xl text-[14px] font-medium text-stone-800 active:bg-stone-100 transition"
          >
            <Upload size={16} />
            Importieren
          </button>
        </div>

        {importOpen && (
          <div className="mt-4 bg-stone-900 rounded-2xl p-4 anim-in">
            <div className="font-mono-ui text-[10px] uppercase tracking-[0.15em] text-stone-400 mb-2">
              {importText && !copied ? "Kopiere diesen Text und speichere ihn sicher:" : "Exportierten Text einfügen:"}
            </div>
            <textarea
              value={importText}
              onChange={(e) => setImportText(e.target.value)}
              placeholder='{"chapters":...}'
              rows={5}
              className="w-full bg-stone-800 text-stone-100 text-[11px] font-mono-ui p-3 rounded-xl border border-stone-700 focus:outline-none focus:border-stone-500"
            />
            {importMsg && (
              <div className={`mt-2 text-[11px] font-mono-ui ${importMsg.type === "ok" ? "text-emerald-400" : "text-rose-400"}`}>
                {importMsg.text}
              </div>
            )}
            <div className="grid grid-cols-2 gap-2 mt-3">
              <button
                onClick={() => { setImportOpen(false); setImportText(""); setImportMsg(null); }}
                className="tap-highlight py-3 text-[13px] text-stone-400 rounded-xl active:bg-stone-800"
              >
                Abbrechen
              </button>
              <button
                onClick={handleImport}
                disabled={!importText.trim()}
                className="tap-highlight py-3 text-[13px] font-medium text-stone-900 bg-stone-100 rounded-xl active:bg-stone-300 disabled:opacity-40 transition"
              >
                Importieren
              </button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));

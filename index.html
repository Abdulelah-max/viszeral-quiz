    { letter: "d", text: "Als Ursache für einen persistierenden Aszites nach einer akuten Pankreatitis kommt in erster Linie eine Dissoziation des Pankreasgangs in Betracht.", correct: true, explanation: "Richtig. Eine Pankreasgangruptur tritt recht häufig bei einer akuten nekrotisierenden Pankreatitis auf (30–50 %) und wird oft übersehen. Neben einer interventionellen Therapie besteht die Möglichkeit einer operativen Intervention. Hierbei reicht das Spektrum von einer Pankreasteilresektion bis zu einer Pankreatikojejunostomie." },
    { letter: "e", text: "Beim chirurgischen 'step-up approach' wird eine perkutane Punktion mit einer retroperitonealen Nekrosektomie kombiniert.", correct: true, explanation: "Richtig. Die Nekrosektomie erfolgt häufig videoassistiert retroperitoneal über einen lateralen Zugang. Hierbei werden in der Regel laparoskopische Instrumente eingesetzt. In vielen Kliniken wird jedoch primär der endoskopische 'step-up approach' favorisiert." },
  ]},
  { id: 36, chapter: 7, number: 16, text: "Welche Aussagen zur OP-Indikation bei zystischen Pankreasneoplasien sind zutreffend?", statements: [
    { letter: "a", text: "Serös-zystische Neoplasien müssen nur operiert werden, wenn sie groß sind und zu einer Kompression von benachbarten Strukturen führen.", correct: true, explanation: "Richtig. Serös-zystische Neoplasien sind in der Regel gutartig. Sie können jedoch zur Kompression von Nachbarstrukturen führen. Weiterhin besteht eine OP-Indikation ab einer Größe > 4 cm oder bei deutlichem Wachstum innerhalb kurzer Zeit. Auch eine vorhandene, exzentrische Verdichtung innerhalb der Zyste kann eine OP-Indikation darstellen." },
    { letter: "b", text: "Solid-pseudopapilläre Neoplasien können lange beobachtet werden.", correct: false, explanation: "Falsch. Hierbei handelt es sich um die seltenste Entität der zystischen Pankreastumoren. Sie treten in 80 % bei jüngeren Frauen auf. Da die Entartungshäufigkeit zwischen 20 und 30 % liegt, sollten diese Tumoren reseziert werden." },
    { letter: "c", text: "Muzinös-zystische Neoplasien sollten primär operiert werden, wenn sie > 4 cm sind und Risikofaktoren vorliegen.", correct: true, explanation: "Richtig. Diese Tumoren treten fast ausschließlich bei Frauen auf und liegen zu 90 % im Pankreasschwanz. Histologisch zeigen sie ein Ovar-ähnliches Stroma. Da sie in 4–14 % der Fälle maligne sein können, besteht ab einer Größe von 4 cm in der Regel eine OP-Indikation. Kleinere Zysten ohne Risikofaktoren können überwacht werden." },
    { letter: "d", text: "Bei einer Seitengang-IPMN ist das Karzinomrisiko so gering, dass keine Operation erforderlich ist.", correct: false, explanation: "Falsch. Auch wenn die Seitgang-IPMN nicht so aggressiv wie die Hauptgangvariante ist, besteht auch hier ein deutliches Karzinomrisiko. Daher sollten insbesondere jüngere und gesunde Patienten mit einer Seitengang-IPMN ab einer Zystengröße von > 3 cm operiert werden." },
    { letter: "e", text: "Patienten mit einer IPMN vom Hauptgangtyp sollten reseziert werden.", correct: true, explanation: "Richtig. Es besteht eine relative OP-Indikation bei einem Hauptgangdurchmesser bis 1 cm und eine absolute Indikation bei einer Hauptgang-IPMN von > 1 cm Größe." },
  ]},
  { id: 37, chapter: 6, number: 1, text: "Welche Aussagen zum akuten Leberversagen (ALV) sind zutreffend?", statements: [
    { letter: "a", text: "Die häufigste Ursache für ein akutes Leberversagen ist die medikamentös-toxische Leberschädigung durch Paracetamol.", correct: true, explanation: "Richtig. Während vor 40 Jahren die akute Hepatitis-B-Infektion als häufigste Ursache für ein akutes Leberversagen galt, ist es heute in über 40 % der Fälle die medikamentös-toxische Leberschädigung, vorrangig durch Paracetamol." },
    { letter: "b", text: "Bei der Paracetamolintoxikation kommt es zur Nekrose von Hepatozyten.", correct: true, explanation: "Richtig. Bei der Paracetamolintoxikation kommt es zu einer Schädigung der Mitochondrien der Hepatozyten und damit zum nekrotischen Zelltod und der Freisetzung toxischer Metaboliten." },
    { letter: "c", text: "Das akute Leberversagen durch Paracetamolintoxikation tritt nicht selten schon bei therapeutischer Dosierung auf.", correct: false, explanation: "Falsch. Paracetamol kann jedoch bereits ab einer Dosis von 4 g pro Tag (Maximaldosis für Erwachsene) hepatotoxisch wirken. Das Paracetamol-induzierte Leberversagen wird bei der Einnahme von über 10 g Paracetamol beobachtet. Bei einer chronisch vorgeschädigten Leber können jedoch auch schon geringere Mengen ausreichend sein. Die Letaldosis liegt zwischen 12 und 20 g." },
    { letter: "d", text: "Weitere Ursachen für ein akutes Leberversagen können eine Autoimmunhepatitis, ein HELLP-Syndrom oder ein Budd-Chiari-Syndrom sein.", correct: true, explanation: "Richtig. Ursachen des akuten Leberversagens können sein: akute Intoxikationen (z. B. Paracetamol, Knollenblätterpilz), Virushepatitiden (A, B, C, HSV, EBV, CMV), idiosynkratische toxische Reaktionen (Phenprocoumon, Tetrazyklin, Halothan, Anabolika), immunologische Ursachen (Autoimmunhepatitis, Graft-versus-Host-Disease), metabolische Ursachen (M. Wilson, α1-Antitrypsinmangel), Schwangerschafts-assoziierte Ursachen (HELLP) oder vaskuläre Ursachen (Budd-Chiari, Ischämie, kardiovaskulärer Schock)." },
    { letter: "e", text: "Selten kommt es im Rahmen eines akuten Leberversagens zu einem hepatorenalen Syndrom.", correct: false, explanation: "Falsch. Bei bis zu 80 % der Fälle kommt es aus unterschiedlichen Gründen zum hepatorenalen Syndrom — entweder aufgrund einer direkten Nierenschädigung durch Intoxikation (z. B. Paracetamol, Aflatoxin, NSAR) oder aufgrund einer akuten Tubulusnekrose durch eingeschränkte Nierenperfusion." },
  ]},
  { id: 38, chapter: 6, number: 2, text: "Welche Aussagen zu Leberzysten sind zutreffend?", statements: [
    { letter: "a", text: "Der Altersgipfel der Diagnose von Leberzysten liegt bei < 40 Jahren.", correct: false, explanation: "Falsch. Der Altersgipfel für die Diagnose von Leberzysten liegt bei > 50 Jahren." },
    { letter: "b", text: "Zysten werden mit steigendem Alter häufig symptomatisch.", correct: false, explanation: "Falsch. Leberzysten sind häufig asymptomatisch und werden meist inzidentell diagnostiziert. Lediglich bei großen Zysten kann es zu Symptomen (Oberbauchschmerzen) kommen." },
    { letter: "c", text: "Leberzysten treten kongenital auf.", correct: true, explanation: "Richtig. Leberzysten treten kongenital auf." },
    { letter: "d", text: "Sonographisch weisen Leberzysten eine echoreiche Konfiguration auf.", correct: false, explanation: "Falsch. In der Sonographie sind Leberzysten echofrei, rund und zeigen eine dorsale Schallverstärkung. Leberzysten zeigen keine Kontrastmittelanreicherung." },
    { letter: "e", text: "Große, symptomatische Zysten sollten chirurgisch exstirpiert werden.", correct: false, explanation: "Falsch. Große, symptomatische Zysten werden nicht exstirpiert, sondern entdeckelt und drainiert. Im Großteil der Fälle und je nach Lage der Zyste ist dies laparoskopisch möglich." },
  ]},
  { id: 39, chapter: 6, number: 3, text: "Welche Aussagen zum Leberhämangiom sind zutreffend?", statements: [
    { letter: "a", text: "Es handelt sich um den häufigsten benignen Lebertumor.", correct: true, explanation: "Richtig. Das kavernöse Leberhämangiom ist der häufigste benigne mesenchymale Lebertumor mit einer Prävalenz von 3–20 %. Frauen sind dreimal häufiger betroffen als Männer. Der Häufigkeitsgipfel liegt zwischen dem 30. und 50. Lebensjahr." },
    { letter: "b", text: "Es leitet sich von den Endothelien der Leberkapillargefäße ab.", correct: true, explanation: "Richtig. Leberhämangiome leiten sich von den Endothelien der Leberkapillargefäße ab." },
    { letter: "c", text: "Auch kleine Hämangiome können häufig symptomatisch werden und eine chirurgische Therapie erforderlich machen.", correct: false, explanation: "Falsch. Kleine Hämangiome sind oft symptomlos und häufig Zufallsbefunde. Sie haben meist keine chirurgische Relevanz. Bei sehr großen Hämangiomen kann es zu Kapseldehnungsschmerzen oder Komplikationen durch verdrängendes Wachstum bzw. zu Einblutungen und Infarzierungen durch intratumorale Thrombosen kommen." },
    { letter: "d", text: "Das Kasabach-Merritt-Syndrom beschreibt die Transformation vom Leberhämangiom zum Hämangiosarkom.", correct: false, explanation: "Falsch. Das Kasabach-Merritt-Syndrom beschreibt das Auftreten von Riesenhämangiomen, die mit einer Verbrauchskoagulopathie und Thrombozytopenie einhergehen." },
    { letter: "e", text: "Sonographisch stellen sich Hämangiome als echofreie und scharf begrenzte Läsionen mit dorsaler Schallverstärkung dar.", correct: false, explanation: "Falsch. Der beschriebene Sonographiebefund trifft auf die unkomplizierte Leberzyste zu. Hämangiome stellen sich im Ultraschall typischerweise als homogene, hyperechogene und scharf begrenzte Läsionen ohne Randsaum dar." },
  ]},
  { id: 40, chapter: 6, number: 4, text: "Welche Aussagen zur fokalen nodulären Hyperplasie (FNH) sind zutreffend?", statements: [
    { letter: "a", text: "Die FNH ist ein seltener benigner Lebertumor, der bei Frauen und Männern in etwa gleichem Verhältnis auftritt.", correct: false, explanation: "Falsch. Die FNH ist mit einer Prävalenz von 2–8 % nach dem Hämangiom der zweithäufigste benigne Lebertumor und tritt bei Frauen achtmal häufiger auf als bei Männern. Der Altersgipfel liegt zwischen dem 30. und 50. Lebensjahr." },
    { letter: "b", text: "Ähnlich wie beim Leberadenom ist die Inzidenz für die FNH bei langjähriger Einnahme von östrogenhaltigen Kontrazeptiva deutlich erhöht.", correct: false, explanation: "Falsch. Ein kausaler Zusammenhang der FNH-Entstehung mit der Einnahme von östrogenhaltigen Kontrazeptiva ist nicht bewiesen, weshalb deren Absetzen bei Vorliegen einer FNH auch nicht empfohlen wird. Als Genese wird eine reaktive Hyperplasie des Lebergewebes bei Hyperperfusion aufgrund hepatischer vaskulärer Malformation vermutet." },
    { letter: "c", text: "Bei der FNH besteht kein Risiko für eine maligne Transformation.", correct: true, explanation: "Richtig. Bei der FNH besteht kein Risiko für eine maligne Transformation." },
    { letter: "d", text: "Die FNH ist meist symptomlos und wird häufig erst als Zufallsbefund bei bildgebender Diagnostik entdeckt.", correct: true, explanation: "Richtig. Die FNH ist meist symptomlos und wird häufig erst als Zufallsbefund bei bildgebender Diagnostik entdeckt." },
    { letter: "e", text: "Die FNH wird immer konservativ behandelt.", correct: false, explanation: "Falsch. Während bei asymptomatischen Patienten die konservative Therapie angestrebt wird, kann unter bestimmten Umständen durchaus eine OP-Indikation bestehen, etwa bei diagnostischer Unsicherheit oder persistierenden Symptomen. Sehr seltene Komplikationen können die Ruptur in der Schwangerschaft oder eine portale Hypertension bei multiplem Leberbefall sein." },
  ]},
  { id: 217, chapter: 6, number: 5, text: "Welche Aussagen zum Leberadenom sind zutreffend?", statements: [
    { letter: "a", text: "Leberzelladenome finden sich häufig als Zufallsbefunde bei bildgebender Diagnostik.", correct: true, explanation: "Richtig. Leberadenome werden selten in Form von meist unspezifischen rechtsseitigen Oberbauchschmerzen symptomatisch und werden daher häufig erst zufällig in der Bildgebung entdeckt." },
    { letter: "b", text: "Langjährige Kontrazeptiva-Einnahme erhöht deutlich die Inzidenz von Leberadenomen.", correct: true, explanation: "Richtig. Inzidenz:\n• Frauen ohne Kontrazeptiva: ca. 1 Neuerkrankung pro 100.000 Einwohner pro Jahr\n• Frauen mit Kontrazeptiva: 30–40 Neuerkrankungen pro 100.000 Einwohner pro Jahr" },
    { letter: "c", text: "Unter Kontrazeptiva-Einnahme besitzen Leberadenome zudem ein erhöhtes Blutungsrisiko.", correct: true, explanation: "Richtig. Unter Kontrazeptiva-Einnahme oder während der Schwangerschaft sind Leberadenome häufig größer und multifokaler — und besitzen ein erhöhtes Blutungsrisiko." },
    { letter: "d", text: "Bei nahezu allen Leberadenomen kommt es irgendwann zu einer malignen Transformation.", correct: false, explanation: "Falsch. Bei Leberadenomen ≥ 5 cm Durchmesser besteht ein Risiko von ca. 10 % für eine maligne Transformation in ein hepatozelluläres Karzinom. Bei kleineren Leberadenomen ist das Entartungsrisiko deutlich niedriger." },
    { letter: "e", text: "Es sollte immer die operative Therapie angestrebt werden.", correct: false, explanation: "Falsch. Unkomplizierte asymptomatische Leberadenome ≤ 4 cm können nach Absetzen östrogenhaltiger Kontrazeptiva und Steroiden mit jährlichen sonographischen Verlaufskontrollen und AFP-Bestimmungen beobachtet werden. Bei größeren Adenomen sollte aufgrund des Entartungsrisikos (5–10 % mit zunehmendem Alter) eine operative Resektion erwogen werden." },
  ]},
  { id: 218, chapter: 6, number: 6, text: "Welche Aussagen zum hepatozellulären Karzinom (HCC) sind zutreffend?", statements: [
    { letter: "a", text: "Das HCC ist ein primär maligner epithelialer Lebertumor mit weltweit steigender Inzidenz.", correct: true, explanation: "Richtig. Das HCC ist weltweit das fünfthäufigste Malignom mit steigender Inzidenz und steht an dritter Stelle der malignombedingten Todesursachen." },
    { letter: "b", text: "Der Häufigkeitsgipfel liegt um das 70. Lebensjahr.", correct: false, explanation: "Falsch. Häufigkeitsgipfel je nach Region:\n• Europa und Nordamerika: 50.–60. Lebensjahr\n• Asien und Afrika: 30.–40. Lebensjahr" },
    { letter: "c", text: "Die häufigste Ursache für ein HCC ist die Leberzirrhose.", correct: true, explanation: "Richtig. 80–90 % aller HCC entstehen auf dem Boden einer Leberzirrhose. 5 % aller Patienten mit Leberzirrhose entwickeln pro Jahr ein HCC." },
    { letter: "d", text: "Die häufigste Ursache für eine Leberzirrhose sind chronische Virushepatitiden (Hepatitis B und C).", correct: false, explanation: "Falsch. Häufigste Ursachen für eine Leberzirrhose:\n• Chronischer Alkoholabusus: 40–60 %\n• Virushepatitiden: 25–30 %" },
    { letter: "e", text: "Bei einer Leberzirrhose auf dem Boden einer Hepatitis B besteht ein besonders großes Risiko für die Entstehung eines HCC.", correct: true, explanation: "Richtig. Das größte Risiko für die Entstehung eines HCC haben Patienten mit:\n1. Äthyltoxische Leberzirrhose bei chronischer Hepatitis B\n2. Hepatitis C\n3. Hämochromatose" },
  ]},
  { id: 219, chapter: 6, number: 7, text: "Welche Aussagen zum hepatozellulären Karzinom (HCC) sind zutreffend?", statements: [
    { letter: "a", text: "Bei dem Vorliegen einer Leberzirrhose wird ein regelmäßiges HCC-Screening empfohlen.", correct: true, explanation: "Richtig. Bei Leberzirrhose auf dem Boden einer Hepatitis B oder C wird ein halbjährliches Screening mit Sonographie und AFP-Bestimmung empfohlen." },
    { letter: "b", text: "Bei chronischer Hepatitis B kann die virostatische Therapie das Risiko einer HCC-Entstehung senken.", correct: true, explanation: "Richtig. Die virostatische Therapie bei Hepatitis B senkt das Risiko einer HCC-Entstehung." },
    { letter: "c", text: "Beim unbehandelten HCC beträgt die mittlere Lebenserwartung weniger als ein Jahr.", correct: true, explanation: "Richtig. Beim unbehandelten HCC beträgt die mittlere Lebenserwartung weniger als ein Jahr." },
    { letter: "d", text: "Die Lebertransplantation hat gegenüber der Leberresektion und den lokal-ablativen Interventionen die beste Prognose bezüglich des Langzeitüberlebens.", correct: true, explanation: "Richtig. 5-Jahresüberlebensraten:\n• Lebertransplantation: ca. 70 %\n• Leberresektion: ca. 50 %\n• Lokalablative Therapie: 20–50 %\n\nDie Lebertransplantation kommt insbesondere bei HCC in Leberzirrhose in Betracht." },
    { letter: "e", text: "Bei Patienten mit einem Frühstadium des HCC hat die Leberresektion als Erstlinientherapie gegenüber der lokalen Radiofrequenzablation (RFA) eine deutlich bessere Prognose.", correct: true, explanation: "Richtig. Bei einem HCC < 2 cm:\n• Chirurgische Resektion: 5-JÜR ca. 80 %\n• RFA: 5-JÜR ca. 66 %", note: "Update seit 2020: Bei nicht-resektablem fortgeschrittenem HCC ist Atezolizumab + Bevacizumab die neue Erstlinientherapie (IMbrave150-Studie, 2020) — verdrängt das alte Sorafenib. Bei Kontraindikationen gegen Bevacizumab: Tremelimumab + Durvalumab (HIMALAYA-Studie, 2022) als Alternative." },
  ]},
  { id: 220, chapter: 6, number: 8, text: "Welche Aussagen zur Leberfunktion im Zusammenhang mit Leberresektionen sind zutreffend?", statements: [
    { letter: "a", text: "Bei einer nicht-zirrhotisch veränderten Leber können bis zu drei Viertel des Lebervolumens reseziert werden, ohne dass es zu einem postoperativen Leberversagen kommt.", correct: true, explanation: "Richtig. Bei einer nicht-zirrhotisch veränderten Leber können bis zu 3/4 des Lebervolumens reseziert werden, ohne dass es zum postoperativen Leberversagen kommt. Die Indikation sollte immer auch in Abhängigkeit der funktionellen Leberreserve (FLR) gestellt werden. Bei manchen Patienten ist vor einer erweiterten Resektion eine präoperative Wachstumsinduktion notwendig — so können bis zu 70 % des Lebergewebes entfernt werden." },
    { letter: "b", text: "Wenn das nach Resektion zu erwartende Volumen des Leberrestgewebes zu gering ist, stellt das immer eine Kontraindikation zur Leberresektion dar.", correct: false, explanation: "Falsch. Es kann zur präoperativen Konditionierung beispielsweise eine Pfortaderembolisation erfolgen — ein Verfahren zur Hypertrophieinduktion im verbleibenden Lebergewebe." },
    { letter: "c", text: "Bei einer Steatosis hepatis kann bereits schon eine verminderte Leberfunktion vorliegen.", correct: true, explanation: "Richtig. Sowohl Steatose als auch Fibrose oder ausgeprägte Cholestase können mit eingeschränkter Leberfunktion einhergehen und stellen eine relative Kontraindikation für eine Resektion dar." },
    { letter: "d", text: "Perioperativ ist in der Parenchymdissektionsphase auf einen möglichst hohen zentralvenösen Druck zu achten.", correct: false, explanation: "Falsch. Es ist auf einen möglichst NIEDRIGEN zentralvenösen Druck (ZVD < 5 cm H₂O) zu achten — ein erhöhter ZVD geht mit einem deutlich höheren Blutungsrisiko und höherem Blutverlust einher." },
    { letter: "e", text: "Das Pringle-Manöver kann den perioperativen Blutverlust reduzieren.", correct: true, explanation: "Richtig. Durch die temporäre Okklusion des Ligamentum hepatoduodenale (Pringle-Manöver) kann der Blutverlust während der Dissektionsphase reduziert werden. Wichtig: Der Blutfluss sollte nach kurzen Abständen (< 15 min) immer wieder freigegeben werden, um einen Ischämie-bedingten Gewebeuntergang zu vermeiden." },
  ]},
  { id: 221, chapter: 6, number: 9, text: "Welche Aussagen zur chirurgischen Therapie maligner Leberherde sind richtig?", statements: [
    { letter: "a", text: "Bei einer Hemihepatektomie rechts bzw. links werden jeweils vier Segmente entfernt.", correct: true, explanation: "Richtig. Resektion entlang der durch Gefäßversorgung und Gallengänge vorgegebenen Strukturen:\n• Hemihepatektomie rechts: Segmente V + VI + VII + VIII\n• Hemihepatektomie links: Segmente II + III + IVa + IVb" },
    { letter: "b", text: "Bei der links-lateralen Segmentresektion werden die Segmente III und IVa entfernt.", correct: false, explanation: "Falsch. Bei der links-lateralen Segmentresektion werden die Segmente II und III entfernt." },
    { letter: "c", text: "Eine Resektion ist nur in kurativer Intention sinnvoll.", correct: true, explanation: "Richtig. Ziel jeder Resektion sollte eine kurative R0-Resektion mit 1 cm Sicherheitsabstand zu allen Seiten bei ausreichendem Restleberparenchym sein. In manchen Fällen können auch zweizeitige operative Resektionen sinnvoll sein." },
    { letter: "d", text: "Bei der erweiterten Hemihepatektomie links erfolgt die Resektion der rechten Lebervene.", correct: false, explanation: "Falsch. Die erweiterte Hemihepatektomie links umfasst die Lebersegmente I, II, III, IVa/b, V und VIII. Zwingend erforderlich ist der ERHALT der rechten Lebervene sowie der Pfortader und Arterien für die Segmente VI und VII inklusive Gallengänge." },
    { letter: "e", text: "Bei der erweiterten Hemihepatektomie rechts erfolgt die Resektion der mittleren Lebervene.", correct: true, explanation: "Richtig. Bei der erweiterten Hemihepatektomie rechts erfolgt die Linkserweiterung auf die Segmente I und/oder IV unter Mitnahme der mittleren Lebervene." },
  ]},
  { id: 222, chapter: 6, number: 10, text: "Welche Aussagen zur operativen Therapie von Lebertumoren sind zutreffend?", statements: [
    { letter: "a", text: "Kolorektale Lebermetastasen sollten immer simultan mit dem Primärtumor operiert werden.", correct: false, explanation: "Falsch. Eine simultane Resektion ist nur unter bestimmten Voraussetzungen sinnvoll:\n• Weniger als 3 Metastasen\n• Patient < 70 Jahre\n• Keine wesentlichen Komorbiditäten\n\nBei größeren oder multiplen Metastasen sollte ein zweizeitiges Vorgehen gewählt werden — entweder erst Primarius oder 'liver first'." },
    { letter: "b", text: "Die minimal-invasive Chirurgie von Lebermetastasen ist mit einer deutlich geringeren Morbidität und kürzeren Verweildauer als bei offenen Resektionen assoziiert.", correct: true, explanation: "Richtig. Im Vergleich zur offenen Resektion zeichnen sich minimal-invasive Verfahren aus durch:\n• Geringere Morbidität: 19 % vs. 31 %\n• Signifikant kürzere Krankenhausverweildauer" },
    { letter: "c", text: "Beim ALPPS-Verfahren (associating liver partition and portal vein ligation for staged hepatectomy) wird das Leberparenchym bei der ersten Operation zwar durchtrennt, aber in-situ belassen.", correct: true, explanation: "Richtig. Beim ALPPS-Verfahren:\n1. Erste Operation: Ligatur der rechten Pfortader, Durchtrennung der Leber entlang Segment IV, Resektion der Tumoren in der verbleibenden linken Leber\n2. Nach 7–10 Tagen: komplette Resektion der rechten Leber, nachdem die linke Seite hypertrophiert ist" },
    { letter: "d", text: "Während bei einem HCC anatomische Resektionen Vorteile bieten, können bei kolorektalen Metastasen auch limitierte Resektionen sinnvoll sein.", correct: true, explanation: "Richtig. Bei HCC sind anatomische Resektionen vorteilhafter, da sich diese Tumoren primär über die portale Zirkulation weiterverbreiten. Bei kolorektalen Lebermetastasen zeigen größere Studien keinen Überlebensvorteil zwischen parenchymsparenden und anatomischen Resektionen." },
    { letter: "e", text: "Bei größeren Leberresektionen ist der Erhalt von mindestens 15 % des Standardlebervolumens ausreichend, um eine lebensbedrohliche Leberinsuffizienz zu verhindern, da sich die Leber innerhalb von wenigen Tagen wieder vergrößert.", correct: false, explanation: "Falsch. Erforderliches Restlebergewebe:\n• Standard: > 30 % des Ausgangswertes\n• Nach Chemotherapie: > 40 %\n\nWeitere Voraussetzungen: normale Leberfunktion, maximal Child-A-Zirrhose." },
  ]},
  { id: 223, chapter: 6, number: 11, text: "Welche Aussagen zur Echinokokkose sind zutreffend?", statements: [
    { letter: "a", text: "Die zwei für den Menschen medizinisch relevanten Echinokokkusarten sind Echinococcus granulosus und Echinococcus vogeli.", correct: false, explanation: "Falsch. Die beiden medizinisch relevanten Echinokokkusarten sind:\n• Echinococcus granulosus (Hundebandwurm)\n• Echinococcus multilocularis (Fuchsbandwurm)" },
    { letter: "b", text: "Die Inkubationszeit beträgt einige Tage.", correct: false, explanation: "Falsch. Die Inkubationszeit ist variabel und reicht von Wochen bis Jahre. Die Wurmeier werden über den Kot des Hauptwirts (Hunde, Katzen, Füchse) ausgeschieden und durch orale Aufnahme übertragen — direkt über Kot/Fell oder indirekt über kontaminierte Erde." },
    { letter: "c", text: "Der Hauptmanifestationsort der Echinokokkose ist die Leber.", correct: true, explanation: "Richtig. Die Larven erreichen im Menschen über die Pfortader zunächst die Leber und können von dort in andere Organe migrieren (häufiger: Lunge; seltener: Milz, Gehirn). Symptome: Leberbefall meist unspezifische Oberbauchschmerzen; Lungenbefall mit Dyspnoe und Pleuraschmerz." },
    { letter: "d", text: "In der CT-Bildgebung spricht eine zystische, hyperdense Struktur ohne Kontrastmittelanreicherung in der Wand für eine Echinokokkose.", correct: false, explanation: "Falsch. Im CT zeigen sich singuläre oder diffuse zystische, HYPOdense, häufig gekammerte Strukturen MIT Kontrastmittelanreicherung in der Zystenwand." },
    { letter: "e", text: "Die Echinokokkose ist immer kurativ therapierbar.", correct: false, explanation: "Falsch. Therapie je nach Erreger:\n• E. granulosus: meist singuläre Zyste, chirurgisch unter perioperativer Antihelmethika-Abschirmung (Albendazol, Mebendazol) in toto resezierbar; alternativ PAIR-Methode (Punktion-Aspiration-Injektion-Reaspiration mit 95 %igem Alkohol nur nach Ausschluss zystobiliärer Fisteln)\n• E. multilocularis: multifokales Wachstum typisch, in 25 % der Fälle nur palliatives Konzept möglich" },
  ]},
  { id: 41, chapter: 3, number: 1, text: "Welche der folgenden Aussagen sind bezüglich der Definition der Adenokarzinome des ösophagogastralen Übergangs (AEG) zutreffend?", statements: [
    { letter: "a", text: "Unter AEG-Karzinomen versteht man Adenokarzinome im Bereich des ösophagogastralen Übergangs, beginnend 5 cm oral und bis 5 cm aboral der anatomischen Kardia.", correct: true, explanation: "Richtig. Nur Tumoren im Bereich 5 cm oral und bis 5 cm aboral der anatomischen Kardia gelten als AEG-Tumoren. Makroanatomisch wird aufgrund des sich verändernden Verlaufs der zirkulären Muskelschicht ein 2–3 cm langes Segment zwischen dem distalen tubulären Ösophagus und der sackartigen Ausweitung des Magens als Zone des ösophagogastralen Übergangs definiert." },
    { letter: "b", text: "Sowohl Plattenepithelkarzinome als auch Adenokarzinome, ca. 5 cm oral der Kardia beginnend, werden dem Begriff AEG zugeordnet.", correct: false, explanation: "Falsch. Plattenepithelkarzinome, die in den gastroösophagealen Übergangsbereich wachsen, gelten als Ösophaguskarzinome. Weltweit finden sich unter den AEG ca. 50 % Adenokarzinome. In Deutschland, USA und Großbritannien ist die Häufigkeit von Plattenepithelkarzinomen stark gesunken. Im Gegensatz dazu hat das Barrett-Karzinom in den letzten zwei Jahrzehnten deutlich zugenommen." },
    { letter: "c", text: "AEG-Tumoren werden definitionsgemäß dem gastroösophagealen Übergangsbereich, beginnend 5 cm oral und 3 cm aboral der Kardia, zugeordnet.", correct: false, explanation: "Falsch. Tumoren bis 5 cm aboral der anatomischen Kardia werden den AEG-Tumoren zugerechnet (nicht 3 cm)." },
    { letter: "d", text: "AEG-Tumoren wachsen nur aboral der Z-Linie.", correct: false, explanation: "Falsch. Die Z-Linie beschreibt nur den Übergang zwischen Plattenepithel und Zylinderepithel." },
    { letter: "e", text: "AEG-Tumoren werden nach der Tumorobergrenze klassifiziert.", correct: false, explanation: "Falsch. Die Tumorobergrenze ist für das Resektionsausmaß von Bedeutung, nicht für die Klassifikation. Klassifiziert wird nach dem Tumorzentrum." },
  ]},
  { id: 42, chapter: 3, number: 2, text: "Die Klassifikation der AEG unterscheidet drei Typen: Welche der folgenden Aussagen sind falsch?", statements: [
    { letter: "a", text: "Die Unterteilung erfolgt unter topographisch-anatomischen Gesichtspunkten.", correct: false, explanation: "Falsch (d.h. die Aussage ist richtig — in der Frage war nach falschen Aussagen gefragt). Die Unterteilung folgt der Topographie: AEG I = Tumorzentrum 1–5 cm oral der Kardia (distaler Ösophagus); AEG II = 1 cm oral bis 2 cm aboral der Kardia (Kardiakarzinom); AEG III = 2–5 cm aboral der Kardia (subkardiales Magenkarzinom)." },
    { letter: "b", text: "Die Unterteilung erfolgt in Bezug auf die Z-Linie.", correct: true, explanation: "Richtig (die Aussage ist falsch). Die Z-Linie hilft nicht bei der Unterteilung der AEG-Typen und wandert im Laufe des Lebens nach oral. Sie ist die Trennlinie zwischen Platten- und Zylinderepithel." },
    { letter: "c", text: "Für die Beurteilung ist die endoskopische Lokalisation der Kardia notwendig.", correct: false, explanation: "Falsch (die Aussage ist richtig). Bei einer Lage des Tumorzentrums 1 cm oral bis 2 cm aboral der Kardia → AEG II. 2–5 cm aboral der Kardia → AEG III. Die endoskopische Lokalisation der Kardia ist für die Einteilung wesentlich." },
    { letter: "d", text: "Das Tumorzentrum bestimmt den Typ.", correct: false, explanation: "Falsch (die Aussage ist richtig). Bei größeren Tumoren, die nicht eindeutig einem AEG-Typ zugeordnet werden können, wird durch die Haupttumormasse der Typ festgelegt." },
    { letter: "e", text: "Die Einteilung ist auch abhängig vom histologischen Typ.", correct: true, explanation: "Richtig (die Aussage ist falsch). Der histologische Befund spielt keine Rolle bei der Unterteilung der AEG-Tumoren." },
  ]},
  { id: 43, chapter: 3, number: 3, text: "Welche der folgenden Aussagen zur Epidemiologie und Tumorbiologie der AEG sind korrekt?", statements: [
    { letter: "a", text: "Im Wesentlichen gibt es bei den AEG-Typen keine Unterschiede bezüglich der Epidemiologie und Tumorbiologie.", correct: false, explanation: "Falsch. Die AEG-Typen unterscheiden sich deutlich bezüglich der Tumorbiologie. Die intestinale Metaplasie findet sich fast ausschließlich bei AEG-I Tumoren. Das Grading ist beim Typ I in der Regel günstiger als bei den anderen beiden AEG-Typen." },
    { letter: "b", text: "Der Tumorwachstumstyp beim AEG Typ I unterscheidet sich deutlich vom Typ II und III.", correct: true, explanation: "Richtig. Die intestinale Tumorwuchsform (nach Laurén) findet sich bei ca. 80 % der AEG I Tumoren, jedoch nur in 55 % beim AEG Typ II und in 33 % bei AEG Typ III." },
    { letter: "c", text: "Männer und Frauen sind gleich häufig betroffen.", correct: false, explanation: "Falsch. Männer erkranken deutlich häufiger als Frauen (10:1 bei Typ I, 5:1 bei Typ II und 2:1 bei Typ III)." },
    { letter: "d", text: "Der Altersgipfel liegt bei allen Typen um das 60. Lebensjahr.", correct: true, explanation: "Richtig. Die Altersgipfel unterscheiden sich nur gering. Bei Typ I und II liegt er um das 60. Lebensjahr, der AEG Typ III hat seinen Gipfel um das 62. Lebensjahr." },
    { letter: "e", text: "Der gastroösophageale Reflux hat nur beim AEG Typ I und II eine pathogenetische Bedeutung.", correct: false, explanation: "Falsch. Bisher konnte nur beim Barrett-Karzinom (AEG Typ I) die pathognomonische Rolle des gastroösophagealen Refluxes gezeigt werden." },
  ]},
  { id: 44, chapter: 3, number: 4, text: "Welche Veränderungen brachte die neue TNM-Klassifikation der UICC 2010 bezüglich der AEG und welche Aussagen sind korrekt?", statements: [
    { letter: "a", text: "Tumoren der AEG Typen II und III werden den Magenkarzinomen zugerechnet.", correct: false, explanation: "Falsch. Grundsätzlich werden alle Tumoren, die den ösophagogastralen Bereich betreffen, wie ein Ösophaguskarzinom klassifiziert. Nur Tumoren, die ihr Zentrum im Magen und mehr als 5 cm vom ösophagogastralen Übergang entfernt haben, oder deren Zentrum innerhalb eines Abstands von 5 cm liegt, aber nicht in den ösophagogastralen Übergang hineinreicht, unterliegen der Klassifikation für Magenkarzinome." },
    { letter: "b", text: "Ein Tumor, dessen Zentrum in einem Abstand von 5 cm vom ösophagogastralen Übergang liegt und in den ösophagogastralen Übergang hineinreicht, wird nach dem Schema der Ösophaguskarzinome klassifiziert.", correct: true, explanation: "Richtig. Die AEG-Tumoren werden nach der aktuellen Klassifikation den Ösophaguskarzinomen zugeordnet." },
    { letter: "c", text: "Die UICC-Vorgaben vereinfachen die TNM-Klassifikation und das therapeutische Vorgehen.", correct: false, explanation: "Falsch. Durch die aktuellen UICC-Vorgaben (2010) werden AEG-Tumore nicht mehr durch eine eigene Klassifikation abgebildet, sondern den Ösophaguskarzinomen zugeordnet." },
    { letter: "d", text: "AEG-Tumoren erhalten keine eigene Klassifikation mehr.", correct: true, explanation: "Richtig. Die AEG-Tumore werden aktuell den Ösophaguskarzinomen zugeordnet. Es ergibt sich jedoch keine Veränderung bezüglich der Therapie." },
    { letter: "e", text: "Bei der neuen Klassifikation der AEG-Tumoren gilt ein Befall der zöliakalen Lymphknotenstationen nicht mehr als Fernmetastasierung.", correct: true, explanation: "Richtig. Geändert wurde auch die Einstufung des Lymphknotenbefalls. Unabhängig vom Sitz des Primärtumors gelten als regionäre Lymphknoten diejenigen im lymphatischen Abflussgebiet des Ösophagus. Eingeschlossen werden daher die zöliakalen Lymphknoten und paraösophagealen Lymphknoten des Halses, aber nicht die supraklavikulären Lymphknoten." },
  ]},
  { id: 45, chapter: 3, number: 5, text: "Welche der folgenden Aussagen bezüglich der Diagnostik von AEG-Tumoren sind korrekt?", statements: [
    { letter: "a", text: "Eine Ösophagogastroskopie und Abdomensonographie gehören zum primären Staging.", correct: true, explanation: "Richtig. Die Sonographie besitzt eine zentrale Bedeutung beim Staging der AEG-Tumoren. Ergänzend zur Sonographie des Abdomens (auch zum Ausschluss von Lebermetastasen) sollte die Untersuchung des Halses auf pathologisch vergrößerte Lymphknoten durchgeführt werden, und bei hochsitzenden Tumoren eine Sonographie des Halses erfolgen." },
    { letter: "b", text: "Eine Computertomographie des Thorax und Abdomens sowie eine endoskopische Ultraschalluntersuchung werden nur bei einem kurativen Therapieansatz empfohlen.", correct: true, explanation: "Richtig. Eine CT von Thorax und Abdomen sowie eine EUS zur Beurteilung der lokalen Infiltrationstiefe und des regionären Lymphknotenbefalls werden zum Staging empfohlen. Das PET-CT wird derzeit nicht routinemäßig empfohlen, kann aber bei lokal fortgeschrittenen Tumoren nach dem konventionellen Staging sinnvoll sein. Insbesondere das frühe Ansprechen auf die neoadjuvante Therapie bei AEG Typ I und II kann zur Therapiestratifizierung genutzt werden." },
    { letter: "c", text: "Eine diagnostische Laparoskopie sollte vor jeder geplanten Tumorresektion durchgeführt werden.", correct: false, explanation: "Falsch. Die Staging-Laparoskopie kann bei fortgeschrittenen Tumoren (cT3/4) zum Ausschluss von Lebermetastasen und/oder Peritonealkarzinose sinnvoll sein. Eine Peritoneallavage kann zusätzlich erfolgen, beeinflusst jedoch das therapeutische Vorgehen nicht." },
    { letter: "d", text: "Zur Prognoseeinschätzung sollten präoperativ die Tumormarker CEA, CA 19-9 und CA 72-4 bestimmt werden.", correct: false, explanation: "Falsch. Für die Primärdiagnostik und zur Verlaufskontrolle haben Tumormarker keine Bedeutung." },
    { letter: "e", text: "Gegenwärtig kann ein routinemäßiger Einsatz der MRT in der Diagnostik der AEG-Tumoren noch nicht empfohlen werden.", correct: true, explanation: "Richtig. Die MRT sollte den Patienten vorbehalten sein, bei denen keine CT-Untersuchung durchgeführt werden kann." },
  ]},
  { id: 46, chapter: 3, number: 6, text: "Welche tumorbiologischen Faktoren beeinflussen die Prognose beim AEG?", statements: [
    { letter: "a", text: "Die Tumorlokalisation.", correct: true, explanation: "Richtig. Tumoren im subkardialen Bereich (AEG Typ III) haben eine schlechtere Prognose als Tumoren des Typs I und II. Sie weisen außerdem bereits zum Zeitpunkt der Diagnosestellung deutlich häufiger einen Lymphknotenbefall auf." },
    { letter: "b", text: "Die Tiefeninfiltration des Tumors.", correct: true, explanation: "Richtig. Das Tumorstadium T4 (T4a: Infiltration von Pleura, Zwerchfell oder Perikard; T4b: Infiltration anderer Nachbarorgane wie Wirbelkörper, Trachea, Aorta) ist beim AEG III Typ fast dreimal so häufig wie beim AEG I und II, sodass die Gesamtprognose beim AEG III deutlich schlechter ist." },
    { letter: "c", text: "Eine Anzahl von befallenen Lymphknoten > 10.", correct: false, explanation: "Falsch. Sind mehr als zwei Lymphknoten befallen, wandelt sich in der neuen UICC-Einteilung der N-Status von N1 zu N2, was mit einer Verschlechterung der Prognose einhergeht. N1 = 1–2 regionäre LK, N2 = 3–6 regionäre LK, N3 = > 7 LK. Nicht nur der Lymphknotenbefall, sondern auch das Verhältnis der untersuchten zu den befallenen LK beeinflusst die Prognose." },
    { letter: "d", text: "Eine Gefäßinvasion.", correct: true, explanation: "Richtig. Die Lymphgefäßinvasion gilt als prognostischer Faktor bei AEG-Tumoren. Eine Invasion der Lymphbahnen findet sich häufiger beim Typ II und III als beim Typ I. Damit steigt auch das Risiko für Lymphknotenmetastasen." },
    { letter: "e", text: "Der Nachweis einer p53-Mutation.", correct: false, explanation: "Falsch. Besonders häufig lässt sich beim AEG-Typ I Tumor eine p53-Mutation und Akkumulation nachweisen. Eine prognostische Signifikanz konnte jedoch bisher nicht eindeutig bewiesen werden." },
  ]},
  { id: 47, chapter: 3, number: 7, text: "Die Prognose der AEG-Tumore wird maßgeblich durch die korrekte Operation verbessert. Welche Therapie eignet sich für welche Lokalisation am besten?", statements: [
    { letter: "a", text: "AEG Typ I: Gastrektomie und Ösophagektomie.", correct: false, explanation: "Falsch. Nur in Ausnahmefällen ist bei sehr ausgedehnten Tumoren beim AEG Typ I die Gastrektomie und Ösophagektomie indiziert. In der Regel ist die transthorakale subtotale Ösophagusresektion mit proximaler Magenresektion (sogenanntes Ivor-Lewis-Verfahren) mit adäquater Lymphknotendissektion die Methode der Wahl." },
    { letter: "b", text: "AEG Typ I: Die transthorakale Ösophagektomie ist besser als die transhiatale Ösophagusresektion.", correct: true, explanation: "Richtig. Die transthorakale Ösophagusresektion ermöglicht eine gezieltere Lymphadenektomie, insbesondere der Lymphknoten oberhalb der Trachealbifurkation, als es beim transmediastinalen Vorgehen möglich ist. Ein prognostischer Vorteil besteht nur, wenn weniger als 8 Lymphknoten befallen sind." },
    { letter: "c", text: "AEG Typ II: Die Ösophagektomie ist besser als die transhiatal erweiterte totale Gastrektomie.", correct: false, explanation: "Falsch. Therapie der Wahl ist die transhiatal erweiterte totale Gastrektomie mit Resektion des distalen Ösophagus. Eine Schnellschnittuntersuchung des proximalen Absetzungsrandes ist obligat. Im Einzelfall kann eine transthorakale Ösophagusresektion erforderlich sein." },
    { letter: "d", text: "AEG Typ III: Die transhiatal erweiterte totale Gastrektomie ist besser als die linksthorakale Gastrektomie.", correct: true, explanation: "Richtig. Bei AEG Typ III wird aktuell die transhiatal erweiterte totale Gastrektomie empfohlen. Im Einzelfall ist alternativ die proximale Magenresektion und distale Ösophagusresektion mit Dünndarm- oder Kolonteilinterposition möglich. Das Resektionsausmaß nach proximal richtet sich nach der Laurén-Klassifikation: 5 cm beim intestinalen und 8 cm beim diffusen Typ in situ." },
    { letter: "e", text: "Beim Barrett-Frühkarzinom ist die endoskopische Abtragung des Tumors ausreichend.", correct: false, explanation: "Falsch. Bei einem Barrett-Frühkarzinom muss neben der Tumorresektion auch der gesamte Endobrachyösophagus endoskopisch mitreseziert werden." },
  ]},
  { id: 48, chapter: 3, number: 8, text: "Unter welchen Bedingungen ist bei AEG-Tumoren eine endoskopische Therapie möglich?", statements: [
    { letter: "a", text: "Bei Tumoren, die auf die Mukosa begrenzt sind.", correct: true, explanation: "Richtig. Nach aktueller Datenlage sollte eine lokale Tumorabtragung nur bei einer Infiltration der Mukosa (m1–m3) erfolgen. Positiv ist derzeit auch die Datenlage bezüglich einer lokalen Therapie bei submukosaler Tumorausbreitung (sm1) ohne Risikofaktoren (G3, Gefäßinvasion, > 20 mm). Die Durchführung erfolgt nach Möglichkeit en bloc als endoskopische Mukosaresektion (EMR) oder als endoskopische Submukosadissektion (ESD) bei größeren Läsionen und bei Plattenepithelkarzinomen." },
    { letter: "b", text: "Bei Tumoren im Stadium T1 bis T2, N0, M0.", correct: false, explanation: "Falsch. Endoskopische Verfahren sind nach den aktuellen Leitlinien nur bei Tumoren im Stadium T1 (m1 bis m3, sm1) anzuwenden, wobei die Stadien m3 bzw. sm1 bei einem Risiko für einen Lymphknotenbefall von ca. 12 % bzw. 27 % in einer interdisziplinären Tumorkonferenz als Einzelfallentscheidung diskutiert werden müssen und nur ohne Risikofaktoren in Frage kommen. Maßgeblich bestimmt die Lymphgefäßinvasion die Lymphknotenmetastasen; bei L0 kann auch eine endoskopische Resektion ausreichen." },
    { letter: "c", text: "Nur bei Tumoren bis zu einer G2-Differenzierung.", correct: false, explanation: "Falsch. Die Einschränkung der endoskopischen Tumorresektionen betrifft nicht die Differenzierung. Eine Gefäßinvasion darf zudem nicht eingetreten sein." },
    { letter: "d", text: "Bei Läsionen vom erhabenen Typ, jedoch < 3 cm.", correct: false, explanation: "Falsch. Die Läsionen sollten von erhabenen Typen < 2 cm und von flachen Typen < 1 cm sein und keine Ulzerationen aufweisen. Es werden Mukosa- und Submukosaresektionen gleichwertig durchgeführt; dabei muss eine En-bloc-Resektion angestrebt werden. Auch kleine Lokalrezidive (rT1a N0 M0) können erneut endoskopisch behandelt werden." },
    { letter: "e", text: "Bei makroskopischer Ulzeration.", correct: false, explanation: "Falsch. Makroskopische Ulzerationen gelten als Kontraindikation für eine lokale Tumortherapie." },
  ]},
  { id: 49, chapter: 3, number: 9, text: "Welches Vorgehen ist im metastasierten Stadium von AEG-Tumoren zu empfehlen?", statements: [
    { letter: "a", text: "Eine Gastrektomie und simultane Resektion der Metastasen.", correct: false, explanation: "Falsch. Im metastasierten Stadium ist der Stellenwert der Chirurgie sehr begrenzt. Stenosen oder Blutungen können im Einzelfall zu einer OP-Indikation führen. Liegt eine singuläre, gut resektable Lebermetastase vor, kann diese jedoch im Rahmen einer geplanten Gastrektomie mitentfernt werden." },
    { letter: "b", text: "Eine palliative Chemo-/Radiochemotherapie.", correct: true, explanation: "Richtig. Insbesondere bei einem lokal fortgeschrittenen und inoperablen oder metastasierten AEG sollte die palliative Chemotherapie favorisiert werden.\n\nBeim Adenokarzinom sollte vor Beginn der palliativen Chemotherapie der HER2/neu-Status bestimmt werden. Bei negativem Status: meist 5-FU und Cisplatin (ggf. + Docetaxel oder Epirubicin). Bei positivem Status: 5-FU, Cisplatin und Trastuzumab. Beim palliativ behandelten Plattenepithelkarzinom erfolgt ebenfalls meist 5-FU + Cisplatin." },
    { letter: "c", text: "Eine Stentimplantation.", correct: true, explanation: "Richtig. Bei ausgeprägter Tumorstenose ist eine Stentimplantation indiziert. Langfristig können Patienten auch von einer externen oder endoluminalen Strahlentherapie profitieren." },
    { letter: "d", text: "Die Anlage eines enteralen Bypasses.", correct: false, explanation: "Falsch. Im Rahmen einer Ernährungstherapie sollte bei rein palliativem Vorgehen die Anlage einer perkutanen endoskopischen gastralen Ernährungssonde diskutiert werden, wenn eine Stentanlage nicht möglich ist. Eine Bypass-Operation ist im Regelfall nicht notwendig." },
    { letter: "e", text: "Eine Brachytherapie.", correct: true, explanation: "Richtig. Langfristig können Patienten auch von einer externen oder endoluminalen Strahlentherapie profitieren. Auch eine Argon-Plasma-Koagulation kann das Lumen durch Abtragung exophytischer Tumoranteile freihalten." },
  ]},
  { id: 50, chapter: 3, number: 10, text: "Welche Nachsorge ist nach einer chirurgischen Therapie von AEG-Tumoren sinnvoll?", statements: [
    { letter: "a", text: "In den ersten 2 Jahren vierteljährliche Staginguntersuchungen.", correct: false, explanation: "Falsch. Es gibt keine wissenschaftlich belegten Gründe, dass eine strukturierte Nachsorge im Sinne regelmäßiger Staginguntersuchungen das Überleben verbessert." },
    { letter: "b", text: "In den ersten 2 Jahren halbjährliche Kontrollen.", correct: false, explanation: "Falsch. In der Literatur werden keine festen Intervalle für Kontrolluntersuchungen empfohlen. Dennoch sollten Nachuntersuchungen durchgeführt werden, um frühzeitig funktionelle Probleme infolge der Operation oder ein Tumorrezidiv zu entdecken. Besonders ist auf den Ernährungszustand zu achten." },
    { letter: "c", text: "Eine Vitamin-B12-Substitution.", correct: true, explanation: "Richtig. Die Kontrolluntersuchungen umfassen Anamnese, körperliche Untersuchung, Gewichtsverlauf, Bestimmung von Blutbild, Eisen, Transferrin, Transferrin-Sättigung und Vitamin B12 im Serum. Patienten nach Gastrektomie sollen regelmäßig in ¼- bis ½-jährlichen Abständen Vitamin B12 parenteral substituiert bekommen; in Ausnahmefällen kann die Substitution auch täglich oral in hochdosierter Form erfolgen." },
    { letter: "d", text: "Eine symptomorientierte Nachsorge.", correct: true, explanation: "Richtig. Die symptomorientierte Nachsorge steht im Mittelpunkt der weiteren Betreuung. Zusätzlich sollte eine psychische Unterstützung den Patienten und deren Angehörigen angeboten werden, insbesondere in einer palliativen Situation. Die Nachkontrollen können auch zur Evaluation der chirurgischen Behandlungsverfahren genutzt werden." },
    { letter: "e", text: "Die regelmäßige Einnahme eines Cyclooxygenase (COX-2)-Hemmers.", correct: false, explanation: "Falsch. Sowohl im Barrett-Ösophagus als auch im Barrett-Karzinom konnte eine Expression von COX-1 und COX-2 nachgewiesen werden. COX-2 spielt eine Rolle bei der Tumorangiogenese und hemmt die Apoptose. Dennoch besteht aktuell weder im palliativen Konzept noch im Sinne einer Prävention eine Indikation zur Gabe eines COX-2-Hemmers." },
  ]},
  { id: 51, chapter: 4, number: 1, text: "Welche Aussagen zu den Risikofaktoren eines Adenokarzinoms des Magens treffen zu?", statements: [
    { letter: "a", text: "Eine Infektion mit Helicobacter pylori (HP) ist ein Risikofaktor für ein Magenkarzinom.", correct: true, explanation: "Richtig. Das Magenkarzinom ist eine multifaktorielle Erkrankung, bei der die Infektion mit HP den wichtigsten Risikofaktor darstellt. Seit 1994 ist HP durch die WHO als Klasse-I-Karzinogen anerkannt (2009 bestätigt). Die Infektion induziert eine chronisch aktive Gastritis. Bei einem Teil der Patienten kommt es über eine atrophische Gastritis und intestinale Metaplasie zum Magenkarzinom. Eine HP-Eradikation zur Magenkarzinomprophylaxe sollte bei Risikopersonen erfolgen." },
    { letter: "b", text: "Eine Infektion mit HP ist ein Risikofaktor für ein Adenokarzinom des ösophagogastralen Übergangs (AEG).", correct: false, explanation: "Falsch. Eine gastroösophageale Refluxkrankheit (GERD) kann zu einer Ösophagitis und konsekutiv zur Ausbildung einer Barrett-Mukosa führen. Diese kann über eine intestinale Metaplasie in ein AEG münden. Somit besteht beim AEG kein direkter Zusammenhang mit der HP-Infektion." },
    { letter: "c", text: "Bei der Entstehung eines Magenkarzinoms gibt es ein familiäres Risiko.", correct: true, explanation: "Richtig. Für Verwandte 1. Grades eines Patienten mit Magenkarzinom ist das Risiko um das 2- bis 3-fache erhöht. Ursache können gemeinsame Umweltbedingungen, Lebensgewohnheiten, genetische Veranlagung oder eine Kombination sein. Die genetische Veranlagung beruht auf der Keimbahnmutation des E-Cadherin-Gens (CDH-1) — autosomal dominant — und führt zum hereditären diffusen Magenkarzinom. Träger haben ein Lebenszeitrisiko von ca. 40–70 % (Männer) bzw. 60–80 % (Frauen); Frauen zusätzlich ca. 40–50 % Risiko für ein lobuläres Mammakarzinom. Bei Nachweis wird eine prophylaktische Gastrektomie empfohlen. HNPCC-Patienten haben ein 5-fach erhöhtes Risiko." },
    { letter: "d", text: "Patienten mit einer atrophischen Gastritis und einer intestinalen Metaplasie sollten endoskopisch überwacht werden.", correct: false, explanation: "Falsch. Eine regelmäßige endoskopisch-bioptische Überwachung wird bei fokaler Atrophie und intestinaler Metaplasie nicht empfohlen, da das Magenkarzinomrisiko auch nach 10 Jahren zu gering ist (< 1,8 %). Bei ausgeprägter Atrophie und Metaplasie kann es sinnvoll sein, Risikopatienten zu identifizieren, allerdings liegen diesbezüglich keine prospektiven Studien vor." },
    { letter: "e", text: "Das Risiko der Entstehung eines Magenstumpfkarzinoms 15–20 Jahre nach der Operation eines Ulkus ist vergleichbar hoch, unabhängig davon, ob eine Billroth-I- oder Billroth-II-Resektion erfolgt ist.", correct: false, explanation: "Falsch. Das Risiko eines Magenstumpfkarzinoms ist nach einer Billroth-II-Resektion höher als nach einer Billroth-I-Resektion. Ursache ist der alkalische Galle- und Pankreassaftreflux, der nach Billroth II ausgeprägter ist." },
  ]},
  { id: 52, chapter: 4, number: 2, text: "Welche Aussagen zur Eradikation von Helicobacter pylori (HP) treffen zu?", statements: [
    { letter: "a", text: "Sie sollte bei einer Pangastritis erfolgen.", correct: true, explanation: "Richtig. Die Eradikation sollte bei einer Risikogastritis erfolgen. Dazu zählt neben der Pangastritis auch die Korpus-dominante Gastritis." },
    { letter: "b", text: "Sie ist bei erstgradigen Verwandten von Magenkarzinompatienten nicht indiziert.", correct: false, explanation: "Falsch. Das Risiko für ein Magenkarzinom ist in diesen Fällen erhöht. Daher sollte auch hier eine HP-Eradikation erfolgen." },
    { letter: "c", text: "Frühere Neoplasien des Magens spielen bei der Indikation zur Eradikation keine Rolle.", correct: false, explanation: "Falsch. Bei früheren endoskopischen Resektionen, nach Magenteilresektionen bei Adenomen oder beim MALT-Lymphom sollte ebenfalls eine HP-Eradikation durchgeführt werden." },
    { letter: "d", text: "Eine Magenatrophie ist genauso wie eine nachgewiesene intestinale Metaplasie keine Indikation für die Eradikation.", correct: true, explanation: "Richtig. Bei ausgedehnten und insbesondere bei multifokalen Befunden sollte eine Eradikation erfolgen." },
    { letter: "e", text: "Die Eradikation hat grundsätzlich das Potential, die Entstehung eines Magenkarzinoms zu verhindern.", correct: true, explanation: "Richtig. Wichtig ist der Zeitpunkt der Behandlung. Insbesondere wenn noch keine präneoplastischen Veränderungen vorliegen (Atrophie, intestinale Metaplasie), ist die HP-Eradikation wirksam.\n\nEradikationsschemata laut deutscher Leitlinie (2016):\n• Italienische Therapie: PPI + Clarithromycin + Amoxicillin\n• Französische Therapie: PPI + Clarithromycin + Metronidazol\n• Bismut-Therapie: PPI + Bismut + Tetracyclin + Metronidazol (gleichwertig)\n\nBei HP-Infektion soll nach 4–6 Wochen eine erneute HP-Diagnostik erfolgen — entweder durch erneute Gastroskopie (z. B. bei Ulcus ventriculi oder duodeni) oder mittels Stuhlantigentest bzw. ¹³C-Atemtest." },
  ]},
  { id: 53, chapter: 4, number: 3, text: "Welche Aussagen zum Magenkarzinom treffen zu?", statements: [
    { letter: "a", text: "Die angewandte Klassifikation der Lymphknotenstationen basiert auf der European Gastric Cancer Association.", correct: false, explanation: "Falsch. Die weltweit angewandte Klassifikation der Lymphknotenstationen basiert auf der Japanese Research Society for Gastric Cancer (JRSGC). In Japan kommt das Magenkarzinom viel häufiger als im Rest der Welt vor. Die Klassifikation definiert die Häufigkeit des Lymphknotenbefalls der verschiedenen Kompartimente abhängig von der Tumorlokalisation." },
    { letter: "b", text: "Die Einteilung erfolgt in drei Kompartimente, die drei Ebenen entsprechen: magennahe Lymphknoten, Lymphknoten an den Abgängen der magenversorgenden Arterien und ferne Lymphknoten entlang der großen retroperitonealen Gefäße.", correct: true, explanation: "Richtig.\n• Kompartiment I: LK-Stationen 1–6 (perigastrisch) — alle LK direkt am Magen: parakardial, an der kleinen und großen Kurvatur, supra- und infrapylorisch.\n• Kompartiment II: LK-Stationen 7–11 (regional) — entlang der großen Gefäße: A. gastrica sinistra, A. hepatica communis, Truncus coeliacus, Milzhilus, A. lienalis.\n• Kompartiment III: LK-Stationen 12–16 (distal) — am Lig. hepatoduodenale, hinter dem Pankreaskopf, an der Mesenterialwurzel, im Mesenterium und entlang der Aorta." },
    { letter: "c", text: "Die D2-Lymphadenektomie beim Fundus-/Korpuskarzinom beinhaltet, wenn man sich streng an die Vorgaben hält, immer eine Pankreaslinksresektion und Splenektomie.", correct: true, explanation: "Richtig. Strenggenommen beinhaltet die D2-Lymphadenektomie beim Fundus-/Korpuskarzinom die Entfernung der LK-Stationen 1–11, wobei Station 10 dem Milzhilus und Station 11 der A. lienalis entsprechen. Station 10 kann häufig nur mittels Splenektomie bzw. Pankreaslinksresektion entfernt werden. Da dies in den meisten Studien nur erhöhte Morbidität ohne Überlebensgewinn zeigte, werden die Stationen 10 und 11 in der Regel belassen. Beim Antrumkarzinom gehören Stationen 10 und 11 dagegen zum Kompartiment III." },
    { letter: "d", text: "Wie beim Kolonkarzinom gibt es in Deutschland ab 50 Jahren auch eine Magenkarzinomvorsorgeuntersuchung.", correct: false, explanation: "Falsch. In Deutschland gibt es keine Magenkarzinomvorsorge. Diese sollte nur bei Risikopatienten erfolgen." },
    { letter: "e", text: "Eine D3-Lymphadenektomie ist in Japan Therapiestandard.", correct: true, explanation: "Richtig. Aufgrund der hohen Magenkarzinominzidenz in Japan (möglicherweise durch Ernährungs- und Umweltfaktoren bedingt) gibt es ein nationales Vorsorgeprogramm. Magenfrühkarzinome werden häufiger diagnostiziert, und die hohe Expertise in der Magenkarzinomchirurgie ermöglicht ausgedehnte Lymphadenektomien mit geringer Morbidität." },
  ]},
  { id: 54, chapter: 4, number: 4, text: "Welche Aussagen zum Staging beim Magenkarzinom treffen zu?", statements: [
    { letter: "a", text: "Zum Ausschluss von Fernmetastasen sind eine Röntgen-Thorax-Aufnahme und eine Abdomensonographie ausreichend.", correct: false, explanation: "Falsch. Die Standarduntersuchung zum Staging eines Magenkarzinoms ist das Thorax-Abdomen-CT mit oraler und intravenöser Kontrastierung." },
    { letter: "b", text: "Die lokale Tumorausbreitungsdiagnostik mittels endoskopischen Ultraschalls (EUS) ist im metastasierten Stadium von Nutzen.", correct: false, explanation: "Falsch. Der EUS sollte Bestandteil des Stagings des Primärtumors bei Patienten mit kurativer Therapieintention sein. Im gesicherten metastasierten Stadium sind perigastrale Lymphknoten, lokale Eindringtiefe (T-Stadium) oder vorhandener Aszites nicht relevant für die Therapieentscheidung." },
    { letter: "c", text: "Ein MRT ist zur Beurteilung der perigastralen Lymphknoten sinnvoll.", correct: false, explanation: "Falsch. Das MRT sollte Patienten vorbehalten sein, bei denen kein CT durchgeführt werden kann oder bei denen CT- und/oder EUS-Befunde unklar geblieben sind." },
    { letter: "d", text: "Das PET-CT findet eine breite Anwendung als Staginguntersuchung beim Magenkarzinom.", correct: false, explanation: "Falsch. Das PET-CT wird nicht routinemäßig für das Staging empfohlen. Es kann aber bei lokal fortgeschrittenen 'mass-forming tumours' des intestinalen Typs bzw. beim nicht-siegelringzelligen Magenkarzinom bei kurativer Therapieoption in Betracht gezogen werden. Als Prognosemarker oder zum Monitoring des Therapieansprechens bei neoadjuvanter Chemotherapie ist das PET-CT noch Gegenstand laufender Forschung." },
    { letter: "e", text: "Eine Staging-Laparoskopie ist bei lokal fortgeschrittenen Tumoren (T3–4) sinnvoll.", correct: true, explanation: "Richtig. Eine Laparoskopie kann zur Verbesserung der Genauigkeit des Stagings, zum Ausschluss von Lebermetastasen und Peritonealkarzinose in fortgeschrittenen Stadien (insbesondere cT3/T4) durchgeführt werden." },
  ]},
  { id: 55, chapter: 4, number: 5, text: "Welche Aussagen zum Magenfrühkarzinom treffen zu?", statements: [
    { letter: "a", text: "Magenfrühkarzinome sind T1-Karzinome.", correct: true, explanation: "Richtig. Die T1-Karzinome werden in T1a (Mukosa) und T1b (Submukosa) unterteilt." },
    { letter: "b", text: "Magenfrühkarzinome sollten, wenn möglich, lokal endoskopisch reseziert werden.", correct: true, explanation: "Richtig. Magenfrühkarzinome oder intraepitheliale Dysplasien sollten endoskopisch reseziert werden, wenn folgende Kriterien vorliegen: Tumor < 2 cm, nicht ulzeriert, Mukosakarzinom und entweder vom intestinalen Typ oder histologisch gut bis mäßig differenziert (G1/G2). Die Resektion sollte als ESD (endoskopische Submukosadissektion) erfolgen." },
    { letter: "c", text: "Auch Magenfrühkarzinome mit maximal einem erweiterten Kriterium können endoskopisch behandelt werden.", correct: true, explanation: "Richtig. Zu den erweiterten Resektionskriterien zählen:\n• Ein differenziertes Mukosakarzinom (G1/G2) ohne Ulzeration und Größe > 2 cm\n• Ein differenziertes Mukosakarzinom mit Ulzeration und Größe < 3 cm\n• Ein gut differenziertes Karzinom mit Submukosainvasion < 500 μm und Größe < 3 cm\n• Ein undifferenziertes Mukosakarzinom < 2 cm Durchmesser (sofern bioptisch kein Nachweis von Tumorzellen im Abstand ≤ 1 cm besteht)" },
    { letter: "d", text: "Das Lymphknotenmetastasenrisiko eines Magenfrühkarzinoms bei submukosalem (T1b) Befall liegt bei 10 %.", correct: false, explanation: "Falsch. Bei Submukosa-, Lymph- oder Blutgefäßinvasion sind in bis zu 25–30 % Lymphknotenmetastasen nachweisbar." },
    { letter: "e", text: "Nach einer endoskopischen Resektion sollte die Nachsorge halbjährlich erfolgen.", correct: false, explanation: "Falsch. Die Nachsorge sollte im ersten Jahr 3-monatlich, im zweiten halbjährlich und danach jährlich erfolgen." },
  ]},
  { id: 56, chapter: 4, number: 6, text: "Welche Aussagen zur chirurgischen Resektion bei Magenkarzinom treffen zu?", statements: [
    { letter: "a", text: "Beim diffusen Typ nach Laurén reicht ein proximaler Sicherheitsabstand von 5 cm in situ.", correct: false, explanation: "Falsch. Beim diffusen Typ nach Laurén muss der proximale Sicherheitsabstand in situ mindestens 8 cm betragen, was ca. 5 cm am frischen Präparat ohne Zug und Spannung entspricht." },
    { letter: "b", text: "Beim intestinalen Typ nach Laurén ist ein proximaler Sicherheitsabstand von 3 cm am frischen Präparat ausreichend.", correct: true, explanation: "Richtig. Beim intestinalen Typ nach Laurén muss der proximale Sicherheitsabstand in situ mindestens 5 cm betragen, was ca. 3 cm am frischen Präparat ohne Zug und Spannung entspricht." },
    { letter: "c", text: "Die 2/3-Magenresektion ist beim Magenantrumkarzinom eine Therapieoption.", correct: false, explanation: "Falsch. Die 2/3-Magenresektion ist in der Regel benignen Befunden vorbehalten. Die einzige partielle Magenresektion, die bei einem Magenkarzinom in Frage kommt, ist die 4/5-Magenresektion. Diese Option besteht meist nur beim Antrumkarzinom und wenn der proximale Sicherheitsabstand es ermöglicht. Beim diffusen Typ sollte immer die totale Gastrektomie favorisiert werden." },
    { letter: "d", text: "Bei Befall der Lymphknotenstation 10 (Milzhilus) sollte eine Splenektomie mit erfolgen.", correct: true, explanation: "Richtig. Die LK-Station 10 (Milzhilus) gehört beim Fundus-/Korpuskarzinom zum Kompartiment II und wird nicht standardmäßig bei der D2-Lymphadenektomie entfernt. Studien zeigten, dass eine zusätzliche Splenektomie lediglich höhere Morbidität ohne sicheren Überlebensgewinn bringt. Wenn diese Station jedoch sicher befallen ist, sollte die Splenektomie erfolgen. Eine milzerhaltende Ausräumung des Milzhilus ist technisch in der Regel nicht machbar." },
    { letter: "e", text: "Die Wiederherstellung der Kontinuität nach totaler Gastrektomie wird meistens mittels einer End-zu-Seit-Ösophagojejunostomie durchgeführt.", correct: true, explanation: "Richtig. Es gibt viele Möglichkeiten, die Kontinuität nach totaler Gastrektomie wiederherzustellen (z. B. Jejunum-Pouch, freies Jejunuminterponat), aber die mit Abstand am meisten verbreitete Methode ist die End-zu-Seit-Ösophagojejunostomie mit 60–70 cm langer Y-Roux-Schlinge und kurzem Krückstock. Sie kann je nach Gewohnheit des Operateurs mit Zirkularstapler oder Handnaht erfolgen." },
  ]},
  { id: 57, chapter: 4, number: 7, text: "Welche Aussagen zur Lymphadenektomie beim Magenkarzinom treffen zu?", statements: [
    { letter: "a", text: "Die pN0-Einstufung kann nur bei mindestens 16 untersuchten Lymphknoten (LK) erfolgen.", correct: true, explanation: "Richtig. Mindestens 16 Lymphknoten sind notwendig für eine adäquate Erhebung des pN-Status. In einer D1-Lymphadenektomie (perigastrische LK-Stationen) sind in der Regel > 16 LK enthalten." },
    { letter: "b", text: "Die D2-Lymphadenektomie entfernt standardmäßig immer dieselben Lymphknotenstationen, unabhängig von der Tumorlokalisation.", correct: false, explanation: "Falsch. Je nach Tumorlokalisation werden die Kompartimente anders definiert. Beim Antrumkarzinom zählt z. B. Station 2 (parakardial links) zum Kompartiment III und wird bei D2 belassen (deshalb nur 4/5-Magenresektion). Beim Fundus-/Korpuskarzinom gehört sie zum Kompartiment I und muss entfernt werden. Stationen 10 (Milzhilus) und 11 (A. lienalis) gehören beim Fundus-/Korpus zum Kompartiment II, beim Antrum zum Kompartiment III." },
    { letter: "c", text: "Eine D2-Lymphadenektomie muss mindestens 25 LK beinhalten.", correct: true, explanation: "Richtig. Bei der D2-Lymphadenektomie ohne Splenektomie/Pankreaslinksresektion werden in der Regel mehr als 25 regionäre Lymphknoten entfernt und histopathologisch untersucht." },
    { letter: "d", text: "Eine D1-Lymphadenektomie umfasst die Lymphknotenstationen 1–6.", correct: true, explanation: "Richtig. Im Allgemeinen stimmt diese Aussage, jedoch muss die Tumorlokalisation einbezogen werden. Beim Antrumkarzinom entsprechen die Stationen 10 und 11 dem Kompartiment III und werden bei D2 belassen." },
    { letter: "e", text: "Eine D1-Lymphadenektomie ist bei einem UICC-Stadium I vertretbar.", correct: false, explanation: "Falsch. Das UICC-Stadium I beinhaltet T1N0M0 (IA) und T2N0M0 sowie T1N1M0 (IB). Bei T1N0M0 und T2N0M0 wäre eine D1 theoretisch ausreichend. Bei Befall des Kompartiments I muss jedoch das nächst höhere ausgeräumt werden, also D2. Da das präoperative Staging nie zu 100 % verlässlich ist und das Magenkarzinom eine schlechte Prognose hat, sollte auch bei UICC-Stadium I großzügig eine D2-Lymphadenektomie erfolgen." },
  ]},
  { id: 58, chapter: 4, number: 8, text: "Welche Aussagen zu Prinzipien in der chirurgischen Therapie des Magenkarzinoms treffen zu?", statements: [
    { letter: "a", text: "Die Linitis plastica sollte generell mittels einer totalen Gastrektomie therapiert werden.", correct: true, explanation: "Richtig. Die Linitis plastica des Magens ist ein submukös wachsender Tumor, der meistens die gesamte Magenwand infiltriert und nur durch tiefe Biopsien histologisch gesichert werden kann. Histopathologisch zeigen sich typische Siegelringzellverbände und eine ausgeprägte Fibrose. Aufgrund der schlechten Prognose und der diffusen Infiltration sollte immer eine totale Gastrektomie erfolgen." },
    { letter: "b", text: "Die palliative Gastrektomie kann auch bei asymptomatischen Karzinomen indiziert werden.", correct: false, explanation: "Falsch. Bei Fernmetastasen oder Peritonealkarzinose sollte bei asymptomatischen Tumoren keine Gastrektomie in palliativer Intention erfolgen. Da die Tumoren aber häufig bluten oder pylorus- bzw. kardianah liegen, sind sie oft symptomatisch. Eine Resektion sollte einem Bypass bevorzugt werden. Palliativ wird in der Regel nur eine D1-Lymphadenektomie durchgeführt." },
    { letter: "c", text: "Lokal fortgeschrittene Magenkarzinome werden perioperativ chemotherapiert.", correct: true, explanation: "Richtig. Der aktuelle Standard basiert auf den Ergebnissen der FLOT4-Studie und sieht eine perioperative Chemotherapie nach FLOT-Protokoll (5-Fluorouracil + Leucovorin + Oxaliplatin + Docetaxel) vor. Die Patienten erhalten in der Regel vier Zyklen prä- und vier Zyklen postoperativ.", note: "Seit 2021 zusätzlich: Bei metastasiertem/fortgeschrittenem Magenkarzinom mit PD-L1-Expression (CPS ≥ 5) ist Nivolumab + Chemotherapie als Erstlinientherapie Standard (CheckMate-649-Studie). Für lokal fortgeschrittene Stadien wird aktuell die perioperative Immuntherapie in Studien evaluiert (z.B. MATTERHORN-Studie mit Durvalumab)." },
    { letter: "d", text: "Eine Lymphknotenmetastase am Abgang der A. mesenterica superior (AMS) zählt noch zu den lokalen Lymphknotenstationen eines Magenkarzinoms.", correct: false, explanation: "Falsch. Eine LK-Metastase an der AMS ist als Fernmetastase (M1) zu werten; ebenso eine retropankreatische, paraaortale oder subklavikuläre LK-Metastase." },
    { letter: "e", text: "Bei der Laparotomie müssen bei der Frau insbesondere die Adnexen inspiziert werden.", correct: true, explanation: "Richtig. Typisch sind Ovarialmetastasen (Krukenberg-Tumor). Deshalb sind die Adnexen immer gesondert zu explorieren. Histologisch zeigt sich eine siegelringzellartige Tumorproliferation. In manchen Fällen liegt eine Linitis plastica des Kolons als Primärtumor vor." },
  ]},
  { id: 59, chapter: 4, number: 9, text: "Welche Aussagen zur Anwendung von chemo- und radiotherapeutischen Therapiestrategien beim Magenkarzinom treffen zu?", statements: [
    { letter: "a", text: "Bei einem T2-Stadium des Magenkarzinoms ist die Durchführung einer perioperativen Chemotherapie eine optionale Entscheidung.", correct: true, explanation: "Richtig. Bei T2 ist die perioperative Chemotherapie optional und sollte interdisziplinär abgewogen und individuell diskutiert werden. Ab T3 besteht eine klare Empfehlung zur perioperativen Chemotherapie." },
    { letter: "b", text: "Standard ist eine perioperative Chemotherapie mit je vier Zyklen prä- und postoperativ.", correct: false, explanation: "Falsch. Standard ist die perioperative Chemotherapie mit je drei Zyklen prä- und postoperativ, wobei der Stellenwert der postoperativen Chemotherapie derzeit in Studien geprüft wird." },
    { letter: "c", text: "Die Standard-Chemotherapie erfolgt beim Magenkarzinom nach dem FLOT-Schema.", correct: true, explanation: "Richtig. Standard ist die Anwendung nach FLOT (5-FU + Folinsäure + Oxaliplatin + Docetaxel) — intravenös." },
    { letter: "d", text: "Auch im perioperativen Setting wird bei positivem HER2/neu-Status die zusätzliche Gabe von Trastuzumab empfohlen.", correct: false, explanation: "Falsch. Eine Antikörpertherapie mit Trastuzumab wird bei positivem HER2/neu-Status derzeit nur in der palliativen Therapie angewandt und empfohlen. Die Anwendung im kurativen Setting wird in klinischen Studien evaluiert." },
    { letter: "e", text: "Nach der präoperativen Chemotherapie erfolgt die Operation ohne erneutes Staging.", correct: false, explanation: "Falsch. Nach der präoperativen Chemotherapie muss eine Prüfung des Ansprechens und ein Re-Staging mittels erneuter Endoskopie (und ggf. CT) erfolgen." },
  ]},
  { id: 60, chapter: 4, number: 10, text: "Welche Aussagen zur Motilität des Magens sind zutreffend?", statements: [
    { letter: "a", text: "Das Motilitätszentrum liegt im Fundus.", correct: false, explanation: "Falsch. Das Motilitätszentrum des Magens liegt im Korpus nahe der großen Kurvatur. Von dort werden propulsive Bewegungen in Richtung Pylorus ausgelöst. Man unterscheidet Nüchternmotilität (interdigestive Phase) von postprandialer Motilität (digestive Phase). In der Nüchternphase: 1) fast vollständige motorische Ruhe, 2) unkoordinierte Aktivität, 3) kurzzeitig starke propulsive Bewegung Richtung Antrum (ca. 3×/min). Digestive Phase: Dehnung des Fundus + Antrumkontraktionen durchmischen und transportieren den Speisebrei." },
    { letter: "b", text: "Nach der Nahrungsaufnahme kommt es zu einer Relaxation im Fundus.", correct: true, explanation: "Richtig. Nach der Nahrungsaufnahme kommt es im Magen zu einer lokalen Wanddehnung, die reflexartig zu einer Entspannung der Muskulatur im Fundus führt." },
    { letter: "c", text: "Die Magenentleerung erfolgt im Wesentlichen über Rezeptoren im Antrum.", correct: false, explanation: "Falsch. Der Transport des Speisebreis bis zum Duodenum ist Folge einer koordinierten Aktivität von Fundus, Antrum und Pylorus. Die Magenentleerung wird durch Rezeptoren gesteuert, die vorwiegend im Duodenum liegen. Einflussfaktoren: Nahrungsmenge, Konsistenz, Zusammensetzung. Je höher der Fettgehalt, umso stärker wird die Entleerung gehemmt." },
    { letter: "d", text: "Ein Anstieg des pH-Wertes hemmt die Pylorusdilatation.", correct: false, explanation: "Falsch. Je saurer der Chymus ist, desto stärker wird die Magenentleerung gehemmt. Auch eine hohe Osmolarität beeinträchtigt die Magenentleerung." },
    { letter: "e", text: "Bei Diabetes mellitus kann es zu beschleunigter Magenentleerung kommen.", correct: false, explanation: "Falsch. Im Rahmen eines Diabetes mellitus kann eine Schädigung der afferenten und efferenten Nervenfasern des N. vagus zu einer Gastroparese führen, sodass die Magenentleerung oft länger als 12 Stunden dauert." },
  ]},
  { id: 61, chapter: 4, number: 11, text: "Welche Aussage über die Wirkungsweise von Protonenpumpenhemmern (PPI) ist korrekt?", statements: [
    { letter: "a", text: "Sie führen zu einer irreversiblen Hemmung der H+-K+-ATPase in der Parietalzelle.", correct: true, explanation: "Richtig. PPI führen zu einer irreversiblen Hemmung der H⁺-K⁺-ATPase in der Parietalzelle. Sie binden sich kovalent über Disulfidbrücken an die H⁺-K⁺-ATPase." },
    { letter: "b", text: "Sie führen zu einer reversiblen Hemmung der H+-K+-ATPase in der ECL-Zelle.", correct: false, explanation: "Falsch. PPI wirken an der Parietalzelle, sie führen jedoch zu einer Hypertrophie der enterochromaffinen Zellen (ECL-Zellen). Die ECL- bzw. H-Zellen produzieren Histamin, das sich mit dem Histamin-2-Rezeptor der Beleg- bzw. Parietalzellen verbindet und die Säureproduktion stimuliert. Die Hemmung ist irreversibel." },
    { letter: "c", text: "Die PPI werden zunächst als Prodrug aufgenommen.", correct: true, explanation: "Richtig. Die PPI werden als Prodrug aufgenommen und erst durch die Magensäure in die aktive Form umgewandelt." },
    { letter: "d", text: "Die PPI werden im Magen resorbiert und blockieren die H+-K+-ATPase dosisabhängig.", correct: false, explanation: "Falsch. Der Wirkstoff kann nicht über die Magenoberfläche an die Belegzellen gelangen. Die Einnahme erfolgt als Prodrug, das jedoch durch das saure Milieu im Magen zerstört würde. Daher wird der Wirkstoff durch eine säurefeste Kapsel geschützt, die sich in alkalischer Umgebung auflöst. Erst nach dieser Freisetzung beginnt die Resorption im Duodenum. Neuere Darreichungsformen wie Omeprazol-Natriumbikarbonat benötigen keinen magensaftresistenten Überzug mehr. Nach Kreislaufzirkulation reichert sich der Wirkstoff im sauren Milieu der membranständigen Canaliculi der Belegzellen an." },
    { letter: "e", text: "Aufgrund der langen Halbwertszeit der PPI ist eine Einmalgabe pro Tag ausreichend.", correct: false, explanation: "Falsch. Die Halbwertszeit der PPI im Plasma ist sehr kurz (1–2 Stunden); die Halbwertszeit des Enzym-Inhibitor-Komplexes liegt jedoch über 24 Stunden. Endogene Substanzen (z. B. Glutathione) bewirken eine Dissoziation des Komplexes, was zur Reaktivierung der H⁺-K⁺-ATPase führt. Der Säureanstieg ist auch durch neu gebildete H⁺-K⁺-ATPase bedingt." },
  ]},
  { id: 62, chapter: 4, number: 12, text: "Welche Aussagen zur Ulkuschirurgie des Magens sind korrekt?", statements: [
    { letter: "a", text: "Bei einer endoskopisch nicht stillbaren Ulkusblutung ist nur die Operation aussichtsreich.", correct: false, explanation: "Falsch. Wenn es die lokalen Gegebenheiten vor Ort zulassen und entsprechende Expertise vorhanden ist, kann zunächst eine Angiographie und ggf. interventionelle Blutstillung durchgeführt werden." },
    { letter: "b", text: "Eine Magenperforation kann auch laparoskopisch versorgt werden.", correct: true, explanation: "Richtig. In der Regel sind Magenperforationen gut laparoskopisch zu versorgen. Intraoperativ sollte der Perforationsrand (wenn möglich exzidiert) und anschließend übernäht werden. Auch eine notwendige Spülung der Abdominalhöhle kann laparoskopisch erfolgen." },
    { letter: "c", text: "Bei der Versorgung des Ulkus sollte nicht nur die Perforationsstelle übernäht werden, sondern auch eine Biopsie des Ulkus erfolgen.", correct: true, explanation: "Richtig. Bei einem perforierten Ulkus muss an das Vorliegen eines Magenkarzinoms als auslösende Ursache gedacht werden; eine histologische Sicherung sollte daher erfolgen." },
    { letter: "d", text: "Neben der Versorgung der Perforation sollte unbedingt eine selektive proximale Vagotomie durchgeführt werden, um einem Rezidiv vorzubeugen.", correct: false, explanation: "Falsch. Die selektive proximale Vagotomie wird heute nicht mehr empfohlen. Nach Versorgung der Perforation erfolgt die medikamentöse Therapie (PPI) sowie ggf. HP-Eradikation als kausale Therapie." },
    { letter: "e", text: "Die Indikation zur Operation bei einer Ulkusblutung besteht, wenn mehr als drei Erythrozytenkonzentrate in 24 Stunden verabreicht werden müssen.", correct: false, explanation: "Falsch. Die OP-Indikation besteht bei endoskopisch nicht stillbarer Blutung, nach mehrfachem Rezidiv trotz endoskopischer und ggf. interventioneller Therapie, oder bei hämodynamischer Instabilität. Ein starrer Transfusionsschwellenwert gilt nicht als alleiniges Kriterium." },
  ]},
  { id: 63, chapter: 5, number: 1, text: "Welche Aussagen zum Gallenblasenkarzinom sind richtig?", statements: [
    { letter: "a", text: "Die Entstehung eines Gallenblasenkarzinoms ist mit einer Cholezystolithiasis assoziiert.", correct: false, explanation: "Falsch. Chronisch-rezidivierende Entzündungen der Gallenblase im Rahmen einer Cholezystolithiasis (chronische Cholezystitis / Schrumpfgallenblase) sind ein Risikofaktor für die Entstehung eines Karzinoms. Karzinome können jedoch auch ohne Cholezystolithiasis entstehen (aus Adenomen können Dysplasien entstehen und aus diesen Karzinome)." },
    { letter: "b", text: "Beim Zufallsbefund eines Adenokarzinoms im Präparat einer laparoskopischen Cholezystektomie ist eine Nachresektion immer sinnvoll.", correct: false, explanation: "Falsch. Eine Nachresektion ist nur indiziert, wenn das Tumorstadium ≥ T1b und/oder N+ und/oder R1 ist. Beim Tis und T1a (die Mukosa nicht überschreitend) ist die Cholezystektomie als kurativ anzusehen." },
    { letter: "c", text: "Das Gesamt-5-Jahresüberleben (5-JÜR) bei Patienten mit einem Gallenblasenkarzinom ist < 5 %.", correct: false, explanation: "Falsch. Das Gesamt-5-JÜR liegt beim Gallenblasenkarzinom bei 5–15 %. Bei Tis/T1-Stadien bei 75–100 %, bei T2-Stadien bei 35–69 %." },
    { letter: "d", text: "Die Lebertransplantation kann eine Therapieoption bei nicht-resektablem Gallenblasenkarzinom sein.", correct: false, explanation: "Falsch. Aufgrund der schlechten Prognose des Gallenblasenkarzinoms und der hohen Rezidivraten auch nach kurativer Resektion stellt die Lebertransplantation keine Therapieoption dar." },
    { letter: "e", text: "Trokarmetastasen nach laparoskopischer Cholezystektomie nach Zufallsbefund eines Gallenblasenkarzinoms im Cholezystektomiepräparat sind häufig.", correct: true, explanation: "Richtig. Aus nicht geklärten Gründen ist das Gallenblasenkarzinom das einzige Malignom, bei dem gehäuft Trokarmetastasen auftreten (in ca. 7–14 %). Daher sollten bei Nachresektionen immer die Trokarstellen exzidiert werden. Auch bei T1a-Karzinomen, bei denen die Cholezystektomie als kurativ zu betrachten ist, sollten die Trokarstellen nachexzidiert werden." },
  ]},
  { id: 64, chapter: 5, number: 2, text: "Welche chirurgischen Therapieoptionen in kurativer Intention sind beim Gallenblasenkarzinom möglich?", statements: [
    { letter: "a", text: "Laparoskopische Cholezystektomie.", correct: false, explanation: "Falsch. Bei präoperativem Verdacht auf ein Gallenblasenkarzinom ist die Laparoskopie kontraindiziert. Bei intraoperativer Entdeckung eines Gallenblasenkarzinoms während einer Laparoskopie muss konvertiert und die Trokarstellen müssen exzidiert werden." },
    { letter: "b", text: "Offene Cholezystektomie + Resektion des Gallenblasenbetts und Lymphadenektomie im Abflussgebiet mit Resektion der extrahepatischen Gallenwege.", correct: true, explanation: "Richtig. Wenn der Ductus cysticus tumorinfiltriert ist, müssen die extrahepatischen Gallenwege mitreseziert werden." },
    { letter: "c", text: "Offene Cholezystektomie + Resektion des Gallenblasenbetts und Lymphadenektomie im Abflussgebiet ohne Resektion der extrahepatischen Gallenwege.", correct: true, explanation: "Richtig. Wenn der Ductus cysticus nicht tumorinfiltriert ist, müssen die extrahepatischen Gallenwege nicht mitreseziert werden." },
    { letter: "d", text: "Offene Cholezystektomie + Resektion der Lebersegmente IVa/V und Lymphadenektomie im Abflussgebiet ohne Resektion der extrahepatischen Gallenwege.", correct: true, explanation: "Richtig. Diese Resektion ist eine Therapieoption bei tumorfreiem Ductus cysticus." },
    { letter: "e", text: "Trisektorektomie rechts.", correct: true, explanation: "Richtig. Bei jungen 'gesunden' Patienten sollte eine erweiterte Leberresektion erfolgen. Aufgrund der Hilusnähe des Tumors müssen sowohl die rechte Leberhälfte (S V–VIII) als auch das Segment IV(a) entfernt werden. Voraussetzung ist, genügend Restleber zu belassen (präoperative Volumetrie)." },
  ]},
  { id: 65, chapter: 5, number: 3, text: "Welche der folgenden Aussagen zu malignen Gallengangstumoren treffen zu?", statements: [
    { letter: "a", text: "Gallengangskarzinome werden nach ihrer Lokalisation eingeteilt.", correct: true, explanation: "Richtig. Gallengangskarzinome werden eingeteilt in: cholangiozelluläre Karzinome (intrahepatisch), Klatskin-Tumore (perihilär, in der Hepatikusgabel), distale extrahepatische Karzinome und Papillenkarzinom (an der Ampulla Vateri)." },
    { letter: "b", text: "Es wird zwischen extra- und intrahepatischen Cholangiokarzinomen unterschieden.", correct: true, explanation: "Richtig. Aufgrund ihrer pathogenetischen Verwandtschaft können die Gallenblasenkarzinome den extrahepatischen Gallenwegskarzinomen zugeordnet werden." },
    { letter: "c", text: "Die Gallengangskarzinome werden in der Klassifikation nach Wermuth beschrieben.", correct: false, explanation: "Falsch. Die am häufigsten verwendete Klassifikation der Gallengangstumoren ist die nach Bismuth-Corlette (BC):\n• Typ I: Proximale Karzinome ohne Einbeziehung der Hepatikusgabel\n• Typ II: Tumoren, die entweder den linken oder rechten Hepatikusast ohne Beteiligung der Segmentgallengänge befallen\n• Typ III: Karzinome, die zusätzlich zu Typ II Segmentgallengänge einer Leberhälfte befallen\n• Typ IV: Zusätzliche Beteiligung von Segmentgallengängen beider Leberhälften" },
    { letter: "d", text: "Distale Gallengangskarzinome werden auch als Klatskin-Tumoren bezeichnet.", correct: false, explanation: "Falsch. Die proximalen (zentralen) Tumoren werden als Klatskin-Tumoren bezeichnet (BC Typ III und IV)." },
    { letter: "e", text: "Gallengangskarzinome sind selten.", correct: true, explanation: "Richtig. Die Inzidenz wird mit etwa 0,5 Neuerkrankungen pro 100.000 Einwohner pro Jahr angegeben, wobei es keine geschlechtsspezifische Häufung gibt." },
  ]},
  { id: 66, chapter: 5, number: 4, text: "Welche Aussagen zu Symptomen und Diagnostik der Gallengangskarzinome treffen zu?", statements: [

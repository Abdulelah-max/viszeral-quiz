const QUESTIONS = [
  { id: 1, chapter: 1, number: 1, text: "Welche allgemeinen Aussagen treffen auf ERAS-Konzepte (Enhanced Recovery After Surgery) zu?", statements: [
    { letter: "a", text: "Es handelt sich um ein unimodales Behandlungskonzept.", correct: false, explanation: "Falsch. Es handelt sich um ein multimodales Behandlungskonzept nach operativen Eingriffen, welches prozedurenspezifisch, evidenzbasiert und interdisziplinär angewandt wird. Ziel ist die schnellstmögliche Wiederherstellung der physischen und psychischen Leistungsfähigkeit nach chirurgischen Eingriffen." },
    { letter: "b", text: "Das Konzept stammt ursprünglich aus den USA.", correct: false, explanation: "Falsch. Das Konzept wurde erstmalig von Dr. Kehlet in Dänemark vorgestellt. Bis heute sind skandinavische Länder Vorreiter in der Umsetzung von ERAS. Die ERAS-Society wurde 2001 von Professor Ken Fearon (Großbritannien) und Professor Olle Ljungqvist (Schweden) gegründet." },
    { letter: "c", text: "ERAS umfasst drei Säulen von Grundprinzipien.", correct: true, explanation: "Richtig. Es handelt sich um prä-, intra- und postoperative Prinzipien:\n• präoperativ: Nikotinkarenz, Alkoholabstinenz, Atemtraining, ambulante Vorbereitung, Patienteninformation/-Motivation, kurze präoperative Nüchternheit, PONV-Prophylaxe, Ausgleich kataboler Stoffwechsellagen und Prähabilitation\n• intraoperativ: balancierte Flüssigkeitstherapie, Normothermie, Minimierung des Zugangstraumas, Verzicht auf Drainagen, Sonden und Katheter\n• postoperativ: schneller Kostaufbau, Physiotherapie, optimierte Analgesie und frühzeitige Mobilisation." },
    { letter: "d", text: "Das Thema Prähabilitation und Präkonditionierung spielt bei ERAS-Konzepten eine große Rolle.", correct: true, explanation: "Richtig. Verschiedene Studien zeigen eine Reduktion der postoperativen Morbidität und der Krankenhausverweildauer bei präoperativem Atemtraining, Muskelaufbau/Ausdauertraining, Gewichtsnormalisierung und Nikotinabstinenz von vier Wochen prä- und postoperativ." },
    { letter: "e", text: "Ein zentrales Problem in der Umsetzung von ERAS-Programmen ist der hohe Organisationsgrad unter Einbeziehung vieler Schnittstellen.", correct: true, explanation: "Richtig. Die Implementierung und Umsetzung von ERAS-Konzepten erfordern einen hohen Organisationsgrad unter Einbeziehung vieler Schnittstellen. Wichtig sind: Einsatzbereitschaft und Flexibilität für Änderungen des Personals und ein ausreichender Personalschlüssel des betreuenden Teams. Weitere Faktoren sind soziale Aspekte (soziale Anbindung, Akzeptanz kürzerer Liegedauer, höhere Eigenverantwortung) und gesundheitsökonomische Aspekte/G-DRG System." },
  ]},
  { id: 2, chapter: 1, number: 2, text: "Welche Aussagen zur allgemeinen präoperativen Vorbereitung vor chirurgischen Eingriffen in ERAS-Konzepten treffen zu?", statements: [
    { letter: "a", text: "Klare Flüssigkeiten dürfen bis zu vier Stunden präoperativ verabreicht werden, um präoperatives Fasten zu reduzieren.", correct: false, explanation: "Falsch. In europäischen und amerikanischen anästhesiologischen Gesellschaften gibt es eine Änderung des Dogmas: Bei elektiven Eingriffen (und Patienten ohne Magenentleerungsstörungen) ist die Einnahme klarer Flüssigkeiten bis zu zwei Stunden präoperativ möglich, Essen bis zu sechs Stunden präoperativ. In ERAS-Programmen erfolgt außerdem die Gabe eines 400 ml-Kohlenhydrat-Drinks (Maltodextrin) ca. zwei Stunden präoperativ (Reduktion postoperativer Unruhe, Liegedauer und Morbidität)." },
    { letter: "b", text: "Präoperativ erfolgt die Einnahme eines sedativ-wirkenden Medikaments.", correct: false, explanation: "Falsch. Die Einnahme sedativer Prämedikationspräparate innerhalb 12 Stunden präoperativ führt zu einer prolongierten postoperativen Erholungsphase und Verlängerung von psychomotorischen Funktionen innerhalb der ersten vier Stunden postoperativ. Eine Einnahme wird daher nicht mehr empfohlen. Sehr aufgeregten Patienten kann präoperativ ein kurzwirksames Benzodiazepin (z. B. Midazolam) verabreicht werden." },
    { letter: "c", text: "Nur ausgewählte Patienten erhalten eine präoperative PONV-Prophylaxe.", correct: false, explanation: "Falsch. Studien konnten zeigen, dass alle Patienten von einer präoperativen PONV-Prophylaxe profitieren. In ERAS-Protokollen wird die orale bzw. i.v. Gabe von 8 mg Dexamethason vor dem Transport in den OP empfohlen. Dies führt postoperativ zu einer Verringerung von Übelkeit, Erbrechen und Schmerzen sowie zu einer Verbesserung der Lungenfunktion." },
    { letter: "d", text: "Eine präoperative Darmvorbereitung vor kolorektalen Eingriffen wird nicht mehr empfohlen.", correct: false, explanation: "Falsch. Es handelt sich hier um ein kontrovers diskutiertes Thema. Retrospektive Kohortenstudien und Metaanalysen zeigten eine signifikante Reduktion von Wundinfektionen und teilweise geringere Anastomoseninsuffizienzraten bei Patienten mit präoperativer Darmvorbereitung in Kombination mit Antibiose vor elektiver kolorektaler Chirurgie. Die Leitlinienkommissionen der WHO 2016 und der Krinko 2016 empfehlen aktuell dieses Vorgehen." },
    { letter: "e", text: "Eine präoperative Rasur des Operationsgebietes wird nicht mehr empfohlen.", correct: true, explanation: "Richtig. 2016 veröffentlichte das Lancet Journal die WHO-Empfehlungen zur Vermeidung chirurgischer Infektionen. Hierbei wurde von einer präoperativen Rasur abgeraten, da sie zu Mikroläsionen der Haut und einer höheren lokalen Wundinfektionsrate führt. Falls gewünscht, können Haare mit einer Haarschneidemaschine entfernt bzw. gekürzt werden. Eine ähnliche Empfehlung existiert von der Kommission für Krankenhaushygiene und Infektionsprävention des Robert Koch-Instituts aus dem Jahre 2007." },
  ]},
  { id: 3, chapter: 1, number: 3, text: "Welche Aussagen zur allgemeinen intraoperativen Vorgehensweise bei chirurgischen Eingriffen im Rahmen von ERAS-Protokollen treffen zu?", statements: [
    { letter: "a", text: "Laparoskopisch durchgeführte onkologische Eingriffe haben ein besseres onkologisches Outcome.", correct: false, explanation: "Falsch. Bei laparoskopischem Vorgehen zeigen sich bei fast allen Operationen eine verkürzte Krankenhausverweildauer, weniger postoperative Schmerzen und niedrigere perioperative Komplikationsraten bei vergleichbarem onkologischem Ergebnis im Vergleich zur offen-konventionellen Chirurgie." },
    { letter: "b", text: "Für die Verwendung von Drainagen besteht eine großzügige Indikation.", correct: false, explanation: "Falsch. In ERAS-Programmen wird die restriktive Anwendung von Drainagen mit strenger Indikationsprüfung empfohlen. Verschiedene Studien zeigen, dass die Anwendung von intraabdominellen Drainagen in der kolorektalen Chirurgie und nach Appendektomie keinen Vorteil hat. Bei Leberresektionen werden bei Drainageneinlage vermehrt infizierte Flüssigkeitskollektionen beschrieben." },
    { letter: "c", text: "Intraoperative intravenöse Flüssigkeitsgabe wird nur restriktiv empfohlen.", correct: true, explanation: "Richtig. Intraoperative intravenöse Flüssigkeitsgabe wird nur restriktiv empfohlen und kann zu Darmwandödemen, Anastomoseninsuffizienzen, postoperativer Darmatonie und erhöhtem interstitiellen Wassereinlagerungen führen. Bei normovolämen Patienten besteht die Empfehlung zu einer restriktiven intraoperativen Flüssigkeitsgabe und dem Gebrauch von Vasopressoren zur Blutdruckstabilisierung." },
    { letter: "d", text: "Die perioperative Antibiotikagabe dient der Vermeidung von Wundinfekten.", correct: true, explanation: "Richtig. Die Wundinfektionsrate nimmt jede Stunde nach Operationsbeginn signifikant zu. Die erste Dosis des Antibiotikums sollte je nach Anflutungszeit rechtzeitig vor der Operation gegeben werden (normalerweise 30–60 Minuten präoperativ). Bei starkem Blutverlust (>1 Liter) oder länger dauernden Operationen muss in Abhängigkeit von der Halbwertzeit des applizierten Antibiotikums eine Folgedosis verabreicht werden.\n\nHalbwertszeiten: Cefuroxim 70 min, Metronidazol 420 min, Piperacillin-Tazobactam 45 min, Ceftriaxon 420–480 min, Meropenem 60 min, Ampicillin-Sulbactam 60 min." },
    { letter: "e", text: "Bei großen elektiven chirurgischen Eingriffen sollte präoperativ eine Anämie ausgeschlossen werden.", correct: true, explanation: "Richtig. Die aktuelle AWMF-Leitlinie empfiehlt die Diagnostik und Therapie der präoperativen Anämie. Die häufigste Ursache ist ein Eisenmangel. Eine Therapie mit Eisen ohne vorherige Ursachenklärung ist jedoch nicht indiziert. Eine ursachengerechte präoperative Therapie mit Erythropoietin und oralem/intravenösem Eisen wird empfohlen. Für eine präoperative Transfusion von Erythrozytenkonzentraten existiert keine Evidenz hinsichtlich der Mortalität." },
  ]},
  { id: 4, chapter: 1, number: 4, text: "Welche Aussage zum postoperativen Procedere im Rahmen von ERAS-Programmen trifft zu?", statements: [
    { letter: "a", text: "Postoperatives Kaugummi kauen ist fester Bestandteil von ERAS-Programmen.", correct: true, explanation: "Richtig. Postoperatives Kaugummi kauen und Laxanzieneinnahme verringern postoperative Darmatonien." },
    { letter: "b", text: "Der postoperative Kostaufbau soll vorsichtig erfolgen, da es sonst zum Ileus kommen kann.", correct: false, explanation: "Falsch. Die S3-Leitlinie 'Klinische Ernährung in der Chirurgie' empfiehlt auch nach kolorektalen Eingriffen die orale Nahrungszufuhr einschließlich klarer Flüssigkeiten innerhalb einiger Stunden postoperativ. Ein zügiger postoperativer Kostaufbau führt zu einer Vermeidung von Sarkopenie, weniger Insulinresistenz, einer verringerten Morbidität und Mortalität und wird daher empfohlen. Auf intravenöse Infusionen sollte möglichst zeitig postoperativ verzichtet werden." },
    { letter: "c", text: "Eine frühzeitige Mobilisation führt zu einer Verringerung der Mortalität.", correct: false, explanation: "Falsch. Die Mobilisation bereits am OP-Tag ist ein zentrales Element von ERAS-Programmen und führt zu einer Verringerung der Liegedauer, des Pneumonie- und Thromboserisikos. Eine Verringerung der Mortalität konnte nicht nachgewiesen werden." },
    { letter: "d", text: "Bei Einhaltung von ERAS-Programmen kommt es zu einer Verbesserung der 5-Jahres-Überlebensrate nach kolorektalen onkologischen Eingriffen.", correct: true, explanation: "Richtig. Verschiedene schwedische Studien beschreiben bei einem hohen Umsetzungsgrad von >70 % in ERAS-Programmen eine Verbesserung der 5-Jahresüberlebensrate nach kolorektaler onkologischer Chirurgie." },
    { letter: "e", text: "Nicht-blutende, kardiologisch und respiratorisch stabile intensivmedizinische Patienten mit einer Hämoglobinkonzentration von >7 g/dL sollten in der Regel keine Bluttransfusionen erhalten.", correct: true, explanation: "Richtig. Aufgrund des Risikos für Transfusionsreaktionen wird bei nicht blutenden Patienten die Indikation für Transfusionen restriktiv gestellt. Ausnahmen sind akut blutende Patienten. Hier wird z.B. die Transfusion bei Hb <6 g/dL unabhängig der Klinik und bei 6–8 g/dL bei Risikofaktoren wie KHK oder Z.n. zerebraler Ischämie empfohlen. Bei chronischer Anämie: Transfusion bei Hb 7–8 g/dL ohne Symptome und bei <8 g/dL mit Symptomen indiziert." },
  ]},
  { id: 5, chapter: 1, number: 5, text: "Welche Aussagen zur perioperativen Ernährung treffen zu?", statements: [
    { letter: "a", text: "Onkologische Patienten sollen vor großen viszeralchirurgischen Eingriffen auf das Vorliegen eines hohen metabolischen Risikos gescreent werden.", correct: true, explanation: "Richtig. Insbesondere onkologische Patienten und Patienten mit hohem Risiko sollten bezüglich Malnutrition gescreent werden. Mögliche Scores:\n• Nutrition Risk in the Critically Ill (Nutric) Score — für kritisch-kranke Patienten\n• Nutrition Risk Screening 2002 (NRS-2002) — Risikovorhersage für stationäre Patienten\n• Mini Nutritional Assessment (MNA) — für geriatrische Patienten." },
    { letter: "b", text: "Eine parenterale Ernährung wird empfohlen, wenn die enterale Ernährung nicht möglich ist.", correct: true, explanation: "Richtig. Laut S3-Leitlinie wird eine künstliche Ernährung empfohlen, wenn:\n• >7 Tage postoperativ eine orale Kostzufuhr unmöglich ist\n• der Patient postoperativ >10 Tage nicht mehr als 60–75 % der empfohlenen Energiemenge oral aufnehmen kann\n• der Energie- und Substratbedarf nicht durch orale/enterale Ernährung allein gedeckt wird (<60 %)\nBei 7–10 Tagen: ZVK-Anlage empfohlen. Eine totale parenterale Ernährung sollte begonnen werden, wenn enterale Ernährung nicht durchführbar/kontraindiziert ist (z.B. Kurzdarm <60 cm, Peritonealkarzinose)." },
    { letter: "c", text: "Ein hohes metabolisches Risiko kann auch bei adipösen Patienten vorliegen.", correct: true, explanation: "Richtig. Ein hohes metabolisches Risiko kann auch bei adipösen Patienten vorliegen. Ein Screening auf Malnutrition ist deshalb auch bei adipösen Patienten wichtig." },
    { letter: "d", text: "Die parenterale Ernährung kann in der kolorektalen Chirurgie frühestens ab dem ersten postoperativen Tag begonnen werden.", correct: false, explanation: "Falsch. Der orale Kostaufbau kann bei den meisten Patienten postoperativ noch am Operationstag begonnen werden. Im Vergleich zum verzögerten Kostaufbau geht der frühe Kostaufbau mit einer Senkung der Morbidität und einer Verkürzung der Krankenhausverweildauer einher, ohne dabei die Letalität, die Anastomosenheilung oder das Wiedereintreten der Darmfunktion negativ zu beeinflussen." },
    { letter: "e", text: "Durch die Einnahme einer immunomodulatorischen Trinknahrung kann die postoperative Morbidität reduziert werden.", correct: true, explanation: "Richtig. In Studien konnte gezeigt werden, dass die Einnahme einer mit immunomodulatorischen Substraten angereicherten Trinknahrung (Arginin, n3-Fettsäuren, Ribonukleotide) zu einer Reduktion der Morbidität und der Krankenhausverweildauer führt. Insbesondere mangelernährte Patienten profitieren von dieser Therapie." },
  ]},
  { id: 6, chapter: 1, number: 6, text: "Welche Aussagen zur Ernährung onkologischer Patienten sind korrekt?", statements: [
    { letter: "a", text: "Der Kalorienbedarf beträgt mindestens 30 kcal pro Kilogramm Körpergewicht (kg/KG).", correct: true, explanation: "Richtig. Der Kalorienbedarf beträgt mindestens 30 kcal pro Kilogramm Körpergewicht (1–1,5 g Eiweiß, 3 g Kohlenhydrate und 1–1,5 g Fett pro kg/KG)." },
    { letter: "b", text: "Mangelernährte Patienten mit einer Hypoalbuminämie zeigten im Vergleich mehr Zytostatika-assoziierte Nebenwirkungen.", correct: true, explanation: "Richtig. Mangelernährte Patienten mit einer Hypoalbuminämie zeigen im Vergleich mehr Zytostatika-assoziierte Nebenwirkungen mit Anämie, Fatigue und Appetitverlust als nicht-mangelernährte Patienten mit normalem Albuminspiegel." },
    { letter: "c", text: "Leitsymptom der krankheitsassoziierten Mangelernährung ist der signifikante unbeabsichtigte Gewichtsverlust.", correct: true, explanation: "Richtig. Bis zu 80 % der Patienten mit fortgeschrittener maligner Erkrankung leiden an Tumorkachexie und deren Auswirkungen (Müdigkeit, Leistungseinschränkung, psychosoziale Belastung)." },
    { letter: "d", text: "Auch in einer palliativen Situation kann die Ernährung über eine PEG-, Jejunalsonde oder einen zentralen Zugang erfolgen.", correct: true, explanation: "Richtig. Eine parenterale Ernährung kann auch zu einem fortgeschrittenen Zeitpunkt der Erkrankung erfolgen. Leitlinien-Indikationen: unzureichende Ernährung über den Darm, voraussichtliche Überlebenszeit von mehr als vier Wochen, Stabilisierung des Allgemeinzustandes oder der Lebensqualität oder Patientenwunsch." },
    { letter: "e", text: "Flüssigkeit kann in der Palliativsituation auch subkutan zugeführt werden.", correct: true, explanation: "Richtig. Ob eine subkutane oder intravenöse Flüssigkeitszufuhr in einer hoch-palliativen Situation gewünscht ist, sollte mit dem Patienten und den Angehörigen besprochen und abgewogen werden. Studien zeigen, dass Patienten bei guter Mundpflege auch in palliativen Situationen ohne externe Flüssigkeitszufuhr nahezu kein Durstgefühl verspüren." },
  ]},
  { id: 7, chapter: 1, number: 7, text: "Welche Aussagen zu Vitamin-K-Antagonisten (Cumarinderivaten) sind richtig?", statements: [
    { letter: "a", text: "Die zugehörigen Wirkstoffe sind Phenprocoumon und Warfarin.", correct: true, explanation: "Richtig. Die zugehörigen Wirkstoffe sind Phenprocoumon (Marcumar®, Falithrom®) und Warfarin (Coumadin®). Es handelt sich um unselektive kompetitive Antagonisten von Vitamin K. Die Wirkung erfolgt über die Synthesehemmung der Gerinnungsfaktoren II, VII, IX und X." },
    { letter: "b", text: "Vitamin-K-Antagonisten stellen das Medikament erster Wahl nach mechanischem Herzklappenersatz und zur Thrombembolieprophylaxe bei Vorhofflimmern dar.", correct: true, explanation: "Richtig. Vitamin-K-Antagonisten stellen das Medikament erster Wahl bei mechanischem Herzklappenersatz und Thrombembolieprophylaxe bei Vorhofflimmern dar. Nach initialer Heparinisierung können Vitamin-K-Antagonisten auch nach Lungenarterienembolie und tiefer Beinvenenthrombose eingesetzt werden.\n\nINR-Zielbereiche:\n• Phenprocoumon: 2,0–3,5 nach mech. Klappenersatz, 2–3 bei anderen Indikationen\n• Warfarin: 2,0–3,5 bei mech. Klappenersatz, 2–4 bei anderen Indikationen" },
    { letter: "c", text: "Das Monitoring erfolgt über die INR.", correct: true, explanation: "Richtig. Vitamin-K-Antagonisten können nach INR-Messung je nach Ziel-INR durch den Patienten eingenommen und angepasst werden. Bei stabil eingestellten Patienten erfolgt die Kontrolle in regelmäßigen Zeitabständen (mind. alle 3–4 Wochen)." },
    { letter: "d", text: "Die Eindosierung erfolgt meist standardisiert.", correct: true, explanation: "Richtig. Therapievorschlag Warfarin: Aufsättigung initial ½–1 Tablette als Einzeldosis (2,5–5 mg). Weiterbehandlung: ½–2 Tabletten (2,5–10 mg) je nach Ziel-INR. Bei INR >2 Absetzen des Heparins. Ab Tag 3 regelmäßige INR-Bestimmung. Beim Wiedereinschleichen postoperativ: Schema der Eindosierung, ab dem 3. Tag INR-Bestimmung und Dosisanpassung bis zum Erreichen der Ziel-INR. Bis zum Erreichen der Ziel-INR wird Heparin verabreicht." },
    { letter: "e", text: "Ein Absetzen von Vitamin-K-Antagonisten vor operativen Eingriffen ist nicht notwendig.", correct: false, explanation: "Falsch. Falls wegen eines Eingriffs eine Gerinnungsnormalisierung erforderlich ist, sollten Vitamin-K-Antagonisten abgesetzt und mit NMH gebridgt werden. Bei geringem Blutungsrisiko kann auch eine moderate Absenkung der INR auf 1,8–2,0 ausreichend sein. Bei Niereninsuffizienz sollte NMH durch UFH ersetzt werden.\n\nPerioperativer Ablauf:\n• Präoperativ: Absetzen ca. 7 Tage bei Phenprocoumon, ca. 5 Tage bei Warfarin\n• Perioperativ: Gabe von Heparin in therapeutischer Dosis überlappend\n• Postoperativ: Wiederbeginn der Vitamin-K-Antagonisten (theoretisch innerhalb 24 h möglich) und NMH in therapeutischer Dosis, Absetzen des NMH bei INR im therapeutischen Bereich." },
  ]},
  { id: 8, chapter: 1, number: 8, text: "Welche Aussage zu direkten oralen Antikoagulanzien (DOAK) sind richtig?", statements: [
    { letter: "a", text: "Bei DOAK werden zwei Wirkungsmechanismen unterschieden.", correct: true, explanation: "Richtig. Es wird zwischen den oralen Xa-Inhibitoren und den oralen Thrombin-Antagonisten unterschieden:\n• Orale Xa-Inhibitoren: Apixaban (Eliquis®), Edoxaban (Lixiana®), Rivaroxaban (Xarelto®)\n• Orale Thrombin-Antagonisten: Dabigatran (Pradaxa®)" },
    { letter: "b", text: "Die meisten DOAK haben kein Antidot.", correct: false, explanation: "Falsch. Für die meisten DOAK existiert ein Antidot. Lediglich Edoxaban (Lixiana®) besitzt kein Antidot.\n• Rivaroxaban und Apixaban: Andexanet alfa\n• Dabigatran: Idarucizumab\n\nIndikationen: Primär-/Sekundärprophylaxe von TVT, LAE, VHF (nicht-valvulär). In Deutschland nicht zugelassen bei mechanischen Herzklappen." },
    { letter: "c", text: "Die Wirkung von DOAK kann wie bei Cumarinderivaten anhand des Quick-/INR-Wertes gemessen werden.", correct: false, explanation: "Falsch. Ein Monitoring der DOAK ist nicht möglich. Ebenfalls sind Interaktionen mit anderen Medikamenten möglich und bei der Gabe zu beachten." },
    { letter: "d", text: "Vor chirurgischen Eingriffen müssen DOAK abgesetzt und mit NMH gebridgt werden.", correct: false, explanation: "Falsch. DOAK zeichnen sich durch schnelles An- und Abfluten aus. Es gelten folgende Empfehlungen:\n• Eingriffe mit hohem Blutungsrisiko: 48 Stunden präoperativ absetzen\n• Eingriffe mit niedrigem Blutungsrisiko: 24 Stunden präoperativ absetzen\n• Bei Niereninsuffizienz mit Einschränkung der GFR: Verlängerung des Absetzintervalls auf bis zu 96 Stunden präoperativ (insbesondere bei Dabigatran)" },
    { letter: "e", text: "Die Einnahme der DOAK sollte frühestens 7 Tage nach dem chirurgischen Eingriff wieder begonnen werden.", correct: false, explanation: "Falsch. Empfehlungen für die postoperative Einnahme von DOAK:\n• Niedriges Blutungsrisiko: Wiederbeginn in üblicher Dosis 12–24 Stunden postoperativ\n• Hohes Blutungsrisiko: Wiederbeginn individuell nach Verlauf und interdisziplinärer Entscheidung 24–48 Stunden postoperativ\n• Bei längerer notwendiger DOAK-Pause: Überbrückung mit NMH in therapeutischer Dosis" },
  ]},
  { id: 9, chapter: 1, number: 9, text: "Welche Aussagen zum perioperativen Management der Einnahme von Aspirin (Acetylsalicylsäure, ASS) sind richtig?", statements: [
    { letter: "a", text: "ASS wirkt als Thrombozytenaggregationshemmer.", correct: true, explanation: "Richtig. Acetylsalicylsäure (ASS) hemmt bereits bei einer Dosis von 50–100 mg irreversibel die Aktivität der Cyclooxygenasen I und II in den Thrombozyten und somit die Thrombozytenaggregation. In höherer Dosis (500–1000 mg) wirkt ASS antiphlogistisch, analgetisch und antipyretisch." },
    { letter: "b", text: "Vor chirurgischen Eingriffen sollte ASS pausiert werden.", correct: false, explanation: "Falsch. ASS muss perioperativ nicht pausiert werden. Bei Patienten mit einer KHK besteht ein 90-fach erhöhtes Risiko für das Auftreten eines kardialen Events, wenn die ASS-Therapie perioperativ unterbrochen wird. Von Ausnahmen abgesehen, wird empfohlen die ASS-Einnahme bei elektiven operativen Eingriffen fortzuführen." },
    { letter: "c", text: "Nach einem Eingriff ist der Wiederbeginn der ASS-Einnahme dem Blutungsrisiko anzupassen.", correct: true, explanation: "Richtig. Falls ASS perioperativ pausiert wurde, kann ASS bei adäquater Hämostase maximal 24 Stunden nach erfolgter Operation wieder eingenommen werden." },
    { letter: "d", text: "Die Dauer der dualen Plättchenaggregation beträgt zwölf Monate nach chronischem Koronarsyndrom mit Stentimplantation.", correct: false, explanation: "Falsch. Normalerweise wird innerhalb der ersten sechs Monate nach Stentimplantation bei chronischem Koronarsyndrom und zwölf Monate nach Stentimplantation nach akutem Koronarsyndrom zusätzlich die duale Plättchenaggregation mit ADP-Rezeptorinhibitoren bzw. P2Y12-Inhibitoren (Clopidogrel, Ticagrelor, Prasugrel) empfohlen." },
    { letter: "e", text: "Die Dauer der dualen Plättchenaggregation richtet sich nicht mehr nach der Art des Koronarstents.", correct: true, explanation: "Richtig. Die Dauer der dualen Plättchenaggregation richtet sich nach der Indikation und dem individuellen Blutungsrisiko des Patienten. Früher wurde bei Patienten mit einem Drug-Eluting-Stent (DES) vs. einem Bare-Metal-Stent (BMS) eine längere duale Plättchenaggregation empfohlen. Bei neuen DES treten keine erhöhten Thromboseraten auf." },
  ]},
  { id: 10, chapter: 1, number: 10, text: "Welche Aussagen zu ADP-Rezeptorinhibitoren bzw. P2Y12-Inhibitoren sind korrekt?", statements: [
    { letter: "a", text: "Clopidogrel, Prasugrel und Ticagrelor werden meist in dualer Kombination mit ASS angewandt.", correct: true, explanation: "Richtig. Indikationen für eine duale Thrombozytenaggregationshemmung sind Rezidiv- und Sekundärprophylaxe bei Myokardinfarkt nach Stenting für eine Dauer von sechs bis zwölf Monaten." },
    { letter: "b", text: "ADP-Rezeptorinhibitoren sollten 10 Tage präoperativ abgesetzt werden.", correct: false, explanation: "Falsch. Normalerweise ist ein Absetzen von ADP-Rezeptorinhibitoren 5–7 Tage präoperativ ausreichend." },
    { letter: "c", text: "ADP-Rezeptorinhibitoren können postoperativ wieder begonnen werden.", correct: true, explanation: "Richtig. Bei adäquater Hämostase kann ein ADP-Rezeptorinhibitor 24 Stunden nach erfolgter Operation (je nach Maßgabe des verantwortlichen Chirurgen) wieder eingenommen werden." },
    { letter: "d", text: "ADP-Rezeptorinhibitoren werden nicht zur singulären Thrombozytenaggregation empfohlen.", correct: false, explanation: "Falsch. ADP-Rezeptorinhibitoren stellen eine Alternative zur singulären Thrombozytenaggregationshemmung bei Patienten mit ASS-Unverträglichkeit dar." },
    { letter: "e", text: "Bei Clopidogrel muss eine Dosisanpassung bei Niereninsuffizienz erfolgen.", correct: true, explanation: "Richtig. Clopidogrel und Prasugrel müssen an die Nierenfunktion angepasst werden. Bei Ticagrelor ist keine Anpassung bei Niereninsuffizienz notwendig." },
  ]},
  { id: 11, chapter: 1, number: 11, text: "Welche Aussagen zur Thrombembolieprophylaxe mit unfraktioniertem und niedermolekularem Heparin (UFH und NMH) sind korrekt?", statements: [
    { letter: "a", text: "In der Schwangerschaft darf NMH nicht eingesetzt werden.", correct: false, explanation: "Falsch. UFH und NMH können während der Schwangerschaft eingesetzt werden, da sie weder plazenta- noch muttermilchgängig sind." },
    { letter: "b", text: "Bei NMH muss im Vergleich zu UFH auf Anzeichen einer Heparin-induzierten Thrombopenie (HIT) geachtet werden.", correct: false, explanation: "Falsch. UFH weist ein 10-mal höheres Risiko für eine HIT I als NMH auf. Ebenfalls treten unter UFH häufiger Blutungsereignisse und Nebenwirkungen auf." },
    { letter: "c", text: "Patienten nach kleineren chirurgischen Eingriffen und niedrigem Thrombembolierisiko benötigen keine Thrombembolieprophylaxe.", correct: true, explanation: "Richtig. Eine Low-Dose-Thrombembolieprophylaxe wird bei perioperativer Bettlägerigkeit sowie Immobilität empfohlen. Normalerweise wird diese einmal täglich mit NMH, angepasst an Risiko, Nierenfunktion und Körpergewicht, durchgeführt. Bei Niereninsuffizienz sollte UFH verabreicht werden." },
    { letter: "d", text: "Die Gabe von NMH oder UFH verhindert das Auftreten venöser Thrombembolien.", correct: true, explanation: "Richtig. Studien haben gezeigt, dass die prophylaktische Gabe von NMH oder UFH bei Immobilität die Inzidenz venöser Thrombembolien deutlich senkt. Nachweise zur Verhinderung arterieller Thrombembolien gibt es nicht." },
    { letter: "e", text: "Um die therapeutische Wirkung von NMH zu überprüfen, sollte präoperativ mindestens einmal eine Kontrolle der INR erfolgen.", correct: false, explanation: "Falsch. Die Therapiekontrolle von NMH kann durch Aktivitätskontrolle des Faktor Xa ca. vier Stunden nach Applikation erfolgen. Eine präoperative Therapiekontrolle ist standardgemäß nicht erforderlich. Bei UFH werden in therapeutischer Dosis PTT- und Thrombozytenkontrollen empfohlen." },
  ]},
  { id: 12, chapter: 1, number: 12, text: "Welche Aussage zur perioperativen Immunsuppression ist korrekt?", statements: [
    { letter: "a", text: "Nicht-steroidale Antirheumatika (NSAR) und Glukokortikoide stellen eine effektive analgetische Kombinationstherapie dar.", correct: false, explanation: "Falsch. Für NSAR in Kombination mit einem Glukokortikoid (beispielsweise Prednisolon) besteht ein bis zu 15-fach erhöhtes Risiko für gastrointestinale Blutungen. Daher wird eine duale Therapie nicht empfohlen." },
    { letter: "b", text: "Die Einnahme von Azathioprin hat einen negativen Einfluss auf die Komplikationsraten nach kolorektalen Eingriffen.", correct: false, explanation: "Falsch. Laut Empfehlungen zum perioperativen Vorgehen bei immunsuppressiver Medikation der Gesellschaft für Rheumatologie sollten Ciclosporin A, Mycophenolat-Mofetil und Azathioprin 1–2 Tage vor einer elektiven Operation pausiert werden. Hauptnebenwirkungen von Ciclosporin A: Nephrotoxizität und opportunistische Infektionen. Daher postoperativ auf Infektionszeichen und Niereninsuffizienz achten. Azathioprin kann zur irreversiblen Neutropenie führen." },
    { letter: "c", text: "Prednisolon hat einen negativen Einfluss auf die Komplikationsraten nach kolorektalen Eingriffen.", correct: true, explanation: "Richtig. Glukokortikoide hemmen die Proliferation und Funktion von immunologisch aktiven Zellen, Fibroblasten und Endothelzellen. Dies kann im Rahmen eines chirurgischen Eingriffs die Wund- und Anastomosenheilung verzögern. Bei elektiven Eingriffen sollte, wenn medizinisch vertretbar, eine präoperative Dosisreduktion erfolgen. Bei laufender Glukokortikoid-Therapie und akuter OP-Indikation sollte die Dauerdosis perioperativ beibehalten werden. Eine postoperative Dosiserhöhung ist zu vermeiden." },
    { letter: "d", text: "Methotrexat kann perioperativ weiter verabreicht werden.", correct: true, explanation: "Richtig. Methotrexat moduliert den Purinmetabolismus und kann perioperativ fortgeführt werden. Bei einer hohen Dosis (25–30 mg/Woche) ist eine vorübergehende Dosisreduktion zu erwägen." },
    { letter: "e", text: "TNF-Alpha-Inhibitoren sollten perioperativ pausiert werden.", correct: true, explanation: "Richtig. Die Gabe von TNF-alfa-Inhibitoren ist mit einem deutlich vermehrten Infektionsrisiko verbunden. Schwere Haut- und Weichteilinfektionen kommen bis zu 4-fach häufiger vor; auch tiefe Beinvenenthrombosen treten vermehrt auf. Es wird empfohlen, TNF-alpha-Inhibitoren mindestens zwei Halbwertszeiten vor dem chirurgischen Eingriff oder bestehendem Infektionsrisiko zu pausieren und fortzufahren, sobald der Patient klinisch stabil ist." },
  ]},
  { id: 13, chapter: 1, number: 13, text: "Welche Aussagen zu multiresistenten Erregern (MRE) treffen zu?", statements: [
    { letter: "a", text: "Risikofaktoren für die Besiedlung mit multiresistenten Erregern umfassen Patienten- und Behandlungsfaktoren.", correct: true, explanation: "Richtig. Patientenbezogene Risikofaktoren: Wohnsitz im Pflegeheim, Lungenerkrankungen, Malnutrition, offene Wunden.\n\nBehandlungsbezogene Risikofaktoren: Intensivmedizinische Betreuung und invasive Beatmung (>4 Tage) oder Tracheostoma, Krankenhausverweildauer (>4 Tage), Dialyse, antibiotische Therapie in den letzten 90 Tagen." },
    { letter: "b", text: "MRE sind selten an nosokomialen Infektionen beteiligt.", correct: false, explanation: "Falsch. MRE sind häufig an nosokomialen Infektionen beteiligt." },
    { letter: "c", text: "Im Falle einer nosokomialen Infektion mit MRE gelten die üblichen Behandlungsempfehlungen bei einer antibiotischen Therapie.", correct: false, explanation: "Falsch. Besteht die Indikation zur antibiotischen Therapie, so wird ein früher Beginn in Form einer intravenösen Gabe in einer Dosis im höheren Empfehlungsbereich empfohlen. Antibiotika der ersten Wahl:\n• MRSA: Vancomycin/Linezolid\n• VRE: Linezolid\n• 3-MRGN: Carbapeneme\n• 4-MRGN: Tigecyclin/Colistin" },
    { letter: "d", text: "Isolationsmaßnahmen bei MRSA-Infektionen müssen mittlerweile nicht mehr eingehalten werden.", correct: false, explanation: "Falsch. MRSA-Patienten müssen isoliert und im Einzelzimmer untergebracht werden. Patienten mit gleichen MRSA-Stämmen können auch kohortenisoliert werden. Für medizinisches Personal/Besuch gilt: Mund- und Nasenschutz, Schutzkittel, Handschuhe, Kopfhaube. Patienten mit MRSA sollten möglichst zeitnah auf der Station einer Dekolonisierung unterzogen werden." },
    { letter: "e", text: "3-MRGN Patienten unterliegen Isolierungsmaßnahmen auf peripheren Stationen.", correct: false, explanation: "Falsch. 3-MRGN Patienten müssen auf peripheren Stationen nur durch Basishygienemaßnahmen und Kittelpflege am Patienten betreut werden. Eine Einzelisolation ist nicht notwendig, wird jedoch häufig durchgeführt. Im OP oder intensivmedizinischen Stationen sollten 3-MRGN Patienten weiterhin isoliert werden. Patienten mit 4-MRGN müssen in allen Bereichen isoliert werden. Eine Dekolonisierung ist bei 3-/4-MRGN Patienten nicht möglich." },
  ]},
  { id: 14, chapter: 1, number: 14, text: "Welche Aussagen zur Hygiene im Operationssaal sind zutreffend?", statements: [
    { letter: "a", text: "90 % der exogen übertragenen nosokomialen Infektionen erfolgt durch die Hände.", correct: true, explanation: "Richtig. Etwa 90 % der exogenen Infektionen erfolgen durch die Hände. Dies unterstreicht den Stellenwert einer adäquaten Händedesinfektion." },
    { letter: "b", text: "Beim Tragen doppelter Handschuhe während einer Operation kann eine Perforation und der Kontakt mit Hautkeimen des Operateurs ausgeschlossen werden.", correct: false, explanation: "Falsch. Auch bei der Verwendung von doppelten Handschuhen kommt es in ca. 4 % der Fälle zu Perforationen. Bei den einfachen Handschuhen sind ca. 18 % aller Handschuhe postoperativ perforiert. Das Perforationsrisiko der Handschuhe steigt mit der Operationszeit." },
    { letter: "c", text: "Der Sinn der hygienischen Händedesinfektion ist die Reduktion sowohl der transienten als auch der residenten Hautflora.", correct: false, explanation: "Falsch. Die hygienische Händedesinfektion führt zu einer Reduktion der transienten Flora. Nur bei der chirurgischen Händedesinfektion wird auch die residente, also die körpereigene physiologische Hautflora stark reduziert." },
    { letter: "d", text: "Nach einer chirurgischen Händedesinfektion kommt es nur zu einer vorübergehenden Reduktion der Keimflora der Haut.", correct: true, explanation: "Richtig. Die Wirkungsdauer einer chirurgischen Händedesinfektion beträgt etwa drei Stunden." },
    { letter: "e", text: "Laut Leitlinienempfehlung sollten die Handschuhe intraoperativ regelmäßig gewechselt werden.", correct: true, explanation: "Richtig. Aufgrund der nachgewiesenen Perforationsraten existieren Empfehlungen, die OP-Handschuhe des Operateurs, des ersten Assistenten und der OP-Schwester nach 90 Minuten und die des zweiten Assistenten nach spätestens 150 Minuten zu wechseln." },
  ]},
  { id: 15, chapter: 1, number: 15, text: "Welche Aussagen zu nicht-Opioid-Analgetika sind richtig?", statements: [
    { letter: "a", text: "Es werden drei Wirkungsgruppen der nicht-Opioid-Analgetika unterschieden.", correct: true, explanation: "Richtig. Folgende drei Gruppen werden unterschieden:\n• NSAR (unselektive COX-Hemmung, analgetisch, antiphlogistisch, antipyretisch): Ibuprofen, Naproxen, ASS, Diclofenac, Indometacin\n• Coxibe (selektive COX-2-Hemmung, analgetisch und antiphlogistisch, nicht antipyretisch): Celecoxib, Etoricoxib, Parecoxib\n• Paracetamol und Metamizol (Novalgin): antipyretisch und analgetisch. Metamizol wirkt zusätzlich spasmolytisch." },
    { letter: "b", text: "Metamizol ist ein weltweit anerkanntes Analgetikum.", correct: false, explanation: "Falsch. Metamizol ist aufgrund der Nebenwirkung der Agranulozytose in Ländern wie den USA oder Großbritannien nicht erhältlich." },
    { letter: "c", text: "Metamizol ist während der Schwangerschaft geeignet.", correct: false, explanation: "Falsch. Auf die Verwendung von Metamizol sollte während der Schwangerschaft möglichst verzichtet werden. Als Analgetikum ist Paracetamol in der gesamten Schwangerschaft vorzuziehen. NSAR, bevorzugt Ibuprofen, kann bis zur 28. Schwangerschaftswoche ebenfalls verabreicht werden. Während des Stillens sind Paracetamol und Ibuprofen als Analgetika vorzuziehen." },
    { letter: "d", text: "Selektive Cyclooxygenase (COX-2)-Inhibitoren (Coxibe) haben im Vergleich zu NSAR kaum gastrointestinale Nebenwirkungen.", correct: true, explanation: "Richtig. NSAR haben ein hohes gastrointestinales Nebenwirkungsprofil, insbesondere für Magen-/Darmulcera, und sollten bei Einnahme mit Protonenpumpeninhibitoren kombiniert werden. Für Coxibe ist das gastrointestinale Nebenwirkungsprofil gering." },
    { letter: "e", text: "Nach Pneumothoraces sollte eine Gabe von NSAR und Coxiben nicht erfolgen.", correct: true, explanation: "Richtig. Die Gabe von Antiphlogistika nach Pneumothoraces wird für mindestens drei Wochen nicht empfohlen, da sonst die Rezidivrate signifikant steigt." },
  ]},
  { id: 16, chapter: 1, number: 16, text: "Welche Aussagen zur palliativen Schmerztherapie sind richtig?", statements: [
    { letter: "a", text: "Die Behandlung von Palliativpatienten muss nicht nach WHO-Stufenschema erfolgen.", correct: false, explanation: "Falsch. Die Behandlung sollte nach WHO-Stufenschema erfolgen, bei dem die Schmerzmittel oral, in regelmäßigen zeitlichen Abständen und nach der Stufenleiter verabreicht werden:\n• Stufe 1: Nicht-Opioide (z. B. Metamizol) bei leichten Schmerzen\n• Stufe 2: Bei mittelstarken bis starken Schmerzen schwache Opioide (z. B. Tramadol) in Kombination mit Nicht-Opioiden\n• Stufe 3: Bei starken Schmerzen starke Opioide in Kombination mit Nicht-Opioiden\n\nNiedrig-potente Opioide (WHO II): Tramadol, Tilidin, Dihydrocodein.\nHoch-potente Opioide (WHO III): Morphin, Oxycodon, Levomethadon, Fentanyl, Piritramid, Pethidin, Buprenorphin." },
    { letter: "b", text: "Die Schmerztherapie jedes Palliativpatienten erfordert eine gründliche Erfassung des zugrundeliegenden Schmerztyps um differenzierte Therapiepläne erstellen zu können.", correct: true, explanation: "Richtig. Schmerzen können tumorassoziiert, tumorbedingt, therapiebedingt oder tumorunabhängig sein. Die wichtigsten Schmerztypen sind dabei der Nozizeptorschmerz und der neuropathische Schmerz." },
    { letter: "c", text: "Häufig kommt es zu einer Exazerbation der Schmerzen in der Finalphase.", correct: false, explanation: "Falsch. Insbesondere bei palliativmedizinisch behandelten Patienten kommt es häufig zu verringertem Schmerzmittelbedarf in Terminal-/Finalphase und kann eine Dosisreduktion notwendig machen." },
    { letter: "d", text: "Opioid-bedingte Nebenwirkungen sollten bereits vor deren Auftreten symptomatisch mitbehandelt werden.", correct: true, explanation: "Richtig. Gegen Obstipation sollte präventiv z. B. Movicol oder/und Natrium-Picosulfat eingenommen werden. Opioid-assoziierter Übelkeit sollte insbesondere in den ersten 7–10 Tagen z. B. mit Metoclopramid vorgebeugt werden." },
    { letter: "e", text: "Opioide sind häufig zur Behandlung neuropathischer Schmerzen ausreichend.", correct: false, explanation: "Falsch. Opioide sind häufig zur Behandlung neuropathischer Schmerzen nicht ausreichend und sollten mit einem Co-Medikament kombiniert werden. Hierfür kommen Antiepileptika (z. B. Carbamazepin, Gabapentin, Pregabalin) oder Antidepressiva (z. B. Amitryptilin) in Frage.\n\nDie transdermale Applikation (Fentanylpflaster) bietet eine Möglichkeit der kontinuierlichen Analgesie nach WHO Stufe III bei starken, chronischen Schmerzen oder Tumorschmerzen. Nach 48 Stunden kann ein Wirkungsverlust auftreten." },
  ]},
  { id: 17, chapter: 1, number: 17, text: "Welche Aussagen zur Vorsorgevollmacht und Patientenverfügung treffen zu?", statements: [
    { letter: "a", text: "Der aktuelle Wille eines einwilligungsfähigen Patienten hat Vorrang, auch wenn eine Patientenverfügung oder Vorsorgevollmacht vorliegt.", correct: true, explanation: "Richtig. Bei Intensivpatienten sollte daher frühzeitig das Therapieziel, die medizinische Indikation sowie der Patientenwille evaluiert werden. Liegt keine Patientenverfügung vor oder ist sie zu ungenau, sollten die mutmaßlichen Behandlungswünsche des Patienten festgestellt werden. Üblicherweise erfolgt dies anhand des früher erklärten Willens des Patienten oder durch Aussagen nahestehender Personen." },
    { letter: "b", text: "Eine Patientenverfügung ist nur gültig, wenn sie notariell beglaubigt ist.", correct: false, explanation: "Falsch. Die Patientenverfügung muss in schriftlicher Form vorliegen und legt fest, welche medizinischen Maßnahmen bei einem Patienten durchgeführt werden dürfen und welche nicht. Sie muss vom Patienten unterschrieben sein, jedoch ist keine juristische Legitimierung notwendig. Eine Patientenverfügung kann jederzeit formlos widerrufen werden." },
    { letter: "c", text: "Eine Vorsorgevollmacht bestimmt eine dritte Person Entscheidungen zu treffen.", correct: true, explanation: "Richtig. Eine Vorsorgevollmacht bevollmächtigt einen nahestehenden Dritten ohne eine juristische Prüfung über die medizinischen Belange eines Patienten im Falle einer Nicht-Einwilligungsfähigkeit zu entscheiden." },
    { letter: "d", text: "Eine Vorsorgevollmacht ist mit einer Betreuungsverfügung gleichzusetzen.", correct: false, explanation: "Falsch. Eine Betreuungsverfügung gilt für einen größeren medizinischen Entscheidungsrahmen mit juristischer Legitimation. Das Betreuungsgericht wird beauftragt, eine vorgeschlagene oder beauftragte Person zum Betreuer zu bestellen, wenn die betroffene Person nicht mehr selbst entscheiden kann. Das Betreuungsgericht ist verpflichtet, Vorschläge des Betroffenen zu prüfen." },
    { letter: "e", text: "Aktive und passive Sterbehilfe sind in Deutschland untersagt.", correct: false, explanation: "Falsch. Aktive Sterbehilfe ist in Deutschland untersagt. Passive Sterbehilfe ist gestattet. Passive Sterbehilfe besteht dann, wenn durch Nichtbeginn oder Abbruch einer Behandlung der Betroffene dem Lauf seiner Krankheit überlassen wird. Der tatsächliche/mutmaßliche Wille des Patienten muss dabei immer nachgewiesen werden." },
  ]},
  { id: 18, chapter: 1, number: 18, text: "Welche Voraussetzungen zur palliativen Versorgung treffen zu?", statements: [
    { letter: "a", text: "Eine spezialisierte ambulante Palliativversorgung (SAPV) kommt für Patienten mit einer fortschreitenden Erkrankung ohne Heilungsaussicht in Betracht, welche in der Häuslichkeit versorgt werden möchten.", correct: true, explanation: "Richtig. Patienten mit einer fortschreitenden, nicht heilbaren Erkrankung mit begrenzter Lebenserwartung haben Anspruch auf spezialisierte ambulante Palliativversorgung (SAPV) im Rahmen der Gesetzlichen Krankenversicherung. Dazu gehört eine Ruf-, Notfall- und Kriseninterventionsbereitschaft rund um die Uhr sowie die psychosoziale Unterstützung in enger Zusammenarbeit mit Seelsorge, Sozialarbeit und ambulanten Hospizdiensten." },
    { letter: "b", text: "Eine SAPV-Versorgung ermöglicht schwerstkranken Patienten zu Hause zu versterben.", correct: true, explanation: "Richtig. Der SAPV-Dienst dient dem Ziel, die Lebensqualität und die Selbstbestimmung von Palliativpatienten so weit wie möglich zu erhalten. So können Betroffene bis zum Tod in ihrer gewohnten Umgebung verbleiben oder an ambulante oder stationäre Hospizeinrichtungen angebunden werden." },
    { letter: "c", text: "Die Aufnahme ins Hospiz kommt nur für onkologisch Erkrankte in Frage.", correct: false, explanation: "Falsch. Eine palliativ-medizinische Versorgung in einem stationären Hospiz kommt bei Krebserkrankungen, AIDS, Erkrankungen des Nervensystems oder chronischen Nieren-, Herz-, Verdauungstrakt- oder Lungenerkrankungen in Betracht." },
    { letter: "d", text: "Eine der Grundvoraussetzungen für eine Aufnahme ist eine unaufhaltsam fortschreitende Erkrankung.", correct: true, explanation: "Richtig. Grundvoraussetzung für die Aufnahme in ein stationäres Hospiz ist eine progrediente Erkrankung ohne Aussicht auf Heilung mit einer begrenzten Lebenserwartung von Wochen oder wenigen Monaten, bei der eine Krankenhausbehandlung nicht erforderlich und eine ambulante Versorgung im Haushalt nicht ausreichend gegeben ist." },
    { letter: "e", text: "Auch Patienten, die stationär in einer Pflegeeinrichtung betreut werden, haben Anspruch auf einen Hospizplatz.", correct: false, explanation: "Falsch. Die Notwendigkeit einer stationären Hospizversorgung liegt bei Patienten, die in einer stationären Pflegeeinrichtung versorgt werden, nicht vor." },
  ]},
  { id: 19, chapter: 2, number: 1, text: "Welche Aussagen zur Epidemiologie des Ösophaguskarzinoms sind richtig?", statements: [
    { letter: "a", text: "Die Häufigkeit der Adenokarzinome des unteren Ösophagus nimmt deutlich ab.", correct: false, explanation: "Falsch. Die Inzidenz des Adenokarzinoms des distalen Ösophagus nimmt geradezu exponentiell zu. Demgegenüber ist, zumindest in den westlichen Ländern, die Inzidenz des Plattenepithelkarzinoms auf einem stabilen Niveau. Die Verteilung liegt bei 57 % Plattenepithelkarzinome, 39 % Adenokarzinome und 4 % seltene Karzinome." },
    { letter: "b", text: "Frauen und Männer sind etwa gleich häufig betroffen.", correct: false, explanation: "Falsch. Männer sind sowohl beim Plattenepithel- (7:1) als auch beim Adenokarzinom (8:1) wesentlich häufiger betroffen." },
    { letter: "c", text: "Das Ösophaguskarzinom hat eine Inzidenz von 100 Neuerkrankungen pro Jahr und 100.000 Einwohnern.", correct: false, explanation: "Falsch. Die Inzidenz liegt bei 6–8 Neuerkrankungen pro 100.000 Einwohner pro Jahr." },
    { letter: "d", text: "Patienten mit einem Adenokarzinom haben in der Regel eine langjährige Refluxanamnese.", correct: true, explanation: "Richtig. Ausgangspunkt für ein Adenokarzinom ist häufig eine Barrett-Metaplasie, welche die Folge einer langdauernden gastroösophagealen Refluxkrankheit ist." },
    { letter: "e", text: "Der Anteil von Patienten mit präoperativer Malnutrition ist bei Patienten mit Adenokarzinom besonders ausgeprägt.", correct: false, explanation: "Falsch. Die Inzidenz einer Malnutrition ist bei den Patienten mit Plattenepithelkarzinomen deutlich höher (24 % versus 2 %)." },
  ]},
  { id: 20, chapter: 2, number: 2, text: "Welche Aussagen zur Pathologie des Ösophaguskarzinoms sind richtig?", statements: [
    { letter: "a", text: "Plattenepithelkarzinome treten häufig im Bereich des distalen Ösophagus auf.", correct: false, explanation: "Falsch. Plattenepithelkarzinome treten entlang der gesamten Speiseröhre auf, während Adenokarzinome in der Regel im distalen Ösophagus entstehen." },
    { letter: "b", text: "Adenokarzinome weisen häufig ein exophytisches Wachstum auf.", correct: true, explanation: "Richtig. Während Plattenepithelkarzinome typischerweise exulzerierend wachsen und die Submukosa infiltrieren (in 15 % multizentrisch), wachsen Adenokarzinome eher blumenkohlartig in das Lumen vor." },
    { letter: "c", text: "Einen typischen Risikofaktor für das Adenokarzinom des Ösophagus stellt das Plummer-Vinson-Syndrom dar.", correct: false, explanation: "Falsch. Das Plummer-Vinson-Syndrom (trophische Störungen bei Eisenmangel) ist ein endogener Risikofaktor für das Plattenepithelkarzinom des Ösophagus." },
    { letter: "d", text: "Die Metastasierung der Ösophaguskarzinome ist weitgehend unabhängig von der Tumorlokalisation.", correct: false, explanation: "Falsch. Die Lymphknotenmetastasierung orientiert sich an der embryologischen Entwicklung des Ösophagus. Oberhalb der Trachealbifurkation gelegene Tumoren metastasieren nach kranial, während unterhalb gelegene typischerweise nach kaudal metastasieren. Auch die Fernmetastasen entstehen in Abhängigkeit der Tumorlokalisation (proximal: Lunge, distal: Leber)." },
    { letter: "e", text: "Plattenepithelkarzinome neigen zu sekundären Schleimhautabsiedlungen.", correct: true, explanation: "Richtig. Diese so genannten 'jumping metastases' sind typisch für das Plattenepithelkarzinom." },
  ]},
  { id: 21, chapter: 7, number: 1, text: "Welche Aussagen zur Epidemiologie des Pankreaskarzinoms treffen zu?", statements: [
    { letter: "a", text: "Etwa die Hälfte der Pankreaskarzinome sind Adenokarzinome.", correct: false, explanation: "Falsch. Adenokarzinome machen über 95 % der Pankreaskarzinome aus." },
    { letter: "b", text: "Adenokarzinome entstehen durch maligne Entartung des exokrinen Pankreasanteils.", correct: true, explanation: "Richtig. Adenokarzinome des Pankreas entstehen durch maligne Entartung des exokrinen Anteils des Pankreas." },
    { letter: "c", text: "Eine Vorstufe des exokrinen Pankreaskarzinoms ist die PANIN.", correct: true, explanation: "Richtig. Das exokrine Pankreaskarzinom geht aus einer prämalignen Vorstufe des Epithels im Pankreasgang, der PANIN (Pancreatic Intraepithelial Neoplasia), hervor. Viel seltener sind zystische Tumoren, die aus den Gangzellen hervorgehen, oder azinäre Tumoren, die von den sekretproduzierenden Parenchymzellen des Pankreas ausgehen, sowie endokrine Tumoren, die sich von den endokrinen Zellen der Langerhans-Inseln ableiten." },
    { letter: "d", text: "In Deutschland steht das Pankreaskarzinom sowohl bei Frauen als auch bei Männern an dritter Stelle der Krebsneuerkrankungen.", correct: false, explanation: "Falsch. Das Pankreaskarzinom nimmt bei Männern den 9. Platz und bei Frauen den 7. Platz in der Statistik der Krebsneuerkrankungen in Deutschland ein." },
    { letter: "e", text: "Der Altersgipfel des Pankreaskarzinoms liegt im mittleren Lebensalter.", correct: false, explanation: "Falsch. Der Altersgipfel liegt im höheren Lebensalter. Das mittlere Erkrankungsalter liegt für Männer bei 70 und für Frauen bei 76 Jahren." },
  ]},
  { id: 22, chapter: 7, number: 2, text: "Welche Aussagen treffen zu? Risikofaktoren für ein Pankreaskarzinom sind:", statements: [
    { letter: "a", text: "Moderater Alkoholkonsum.", correct: false, explanation: "Falsch. In aktuellen Studien wurde kein Zusammenhang zwischen moderatem Alkoholkonsum und einem erhöhten Pankreaskarzinomrisiko festgestellt. Allerdings ist ein hoher Alkoholkonsum mit einem erhöhten Pankreaskarzinomrisiko assoziiert." },
    { letter: "b", text: "Nikotinabusus.", correct: true, explanation: "Richtig. Rauchen verdoppelt das Risiko für ein Pankreaskarzinom. Individuelle genetische Faktoren scheinen den Grad der Assoziationen zu beeinflussen." },
    { letter: "c", text: "Adipositas.", correct: true, explanation: "Richtig. Bei einer Adipositas (BMI > 30) besteht ein signifikant erhöhtes Pankreaskarzinomrisiko." },
    { letter: "d", text: "Sporadisches Pankreaskarzinom (SPC) in der Familie.", correct: true, explanation: "Richtig. Beim sporadischen Pankreaskarzinom (SPC — sporadic pancreatic cancer kindred) in der Familie (Verwandte ersten Grades von Patienten mit Pankreaskarzinom) verdoppelt sich das Risiko, an einem Pankreaskarzinom zu erkranken." },
    { letter: "e", text: "Familiäres Pankreaskarzinom (FPC) in der Familie.", correct: true, explanation: "Richtig. Ein familiäres Pankreaskarzinom (FPC — familial pancreatic cancer kindred) wird immer dann angenommen, wenn in einer Familie mindestens zwei erstgradige Verwandte an einem Pankreaskarzinom erkrankt sind, ohne dass ein anderes erbliches Syndrom vorliegt. Das Risiko, an einem Pankreaskarzinom zu erkranken, ist hier um das 18-fache erhöht." },
  ]},
  { id: 23, chapter: 7, number: 3, text: "Welche Aussagen treffen zu? Folgende Erkrankungen haben ein erhöhtes Risiko für ein Pankreaskarzinom:", statements: [
    { letter: "a", text: "Peutz-Jeghers-Syndrom.", correct: true, explanation: "Richtig. Patienten mit Peutz-Jeghers-Syndrom haben ein 36- bis 42%iges Lebenszeitrisiko, an einem Pankreaskarzinom zu erkranken." },
    { letter: "b", text: "FAP (familiäre adenomatöse Polyposis).", correct: true, explanation: "Richtig. Patienten mit FAP und deren Angehörige haben ein erhöhtes Pankreaskarzinomrisiko." },
    { letter: "c", text: "Diabetes mellitus Typ 2.", correct: true, explanation: "Richtig. Patienten mit Diabetes mellitus Typ 2 haben ein etwa 8-fach erhöhtes Risiko für ein Pankreaskarzinom." },
    { letter: "d", text: "Hereditäre Pankreatitis.", correct: true, explanation: "Richtig. Das kumulative Risiko bis zum 70. Lebensjahr, ein Pankreaskarzinom zu entwickeln, liegt bei hereditärer Pankreatitis zwischen 40 und 44 %." },
    { letter: "e", text: "Chronische Pankreatitis.", correct: true, explanation: "Richtig. Patienten mit langjähriger chronischer Pankreatitis haben ein erhöhtes Risiko für die Entwicklung eines Pankreaskarzinoms. Die kumulative Inzidenz ist 1,1 % nach 5 Jahren, 1,8 % nach 10 Jahren und 4 % nach 20 Jahren." },
  ]},
  { id: 24, chapter: 7, number: 4, text: "Welche Aussagen bezüglich der Diagnostik des Pankreaskarzinoms sind zutreffend?", statements: [
    { letter: "a", text: "Ein neu aufgetretener schmerzloser Ikterus sollte diagnostische Untersuchungen zur Klärung der Frage nach einem Pankreaskarzinom auslösen.", correct: true, explanation: "Richtig. Pankreas- oder Gallengangskarzinome sind mit 20 % die häufigste Ursache für einen neu aufgetretenen Ikterus bei Patienten in der zweiten Lebenshälfte (> 60 Jahre)." },
    { letter: "b", text: "Oftmals kann bereits durch die ERCP ein Pankreaskarzinom diagnostiziert werden.", correct: false, explanation: "Falsch. Die ERCP allein ist nicht zur Diagnose eines duktalen Pankreaskarzinoms geeignet, da sie lediglich Gangveränderungen nachweist und die Raumforderung selbst nicht in vollem Ausmaß zur Darstellung kommt. Diagnostische Verfahren der ersten Wahl zur Detektion des Pankreaskarzinoms sind die Oberbauchsonographie, die Endosonographie, die CT oder die MRT in Kombination mit der MRCP." },
    { letter: "c", text: "Bei Verdacht auf ein duktales Pankreaskarzinom sollte als nächster Schritt die Diagnosesicherung mittels Bürstenzytologie erfolgen.", correct: false, explanation: "Falsch. Eine ERCP mit Bürstenzytologie zur Gewebediagnostik des Pankreaskarzinoms ist aufgrund einer zu niedrigen Sensitivität nicht indiziert und hätte bei bildmorphologischem Tumorverdacht auch keine Relevanz bezüglich der Indikationsstellung zur OP." },
    { letter: "d", text: "Bei einem resektabel erscheinenden karzinomverdächtigen Pankreastumor sollte zum Ausschluss anderer Differentialdiagnosen die endosonographisch gestützte Biopsie erfolgen.", correct: false, explanation: "Falsch. Die endosonographisch gestützte Feinnadelpunktion ist sensitiv und hochspezifisch zum histologischen Nachweis des Pankreaskarzinoms. Da bei Operabilität jedoch auch Raumforderungen unklarer Dignität operiert werden sollten, ist sie nicht notwendig. Es erfolgt primär die Resektion. Die präoperative Biopsie ist dann sinnvoll, wenn es Zweifel an der Indikation oder differentialdiagnostische Hinweise gibt, die das Vorgehen ändern würden, wie z. B. Metastasenverdacht bei einem anderen Malignom in der Vorgeschichte." },
    { letter: "e", text: "Bei einem nicht resektablen Pankreastumor sollte zum Ausschluss anderer Differentialdiagnosen die endosonographisch gestützte Biopsie erfolgen.", correct: true, explanation: "Richtig. Vor Durchführung einer palliativen Chemotherapie muss die Diagnose zytologisch oder histologisch gesichert sein, um mögliche Fehlbehandlungen aufgrund anderer Differentialdiagnosen auszuschließen." },
  ]},
  { id: 25, chapter: 7, number: 5, text: "Welche Aussagen zur präoperativen Ausbreitungsdiagnostik beim Pankreaskarzinom treffen zu?", statements: [
    { letter: "a", text: "Zur präoperativen Beurteilung der lokalen Tumorausdehnung und zur Beurteilung der Resektabilität eignen sich die Multidetektor-Computertomographie und die Endosonographie am besten.", correct: true, explanation: "Richtig. Die CT ist das Standardverfahren zur Beurteilung der Größe des Primärtumors und der lokalen Tumorausbreitung. Die Kombination von transabdominalem und endoskopischem Ultraschall liefert ähnlich gute Ergebnisse, diese Untersuchungen sind jedoch stark untersucherabhängig." },
    { letter: "b", text: "Zur Abklärung der Operabilität eines Pankreaskarzinoms sollte auf jeden Fall immer eine Laparoskopie erfolgen.", correct: false, explanation: "Falsch. Die Staging-Laparoskopie kann fakultativ eingesetzt werden, wenn der Verdacht auf eine peritoneale Aussaat besteht, ohne dass diese in der Bildgebung nachweisbar ist. Studien haben gezeigt, dass durch die Staging-Laparoskopie in bis zu einem Drittel der Fälle Befunde erhoben werden, die eine kurative Resektion ausschließen." },
    { letter: "c", text: "Wenn eine Zyste als abklärungsbedürftig angesehen wird, sollte auf eine endosonographisch gesteuerte Punktion verzichtet und primär die Resektion angestrebt werden.", correct: false, explanation: "Falsch. Laut der aktuellen Leitlinie sollte eine abklärungsbedürftige Zyste endosonographisch gestützt punktiert werden. Aus dem Aspirat können die Tumormarker CA 19-9 und CEA sowie eine Zytologie bestimmt werden." },
    { letter: "d", text: "Bei fehlendem Nachweis von Peritonealmetastasen in einer diagnostischen Laparoskopie sollte eine Spülung zur Zytologiegewinnung durchgeführt werden.", correct: false, explanation: "Falsch. Der zytologische Nachweis von Tumorzellen bei fehlender manifester peritonealer Absiedelung würde zu keiner Änderung der Therapie führen. Nach Resektion eines duktalen Pankreaskarzinoms besteht kein signifikanter prognostischer Unterschied für Patienten mit positiver und negativer Zytologie." },
    { letter: "e", text: "Bei Nachweis einer Infiltration der Pfortader in der Computertomographie liegt Inoperabilität vor.", correct: false, explanation: "Falsch. Eine Infiltration der V. portae, V. mesenterica superior oder V. lienalis ist per se kein Ausschlusskriterium für eine Resektion. Bei einer Infiltration venöser Gefäße ist das postoperative Überleben immer noch deutlich günstiger als bei einer Infiltration arterieller Gefäße. Einige Studien haben gezeigt, dass en-bloc-Resektionen mit Venensegmenten keine schlechtere Langzeitprognose haben müssen. Die Prognose korreliert jedoch mit dem Ausmaß der Veneninfiltration." },
  ]},
  { id: 26, chapter: 7, number: 6, text: "Welche Aussagen zur chirurgischen Therapie des Pankreaskarzinoms treffen zu?", statements: [
    { letter: "a", text: "Die chirurgische Therapie ist das einzige potenziell kurative Therapieverfahren beim Pankreaskarzinom. Eine ausschließliche Chemotherapie, Radiochemotherapie oder Strahlentherapie soll bei Patienten mit als resektabel eingeschätztem Pankreaskarzinom nicht durchgeführt werden.", correct: true, explanation: "Richtig. Die chirurgische Therapie ist die einzige potenziell kurative Therapieoption beim Pankreaskarzinom. Durch eine alleinige Radiochemotherapie lässt sich keine Heilung erzielen." },
    { letter: "b", text: "Eine Pankreasresektion ist auch dann gerechtfertigt, wenn von vornherein feststeht, dass der Tumor nicht komplett entfernt werden kann, also eine R2-Situation vorliegt — aufgrund der Tumormassenreduktion bestehe immer noch ein deutlicher Überlebensvorteil gegenüber der alleinigen Chemotherapie.", correct: false, explanation: "Falsch. Die Prognose nach R2-Resektion ist ähnlich schlecht wie ohne Resektion. Insbesondere bei Fernmetastasen verbessert die Resektion des Primärtumors die Prognose der Patienten nicht. Hinzu kommt das operative Risiko. Ziel sollte die Resektion im Gesunden (R0) sein; wenn dies nicht möglich ist, sollte keine Resektion erfolgen." },
    { letter: "c", text: "Ein hohes Lebensalter stellt eine Kontraindikation zu einer Resektion bei Pankreaskarzinom dar.", correct: false, explanation: "Falsch. Aufgrund der demografischen Entwicklung wird die Bevölkerung zunehmend älter. Verschiedene Studien zeigen, dass die operativen Ergebnisse bei älteren Patienten (> 75 Jahre) mit denen jüngerer vergleichbar sind. Die Leitlinien empfehlen daher, dass das Alter kein Kriterium sein sollte, einen Patienten von der Resektion eines Pankreaskarzinoms auszuschließen." },
    { letter: "d", text: "Komorbidität kann ein Kriterium sein, bei einem Patienten auf eine Resektion zu verzichten.", correct: true, explanation: "Richtig. Patienten mit kardialen oder chronisch respiratorischen Erkrankungen oder mit einer Leberzirrhose haben ein deutlich erhöhtes Risiko für perioperative Komplikationen. Bis zu 30 % aller perioperativen Komplikationen und bis zu 50 % aller postoperativen Todesfälle sind auf kardiale Ursachen zurückzuführen. Bei erheblicher Komorbidität mit ohnehin schlechter Prognose kann es sinnvoller sein, auf eine Resektion zu verzichten." },
    { letter: "e", text: "Ein Pankreaskarzinom kann auch trotz einer Infiltration von Nachbarorganen noch im Gesunden (R0) resektabel sein.", correct: true, explanation: "Richtig. Auch lokal fortgeschrittene, in Nachbarorgane infiltrierende Pankreaskarzinome können unter Umständen noch unter Mitnahme der entsprechenden Nachbarstrukturen en bloc im Gesunden reseziert werden. Die erweiterte Resektion ist in der Prognose identisch zur Standardresektion." },
  ]},
  { id: 27, chapter: 7, number: 7, text: "Welche Aussagen zum Pankreaskarzinom treffen zu? Folgende Befunde stellen eine Kontraindikation für die Resektion eines duktalen Pankreaskarzinoms dar:", statements: [
    { letter: "a", text: "Der Nachweis von Fernmetastasen.", correct: true, explanation: "Richtig. Bei Nachweis von Fernmetastasen verbessert die Resektion des Primärtumors die Prognose der Patienten nicht." },
    { letter: "b", text: "Eine Peritonealkarzinose.", correct: true, explanation: "Richtig. Auch beim Vorliegen einer Peritonealkarzinose kann die Prognose durch Resektion nicht verbessert werden." },
    { letter: "c", text: "Ummauerung des Truncus coeliacus.", correct: true, explanation: "Richtig. Die Ummauerung des Truncus coeliacus stellt eine lokale Inoperabilität dar, da keine R0-Situation erzielt werden kann." },
    { letter: "d", text: "Paraaortale Lymphknotenmetastasen.", correct: true, explanation: "Richtig. Paraaortale Lymphknotenmetastasen gelten als Fernmetastasen. Bei Befall von paraaortalen Lymphknoten ist die Prognose der Patienten ungünstig; das mediane postoperative Überleben liegt unter einem Jahr." },
    { letter: "e", text: "Infiltration der V. mesenterica superior mit Stenosierung des Gefäßlumens.", correct: false, explanation: "Falsch. Die Infiltration der V. mesenterica superior bzw. der Pfortader — entsprechend einem direkten Kontakt des Tumors mit oder ohne Stenosierung des Gefäßlumens in der Bildgebung — entspricht der Definition einer grenzwertigen Resektabilität ('borderline resectability') beim Pankreaskarzinom. Die en-bloc-Resektion unter Mitnahme des infiltrierten Gefäßsegments kann bei R0-Situation die Prognose verbessern." },
  ]},
  { id: 28, chapter: 7, number: 8, text: "Welche Aussagen zum Resektionsausmaß bei der Pankreasresektion treffen zu?", statements: [
    { letter: "a", text: "Bei der Pankreaskopfresektion ist die magenteilresezierende der pyloruserhaltenden partiellen Duodenopankreatektomie bezüglich der postoperativen Komplikationen überlegen.", correct: false, explanation: "Falsch. Bezüglich der postoperativen Komplikationen und Letalität sowie der onkologischen Langzeitergebnisse sind laut Studienlage die pyloruserhaltende und die magenresezierende partielle Duodenopankreatektomie gleichwertig." },
    { letter: "b", text: "Bei Resektion des Pankreaskarzinoms sollen mindestens 10 regionäre Lymphknoten entfernt werden.", correct: true, explanation: "Richtig. In den aktuellen Leitlinien wird gefordert, dass mindestens 10 Lymphknoten entfernt und untersucht werden sollten, um pN0 sicher klassifizieren zu können. Das Verhältnis von befallenen zu insgesamt entfernten Lymphknoten (Lymph Node Ratio, LNR) soll angegeben werden. Eine LNR ≥ 0,2 hat sich in mehreren Studien als prognostisch ungünstig erwiesen." },
    { letter: "c", text: "Zur geforderten Lymphadenektomie bei Pankreaskopfresektion gehören unter anderem die Lymphknoten des Ligamentum hepatoduodenale sowie der kranialen Vena mesenterica superior.", correct: true, explanation: "Richtig. Die standardisierte Lymphadenektomie bei einer OP nach Whipple beinhaltet die komplette und zirkuläre Dissektion der Lymphknoten des Lig. hepatoduodenale, um die A. hepatica communis, die Pfortader und den kranialen Anteil der Vena mesenterica superior. Darüber hinaus sollten die Lymphknoten des Truncus coeliacus auf der rechten Seite und der rechten Hemizirkumferenz der A. mesenterica superior entfernt werden." },
    { letter: "d", text: "Eine erweiterte Lymphadenektomie kann insbesondere beim Vorliegen von Lymphknotenmetastasen die Langzeitprognose verbessern.", correct: false, explanation: "Falsch. Eine erweiterte Lymphadenektomie soll nicht durchgeführt werden. Aktuelle Studien zeigen, dass die erweiterte Radikalität der Lymphknotendissektion, die über die Standarddissektion hinausgeht, keinen Vorteil hinsichtlich des Langzeitüberlebens erzielt." },
    { letter: "e", text: "Im Falle von erst intraoperativ nachweisbaren Fernmetastasen sollte eine Resektion trotz gegebener Resektabilität unterbleiben.", correct: true, explanation: "Richtig. Denn durch die Resektion von Metastasen entsteht kein signifikanter Überlebensvorteil, sondern lediglich eine erhöhte Morbidität." },
  ]},
  { id: 29, chapter: 7, number: 9, text: "Welche Aussagen zur Chemotherapie des Pankreaskarzinoms sind zutreffend?", statements: [
    { letter: "a", text: "Nach R0-Resektion eines Pankreaskarzinoms im UICC-Stadium I ist eine adjuvante Chemotherapie indiziert.", correct: true, explanation: "Richtig. Nach R0-Resektion eines Pankreaskarzinoms im UICC-Stadium I–III soll eine adjuvante Chemotherapie durchgeführt werden. Nach aktueller Studienlage besteht ein deutlicher Vorteil im krankheitsfreien Überleben durch eine adjuvante Chemotherapie im Vergleich zu alleiniger Chirurgie. Das mediane Überleben liegt nach multimodaler Therapie bei bis zu 24 Monaten, das 5-Jahresüberleben bei ca. 20 %." },
    { letter: "b", text: "Ein hohes Patientenalter ist eine Kontraindikation für eine adjuvante Chemotherapie.", correct: false, explanation: "Falsch. Es gibt keine Hinweise dafür, dass Patienten im höheren Lebensalter (> 70 Jahre) nicht von einer adjuvanten Chemotherapie profitieren." },
    { letter: "c", text: "Eine schwere Herzinsuffizienz (NYHA III) ist eine Kontraindikation für eine adjuvante Chemotherapie.", correct: true, explanation: "Richtig. Die Indikation sollte aber immer individuell abgestimmt werden." },
    { letter: "d", text: "Hinsichtlich Langzeitüberlebens nach kurativer Resektion eines duktalen Adenokarzinoms des Pankreas ist die adjuvante Chemotherapie mit modifiziertem FOLFIRINOX einer Monotherapie mit Gemcitabin überlegen.", correct: true, explanation: "Richtig. Bei Patienten mit einem guten Allgemeinzustand kann die Therapie mit modifiziertem FOLFIRINOX eingesetzt werden. Sie führt gegenüber der Gemcitabin-Monotherapie zu einer Verbesserung des krankheitsfreien Überlebens auf knapp 22 Monate und des Gesamtüberlebens auf etwa 54 Monate." },
    { letter: "e", text: "Bei inoperablem Pankreaskarzinom sollte eine palliative Chemotherapie erfolgen.", correct: true, explanation: "Richtig. Laut aktueller Studienlage verbessert die palliative Chemotherapie beim metastasierten oder lokal fortgeschrittenen Pankreaskarzinom die Überlebenszeit signifikant. Zudem kann auch die Lebensqualität verbessert werden." },
  ]},
  { id: 30, chapter: 7, number: 10, text: "Welche Aussagen zu neuroendokrinen Pankreastumoren sind zutreffend?", statements: [
    { letter: "a", text: "Insulinome und Glukagonome entstehen aus Zellen der Langerhans-Inseln.", correct: true, explanation: "Richtig. Insulinome entstehen aus den Insulin-produzierenden Beta-Zellen und Glukagonome sind seltene Tumoren der Glukagon-produzierenden Alpha-Zellen der Langerhansschen Inseln." },
    { letter: "b", text: "Insulinome sind in 80 % der Fälle maligne.", correct: false, explanation: "Falsch. Insulinome sind Insulin-produzierende Tumoren mit einer Inzidenz von 0,5–1,5 / 100 000. Sie sind zu 99 % im Pankreas lokalisiert und in weniger als 10 % maligne." },
    { letter: "c", text: "Dem Zollinger-Ellison-Syndrom liegt eine verminderte Produktion von Gastrin zugrunde.", correct: false, explanation: "Falsch. Ursache ist ein Gastrin-produzierendes Gastrinom. Es tritt mit einer Inzidenz von 1–2 / 100 000 auf und ist zu 25 % im Pankreas lokalisiert (im Duodenum zu 70 %). Es kann in bis zu 90 % der Fälle maligne sein." },
    { letter: "d", text: "Das Glukagonom ist der häufigste endokrine Pankreastumor.", correct: false, explanation: "Falsch. Die Inzidenz beträgt lediglich 0,01–0,1 / 100 000. Es ist ein Glukagon-produzierender Tumor, der nur im Pankreas vorkommt, mit einer Malignität von 50–80 %." },
    { letter: "e", text: "VIPome befinden sich zu 90 % im Pankreas.", correct: true, explanation: "Richtig. VIPome befinden sich zu 90 % im Pankreas. Sie produzieren ein vasoaktives Intestinalpeptid (VIP), treten mit einer Inzidenz von 0,05–0,2 / 100 000 auf und sind in 40–70 % maligne." },
  ]},
  { id: 31, chapter: 7, number: 11, text: "Welche Aussagen zu neuroendokrinen Pankreastumoren sind zutreffend?", statements: [
    { letter: "a", text: "Insulinome treten zumeist als solitäre Pankreastumoren auf.", correct: true, explanation: "Richtig. 90–95 % der Insulinome sind Solitärtumoren mit einem Durchmesser von 1–2 cm." },
    { letter: "b", text: "Bei nicht kurativ resektablen malignen Insulinomen kann eine palliative Resektion dennoch sinnvoll sein.", correct: true, explanation: "Richtig. Bei nicht kurativ resektablen malignen Insulinomen kann durch eine Tumormassenreduktion eine signifikante Besserung der Symptomatik erreicht werden. Voraussetzung ist die Resektabilität des Primärtumors und die Möglichkeit der Entfernung der größten Masse der Lebermetastasen. Ist der Primärtumor nicht resektabel oder liegen diffuse Lebermetastasen vor, ist eine Resektion nicht sinnvoll. Die alleinige konservative Therapie (Chemotherapie z. B. mit Streptozotocin und 5-Fluorouracil oder antihormonelle Therapie) ist bezüglich der Behandlung des Hyperinsulinismus unbefriedigend." },
    { letter: "c", text: "Duodenale Gastrinome haben eine deutlich schlechtere Prognose als pankreatische.", correct: false, explanation: "Falsch. Duodenale Gastrinome, die zum Diagnosezeitpunkt zumeist kleiner sind als pankreatische, metastasieren zu 9 % in die Leber. Die im Pankreas lokalisierten Gastrinome haben zum Diagnosezeitpunkt in bis zu 57 % Lebermetastasen gebildet und somit eine deutlich schlechtere Prognose." },
    { letter: "d", text: "Gastrinome sind häufig mit einer multiplen endokrinen Neoplasie vom Typ 1 (MEN 1) assoziiert.", correct: true, explanation: "Richtig. Gastrinome sind zu 20–25 % mit einer MEN 1 assoziiert." },
    { letter: "e", text: "Etwa 10 % der Patienten mit einem Ulkus haben ein Zollinger-Ellison-Syndrom.", correct: false, explanation: "Falsch. Nur etwa 0,1 % der Ulkuspatienten haben ein Zollinger-Ellison-Syndrom." },
  ]},
  { id: 32, chapter: 7, number: 12, text: "Welche Aussagen zum Insulinom sind zutreffend?", statements: [
    { letter: "a", text: "Das Leitsymptom des Insulinoms ist die Hypoglykämie.", correct: true, explanation: "Richtig. Die Hypoglykämie ist definiert durch die Whipple-Trias: Plasmaglukosekonzentrationen < 40 mg/dl, Symptome der Hypoglykämie und Reversibilität der Symptome durch Glukosegabe." },
    { letter: "b", text: "Der Standardtest für die Diagnostik des Insulinoms ist der Hungerversuch.", correct: true, explanation: "Richtig. Der etablierte Standardtest für die Diagnostik des Insulinoms ist der Hungerversuch über 72 Stunden. Er besitzt eine Sensitivität und Spezifität von nahezu 100 %." },
    { letter: "c", text: "Zur Lokalisation des Insulinoms eignen sich intraoperative Sonographie, MRT (MR-Angio und MRCP), CT, Endosonographie und ggf. Somatostatin-Rezeptor-Szintigraphie.", correct: true, explanation: "Richtig. Der intraoperative Ultraschall erreicht in Studien eine Sensitivität von > 90 %. In Verbindung mit der bidigitalen Pankreaspalpation können so nahezu alle Insulinome diagnostiziert werden. Zur OP-Planung ist zudem eine Schnittbilduntersuchung sinnvoll (CT, MRT — Sensitivität der MRT zwischen 79 und über 90 %). Die Endosonographie weist die höchste Sensitivität in der Lokalisation auf, ist jedoch stark untersucherabhängig. Die Somatostatin-Rezeptor-Szintigraphie hat eine deutlich geringere Sensitivität und sollte nur in Ausnahmefällen eingesetzt werden." },
    { letter: "d", text: "Die Therapie des benignen Insulinoms erfolgt konservativ mit Antihypoglykämika (z. B. Diazoxid). Bei Therapieversagen ist eine operative Therapie indiziert.", correct: false, explanation: "Falsch. Die einzig kurative Behandlungsoption des Insulinoms ist die komplette chirurgische Entfernung. Nur so können die Symptome der Neuroglukopenie und der hyperadrenergen Reaktion geheilt werden. Die primär medikamentöse Therapie mit Antihypoglykämika (z. B. Diazoxid oder Phenytoin) zur Besserung der Hypoglykämiesymptomatik sollte nur bei inoperablen Patienten erfolgen." },
    { letter: "e", text: "Bei einem benignen Insulinom ist die sparsame Resektion (Enukleation), beim malignen Insulinom eine radikale Resektion wie beim Pankreaskarzinom anzustreben.", correct: true, explanation: "Richtig. Benigne Insulinome sollten parenchymsparend und möglichst lokal entfernt werden, bei oberflächlichen Befunden ggf. durch eine Enukleation. Liegt der Befund tiefer und in der Nähe des Pankreasgangs, sollte eine sparsame Resektion erfolgen. Bei malignen Insulinomen erfolgt die onkologische Resektion mit Entfernung der regionalen Lymphknoten. Entscheidend für die Indikationsstellung ist das Vorliegen eines positiven Hungerversuchs mit Nachweis eines organischen Hyperinsulinismus und Ausschluss einer faktitiellen Hypoglykämie." },
  ]},
  { id: 33, chapter: 7, number: 13, text: "Welche Aussagen sind zutreffend? Die folgenden Erkrankungen sind typische Ursachen für eine chronische Pankreatitis:", statements: [
    { letter: "a", text: "Alkoholabusus.", correct: true, explanation: "Richtig. Ein Alkoholabusus ist je nach Studienlage mit 50–84 % die häufigste Ursache einer chronischen Pankreatitis im Erwachsenenalter." },
    { letter: "b", text: "Idiopathische Pankreatitis.", correct: true, explanation: "Richtig. Die zweithäufigste Gruppe ist die idiopathische Pankreatitis mit bis zu 28 %. Hierbei finden sich in bis zu 45 % genetische Faktoren." },
    { letter: "c", text: "Hereditäre Pankreatitis.", correct: true, explanation: "Richtig. Eine hereditäre Pankreatitis nach Definition von Comfort und Steinberg liegt bei bis zu 1–4 % der Patienten vor." },
    { letter: "d", text: "Primärer Hyperparathyreoidismus.", correct: true, explanation: "Richtig. Der primäre Hyperparathyreoidismus kann zu einer chronischen Pankreatitis führen." },
    { letter: "e", text: "Autoimmunpankreatitis.", correct: true, explanation: "Richtig. Bei der Autoimmunpankreatitis handelt es sich um eine systemische fibrosierende entzündliche Erkrankung, bei der das Pankreas eines der betroffenen Organe ist. Etwa 5 % der Patienten, die bei V. a. ein Pankreaskarzinom operiert werden, leiden histologisch an einer Autoimmunpankreatitis. Die Diagnosestellung erfolgt nach den HiSORT-Kriterien (Histologie, Serologie, Beteiligung anderer Organsysteme und Ansprechen auf Steroidtherapie)." },
  ]},
  { id: 34, chapter: 7, number: 14, text: "Welche Aussagen zur Diagnostik der chronischen Pankreatitis sind zutreffend?", statements: [
    { letter: "a", text: "Bei der Diagnose und Beurteilung von Pankreasnekrosen ist die Kontrastmittel-CT (KM-CT) der KM-Sonographie deutlich überlegen.", correct: false, explanation: "Falsch. Der Kontrastmittel-Ultraschall (CEUS) kann Nekrosen in gleichem Umfang wie die KM-CT oder die KM-MRT erfassen, was insbesondere bei Patienten mit eingeschränkter Nierenfunktion von Vorteil ist. Bei Verdacht auf eine infizierte Nekrose kann eine US- oder CT-gestützte Punktion erfolgen." },
    { letter: "b", text: "Bildgebung der Wahl zur Differenzierung zystischer Pankreasläsionen (Pankreaspseudozysten/zystische Neoplasien) ist die kontrastmittelgestützte CT.", correct: false, explanation: "Falsch. Zysten sind aufgrund klar definierter Kriterien (echofrei, Tangentialphänomen, dorsale Schallverstärkung) sehr gut mit dem Ultraschall detektierbar. Bei atypischen Zysten müssen differentialdiagnostisch zystische Neoplasien bedacht und andere bildgebende Verfahren eingesetzt werden. Die höchsten Trefferraten in der Differenzierung zystischer Pankreasläsionen kommen der EUS und der MRT/MRCP zu. Im Zweifelsfall kann sich eine EUS-FNP mit Asservierung von Zystenflüssigkeit (Zytologie, Lipase, CEA-Bestimmung) anschließen." },
    { letter: "c", text: "Vor endosonographischer Feinnadelbiopsie einer suspekten Pankreaszyste muss eine Dopplersonographie erfolgen.", correct: true, explanation: "Richtig. Beim Nachweis zystischer Veränderungen des Pankreas sollte der Ultraschall kombiniert mit dem Farbdoppler durchgeführt werden, um ein Pseudoaneurysma sicher ausschließen zu können. Dieser sollte vor entsprechenden Interventionen obligat durchgeführt werden." },
    { letter: "d", text: "Die Endosonographie kann bei Vorliegen einer chronischen Pankreatitis zwischen Karzinom und Entzündung unterscheiden.", correct: false, explanation: "Falsch. Die perkutane und die endoskopische Sonographie können bei Nachweis einer chronischen Pankreatitis nur begrenzt zwischen Karzinom und Entzündung unterscheiden. Für die MRT mit MRCP besteht eine Sensitivität von 84 % mit einer Spezifität von 97 %. Zur Differenzierung einer chronischen Pankreatitis vs. Pankreaskarzinom wird eine Sensitivität von 93 % mit einer Spezifität von 75 % beschrieben. Dies trifft jedoch nicht auf Karzinome in einer chronischen Pankreatitis zu. Im Zweifelsfall sollte eine endosonographisch-gestützte Feinnadelpunktion angeschlossen werden (Sensitivität > 85 %). Bei operablen Befunden mit Tumorverdacht sollte jedoch darauf verzichtet und primär operiert werden." },
    { letter: "e", text: "Zur Differenzierung zwischen einer Autoimmunpankreatitis und anderen Pankreaserkrankungen wird die Feinnadelpunktion empfohlen.", correct: true, explanation: "Richtig. Für die Diagnose einer Autoimmunpankreatitis nach den HiSORt-Kriterien ist die zytologische/histologische Diagnose der Goldstandard. Bei bildgebendem oder klinischem Verdacht auf eine Autoimmunpankreatitis kann daher eine endosonographisch-gestützte Feinnadelpunktion erfolgen." },
  ]},
  { id: 35, chapter: 7, number: 15, text: "Welche Aussagen zur akuten Pankreatitis treffen zu?", statements: [
    { letter: "a", text: "Bei 'walled-off' Nekrosen handelt es sich um ältere, abgekapselte Nekrosen.", correct: true, explanation: "Richtig. Die 'walled-off' Nekrosen (WON) bilden sich als reife Gewebenekrosen innerhalb von etwa vier Wochen nach einer akuten nekrotisierenden Pankreatitis." },
    { letter: "b", text: "Pankreatische Pseudozysten sind in der Regel angeboren.", correct: false, explanation: "Falsch. Hierbei handelt es sich um eingekapselte, homogene Flüssigkeitsansammlungen, die typischerweise außerhalb des Pankreas gelegen sind und vier Wochen nach Ablauf einer interstitiellen Pankreatitis entstehen. Als Ursache findet man häufig kleinere Gangrupturen der Pankreasgänge." },
    { letter: "c", text: "Bei einer akuten nekrotisierenden Pankreatitis sollte umgehend eine Laparotomie erfolgen, um eine ausgedehnte Nekrosektomie durchzuführen.", correct: false, explanation: "Falsch. Bei einer akuten nekrotisierenden Pankreatitis wird im Rahmen eines 'step-up approaches' eine schrittweise Eskalation der Therapie empfohlen. In der Regel versucht man, so lange mit einer Intervention zu warten, bis sich die Nekrose abgekapselt hat. Dann kommt zunächst eine interventionelle Therapie in Betracht." },

    { letter: "d", text: "Akute Hepatitis B oder C.", correct: false, explanation: "Falsch. Eine akute, unkomplizierte Hepatitis B/C ist KEINE Indikation für eine Lebertransplantation. Hier sollte zunächst die medikamentöse Behandlung erfolgen. Bei Chronifizierung (mit aktuellen Therapieoptionen selten) kann eine virale Hepatitis in eine Leberzirrhose übergehen und damit eine Transplantationsindikation darstellen." },
    { letter: "e", text: "Hepatozelluläres Karzinom mit einem Herd von 30 mm in einer vorbestehenden Leberzirrhose.", correct: true, explanation: "Richtig. Das HCC ist eine der wenigen malignen Erkrankungen, bei denen eine Lebertransplantation indiziert ist. Mehrere Studien zeigten signifikant verbessertes krankheitsfreies und Gesamtüberleben durch Transplantation. Die zwei entscheidenden Faktoren sind R0-Resektion und Behandlung der Grunderkrankung (Leberzirrhose). Sonderpunkte auf der Warteliste richten sich nach den Milan-Kriterien.", note: "Update: Seit 2021 hat die systemische Therapie des HCC mit Atezolizumab + Bevacizumab (Imbrave150-Studie) einen festen Stellenwert in der Erstlinientherapie des fortgeschrittenen HCC. Die Milan-Kriterien (1 Herd ≤ 5 cm oder bis zu 3 Herde ≤ 3 cm, kein Gefäßeinbruch, keine Fernmetastasen) gelten weiterhin als Standard für die Listung zur Lebertransplantation, werden aber durch erweiterte Kriterien (UCSF, Up-to-Seven) zunehmend ergänzt." },
  ]},
  { id: 225, chapter: 18, number: 2, text: "Die Immunsuppression ist ein wesentlicher Bestandteil der Transplantationsmedizin. Welche der folgenden Aussagen sind richtig?", statements: [
    { letter: "a", text: "Corticosteroide haben sehr viele Nebenwirkungen und werden daher meistens bereits nach einer kurzen Zeit abgesetzt.", correct: true, explanation: "Richtig. Corticosteroide (z. B. Prednisolon, Methylprednisolon) sind sehr potente Immunsuppressiva mit beträchtlichem Nebenwirkungspotenzial:\n• Osteoporose\n• Stammfettsucht\n• Erhöhtes Diabetes-mellitus-Risiko\n• Erhöhtes Malignomrisiko\n\nIn deutschen Transplantationszentren wird daher eine frühe Reduktion und möglichst ein Absetzen (withdrawal) praktiziert. Ausnahme: Autoimmunhepatitis als Transplantationsindikation." },
    { letter: "b", text: "Da sich das Immunsystem mit der Zeit an das neue Organ adaptiert, kann die immunsuppressive Therapie nach ca. einem Jahr bei fast allen Patienten komplett abgesetzt werden.", correct: false, explanation: "Falsch. Eine stufenweise Reduktion ist gut möglich, ein komplettes Absetzen führt jedoch in den meisten Fällen zur akuten Abstoßung. Besonders deutlich bei Jugendlichen mit kindlichen Transplantaten — in der Pubertät kommt es durch non-compliance bedingte 'drug holidays' häufig zu erhöhten Abstoßungsraten. Nur sehr wenige Patienten können vollständig ausschleichen — diese Kohorte ist Gegenstand laufender Forschung." },
    { letter: "c", text: "Tacrolimus ist ein Calcineurin-Inhibitor mit einer sehr großen therapeutischen Breite, sodass speziell bei diesem Wirkstoff keine Spiegelkontrolle erfolgen muss, vielmehr kann ein festes Medikationsschema angewendet werden.", correct: false, explanation: "Falsch. Calcineurin-Inhibitoren gehören neben Corticosteroiden und Nukleotid-Synthese-Hemmern (MMF) zu den Basis-Immunsuppressiva. Tacrolimus hat eine SEHR ENGE therapeutische Breite:\n• Unterdosierung → akute Abstoßung\n• Überdosierung → Neuro- und Nephrotoxizität\n\nRegelmäßige Spiegelkontrolle ist daher unbedingt notwendig." },
    { letter: "d", text: "In der Regel wird bei einer soliden Organtransplantation eine Kombination aus immunsuppressiven Medikamenten eingesetzt, um eine Balance zwischen Nutzen und Nebenwirkung zu erreichen.", correct: true, explanation: "Richtig. Drei Hauptmedikamente werden in der Langzeit-Immunsuppression eingesetzt:\n• Calcineurin-Inhibitoren (z. B. Tacrolimus)\n• Corticosteroide\n• Nukleotid-Synthese-Hemmer (MMF)\n\nBei bestimmten Indikationen ergänzend: m-TOR-Inhibitoren oder Zytostatika. Ziel der Kombinationstherapie: Optimierung der Nutzen-Risiko-Relation." },
    { letter: "e", text: "Einige Immunsuppressiva können auch hemmend auf das Tumorwachstum bestimmter Tumoren wirken.", correct: true, explanation: "Richtig. Zytostatika und m-TOR-Inhibitoren können unter bestimmten Umständen auch das Wachstum bösartiger Tumoren hemmen. Eine generelle Empfehlung für deren Einsatz bei Patienten mit Malignom in der Anamnese kann aufgrund der aktuellen Datenlage jedoch nicht ausgesprochen werden." },
  ]},
  { id: 226, chapter: 18, number: 3, text: "Welche Aussagen zur Nachsorge nach solider Organtransplantation treffen zu?", statements: [
    { letter: "a", text: "Die Nachbetreuung nach solider Organtransplantation ist oft aufwendig für den Patienten und das Transplantations-Team. Um die Zuständigkeiten und Verantwortlichkeiten sicher festzulegen, ist die Nachbeobachtung auch in den Richtlinien zur Organtransplantation geregelt.", correct: true, explanation: "Richtig. Ziele der Nachsorge:\n• Möglichst lange Organfunktion erhalten\n• Begleiterkrankungen optimal einstellen\n• Nebenwirkungen der Immunsuppression minimieren\n\nFür ein langes Patienten- und Organüberleben braucht es hohe Patientencompliance und ein engagiertes Transplantationsteam. Die Bundesärztekammer hat die Nachbeobachtung in die Richtlinien aufgenommen." },
    { letter: "b", text: "Grunderkrankungen wie rheumatoide Erkrankungen, Epilepsien oder arterielle Hypertonie können nach der Transplantation in den Hintergrund rücken, da der Funktionserhalt des Transplantats oberste Priorität hat.", correct: false, explanation: "Falsch. Komorbiditäten müssen weiterhin umfassend behandelt werden. Auch die Grunderkrankung, die zur Transplantation führte (HCC, Autoimmunhepatitis), bleibt im Fokus, da Rezidive auftreten können." },
    { letter: "c", text: "Neben Sonographien und Laborkontrollen gehören auch Endoskopien (ÖGD, Kolo) zu den geplanten Nachsorgeuntersuchungen, vor allem wegen des erhöhten Malignom-Risikos.", correct: true, explanation: "Richtig. Das Risiko für gastrointestinale Tumoren ist nach Organtransplantation signifikant erhöht. Endoskopische Vorsorgen werden je nach Befund der Evaluationsuntersuchungen empfohlen. Auch Komorbiditäten wie Colitis ulcerosa oder Folgeerkrankungen einer Zirrhose (z. B. Ösophagusvarizen) müssen kontrolliert werden." },
    { letter: "d", text: "Bei HCC-Patienten endet die Nachsorge nach 5 Jahren analog zur Tumornachsorge.", correct: false, explanation: "Falsch. Die Nachsorge endet KEINESFALLS nach 5 Jahren — weder bei benigner noch bei maligner Indikation. Klare Empfehlung der Fachgesellschaften: lebenslange Nachsorge, da die Immunsuppression lebenslang eingenommen werden muss und Spätkomplikationen (Gallengangsstenose, Rezidiv der Grunderkrankung, Malignome) noch nach Jahren auftreten können." },
    { letter: "e", text: "Nach einer soliden Organtransplantation gilt man automatisch als schwerbeschädigt — von einer Berufstätigkeit nach Transplantation sollte daher dringend abgeraten werden.", correct: false, explanation: "Falsch. Zwar besteht das Recht auf Feststellung einer Schwerbeschädigung (GdB 60 %), aber die Wiederaufnahme der Berufstätigkeit ist — soweit medizinisch vertretbar — in jedem Fall zu befürworten." },
  ]},
  { id: 227, chapter: 18, number: 4, text: "Seit der ersten erfolgreichen Lebertransplantation 1967 durch Prof. Starzl hat sich die Transplantationstechnik nur wenig geändert. Welche Aussagen zur chirurgischen Technik treffen zu?", statements: [
    { letter: "a", text: "Aufgrund der schlechten Durchblutung des Spendergallengangs wird standardmäßig eine biliodigestive Anastomose zum Galleabfluss angelegt.", correct: false, explanation: "Falsch. Der Gallengang wird extrahepatisch aus Ästen der A. hepatica (meist A. hepatica dextra) und der A. gastroduodenalis versorgt. Bei der LTx erfolgt vor der Gallengangsanastomose die A.-hepatica-Anastomosierung — die Perfusion ist meist beidseits ausreichend, sodass primär anastomosiert werden kann. Ausnahmen (primäre biliodigestive Anastomose erwägen): Verletzungen/Devaskularisationen oder primäre Gallengangsveränderungen wie PBC oder PSC." },
    { letter: "b", text: "Bereits von Thomas E. Starzl beschrieben und auch heute oft durchgeführt, erfolgt die Hepatektomie mit dem Segment der retrohepatischen V. cava inferior und eine Cava-Interposition bei der Transplantation.", correct: true, explanation: "Richtig. Bei der orthotopen LTx mit postmortaler Spende wird in vielen Zentren mit der retrohepatischen V. cava hepatektomiert.\n\n**Vorteile:**\n• Wiederherstellung der anatomischen Verhältnisse\n• Keine schwierige V.-cava-Präparation von der Leber\n\n**Nachteil:** Unterbrechung des venösen Rückflusses → eingeschränkte postoperative Nierenfunktion möglich.\n\n**Alternative: Piggy-Back-Technik** — funktionelle End-zu-Seit-Anastomose von ventral. Vermeidet Cava-Unterbrechung, hat aber andere Risiken (venöse Stauung durch Ausflussbehinderung, Cava-Thrombose)." },
    { letter: "c", text: "Die Phase der Anastomosierung der Gefäße vor der Reperfusion zählt zur sogenannten warmen Ischämiezeit und sollte möglichst kurz gehalten werden.", correct: true, explanation: "Richtig. Bei der Transplantation unterscheidet man warme und kalte Ischämiezeit. Beide sollten kurz gehalten werden — die warme ist organschädlicher.\n\n**Warme Ischämiezeit:** Organ im Körper, aber ohne oxygeniertes Blut.\n• 1. Phase: während der Spenderoperation vor Eiswasser\n• 2. Phase: während der Anastomosierung im Empfänger\n\nWegen der annähernd normalen Stoffwechselgeschwindigkeit entstehen hier die größten Schäden." },
    { letter: "d", text: "Die Spenderleber wird arteriell in der Mehrzahl der Fälle über ein Aorteninterponat (zumeist V. saphena magna des Empfängers) rekonstruiert.", correct: false, explanation: "Falsch. Die arterielle Anastomose erfolgt in der Regel direkt zwischen Spender- und Empfänger-A. hepatica. Ein Interponat auf die Aorta ist nur in seltenen Fällen nötig (unzureichender Blutfluss in der Empfängerarterie) und wird meist mit einem Beckenarterieninterponat (Spenderbeckenarterie) realisiert." },
    { letter: "e", text: "Eine partielle Pfortaderthrombose stellt eine technische Kontraindikation zur Transplantation dar.", correct: false, explanation: "Falsch. Eine partielle oder komplette Pfortaderthrombose ist eine häufige Komplikation der Leberzirrhose. Solange die Thromben auf die V. portae beschränkt bleiben und der Konfluenz nicht betroffen ist, ist eine Transplantation technisch aufwändiger, aber sicher durchführbar (z. B. venöses Interponat).\n\nNur eine vollständige V.-mesenterica-Thrombose kann eine Kontraindikation zur Single-LTx darstellen — in solchen Fällen kann eine Multiviszeraltransplantation (Leber + Dünndarm ± Magen ± Pankreas) erwogen werden." },
  ]},
  { id: 228, chapter: 18, number: 5, text: "Aufgrund des Missverhältnisses zwischen postmortalen Spendern und Patienten auf der Warteliste ist die Lebendspende einer Niere oder eines Leberteils eine Chance für viele Patienten. Welche Aussagen zur Lebendspende treffen zu?", statements: [
    { letter: "a", text: "Den Grundstein für die Leberlebendspende hat der in Hannover wirkende Chirurg Rudolph Pichlmayr mit der Methode der Split-Lebertransplantation gelegt.", correct: true, explanation: "Richtig. Erstmals 1988 durchgeführt, legte die Split-LTx den Grundstein für die Leberlebendspende. Pichlmayr und seinem Team gelang es, eine postmortale Spenderleber zu teilen und beide Teile in jeweils einen Empfänger zu transplantieren. Heute wird die postmortale Split-LTx fast ausschließlich für Kind + Erwachsener genutzt; die Leberteilresektion und -transplantation im Rahmen der Lebendspende hat sich weltweit etabliert (größte Erfahrungen in Asien)." },
    { letter: "b", text: "Das Transplantationsgesetz schreibt vor, dass Spender und Empfänger entweder verwandt oder eng emotional verbunden sein müssen — auch enge Freunde dürfen also spenden.", correct: true, explanation: "Richtig. Um Organhandel zu verhindern, gelten in Deutschland strenge Regeln. § 8 Transplantationsgesetz erlaubt die Lebendspende nur an Verwandte 1./2. Grades, Ehegatten, eingetragene Lebenspartner, Verlobte oder andere Personen, die dem Spender 'in besonderer persönlicher Verbundenheit offenkundig nahestehen'." },
    { letter: "c", text: "Während bei einer postmortalen Spende die Allokation nur innerhalb kompatibler Blutgruppen erfolgt, ist bei der Lebendspende auch eine ABO-inkompatible Transplantation möglich.", correct: true, explanation: "Richtig. Bei AB0-inkompatiblen Organen besteht ein hohes Risiko für hyperakute humorale Abstoßung — daher werden postmortal nur blutgruppenkompatible Organe vermittelt. Bei der Lebendspende ist die OP planbar, sodass eine Vorbehandlung mit Immunsuppression und Plasmapherese (Antikörpertiter-Kontrolle) eine ABO-inkompatible Transplantation ermöglicht." },
    { letter: "d", text: "Oberster Grundsatz bei jeder Lebendspende ist es, das Risiko für den Empfänger möglichst gering zu halten.", correct: false, explanation: "Falsch. Die Empfängersicherheit ist wichtig, aber **oberste Priorität bei der Lebendspende hat die Sicherheit des Spenders** — nicht des Empfängers." },
    { letter: "e", text: "Die laparoskopische Nierenlebendspende gilt als technisch machbar, aber nur im Rahmen von Studien durchzuführen — die klassische Nephrektomie sollte bevorzugt werden.", correct: false, explanation: "Falsch. Die laparoskopische Nephrektomie ist heute Standard in der operativen Therapie von Nierentumoren. Abgeleitet davon hat sich die laparoskopische Lebendspende-Nephrektomie etabliert. Bei ausreichender Zentrumserfahrung kann die laparoskopische Spenderoperation routinemäßig angeboten werden — eine Studienteilnahme ist nicht mehr verpflichtend." },
  ]},
  { id: 229, chapter: 18, number: 6, text: "Welche Aussagen zur Nierentransplantation bzw. zur Pankreastransplantation treffen zu?", statements: [
    { letter: "a", text: "Während die Lebertransplantation orthotop unter Entfernung der kranken Leber erfolgt, wird die Nierentransplantation in der Mehrzahl der Fälle heterotop durchgeführt — die Eigennieren verbleiben.", correct: true, explanation: "Richtig. Standard ist die heterotope Nierentransplantation in die Fossa iliaca. Eine Entfernung der Eigenniere ist nicht zwingend.\n\n**Warum Fossa iliaca?**\n• Guter Zugang zu den Beckengefäßen (Anastomose für A. und V. renalis)\n• Harnblase als Anastomosenmöglichkeit für den Ureter\n• Spenderureter sollte kurz gehalten werden — distaler häufiger Nekrosen\n\n**Ausnahme:** polyzystische Leber- und Nierendegeneration — Eigenniere(n) müssen wegen Platzmangels evtl. mitentfernt werden." },
    { letter: "b", text: "Der Diabetes mellitus Typ II stellt die Hauptindikation zur Pankreastransplantation dar.", correct: false, explanation: "Falsch. Beim Diabetes Typ II besteht eine Insulinresistenz und damit nur ein relativer Insulinmangel. Hauptindikationen zur Pankreastransplantation sind der Typ I und selten der Typ III mit absolutem Insulinmangel." },
    { letter: "c", text: "Die Wartezeit bis zur Nierentransplantation richtet sich, außer bei wenigen Ausnahmefällen, nach dem ersten Tag der Dialyse.", correct: true, explanation: "Richtig. Postmortale Nieren werden bei Eurotransplant nach Gesamtdauer der Dialysepflichtigkeit alloziert — je länger ein Patient hämodialysepflichtig ist, desto wahrscheinlicher ein Organangebot.\n\nDurch den Rückgang der Spenderorgane in Deutschland hat sich die Wartezeit verlängert: aktuell ca. 7–10 Jahre nach erster Dialyse bis zur Nierentransplantation." },
    { letter: "d", text: "Nach einer Pankreastransplantation gilt die Post-Transplantations-Pankreatitis als gefürchtete Komplikation.", correct: true, explanation: "Richtig. Ursache nicht vollständig geklärt — vor allem Ischämiezeit und Mikroverletzungen während Organentnahme/Transplantation werden diskutiert. Spektrum reicht von rein laborchemischen Veränderungen bis zu schweren Nekrosen. Die Behandlung ist oft schwierig und komplikationsbehaftet." },
    { letter: "e", text: "Um dem wachsenden Missverhältnis zwischen Organspendern und Patienten auf der Warteliste sowie der zunehmenden Zahl älterer Spenderorgane Rechnung zu tragen, wurde 1999 das Old-for-Old-Nierentransplantationsprogramm von Eurotransplant ins Leben gerufen.", correct: true, explanation: "Richtig. Das Eurotransplant Senior Program (ESP) — auch Old-for-Old — wurde 1999 gestartet. Ziel: auch älteren Patienten eine Chance auf ein Spenderorgan zu ermöglichen.\n\n**Prinzip:** Organe von Spendern > 65 J. werden an Patienten > 65 J. vermittelt.\n\n**Vorteil:** Wartezeit nur ca. 2–4 Jahre (vs. 7–10 Jahre)\n**Nachteil:** Statistisch geringere Organhaltbarkeit — durch das Alter der Empfänger jedoch gut tolerabel." },
  ]},
  { id: 230, chapter: 18, number: 7, text: "Neben dem Organempfänger ist das Spenderorgan der wichtigste Einflussfaktor auf das Outcome nach einer Transplantation. Welche Feststellungen sind richtig?", statements: [
    { letter: "a", text: "Im Bereich von Eurotransplant handelt es sich bei den postmortalen Spendern in der Hauptsache um junge Spender.", correct: false, explanation: "Falsch. Die DSO-Auswertungen zeigen einen kontinuierlichen Abwärtstrend bei jüngeren Organspendern (16–55 Jahre). Aktuell etwa 44 % (2019) — d. h. etwa 52 % der postmortalen Spenderorgane stammen von Spendern > 56 Jahre." },
    { letter: "b", text: "Die Bundesärztekammer hat zur praktischen Umsetzung des Transplantationsgesetzes Verfahrensregeln zur Feststellung des endgültigen, nicht behebbaren Ausfalls der Gesamtfunktion von Großhirn, Kleinhirn und Hirnstamm im Rahmen der Transplantationsrichtlinien aufgestellt.", correct: true, explanation: "Richtig. Diese Verfahrensregeln definieren den 'Hirntod' präzise — die bewusste Schärfung des Begriffs ist wichtig, um den Hirntod klar von anderen Zuständen wie Locked-in-Syndrom oder Intoxikationen abzugrenzen." },
    { letter: "c", text: "Aufgrund des natürlichen Alterungsprozesses und der mittleren Haltbarkeit von Organen sind Spender mit einem Alter über 60 Jahre prinzipiell nicht geeignet.", correct: false, explanation: "Falsch. Ein großer Anteil der Spender ist > 65 Jahre alt. Während Nieren-Glomeruli mit dem Alter abnehmen, sind Hepatozyten in vitro auch im Alter regenerations- und teilungsfähig (auch wenn die Leber einem Alterungsprozess unterliegt).\n\nÄltere Spenderorgane sollten daher nicht grundsätzlich abgelehnt werden — entscheidend ist ein gutes Matching zwischen Spender und Empfänger.", note: "Update: Maschinenperfusion (normotherm und hypotherm) hat sich seit 2021 zunehmend etabliert und ermöglicht bessere Organbeurteilung sowie Konditionierung marginaler Spenderorgane vor Transplantation. Studien zeigen verbesserte Outcomes besonders bei Lebertransplantationen mit DCD-Spendern (donation after circulatory death)." },
    { letter: "d", text: "Die Deutsche Stiftung Organtransplantation (DSO) und Eurotransplant teilen sich die Organisation der Organspende und die Allokation der Organe.", correct: true, explanation: "Richtig. Beide gemeinnützigen Organisationen sind in Deutschland zuständig:\n• **DSO:** logistische Aufgaben der Spenderoperation und des Organtransports\n• **Eurotransplant:** Allokation der Organe, partielle Outcome-Erfassung" },
    { letter: "e", text: "Bei einer Spenderleber sollte die kalte Ischämiezeit möglichst unter 36 Stunden gehalten werden.", correct: false, explanation: "Falsch. Während des Transports lagert das Organ in einer Kardioplegie-/Nährlösung (HTK oder UW) auf Eis = kalte Ischämiezeit.\n\n**Tolerierbare Zeiten:**\n• Junge gesunde Niere: bis 30+ Stunden beschrieben\n• **Spenderleber: möglichst unter 12 Stunden!**\n\nJe mehr Vorschädigung und je älter das Organ, desto kürzer die Ischämietoleranz." },
  ]},
  { id: 231, chapter: 19, number: 1, text: "Welche Aussagen zu Onkogenen sind richtig?", statements: [
    { letter: "a", text: "Bei Onkogenen handelt es sich um exogene Einflussfaktoren, die das Wachstum von Tumoren fördern.", correct: false, explanation: "Falsch. Eine irreversible Schädigung von Protoonkogenen kann zur Ausbildung von Onkogenen führen. Bei fehlender Inaktivierung von Signalproteinen und Wachstumsfaktoren kommt es zu einem Proliferationsreiz und damit zum Tumorwachstum." },
    { letter: "b", text: "Protoonkogene sind Vorstufen von Onkogenen.", correct: true, explanation: "Richtig. Bei Protoonkogenen handelt es sich um die Vorstufe von Onkogenen. Protoonkogene werden jedoch nicht obligat in Onkogene umgewandelt." },
    { letter: "c", text: "Protoonkogene kommen in jeder Zelle des menschlichen Körpers vor.", correct: true, explanation: "Richtig. Protoonkogene sind normale Gene, die in jeder Zelle vorkommen und Proteine kodieren, die für Wachstum, Teilung und Differenzierung einer Zelle verantwortlich sind." },
    { letter: "d", text: "Schädliche Einflüsse auf Protoonkogene können unter anderem durch Viren erfolgen.", correct: true, explanation: "Richtig. Es gibt onkogene DNA-Viren (z. B. HPV, EBV) und RNA-Viren (z. B. HCV, HTLV-1). Weitere schädliche Einflüsse: physikalische Noxen (UV-Strahlung, ionisierende Strahlen) und chemische Substanzen (Asbest, Teer)." },
    { letter: "e", text: "Es gibt Tumore, die in Folge einer Schädigung von Protoonkogenen auftreten.", correct: true, explanation: "Richtig. Beispiele:\n• kras-Mutationen beim kolorektalen Karzinom\n• abl-Translokation bei der CML\n• HER-2/neu beim Mammakarzinom" },
  ]},
  { id: 232, chapter: 19, number: 2, text: "Welche Aussagen zur Karzinogenese (Entstehung von Malignomen) treffen zu?", statements: [
    { letter: "a", text: "Bei Tumorsuppressorgenen müssen beide Allele durch Mutation geschädigt werden, damit diese ihre Funktion verlieren.", correct: true, explanation: "Richtig. Tumorsuppressorgene sind rezessiv und verlieren ihre Funktion erst nach Schädigung beider Allele ('two-hit-theory'). Es wird davon ausgegangen, dass Mutationen an verschiedenen Stellen des Genoms stattfinden." },
    { letter: "b", text: "Die Karzinogenese wird in vier Phasen eingeteilt: Initiation, Promotion, Latenz und Progression.", correct: true, explanation: "Richtig. Das Karzinogenesemodell benennt diese vier Phasen." },
    { letter: "c", text: "In der Initiationsphase werden erste genetische Fehlregulationen ausgelöst.", correct: true, explanation: "Richtig. Wird der Defekt nicht durch Reparaturmechanismen entfernt bzw. besteht ein Verlust tumorregulierender Funktionen auf Zellebene, so kommt es zur Weitergabe des Defekts an Tochterzellen — die Initiationsphase." },
    { letter: "d", text: "Die Promotionsphase beschreibt das zunehmend autonome und schließlich auch invasive Zellwachstum von Tumorzellen.", correct: false, explanation: "Falsch. Unter Promotion versteht man, dass die betroffene Zelle durch Promotoren (Co-Karzinogene) in eine Tumorzelle mit autonomem Mitoserhythmus umgewandelt wird. Funktionsstörungen entstehen an (Proto-)Onkogenen, Reparatur-, Tumorsuppressor- und Apoptose-regulierenden Genen.\n\nDas invasive Wachstum beschreibt die Progressionsphase. Die neoplastische Zellreihe proliferiert mit den erworbenen DNA-Schäden und es kommt zur malignen Transformation." },
    { letter: "e", text: "In der Latenzphase kommt es zu keinen weiteren Schädigungen der Zelle.", correct: false, explanation: "Falsch. In der Latenzphase ist zwar kein Tumorwachstum erkennbar, es erfolgen jedoch weitere DNA-Läsionen, die weitere (Proto-)Onkogene und Tumorsuppressorgene betreffen." },
  ]},
  { id: 233, chapter: 19, number: 3, text: "Welche Aussagen zu Präkanzerosen sind richtig?", statements: [
    { letter: "a", text: "Zu Präkanzerosen zählen chemische Substanzen, die das Krebsrisiko erhöhen.", correct: false, explanation: "Falsch. Bei Präkanzerosen handelt es sich um Gewebeveränderungen, die mit einem statistisch erhöhten Risiko für eine maligne Zellentartung einhergehen — nicht um chemische Substanzen." },
    { letter: "b", text: "Bei Präkanzerosen handelt es sich immer um erworbene Gewebsveränderungen.", correct: false, explanation: "Falsch. Präkanzerosen können angeboren (z. B. familiäre adenomatöse Polyposis) oder erworben (z. B. aktinische Keratose) sein." },
    { letter: "c", text: "Von einer fakultativen Präkanzerose spricht man, wenn das Entartungsrisiko unter 30 % liegt und eine Zeitspanne von mehr als fünf Jahren zwischen Auftreten und Entartung der Präkanzerose vergeht.", correct: true, explanation: "Richtig. Zu fakultativen Präkanzerosen gehören z. B. Leberzirrhose, aktinische Keratose, Leukoplakie. Obligate Präkanzerosen führen hingegen in nahezu 100 % der Fälle zu einer Krebserkrankung." },
    { letter: "d", text: "Beim Peutz-Jeghers-Syndrom handelt es sich um eine Präkanzerose des Gastrointestinaltraktes.", correct: true, explanation: "Richtig. Das Peutz-Jeghers-Syndrom ist eine hamartomatöse Polyposis mit erhöhtem Risiko für GIT-Karzinome und extraintestinale Karzinome (Mamma, Ovar, Pankreas)." },
    { letter: "e", text: "Die häufigste obligate Präkanzerose des Darmkrebses ist die Colitis ulcerosa.", correct: false, explanation: "Falsch. Die Colitis ulcerosa ist eine fakultative (nicht obligate) Präkanzerose. Zu den OBLIGATEN Präkanzerosen des GIT zählen die familiäre adenomatöse Polyposis (FAP) und das Gardner-Syndrom." },
  ]},
  { id: 234, chapter: 19, number: 4, text: "Welche Aussagen zu Tumormarkern sind richtig?", statements: [
    { letter: "a", text: "Tumormarker sind tumorassoziierte Antigene, die auf ein Malignom hindeuten.", correct: true, explanation: "Richtig. Tumormarker werden im Serum gemessen. Ein erhöhter Wert kann auf ein malignes Grundleiden hindeuten — es gibt aber auch andere Gründe für erhöhte Tumormarker." },
    { letter: "b", text: "Tumormarker werden nur von malignen Zellen exprimiert, sodass bei positivem Nachweis eines Markers ein Malignom zugrunde liegt.", correct: false, explanation: "Falsch. In geringem Maße können Tumormarker auch von gesunden Zellen exprimiert werden — z. B. CA 19-9-Erhöhung bei chronischer Pankreatitis, CEA-Erhöhung bei Rauchern." },
    { letter: "c", text: "Liegt der Tumormarker im Referenzbereich, ist das Vorhandensein einer malignen Erkrankung äußerst unwahrscheinlich.", correct: false, explanation: "Falsch. Tumormarker weisen insbesondere im Frühstadium eine geringe Sensitivität auf und sind daher nicht zur Screeninguntersuchung von Tumoren geeignet." },
    { letter: "d", text: "Tumormarker erlauben die frühzeitige Diagnose eines Tumorrezidivs.", correct: true, explanation: "Richtig. Tumormarker spielen bei der primären Diagnostik eine untergeordnete Rolle, werden jedoch für Verlaufskontrollen nach Therapie genutzt. Daher sollten prä- und postoperativ die spezifischen Tumormarker bestimmt werden." },
    { letter: "e", text: "Der Tumormarker CEA ist ausschließlich ein Tumormarker gastrointestinaler Tumoren.", correct: false, explanation: "Falsch. CEA ist primär ein Tumormarker kolorektaler Karzinome, kann aber auch bei Bronchial-, Magen- und Pankreaskarzinomen sowie gynäkologischen Tumoren (Ovarial-, Endometrium-, Mammakarzinom) erhöht sein." },
  ]},
  { id: 235, chapter: 19, number: 5, text: "Welche Aussagen zur Metastasierung eines Karzinoms sind richtig?", statements: [
    { letter: "a", text: "Zellen, die zur Metastasierung fähig sind, unterscheiden sich von denen des Primärtumors.", correct: true, explanation: "Richtig. Durch Mutationen im Primärtumor kommt es zur Bildung metastasierungsfähiger Zellen. Dies sind bewegliche Zellen, die durch Sekretion von Enzymen die extrazelluläre Matrix auflösen und sich so vermehren." },
    { letter: "b", text: "Nach Translokation der Metastasenzellen in das Zielorgan kommt es immer zur Metastasierung.", correct: false, explanation: "Falsch. Im Gewebe des Zielorgans muss es zur Angiogenese der Tumorzellen kommen, damit sich aus den Mikrometastasen Metastasen bilden können." },
    { letter: "c", text: "Nur maligne Tumoren können metastasieren.", correct: true, explanation: "Richtig. Nur maligne Tumoren metastasieren — wobei wenige maligne Tumoren NICHT metastasieren (z. B. Basaliom, maligne Gliome)." },
    { letter: "d", text: "Metastasen können in allen Organen auftreten.", correct: true, explanation: "Richtig. Tumormetastasen werden in allen Organen beobachtet. Eine Ausnahme bildet die Augenlinse — dort wurden bisher keine Metastasen beschrieben." },
    { letter: "e", text: "Es gibt verschiedene Metastasierungswege. Bei der kavitären Metastasierung können Metastasen unter anderem durch die Schwerkraft gefördert werden.", correct: true, explanation: "Richtig. Die kavitäre Metastasierung entsteht durch Einbruch von Tumorzellen in Körperhöhlen. Die Verschleppung kann durch peristaltische Bewegungen oder Schwerkraft gefördert werden. So entsteht der **Krukenberg-Tumor** beim Magenkarzinom (Abtropfmetastase im Bereich der Ovarien)." },
  ]},
  { id: 236, chapter: 19, number: 6, text: "Welche Aussagen zur Klassifikation von Tumoren sind richtig?", statements: [
    { letter: "a", text: "Mit der TNM-Klassifikation wird die Tumorausbreitung beschrieben.", correct: true, explanation: "Richtig. Die TNM-Klassifikation ist international anerkannt und standardisiert. TNM steht für 'Tumor', 'Nodus' und 'Metastasen'." },
    { letter: "b", text: "Je höher das Grading, desto gutartiger ist der Tumor, da die Zellen bei einer high-grade-Dysplasie besser differenziert sind.", correct: false, explanation: "Falsch. Grading beschreibt den Differenzierungsgrad von G1 bis G3 (teilweise bis G4). Je NIEDRIGER das Grading, desto besser ist der Tumor differenziert. High-grade-Dysplasien sind also schlecht differenziert." },
    { letter: "c", text: "'T' beschreibt die Ausdehnung des Primärtumors.", correct: true, explanation: "Richtig. 'T' für 'Tumor' beschreibt die Ausdehnung:\n• Tcis: Carcinoma in situ, Basalmembran intakt\n• T1–4: je nach Eindringtiefe ins Gewebe\n• T4: Infiltration der Nachbarorgane" },
    { letter: "d", text: "Vor der TNM-Klassifikation können mit einem Kürzel weitere Informationen angegeben werden.", correct: true, explanation: "Richtig. Präfixe ergänzen die TNM:\n• y: nach neoadjuvanter Therapie\n• u: Staging durch Endosonographie\n• p: histopathologisches Staging\n• c: klinisches Staging\n• r: Staging bei Rezidiv" },
    { letter: "e", text: "Bei einer R0-Resektion ist die Beachtung der Sicherheitsabstände hinfällig.", correct: false, explanation: "Falsch. R0 bedeutet, dass kein Residualtumor mehr nachweisbar bzw. vollständig entfernt worden ist. Dennoch ist auf einen ausreichenden Sicherheitsabstand zu achten — dies steigert die tumorfreie Überlebenszeit. Der Sicherheitsabstand variiert je nach Tumorentität bzw. -lokalisation." },
  ]},
  { id: 237, chapter: 19, number: 7, text: "Welche Aussagen zur lymphogenen Metastasierung treffen zu?", statements: [
    { letter: "a", text: "Lymphknotenmetastasen gehören zu den regionären Metastasen.", correct: true, explanation: "Richtig. Bei regionären Lymphknotenmetastasen spricht man von lymphogenen Metastasen. Erfassung in der TNM-Klassifikation durch Kategorie 'N' (Nodus). N1–3 umfasst die Anzahl der regionär positiven Lymphknotenmetastasen." },
    { letter: "b", text: "Das Abfangen von Tumorzellen in Lymphknoten setzt eine geringe Anzahl von Tumorzellen voraus.", correct: true, explanation: "Richtig. Ist die Tumorzellzahl zu hoch, wird der Lymphknoten mit Tumorzellen durchsetzt und wirkt anschließend wie ein Verteiler von Tumorzellen." },
    { letter: "c", text: "Die lymphogene Metastasierung ist in der Regel die erste Metastasenmanifestation eines malignen Tumors.", correct: false, explanation: "Falsch. Die Frage, ob ein maligner Tumor lymphogen metastasiert, hängt vom Primärtumor ab — es ist nicht zwingend die erste Manifestation." },
    { letter: "d", text: "Ist der Wächterlymphknoten (sentinel lymph node) tumorzellfrei, kann auf eine aggressive Lymphknotendissektion verzichtet werden.", correct: true, explanation: "Richtig. Die Detektion des Wächterlymphknotens erfolgt mittels Farbstoffinjektion. Bei Tumorfreiheit ist die Wahrscheinlichkeit einer disseminierten Lymphknotenmetastasierung gering. Etabliert ist das Verfahren beim Mammakarzinom und beim malignen Melanom." },
    { letter: "e", text: "Unter der Lymphangiosis carcinomatosa versteht man das Anhaften von Tumorzellen in den Lymphgefäßen.", correct: true, explanation: "Richtig. Anschließend können sich die Tumorzellen weiter ausbreiten und über den Ductus thoracicus in die Blutbahn gelangen." },
  ]},
  { id: 238, chapter: 19, number: 8, text: "Welche Aussagen zur hämatogenen Metastasierung sind richtig?", statements: [
    { letter: "a", text: "Die hämatogene Metastasierung hat die Ausbildung von Fernmetastasen zur Folge.", correct: true, explanation: "Richtig. Fernmetastasen entstehen über hämatogene Metastasierungswege, wenn Tumorzellverbände in Venen abschilfern und einen Anschluss an das Gefäßsystem erlangt haben. Erfassung durch die 'M'-Kategorie der TNM-Klassifikation." },
    { letter: "b", text: "Eine Vorstufe der hämatogenen Ausbreitung von Fernmetastasen ist die Haemangiosis carcinomatosa.", correct: true, explanation: "Richtig. Die Haemangiosis carcinomatosa beschreibt den Einbruch von Tumorzellen in das Blutgefäßsystem. Erfassung in der TNM-Klassifikation als 'V1' (positiver Nachweis) oder 'V0' (kein Nachweis)." },
    { letter: "c", text: "Die Metastase setzt sich bevorzugt im ersten Organ des jeweiligen venösen Abstroms fest.", correct: true, explanation: "Richtig. Der 'Filtertheorie' zufolge werden Tumorzellen im ersten Organ des venösen Abstroms gefiltert. In der Regel erfolgt erst später die Streuung in den Gesamtkreislauf." },
    { letter: "d", text: "Bei der hämatogenen Metastasierung unterscheidet man verschiedene Typen, welche nach der typischen Lokalisation der ersten Metastase benannt werden.", correct: true, explanation: "Richtig. Es wird unterschieden:\n• **Cava-Typ:** Metastasierung in die Lunge\n• **Pfortadertyp:** Metastasierung in die Leber\n\nDiese Einteilung spiegelt die realen Wege der Tumorausbreitung jedoch nur begrenzt wider." },
    { letter: "e", text: "Die Tumore des Verdauungstraktes gehören dem Pfortadertyp an.", correct: true, explanation: "Richtig. Karzinome des Ösophagus, Magens, Dünn- und Dickdarms, des oberen Rektums und des Pankreas metastasieren über die V. portae → eher Lebermetastasen.\n\nPrimärtumoren des unteren Rektums, Knochen, Niere, Leber, Kopf und Hals metastasieren typischerweise über die V. cava in die Lunge." },
  ]},
  { id: 239, chapter: 19, number: 9, text: "Welche der folgenden Aussagen zur Peritonealkarzinose sind zutreffend?", statements: [
    { letter: "a", text: "Eine primäre Karzinose des Peritoneums bedeutet, dass bei Diagnosestellung des Primärtumors ein Befall des Peritoneums vorliegt.", correct: false, explanation: "Falsch. Der Begriff der primären Peritonealkarzinose wird verwendet, wenn der Primärtumor das maligne Mesotheliom oder ein Peritonealkarzinom ist." },
    { letter: "b", text: "Von einer sekundären Peritonealkarzinose spricht man, wenn der Primärtumor nicht vom Peritoneum ausgeht und zu einem späteren Zeitpunkt festgestellt wird.", correct: false, explanation: "Falsch. Der Zeitpunkt des Auftretens bestimmt nicht die Einteilung. Eine sekundäre Peritonealkarzinose beschreibt die Metastasierung eines Primärtumors ins Peritoneum. Sonderform: **Pseudomyxoma peritonei** (Ursprung meist in muzinösen Neoplasien der Appendix)." },
    { letter: "c", text: "Eine Peritonealkarzinose des Peritoneums infolge eines Ovarialkarzinoms lässt sich nicht sicher vom Peritonealkarzinom differenzieren.", correct: true, explanation: "Richtig. Das primäre Peritonealkarzinom ist epithelialen Ursprungs und hat klinisch, morphologisch und prognostisch große Ähnlichkeit zum Ovarialkarzinom." },
    { letter: "d", text: "Tumorzellverschleppung während der Primärtumorresektion eines Tumors kann eine Peritonealkarzinose begünstigen.", correct: true, explanation: "Richtig. Durch Manipulation kommt es zu mikroskopischer Schädigung der Tumoroberfläche, was eine Metastasierung im Peritoneum und im Wundkanal begünstigen kann." },
    { letter: "e", text: "Es kann sowohl durch hämatogene als auch durch lymphogene Ausbreitung zur Peritonealkarzinose kommen.", correct: true, explanation: "Richtig. Die lymphogene peritoneale Metastasierung tritt eher beim Ovarial- und Kolonkarzinom auf. Die hämatogene peritoneale Metastasierung kommt hingegen beim Mammakarzinom und malignen Melanom vor." },
  ]},
  { id: 240, chapter: 19, number: 10, text: "Welche der folgenden Tumoren weisen selten eine sekundäre Peritonealkarzinose auf?", statements: [
    { letter: "a", text: "Magenkarzinom.", correct: false, explanation: "Falsch. Das Magenkarzinom ist der zweithäufigste Tumor des GIT. In ca. 20–30 % der Fälle wird eine peritoneale Aussaat beobachtet." },
    { letter: "b", text: "Mammakarzinom.", correct: false, explanation: "Falsch. Beim Mammakarzinom kommt es in ca. 15 % der Fälle zu einer Peritonealkarzinose." },
    { letter: "c", text: "Kolonkarzinom.", correct: false, explanation: "Falsch. Kolonkarzinome weisen in 10–15 % der Fälle eine Peritonealkarzinose auf." },
    { letter: "d", text: "Ovarialkarzinom.", correct: false, explanation: "Falsch. Beim Ovarialkarzinom zeigt sich bei 60–75 % der Erkrankten bei Erstdiagnose bereits eine Peritonealkarzinose." },
    { letter: "e", text: "Pankreaskarzinom.", correct: true, explanation: "Richtig. Nur bei ca. 5 % der Patienten mit Pankreaskarzinom entwickelt sich eine Peritonealkarzinose. Viele Pankreaskarzinome sind bei Diagnosestellung jedoch lokal fortgeschritten und damit inoperabel." },
  ]},
  { id: 241, chapter: 19, number: 11, text: "Welche Aussagen über HIPEC (Hyperthermic Intraperitoneal Chemotherapy) treffen zu?", statements: [
    { letter: "a", text: "Retroperitoneale Tumormassen stellen eine Indikation für HIPEC dar.", correct: false, explanation: "Falsch. Retroperitoneale Tumormassen, kleinknotiger diffuser Befall, schwere Komorbiditäten, Lymphknotenbefall und Progress unter Chemotherapie sind KONTRAINDIKATIONEN für HIPEC. Geeignet ist HIPEC für operable Patienten ohne Fernmetastasen mit ausreichend gesundem Dünndarm." },
    { letter: "b", text: "Kolonkarzinome sind für eine HIPEC-Therapie geeignet.", correct: false, explanation: "Falsch. Studien zeigen, dass HIPEC beim Kolonkarzinom keine signifikante Verbesserung des Überlebens bringt — daher nicht mehr empfohlen. Indikationen sind: Magenkarzinom, Pseudomyxoma peritonei und malignes Mesotheliom." },
    { letter: "c", text: "Für ein Langzeitüberleben ist die komplette Zytoreduktion mit anschließender HIPEC und adjuvanter Chemotherapie ggf. unter zusätzlicher Gabe eines Antikörpers (z. B. Cetuximab, Catumaxomab) notwendig.", correct: true, explanation: "Richtig. Nur bei kompletter Zytoreduktion mit nachfolgender HIPEC und Chemotherapie zeigt sich unabhängig der Tumorentität eine signifikante Verbesserung des Überlebens." },
    { letter: "d", text: "Es wird der synergistische Effekt der Hyperthermie mit der Gabe eines Chemotherapeutikums ausgenutzt.", correct: true, explanation: "Richtig. HIPEC nutzt den synergistischen Effekt von Hyperthermie und Chemotherapeutikum.\n\n**Beispiel-Protokoll:** Induktion einer intraabdominellen Hyperthermie von 42 °C, anschließend Oxaliplatin 300 mg/m² intraperitoneal sowie 5-FU 400 mg/m² + 20 mg/m² Natriumfolinat intravenös über 30 Minuten." },
    { letter: "e", text: "Low-grade muzinöse Neoplasien der Appendix (LAMN) werden als Vorstufen des Pseudomyxoma peritonei angesehen.", correct: true, explanation: "Richtig. LAMN sind schleimbildende Tumoren des Appendixlumens. Sie können im Verlauf zur Ruptur der Appendix und Aussaat in der Bauchhöhle führen — daher gelten LAMN als Vorstufen des Pseudomyxoma peritonei (PMP)." },
  ]},
  { id: 242, chapter: 19, number: 12, text: "Welche Aussagen über generelle Indikationen zur Gabe von Zytostatika treffen zu?", statements: [
    { letter: "a", text: "Die neoadjuvante Zytostatikatherapie wird präoperativ zur Tumorreduktion angewandt.", correct: true, explanation: "Richtig. Die neoadjuvante Therapie bezeichnet Zytostatika-Gabe und/oder Radiatio vor einer geplanten Operation mit dem Ziel des 'Down-Stagings' (Tumorreduktion)." },
    { letter: "b", text: "Nach neoadjuvanter Therapie wird postoperativ keine weitere Zytostatikagabe empfohlen.", correct: false, explanation: "Falsch. Nach präoperativer Zytostatikatherapie wird postoperativ die sogenannte Komplettierung empfohlen — vorausgesetzt, der Patient verträgt dies physisch." },
    { letter: "c", text: "Die sogenannte Konditionierung kommt in der Viszeralchirurgie nicht zur Anwendung.", correct: true, explanation: "Richtig. Als Konditionierung bezeichnet man die Gabe einer hohen Zytostatikadosis, ggf. in Kombination mit Ganzkörperradiatio. Anwendung z. B. zur Ausschaltung des Knochenmarks vor Knochenmark- oder Stammzelltransplantationen." },
    { letter: "d", text: "Die adjuvante Zytostatikatherapie erfolgt perioperativ.", correct: false, explanation: "Falsch. Die adjuvante Zytostatikatherapie erfolgt POSTOPERATIV (nachdem das histopathologische Tumorstadium bekannt ist) zur Senkung des Rezidivrisikos und Verbesserung der Langzeitprognose." },
    { letter: "e", text: "Eine palliative Zytostatikatherapie kann Tumor-assoziierte Symptome lindern.", correct: true, explanation: "Richtig. Bei fortgeschrittenem Tumorleiden ohne chirurgische Resektionsoptionen kann eine palliative Zytostatikatherapie eine Verringerung der Morbidität und Verlängerung der Lebenszeit ermöglichen." },
  ]},
  { id: 243, chapter: 19, number: 13, text: "Welche der folgenden Zytostatika-Kombinationstherapien finden bei welchen Tumorerkrankungen Anwendung?", statements: [
    { letter: "a", text: "FLOT bei AEG-Karzinomen.", correct: true, explanation: "Richtig. FLOT (Docetaxel, Oxaliplatin, 5-FU, Folinsäure) ist Standard für die perioperative Therapie bei AEG-Karzinomen und Adenokarzinomen des Magens.\n\nOxaliplatin gehört zur Gruppe der Alkylanzien — hohes emetogenes, oto-, nephro- und neurotoxisches Potential. 5-FU wird durch Folinsäure verstärkt. Spezifische Nebenwirkung: Myelosuppression." },
    { letter: "b", text: "FOLFOX bei Kolonkarzinomen.", correct: true, explanation: "Richtig. FOLFOX (Oxaliplatin, 5-FU, Folinsäure) wird beispielsweise adjuvant beim nicht-metastasierten Kolonkarzinom (UICC III) angewandt." },
    { letter: "c", text: "Trastuzumab bei negativem HER-2/neu-Status.", correct: false, explanation: "Falsch. Trastuzumab wird bei POSITIVEM HER-2/neu-Status eingesetzt — regelhaft beim Mammakarzinom. In der Viszeralchirurgie: palliative Therapie des HER2-positiven Ösophagus- und Magenkarzinoms (in Kombination mit Cisplatin und Fluoropyrimidin z. B. Capecitabin).", note: "Update seit 2021: Beim HER2-positiven metastasierten Magenkarzinom ist die Kombination Trastuzumab + Pembrolizumab + Chemotherapie inzwischen Erstlinienstandard (KEYNOTE-811-Studie). Trastuzumab Deruxtecan (Enhertu) hat sich für die Zweitlinientherapie etabliert (DESTINY-Gastric01, 2020)." },
    { letter: "d", text: "FOLFIRINOX bei Pankreaskarzinomen.", correct: true, explanation: "Richtig. FOLFIRINOX (Oxaliplatin, 5-FU, Folinsäure, Irinotecan) wird palliativ bei Patienten mit fortgeschrittenem oder metastasiertem Pankreaskarzinom empfohlen — bei gutem Allgemeinzustand (ECOG ≤ 1, Alter bis 75 Jahre).\n\nGemcitabin als Monotherapie ist Mittel der Wahl als Standardtherapie des fortgeschrittenen Pankreaskarzinoms oder bei Progress unter FOLFIRINOX." },
    { letter: "e", text: "XELOX bei Ösophaguskarzinomen.", correct: false, explanation: "Falsch. XELOX (Capecitabin und Oxaliplatin) wird in der Behandlung des Kolonkarzinoms als adjuvantes Zytostatikum oder im Rahmen der Erstlinientherapie im metastasierten Stadium eingesetzt — nicht primär bei Ösophaguskarzinomen." },
  ]},
  { id: 244, chapter: 19, number: 14, text: "Welche Aussagen zur Strahlentherapie sind korrekt?", statements: [
    { letter: "a", text: "Insbesondere Zellen mit langsamer Zellteilung werden durch die Strahlentherapie zerstört.", correct: false, explanation: "Falsch. Durch ionisierende Strahlung kommt es zu einer Hemmung der Zellteilung und subsequent zur Zellzerstörung. Dies ist besonders bei Zellen mit HOHER Teilungsrate effektiv." },
    { letter: "b", text: "Im Rahmen des neoadjuvanten Therapiekonzeptes des Rektumkarzinoms kommt nur eine konventionell fraktionierte Radiatio in Frage.", correct: false, explanation: "Falsch. Beim neoadjuvanten Konzept des Rektumkarzinoms gibt es zwei Optionen:\n• Konventionell fraktionierte Radiotherapie: 45–50 Gy Gesamtstrahlendosis + Zytostatika (5-FU oder Capecitabin)\n• Kurzzeitbestrahlung: 5 × 5 Gy an aufeinanderfolgenden Tagen, mit/ohne Zytostatika\n\nEine Radiatio bei Kolonkarzinomen ist nicht indiziert (nicht strahlensensibel).", note: "Update seit 2021: Total neoadjuvante Therapie (TNT) hat sich für lokal fortgeschrittene Rektumkarzinome zunehmend etabliert (RAPIDO- und PRODIGE-23-Studien). Bei MSI-high/dMMR Rektumkarzinom zeigte Dostarlimab 100 % komplette pathologische Remission ohne OP (NYU-Studie 2022). 'Watch and wait' nach klinischer Komplettremission gewinnt an Bedeutung." },
    { letter: "c", text: "Die Strahlentherapie kann entweder palliativ oder adjuvant erfolgen.", correct: false, explanation: "Falsch. Die Strahlentherapie ist in der Viszeralchirurgie eine wichtige Behandlungssäule. Sie kann erfolgen:\n• Kurativ (z. B. Prostatakarzinom)\n• Neoadjuvant zum Downstaging (z. B. Rektum-, Ösophaguskarzinom)\n• Adjuvant postoperativ (z. B. Mammakarzinom)\n• Palliativ (z. B. fortgeschrittenes Ösophaguskarzinom, auch zur Schmerzlinderung)" },
    { letter: "d", text: "Als Fraktionierung der Strahlendosis wird die Aufteilung in kleinere Einzeldosen bezeichnet.", correct: true, explanation: "Richtig. Die geplante Gesamtstrahlendosis wird auf tägliche Einzeldosen aufgeteilt — bessere Verträglichkeit ohne Wirkungsverlust. Maligne Zellen besitzen ein geringeres Potential zur Zellreparation und werden daher primär durch die Strahlentherapie zerstört." },
    { letter: "e", text: "Die Nebenwirkungen der Strahlentherapie werden in akut und chronisch unterteilt.", correct: true, explanation: "Richtig.\n• **Akute Strahlenreaktionen** (Tage bis Wochen): GI-Symptome, Entzündungen der Haut/Schleimhäute, Beeinträchtigung des blutbildenden Systems\n• **Chronische Strahlenschäden** (Jahre später): erhöhtes kardiovaskuläres Risiko, Fertilitätsstörungen, erhöhtes Risiko für Zweitkarzinome (Lymphome, Schilddrüsenkarzinome)" },
  ]},
  { id: 245, chapter: 20, number: 1, text: "Welche Aussagen zur Sepsis sind korrekt?", statements: [
    { letter: "a", text: "Der quick Sepsis-related Organ Failure Assessment (qSOFA)-Score selektiert Patienten mit hohem Letalitätsrisiko.", correct: true, explanation: "Richtig. Der qSOFA-Score ist eine Kurzform des SOFA-Scores und dient der präklinischen/klinischen Risikobeurteilung außerhalb einer Intensivstation.\n\n**Je 1 Punkt für:**\n• Tachypnoe ≥ 22/min\n• Hypotonie systolisch < 100 mmHg\n• Vigilanzminderung mit GCS < 15\n\nBei ≥ 2 Punkten steigt das Risiko einer septischen Organdysfunktion (bis 14-fach erhöhte Mortalität). Allerdings haben nur 20 % der Patienten zum Zeitpunkt des Infektionsverdachts und nur 50 % bei Aufnahme auf eine Intensivstation einen qSOFA ≥ 2." },
    { letter: "b", text: "Der Sepsis-3 Definition zufolge ist Sepsis eine lebensbedrohliche Organdysfunktion, die durch eine fehlregulierte Immunantwort des Körpers auf eine Infektion hervorgerufen wird.", correct: true, explanation: "Richtig. Die Sepsis-3 Kriterien wurden in der internationalen Konsenskonferenz 02/2016 festgelegt. Neu in dieser Definition ist die Betonung auf 'Infektion' als Grund für die Sepsis." },
    { letter: "c", text: "In der Sepsis-3 Definition ist der septische Schock eine Unterform der Sepsis.", correct: true, explanation: "Richtig. Der septische Schock ist eine Unterform der Sepsis, bei der die Störungen von Kreislauf, Metabolismus und Zellfunktion so ausgeprägt sind, dass die Sterblichkeit erheblich ansteigt." },
    { letter: "d", text: "Die höchste prädiktive Validität bezüglich klinischer Verschlechterung besitzt das sogenannte Early Warning System (EWS).", correct: true, explanation: "Richtig. Das EWS basiert auf einer Punkteerhebung für: Sauerstoffsättigung, Herzfrequenz, Blutdruck, subjektive Schmerzen, Körpertemperatur und Atemfrequenz. Daraus wird ein Risikoscore für klinische Verschlechterung berechnet, der auch im Vergleich zu früheren Messungen beurteilt werden kann." },
    { letter: "e", text: "Der schnellstmögliche Beginn einer kalkulierten antibiotischen Therapie ist essenziell.", correct: true, explanation: "Richtig. Studien zeigen:\n• Antibiotikabeginn innerhalb 30 Minuten: ~ 82 % Überlebenschance\n• Innerhalb 60 Minuten: ~ 77 %\n• Anschließend Abnahme um 7–10 % je weiterer verzögerter Stunde\n\nDie kalkulierte Antibiose richtet sich nach vermutetem Fokus, Erregerspektrum und Resistenzlage. Blutkulturen vor primärer Antibiose sind essentiell.", note: "Update: Die Surviving Sepsis Campaign Guidelines (zuletzt 2021/2024) empfehlen heute strikte 'Hour-1 Bundle' — Laktatmessung, Blutkulturen, Breitspektrum-Antibiose, Volumengabe (30 ml/kg bei Hypotonie/Laktat ≥ 4) und Vasopressoren falls nötig — alle innerhalb der ersten Stunde. Der qSOFA wird inzwischen NICHT mehr zum Sepsis-Screening empfohlen — stattdessen NEWS oder MEWS, da qSOFA eine niedrige Sensitivität hat." },
  ]},
  { id: 246, chapter: 20, number: 2, text: "Welche Aussagen zu tiefen Beinvenenthrombosen (TVT) sind korrekt?", statements: [
    { letter: "a", text: "Eine Homozygotie für das Faktor V Leiden (APC-Resistenz) steigert das Risiko für eine TVT nicht.", correct: false, explanation: "Falsch. Faktor V Leiden ist die häufigste hereditäre Thrombophilie:\n• Homozygotie: 80-fach erhöhtes Risiko\n• Heterozygotie: ca. 8-fach erhöhtes Risiko\n\nWeitere Thrombophilien: Faktor-VIII-Erhöhung, Prothrombin-Mutation, Protein-C/S-Mangel, Antithrombin-Mangel." },
    { letter: "b", text: "Eine positive Anamnese für TVT steigert das Risiko um das 50-fache.", correct: false, explanation: "Falsch. Eine positive Anamnese steigert das Risiko ca. 30-fach (nicht 50-fach). Weitere Risikofaktoren: Immobilisation, Adipositas, Alter > 60 Jahre und Malignome." },
    { letter: "c", text: "Das Risiko für eine vorliegende TVT kann mittels des Wells-Scores berechnet werden.", correct: true, explanation: "Richtig. Wells hat sowohl für TVT als auch für Lungenarterienembolie einen Score entwickelt.\n\n**Je 1 Punkt für:**\n• Aktive Krebserkrankung\n• Frühere dokumentierte TVT\n• Lähmung/kürzliche Immobilisation\n• Bettruhe > 3 Tage oder große OP < 12 Wochen\n• Schmerz/Verhärtung entlang der tiefen Venen\n• Schwellung des gesamten Beines\n• Unterschenkelumfang > 3 cm größer als Gegenseite\n• Eindrückbares Ödem am symptomatischen Bein\n• Sichtbare Kollateralvenen\n\nBei ≥ 2 Punkten: hohe TVT-Wahrscheinlichkeit. 2 Punkte werden abgezogen, wenn eine alternative Diagnose genauso wahrscheinlich ist." },
    { letter: "d", text: "TVT der Unterschenkelvenen treten am häufigsten auf.", correct: false, explanation: "Falsch. Verteilung:\n• Oberschenkelvenenthrombose (Lig. inguinale–Fossa poplitea): ~ 50 %\n• Becken- und Poplitealvenenthrombosen: je 10–20 %\n• Unterschenkelthrombosen: 20–30 %\n\nJe proximaler die Thrombose, desto höher das Embolie- und Rezidivrisiko." },
    { letter: "e", text: "Die Behandlung der TVT beinhaltet eine orale Antikoagulation für sechs Monate.", correct: false, explanation: "Falsch. Empfohlen wird eine Antikoagulation für mindestens 5 Tage mit NMH oder DOAK. Zusätzlich Mobilisation und Kompressionstherapie der betroffenen Extremität für mindestens 3 Monate.", note: "Die Therapiedauer hängt heute vom Ursachenprofil ab: provoziert (3 Monate), idiopathisch oder Tumor-assoziiert (zeitlich unbegrenzt zu prüfen). DOAK (Apixaban, Rivaroxaban, Dabigatran, Edoxaban) sind mittlerweile First-line — im Buch 'mindestens 5 Tage NMH oder DOAK' war für die Akutphase bis zur DOAK-Vollwirkung gemeint." },
  ]},
  { id: 247, chapter: 20, number: 3, text: "Welche Aussagen zur Lungenarterienembolie (LAE) treffen zu?", statements: [
    { letter: "a", text: "Die Wahrscheinlichkeit einer LAE wird anhand des Wells-Score berechnet.", correct: true, explanation: "Richtig. Vereinfachter Wells-Score für LAE — je 1 Punkt für:\n• Klinische Zeichen einer TVT\n• Lungenembolie wahrscheinlich\n• Frühere LAE/TVT\n• Tachykardie (HF > 100/min)\n• OP/Immobilisation innerhalb des letzten Monats\n• Hämoptysen\n• Malignom\n\n**Auswertung:** 0–1 Punkte: LAE unwahrscheinlich. ≥ 2 Punkte: wahrscheinlich." },
    { letter: "b", text: "70 % der TVT bleiben asymptomatisch.", correct: false, explanation: "Falsch. Etwa 50 % der TVT bleiben asymptomatisch (nicht 70 %)." },
    { letter: "c", text: "Als inzidentelle LAE werden zufällig bei anderweitig indiziertem CT Thorax entdeckte LAE beschrieben.", correct: true, explanation: "Richtig. Inzidentelle LAE werden am häufigsten bei Patienten mit Malignomen und chronischen kardiopulmonalen Erkrankungen diagnostiziert. Eindeutige Evidenz zur Behandlung gibt es nicht — empfohlen wird eine therapeutische Antikoagulation für 3 Monate (bei onkologischen Patienten ggf. länger)." },
    { letter: "d", text: "Die Diagnose einer LAE erfolgt mit einem nativen CT des Thorax.", correct: false, explanation: "Falsch. Standard bei Verdacht auf LAE ist die **CT-Angiographie des Thorax** (kontrastmittelgestützt), nicht ein natives CT." },
    { letter: "e", text: "Negative D-Dimere schließen mit hoher Wahrscheinlichkeit eine TVT oder LAE aus.", correct: true, explanation: "Richtig. Negative D-Dimere haben einen hohen negativen prädiktiven Wert. Im Rahmen einer postoperativen Beurteilung sind D-Dimere jedoch selten verwertbar (postop fast immer erhöht), sodass eine Testung in diesen Fällen nicht relevant ist." },
  ]},
  { id: 248, chapter: 20, number: 4, text: "Welche Aussagen zum Ileus sind korrekt?", statements: [
    { letter: "a", text: "Man unterscheidet zwischen mechanischem und paralytischem Ileus.", correct: true, explanation: "Richtig.\n• **Mechanischer Ileus:** mechanisches Hindernis (z. B. Briden, Tumor, Adhäsionen)\n• **Paralytischer Ileus:** Störung der Motilität" },
    { letter: "b", text: "Die Behandlung des paralytischen Ileus erfolgt operativ.", correct: false, explanation: "Falsch. Der paralytische Ileus wird KONSERVATIV behandelt: flüssige Kost, prokinetische und abführende Maßnahmen. Nur in schweren Einzelfällen kann eine operative Revision mit Lavage oder Dekompression erwogen werden." },
    { letter: "c", text: "Die Behandlung des mechanischen Ileus erfolgt konservativ.", correct: false, explanation: "Falsch. Der mechanische Ileus wird üblicherweise OPERATIV behandelt — das mechanische Hindernis muss behoben und eine ischämische Komponente ausgeschlossen werden. Bei chronischen Verwachsungsbäuchen mit Subileus-Symptomatik kann ein konservativer Therapieversuch erwogen werden." },
    { letter: "d", text: "Nach kolorektaler Chirurgie tritt postoperativ häufig ein paralytischer Ileus auf.", correct: true, explanation: "Richtig. Ein paralytischer Ileus oder Subileus tritt bei über der Hälfte der Patienten nach kolorektalen Eingriffen auf." },
    { letter: "e", text: "Ist eine mechanische Komponente nicht auszuschließen, sollte die Durchführung einer Sonographie bzw. einer Computertomographie erfolgen.", correct: true, explanation: "Richtig. Bei Verdacht auf mechanische Komponente: Sonographie und/oder CT zur Lokalisation und Charakterisierung des Hindernisses." },
  ]},
  { id: 249, chapter: 20, number: 5, text: "Welche Aussagen zu postoperativen Komplikationen nach kolorektalen Eingriffen sind zutreffend?", statements: [
    { letter: "a", text: "Chemo- oder Radiotherapien stellen keinen Risikofaktor für Anastomoseninsuffizienzen dar.", correct: false, explanation: "Falsch. Chemo-/Radiotherapien sind ein Risikofaktor für Anastomoseninsuffizienzen. Daher Abstand von 4–8 Wochen zwischen Therapie und OP empfohlen (variierend je nach Tumorentität/-lokalisation).\n\n**Weitere Risikofaktoren:** Notfalleingriffe, infiltrierende Malignome, Immunsuppression, katabole Stoffwechsellage/Malnutrition." },
    { letter: "b", text: "Die Anastomoseninsuffizienz ist die häufigste Ursache einer postoperativen Sepsis nach kolorektalen Eingriffen.", correct: true, explanation: "Richtig. Klinisch ist auf Drainagesekrete, abdominelle Schmerzen, Fieber und erhöhte Entzündungswerte zu achten." },
    { letter: "c", text: "Ein noch deutlich erhöhtes CrP am 3. postoperativen Tag ist postoperativ üblich.", correct: false, explanation: "Falsch. Eine **CrP-Erhöhung > 150 mg/l zwischen dem 3.–5. postoperativen Tag** gilt als sensitivster laborchemischer Marker einer Anastomoseninsuffizienz. Patienten mit erhöhten postoperativen Infektwerten sollten daher klinisch besonders beobachtet werden — ggf. weitere diagnostische Maßnahmen einleiten." },
    { letter: "d", text: "Die Behandlung von Anastomoseninsuffizienzen in der kolorektalen Chirurgie sollte chirurgisch erfolgen.", correct: true, explanation: "Richtig. Je nach intraoperativem Befund:\n• Übernähung oder Neuanlage der Anastomose (meist mit protektivem Stoma)\n• Bei ausgeprägten Befunden (z. B. fäkale 4-Quadranten-Peritonitis): endständiges Stoma\n\nIn sehr ausgewählten Einzelfällen kann eine kleine Insuffizienz mit gut ablaufender Drainage konservativ behandelt werden.", note: "Endoskopische Vakuumtherapie (Endo-VAC/E-VAC) hat sich seit Jahren bei Anastomoseninsuffizienzen im oberen GIT (Ösophagus) und zunehmend auch beim Rektum etabliert — gerade bei kleineren Insuffizienzen mit lokaler Höhle ist sie eine wichtige Alternative zur chirurgischen Reintervention." },
    { letter: "e", text: "Ein paralytischer postoperativer Ileus kommt nach kolorektalen Eingriffen selten vor.", correct: false, explanation: "Falsch. Bis zu 50 % der Patienten leiden nach kolorektalen Eingriffen an einem paralytischen Subileus/Ileus.\n\n**Wichtig:** regelmäßige klinische Verlaufsbeurteilung, Prokinetika, Antiemetika und Laxanzien, kurzfristig flüssige enterale Ernährung, Kaugummikauen, ggf. Magensonde zur Entlastung." },
  ]},
  { id: 250, chapter: 20, number: 6, text: "Welche Aussagen zu einer Infektion mit Clostridium difficile treffen zu?", statements: [
    { letter: "a", text: "Eine Infektion mit Clostridium difficile ist oft asymptomatisch.", correct: true, explanation: "Richtig. Es besteht eine hohe asymptomatische Durchseuchungsrate bei Kindern und hospitalisierten Patienten durch fäkal-orale Übertragung. Meist kommt es während der Antibiotikagabe zur Schädigung der Darmflora und Überwucherung von C. difficile." },
    { letter: "b", text: "Klinisch kommt es zu wässrigen Diarrhöen.", correct: true, explanation: "Richtig. Charakteristisch sind olfaktorisch-intensive Diarrhöen, Fieber, Bauchschmerzen und Leukozytose. Symptome treten meist 2–10 Tage nach Antibiotikagabe auf. Nachweis im Stuhl: C. difficile Toxin A und/oder B." },
    { letter: "c", text: "Die schwerste Form der Clostridien-Enteritis wird als pseudomembranöse Colitis bezeichnet.", correct: true, explanation: "Richtig. Die pseudomembranöse Colitis kann bis zum paralytischen Ileus, Sepsis, Nierenversagen, Durchwanderungsperitonitis und toxischen Megakolon führen. Auslösende Antibiotika, Loperamid, PPI und NSAR sollten abgesetzt werden." },
    { letter: "d", text: "Metronidazol in oraler Darreichungsform ist Therapie der ersten Wahl bei Clostridien-Colitis.", correct: true, explanation: "Richtig. Metronidazol 400 mg p. o. 3×/Tag für 10 Tage. Bei Rezidiven oder schweren Verläufen: Vancomycin 125–250 mg p. o. 4×/Tag für 10 Tage (bis 4 Wochen). Bei Versagen aller medikamentösen Therapien: Stuhltransplantation laut Leitlinien erwägbar.", note: "Update Leitlinien (IDSA/SHEA 2021, ESCMID 2021): **Metronidazol ist NICHT mehr Erstlinientherapie** bei C. difficile-Infektion. Empfohlen sind heute **Fidaxomicin** (Erstwahl, falls verfügbar) oder **Vancomycin oral**. Metronidazol nur noch bei sehr leichten Verläufen oder fehlender Verfügbarkeit der Erstlinie. Bei Rezidiven Bezlotoxumab als Add-on möglich. FMT (Fäkaltransplantation) etabliert bei rezidivierendem Verlauf nach 2–3 Episoden." },
    { letter: "e", text: "Eine Isolierung der Patienten ist nicht notwendig.", correct: false, explanation: "Falsch. Bis 48 Stunden nach Abklingen der Diarrhöen sollte eine Isolierung im Einzelzimmer mit eigener Toilette erfolgen (Kittel, Mund-Nasen-Schutz, Handschuhe). Auch Kohortenisolierung möglich. Stuhlprobe zur Verlaufsbeurteilung NICHT notwendig." },
  ]},
  { id: 251, chapter: 20, number: 7, text: "Welche Aussagen zur Heparin-induzierten Thrombopenie (HIT) sind zutreffend?", statements: [
    { letter: "a", text: "Die HIT I tritt bei ca. 10 % der Patienten nach Heparingabe auf.", correct: false, explanation: "Falsch. Die HIT I tritt bei ca. **20 %** der Patienten innerhalb der ersten 5 Tage auf — nicht 10 %. Es kommt nur zu einem moderaten Abfall der Thrombozyten (> 100.000/μL)." },
    { letter: "b", text: "Bei einer HIT I sollte die Heparingabe unverzüglich beendet werden.", correct: false, explanation: "Falsch. Die HIT I beruht auf einer direkten Heparin-Thrombozyten-Interaktion und ist NICHT mit Antikörperbildung assoziiert. Sie tritt innerhalb der ersten 5 Tage auf. Unter Weiterführung der Heparingabe normalisiert sich der Thrombozytenwert im Verlauf — kein Absetzen erforderlich." },
    { letter: "c", text: "Die HIT II tritt typischerweise zwischen dem 5. und 14. Tag der Heparingabe auf.", correct: true, explanation: "Richtig. Die HIT II ist die ungünstigere Form mit ausgeprägtem Thrombozytenabfall (< 100.000/μL oder unter 50 % des Ausgangswertes) und Antikörperbildung. Bei vorbestehenden Antikörpern (frühere Heparinexposition) kann sie auch direkt nach erneuter Applikation auftreten." },
    { letter: "d", text: "Bei der Gabe von NMH kommt es seltener zum Auftreten einer HIT II als bei UFH.", correct: true, explanation: "Richtig. Häufigkeit:\n• NMH: 0,1–1 %\n• UFH: 1–5 %" },
    { letter: "e", text: "Als Akuttherapie der HIT II gilt das Absetzen von Heparin und bei einem Thrombozytenwert < 50.000/μl die Transfusion von Thrombozytenkonzentraten.", correct: false, explanation: "Falsch. Bei Verdacht auf HIT II:\n• Heparin sofort ABSETZEN\n• Antikoagulation umstellen auf **Lepirudin oder Argatroban**\n• Thrombozytenkonzentrate sind KONTRAINDIZIERT (verstärken die paradoxe Thromboseneigung!)" },
  ]},
  { id: 252, chapter: 20, number: 8, text: "Welche Aussagen zur stationär erworbenen Harnwegsinfektion (HWI) treffen zu?", statements: [
    { letter: "a", text: "Es handelt sich um die häufigste nosokomiale Infektion.", correct: false, explanation: "Falsch. Der HWI ist mit ~ 22 % die ZWEITHÄUFIGSTE nosokomiale Infektion. In 90 % aller Fälle besteht eine Assoziation mit einem Blasenkatheter.\n\nHäufigste nosokomiale Infektion ist die postoperative Wundinfektion (~ 25 %). Nosokomiale HWI fallen in der Behandlung unter die unkomplizierten HWI." },
    { letter: "b", text: "Die häufigsten Erreger sind dabei Enterokokken.", correct: false, explanation: "Falsch. Häufigster Erreger ist **Escherichia coli**. Weitere typische Erreger: Staphylococcus saprophyticus, Klebsiella pneumoniae, Proteus mirabilis. Enterokokken und Pseudomonas aeruginosa sind selten." },
    { letter: "c", text: "Ein nicht-septischer asymptomatischer Nitrit-positiver HWI muss nicht behandelt werden.", correct: true, explanation: "Richtig. Patienten mit asymptomatischer Bakteriurie müssen nicht behandelt werden.\n\nAllerdings kann bei symptomatischen Patienten mit Nitrit-NEGATIVEM Befund, Leukozyturie und Bakteriurie eine Enterokokken- oder Pseudomonadeninfektion vorliegen — Resistenz für Cephalosporine wahrscheinlich. Behandlung dann nach Urinkultur mit Resistogramm." },
    { letter: "d", text: "Die Abnahme von Urinkulturen ist obsolet.", correct: false, explanation: "Falsch. Vor Beginn einer antibiotischen Therapie sollten im stationären Setting **immer Urinkulturen** abgenommen werden — für ggf. spätere Eskalation/Deeskalation. Katheter sollten entfernt bzw. gewechselt werden." },
    { letter: "e", text: "Cefuroxim ist das Antibiotikum 1. Wahl bei nosokomialem HWI.", correct: false, explanation: "Falsch. Die orale Gabe von Cefuroxim wird aufgrund der Resistenzlage und des Risikos für eine C.-difficile-Colitis nicht mehr empfohlen.\n\n**Bei unkompliziertem HWI:** Fosfomycin-Granulat (einmalig), Pivmecillinam oder Nitroxolin." },
  ]},
  { id: 253, chapter: 20, number: 9, text: "Welche Aussagen zu postoperativen Wundinfektionen treffen zu?", statements: [
    { letter: "a", text: "Wundinfektionen stellen die häufigste nosokomiale Infektion dar.", correct: true, explanation: "Richtig. Wundinfektionen haben einen Anteil von fast 25 % an nosokomialen Infektionen.\n\n**Häufigste Erreger:** Staphylococcus aureus, Staphylococcus epidermidis, Pseudomonas aeruginosa. In der Abdominalchirurgie zusätzlich: E. coli, Enterokokken, Bacteroides fragilis." },
    { letter: "b", text: "Die Einteilung des Schweregrades einer postoperativen Wundinfektion erfolgt anhand der CDC-Kriterien für nosokomiale Infektionen des Robert Koch Instituts.", correct: true, explanation: "Richtig. Unterscheidung zwischen oberflächlichen (Cutis und Subcutis) und tiefen Infektionen (Faszien, Muskulatur) innerhalb der ersten 30 postoperativen Tage." },
    { letter: "c", text: "Die Behandlung ist abhängig vom klinischen Schweregrad.", correct: true, explanation: "Richtig. Optionen reichen von:\n• Partieller Eröffnung der Wunde + lokale Säuberung\nbis zu\n• Operativer Wundrevision und/oder antibiotischer Therapie" },
    { letter: "d", text: "Die nekrotisierende Fasziitis kann konservativ behandelt werden.", correct: false, explanation: "Falsch. Die nekrotisierende Fasziitis ist eine ausgeprägte, rasch fortschreitende tiefe Weichteilinfektion und ein **medizinischer Notfall**. Sie muss unverzüglich durch großflächige Exzision aller betroffenen Gebiete (bis zur Amputation) behandelt werden.\n\nKlinik: fulminant-akuter Verlauf mit Sepsis, lokaler Krepitation und Nekrosen. Erreger meist beta-hämolysierende Streptokokken Gruppe A. IV-Antibiose und intensivmedizinische Betreuung fast immer notwendig. **Mortalität bis 50 %.**" },
    { letter: "e", text: "Postoperatives Duschen bei primär verschlossenen Wunden sollte für fünf Tage vermieden werden.", correct: false, explanation: "Falsch. Bei normaler Wundheilung sind Duschen und vorsichtiges Trocknen ab dem **2. postoperativen Tag** empfohlen. Wunddrainagen sollten so kurz wie nötig belassen und zeitnah entfernt werden — sie steigern das Risiko für lokale Wundinfektionen." },
  ]},
  { id: 254, chapter: 20, number: 10, text: "Welche Aussagen zur nosokomialen Pneumonie treffen zu?", statements: [
    { letter: "a", text: "Die Pneumonie stellt die dritthäufigste nosokomiale Infektion dar.", correct: true, explanation: "Richtig. Reihenfolge der Häufigkeit nosokomialer Infektionen:\n1. Wundinfektion (~ 25 %)\n2. HWI (~ 22 %)\n3. Pneumonie (~ 21 %)" },
    { letter: "b", text: "Die Definition einer nosokomialen Pneumonie ist ein Beginn frühestens 72 Stunden nach der stationären Aufnahme.", correct: false, explanation: "Falsch. Per definitionem tritt eine nosokomiale Pneumonie **frühestens 48 Stunden** nach Hospitalisierung auf (nicht 72 Stunden).\n\n• **Early onset:** < 96 Stunden\n• **Late onset:** > 96 Stunden nach stationärer Aufnahme" },
    { letter: "c", text: "Für die Diagnosestellung müssen ein Hauptkriterium sowie zwei Nebenkriterien erfüllt sein.", correct: true, explanation: "Richtig.\n• **Hauptkriterium:** Neues bzw. progredientes Infiltrat im Röntgen-Thorax/CT-Thorax\n• **Nebenkriterien:** Leukozytose/Leukopenie, Fieber, purulenter Auswurf" },
    { letter: "d", text: "Eine kalkulierte antibiotische Therapie weist in bis zu 30 % ein Therapieversagen auf.", correct: false, explanation: "Falsch. Bis zu **20 %** Therapieversagen (nicht 30 %). Es ist wichtig, auf klinische Zeichen eines Therapieversagens zu achten." },
    { letter: "e", text: "Bei der Wahl des Antibiotikums werden zwischen Patienten mit und ohne Risikofaktoren für multiresistente Erreger unterschieden.", correct: true, explanation: "Richtig.\n\n**Ohne Risikofaktoren für MRE:**\nErreger: gramneg. Stäbchen (E. coli, Klebsiella, Enterobacter, H. influenzae), grampos. Kokken (S. aureus, S. pneumoniae)\nTherapie: Aminopenicilline + Beta-Laktamaseinhibitor (z. B. Ampicillin/Sulbactam), Cephalosporine Gr. 3a (z. B. Ceftriaxon), Fluorchinolone Gr. 3/4 (z. B. Levofloxacin, Moxifloxacin)\n\n**Mit Risikofaktoren oder septischer Schock:**\nZusätzlich: MRSA/ESBL/MRGN-Bildner, Pseudomonas, Acinetobacter, Stenotrophomonas\nTherapie: Pseudomonas-wirksame Antibiotika — Acylaminopenicilline + BLI (Piperacillin/Tazobactam), Carbapeneme (Imipenem/Meropenem), Cephalosporine (Ceftazidim/Cefepim). Bei MRSA-Verdacht ggf. + Linezolid oder Vancomycin." },
  ]},
  { id: 255, chapter: 20, number: 11, text: "Welche Aussagen zu postoperativen Komplikationen der Lunge sind zutreffend?", statements: [
    { letter: "a", text: "Eine häufige Komplikation bei Thoraxdrainagenanlage ist das Reexpansionsödem.", correct: false, explanation: "Falsch. Das Reexpansionsödem ist eine SELTENE (Inzidenz < 1 %), aber gefürchtete Komplikation mit Letalität bis 20 %.\n\n**Risikofaktoren:** länger bestehender Pneumothorax, Alter < 45 Jahre, großer Pneumothorax, rasche Lungenentfaltung.\n\nBehandlung schwerer Fälle: intensivmedizinische Betreuung und invasive Beatmung." },
    { letter: "b", text: "Ein Hämatothorax muss operativ behandelt werden.", correct: false, explanation: "Falsch. Zunächst Anlage einer Thoraxdrainage. OP-Indikation:\n• Initiale Drainagemenge > 1,5 Liter ODER\n• Blutverlust > 200 ml/h über mehrere Stunden\n→ dann Thorakoskopie/Thorakotomie indiziert." },
    { letter: "c", text: "Die Therapie des Pleuraempyems ist die chirurgische Sanierung.", correct: true, explanation: "Richtig. Empyem = Eiteransammlung im Pleuraspalt. Therapie:\n• Anlage einer Thoraxdrainage\n• Systemische Antibiotikatherapie (z. B. Ampicillin/Sulbactam)\n• In schweren Fällen: Thorakoskopie und Ausräumung der Empyemhöhle mit Dekortikation der Pleura" },
    { letter: "d", text: "Ein postinterventioneller Pneumothorax sollte zwei bis vier Stunden nach der Intervention ausgeschlossen werden.", correct: true, explanation: "Richtig. Ausschluss durch p. a. Röntgen-Thorax im Stehen oder Pleurasonographie. Ein großer Anteil der postinterventionellen Pneumothoraces ist innerhalb von 4 Stunden nachweisbar.\n\n• **Asymptomatisch + klein:** Verlaufsbeobachtung\n• **Groß oder symptomatisch:** kleinlumige Thoraxdrainage mit Sog" },
    { letter: "e", text: "Ein postoperativer Chylothorax wird zunächst diätisch therapiert.", correct: true, explanation: "Richtig. Chylothorax = Komplikation nach Ösophagektomie, Pankreasresektionen, bei Tumorerkrankungen und kardiochirurgischen Eingriffen bei Kindern. Verletzung des Ductus thoracicus oder kommunizierender Lymphbahnen.\n\n**Unbehandelt: ~ 50 % Mortalität. Postoperativ: 5-fach erhöhte 30-Tage-Mortalität.**\n\n**Therapie:**\n• Diät mit mittelkettigen Triglyceriden oder kurzfristige TPN\n• Bei größerem symptomatischem Chylothorax: kontinuierliche Drainage\n• Medikamentös: Somatostatin oder Octreotid zur Reduktion des Lymphflusses" },
  ]},
  { id: 256, chapter: 20, number: 12, text: "Welche Aussagen zu akuten Blutungen bzw. Nachblutungen sind richtig?", statements: [
    { letter: "a", text: "Bei einer relevanten gastrointestinalen Blutung sollte zunächst eine Notfallendoskopie erfolgen.", correct: true, explanation: "Richtig. Zuerst Gastroskopie, dann ggf. Koloskopie.\n\n**Differenzialdiagnose:** Ulkus-, Ösophagus-, Divertikel-, Polypen-, Anastomosen- oder Tumorblutungen." },
    { letter: "b", text: "Bei einer endoskopisch nicht beherrschbaren Blutung wird ein chirurgisches Vorgehen empfohlen.", correct: true, explanation: "Richtig. Bei nicht endoskopisch beherrschbaren Blutungen:\n• Chirurgisch: Übernähung, Exzision oder Resektion der Blutungsquelle\n• Alternativ in Einzelfällen: angiographische Embolisation" },
    { letter: "c", text: "Nach kolorektalen Eingriffen kann es zu relevanten Blutungen aus dem Anastomosenbereich kommen.", correct: true, explanation: "Richtig. Eine Anastomosenblutung ist selten. Bei Auftreten ggf. (Notfall-)Koloskopie oder Bluttransfusionen notwendig." },
    { letter: "d", text: "Bei vermuteter oberer gastrointestinaler Blutung sollte eine kontinuierliche Überwachung der Vitalparameter erfolgen.", correct: true, explanation: "Richtig. Bei vermuteter oberer GI-Blutung:\n• Kontinuierliche Vitalparameter-Überwachung\n• Zeitnahe Endoskopie (innerhalb 12 Stunden)\n• Bei hämodynamischer Instabilität: Notfall-Endoskopie" },
    { letter: "e", text: "Schwere Verläufe bei unteren gastrointestinalen Blutungen sind häufig.", correct: false, explanation: "Falsch. Schwere Verläufe unterer GI-Blutungen sind SELTEN und haben geringe Mortalitätsraten. Komplikative Verläufe häufiger bei Patienten > 65 Jahre und unter Antikoagulation.\n\n**Bei hämorrhagischem Schock mit Hämatochezie/peranalem Koagelabgang:**\n• Aufnahme auf Intensivstation\n• Gastroskopie (Ausschluss obere GI-Blutung)\n• Bei hämodynamischer Instabilität: Notfall-Koloskopie auch ohne vorherige Darmreinigung" },
  ]},
];


    // ═══════════════════════════════════════════════════════════════════════════
    // APP
    // ═══════════════════════════════════════════════════════════════════════════
    
const ACTIVE_CHAPTER_IDS = [...new Set(QUESTIONS.map((q) => q.chapter))];
const STORAGE_KEY = "vc_quiz_v2";

// ─────────────────────────────────────────────────────────────────────────────
// PERSISTENCE
// Stores per-chapter stats, resume position, wrong-answer pile, bookmarks.
// ─────────────────────────────────────────────────────────────────────────────

const defaultStorage = () => ({
  // Per-chapter stats: { chapterId: { correctIds: [...stmt keys], attempted: [...keys], lastQIndex: number } }
  chapters: {},
  // Statement keys that are currently pending review (user got them wrong)
  wrongPile: [], // array of "qid.letter" strings
  bookmarks: [], // array of question ids
  lastActive: null, // chapter id last worked on
  // Analytics
  firstOpenedAt: null, // ISO timestamp of first use
  totalActiveMs: 0, // total active milliseconds across all sessions
  sessionCount: 0, // number of study sessions started
  lastSessionAt: null, // ISO timestamp of last session
  attemptsByStmt: {}, // { "qid.letter": count } - how often each statement was answered (right or wrong)
  correctByStmt: {}, // { "qid.letter": count } - correct attempts per statement
  daysActive: [], // array of ISO date strings (YYYY-MM-DD) the user studied
});

const loadStorage = () => {
  try {
    if (typeof window === "undefined" || !window.localStorage) return defaultStorage();
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return defaultStorage();
    const parsed = JSON.parse(raw);
    return { ...defaultStorage(), ...parsed };
  } catch {
    return defaultStorage();
  }
};

const saveStorage = (data) => {
  try {
    if (typeof window === "undefined" || !window.localStorage) return;
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  } catch {}
};

const stmtKey = (qid, letter) => `${qid}.${letter}`;

// ─────────────────────────────────────────────────────────────────────────────
// App
// ─────────────────────────────────────────────────────────────────────────────

function App() {
  const [view, setView] = useState("home");
  const [storage, setStorage] = useState(defaultStorage);
  const [loaded, setLoaded] = useState(false);
  const [sessionMode, setSessionMode] = useState("chapter"); // "chapter" | "wrong" | "shuffle"
  const [activeChapter, setActiveChapter] = useState(null);
  const [shuffle, setShuffle] = useState(false);

  // Session state
  const [queue, setQueue] = useState([]);
  const [qIndex, setQIndex] = useState(0);
  const [stmtIndex, setStmtIndex] = useState(0);
  const [revealed, setRevealed] = useState(false);
  const [lastGuess, setLastGuess] = useState(null);
  const [sessionStats, setSessionStats] = useState({ correct: 0, wrong: 0 });

  // Load persisted data on mount
  useEffect(() => {
    const data = loadStorage();
    setStorage(data);
    setLoaded(true);
  }, []);

  // Persist whenever storage changes (after initial load)
  useEffect(() => {
    if (loaded) saveStorage(storage);
  }, [storage, loaded]);

  // Session time tracking
  useEffect(() => {
    if (!loaded) return;
    // On load: set firstOpenedAt if null, and count this as a session
    setStorage((prev) => {
      const next = { ...prev };
      if (!next.firstOpenedAt) next.firstOpenedAt = new Date().toISOString();
      next.sessionCount = (prev.sessionCount || 0) + 1;
      next.lastSessionAt = new Date().toISOString();
      return next;
    });

    // Tick every 15 seconds while active (page visible) to add to totalActiveMs
    const TICK_MS = 15000;
    let lastTick = Date.now();
    const interval = setInterval(() => {
      if (document.visibilityState === "visible") {
        const now = Date.now();
        const elapsed = now - lastTick;
        lastTick = now;
        setStorage((prev) => ({ ...prev, totalActiveMs: (prev.totalActiveMs || 0) + elapsed }));
      } else {
        lastTick = Date.now(); // reset so we don't count inactive time
      }
    }, TICK_MS);

    const handleVisibility = () => { lastTick = Date.now(); };
    document.addEventListener("visibilitychange", handleVisibility);
    return () => {
      clearInterval(interval);
      document.removeEventListener("visibilitychange", handleVisibility);
    };
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [loaded]);

  const currentQuestion = queue.length > 0 && qIndex < queue.length ? QUESTIONS.find((q) => q.id === queue[qIndex]) : null;
  const currentStatement = currentQuestion?.statements[stmtIndex];

  // ─────────────────────────────────────────────────────────────────────────
  // CHAPTER STATS — compute counts for each chapter for UI display
  // ─────────────────────────────────────────────────────────────────────────

  const chapterStats = useMemo(() => {
    const out = {};
    for (const chId of ACTIVE_CHAPTER_IDS) {
      const chQs = QUESTIONS.filter((q) => q.chapter === chId);
      const totalStmts = chQs.length * 5;
      const chData = storage.chapters[chId] || { correctIds: [], attempted: [] };
      const correct = chData.correctIds?.length || 0;
      const attempted = chData.attempted?.length || 0;
      // Wrong in THIS chapter currently in pile
      const chStmtKeys = new Set(chQs.flatMap((q) => q.statements.map((s) => stmtKey(q.id, s.letter))));
      const wrongInCh = storage.wrongPile.filter((k) => chStmtKeys.has(k)).length;
      out[chId] = {
        totalStmts,
        correct,
        attempted,
        wrong: wrongInCh,
        pct: totalStmts > 0 ? Math.round((correct / totalStmts) * 100) : 0,
        remaining: totalStmts - attempted,
        lastQIndex: chData.lastQIndex || 0,
      };
    }
    return out;
  }, [storage]);

  // Chapters where accuracy is low (>= 3 attempted, <60% accuracy)
  const weakChapters = useMemo(() => {
    return Object.entries(chapterStats)
      .filter(([_, s]) => s.attempted >= 3 && s.correct / Math.max(s.attempted, 1) < 0.6)
      .map(([id, s]) => ({ id: Number(id), ...s, acc: Math.round((s.correct / Math.max(s.attempted, 1)) * 100) }))
      .sort((a, b) => a.acc - b.acc);
  }, [chapterStats]);

    { letter: "d", text: "Eine langfristige Rezidivprophylaxe mit Glukokortikoiden kann ebenfalls durchgeführt werden.", correct: false, explanation: "Falsch. Bei chronisch-entzündlichen Darmerkrankungen sollten langfristige systemische Gaben von Glukokortikoiden vermieden werden." },
    { letter: "e", text: "Eine erneute Koloskopie nach Erstdiagnosestellung muss bei Patienten in Remission bis zum Beginn der Karzinomvorsorge nicht erfolgen.", correct: true, explanation: "Richtig. Eine Endoskopie kann zur Beurteilung des Therapieansprechens und zur Therapiedeeskalation oder zur Bestätigung der Aktivität bei therapierefraktären Verläufen erfolgen." },
  ]},
  { id: 141, chapter: 12, number: 11, text: "Welche Aussagen zu operativen Verfahren der Colitis ulcerosa sind richtig?", statements: [
    { letter: "a", text: "Die Proktokolektomie gilt als Standardverfahren bei Colitis ulcerosa, dennoch ist eine Heilung nicht möglich.", correct: false, explanation: "Falsch. Die restaurative Proktokolektomie mit ileopouchanaler Anastomose (IPAA) unter Anlage eines protektiven Ileostomas gilt als Standardverfahren (zweizeitig) und führt zur Heilung der Colitis ulcerosa. Eine Operation ohne protektives Ileostoma sollte nur in sehr selektionierten Einzelfällen erfolgen (einzeitiges Verfahren)." },
    { letter: "b", text: "Der J-Pouch bei der Proktokolektomie gilt als Pouchrekonstruktion erster Wahl.", correct: true, explanation: "Richtig. Der J-Pouch wird empfohlen — vergleichsweise einfach anzulegen und mit gleichwertigen Langzeitergebnissen zu anderen Pouchverfahren. Ideale Pouchlänge: 15–18 cm. Zu kleine Pouches → sehr hohe Stuhlfrequenz. Bei der ileoanalen Pouchanlage sollte die belassene Rektummukosa nicht länger als 2 cm sein. Bei IEN oder manifestem Karzinom im Rektum → komplette Mukosektomie mit Anastomose an der Linea dentata." },
    { letter: "c", text: "Die Proktokolektomie beinhaltet immer eine Mukosektomie.", correct: false, explanation: "Falsch. Die komplette Mukosektomie kann Kontinenzeinbußen zur Folge haben. Sie sollte — wenn die Indikation nicht auf Grund einer malignen Entartung oder Dysplasien gestellt wurde — möglichst vermieden werden." },
    { letter: "d", text: "Bei erhöhtem perioperativem Risiko kann auch ein dreizeitiges Vorgehen in Betracht gezogen werden.", correct: true, explanation: "Richtig. Bei erhöhtem perioperativem Risiko (auch unter Berücksichtigung der perioperativen Medikation) kann die Proktokolektomie dreizeitig operiert werden:\n1. Kolektomie bis zum rektosigmoidalen Übergang + protektives Ileostoma\n2. Proktektomie + Pouchanlage im Intervall\n3. Ileostomarückverlagerung" },
    { letter: "e", text: "Das Mesorektum sollte bei allen Eingriffen mit entfernt werden.", correct: false, explanation: "Falsch. Die Rektumresektion sollte bei benigner OP-Indikation darmnah (mesorektumerhaltend) erfolgen — dies verringert die Komplikationsrate (Nervenverletzungen, Erektionsstörungen, Inkontinenz). Nur bei IEN oder Rektum-Malignom ist eine komplette Mukosektomie mit Anastomose an der Linea dentata indiziert." },
  ]},
  { id: 142, chapter: 12, number: 12, text: "Welche Aussagen zur postoperativen Pouchitis bei Colitis ulcerosa-Patienten treffen zu?", statements: [
    { letter: "a", text: "Die Diagnose der Pouchitis erfolgt endoskopisch.", correct: false, explanation: "Falsch. Die Diagnose einer Pouchitis sollte unter Berücksichtigung von Klinik, Endoskopie und Histologie erfolgen." },
    { letter: "b", text: "Patienten mit Malignom oder IEN-assoziierter Colitis ulcerosa und Pouchitis benötigen jährlich eine endoskopische Beurteilung des Pouches.", correct: true, explanation: "Richtig. Patienten mit chronischer Pouchitis oder nach Colitis-ulcerosa-assoziiertem Karzinom bzw. intraepithelialer Neoplasie sollten jährlich endoskopiert werden. Bei Beschwerden oder spätestens alle zwei Jahre sollte eine Pouchoskopie erfolgen." },
    { letter: "c", text: "Antibiotika sind die Primärtherapie der akuten Pouchitis.", correct: true, explanation: "Richtig. Als Primärtherapie der akuten Pouchitis können Ciprofloxacin und Metronidazol eingesetzt werden. Bei Versagen der Monotherapie kann auch eine Kombination eingesetzt werden." },
    { letter: "d", text: "Eine chronische Pouchitis muss nicht behandelt werden.", correct: false, explanation: "Falsch. Aufgrund des Dysplasie-/Neoplasierisikos sollte eine Pouchitis behandelt werden. Bei rekurrierender oder chronischer Pouchitis kann dauerhaft eine Monotherapie oder kombinierte antibiotische Therapie eingesetzt werden. Antibiotikarefraktäre Verlaufsformen sollten oral oder lokal mit Budesonid behandelt werden. Weitere Therapieoptionen: Infliximab, Adalimumab, Vedolizumab, Ustekinumab und Calcineurininhibitoren." },
    { letter: "e", text: "Die Pouchitis kommt nur bei Patienten mit Colitis ulcerosa vor.", correct: true, explanation: "Richtig. Die genaue Erklärung dieses Phänomens ist nicht bekannt. Bei Patienten nach restaurativer Proktokolektomie und IPAA bei familiärer adenomatöser Polyposis tritt normalerweise keine Pouchitis auf." },
  ]},
  { id: 143, chapter: 12, number: 13, text: "Welche Aussagen zu operativen Strategien der Colitis ulcerosa treffen zu?", statements: [
    { letter: "a", text: "In der Akutsituation (Kolonperforation, diffuse Blutung, toxische Kolitis oder Megakolon) beim instabilen Patienten sollte eine Proktokolektomie mit endständigem Ileostoma erfolgen.", correct: false, explanation: "Falsch. In Notfallsituationen sollte das Rektum erhalten werden (außer Perforation/Hauptblutungsquelle im Rektum) und nur eine Kolektomie bzw. subtotale Kolektomie erfolgen. Das Rektum sollte blindverschlossen oder als Sigmaschleimfistel ausgeleitet werden. Proktektomie und IPAA können elektiv in einer zweiten Operation erfolgen. Grund: in der akuten Situation das kleine Becken unberührt lassen, um den zweiten Eingriff zu vereinfachen." },
    { letter: "b", text: "Bei der Proktokolektomie ist es wichtig, die ileokolischen Gefäße und die Randarkade des Colon ascendens zu erhalten.", correct: true, explanation: "Richtig. Sowohl die Randarkade des Colon ascendens als auch die ileokolischen Gefäße sollten bei der Kolektomie erhalten bleiben, da die Ileum-Pouch-Durchblutung bei entsprechender Längenproblematik und möglicherweise notwendigen Gefäßdurchtrennungen im Mesenterium über diese Versorgungsgebiete erfolgt." },
    { letter: "c", text: "Die häufigste OP-Indikation der Colitis ulcerosa ist die refraktäre konservative Therapie.", correct: true, explanation: "Richtig. Patienten mit medikamentös-therapierefraktärem fulminantem Schub sollten operiert werden. OP-Indikationen:\n• Therapierefraktäre Colitis ulcerosa: 75 %\n• Malignome: 10 %\n• Toxische Kolitis: 7 %\n• Dysplasien: 6 %\n• Blutung/Perforation: 2 %" },
    { letter: "d", text: "Bei Kinderwunsch der Patientin sollte keine operative Therapie erfolgen.", correct: false, explanation: "Falsch. Eine elektive Operation kann bei Patientenwunsch erfolgen. Dabei sind die Risiken der konservativen Behandlungsstrategien gegen die Risiken einer Operation abzuwägen. Die laparoskopische restaurative Proktokolektomie ist der offenen Operation vorzuziehen." },
    { letter: "e", text: "Kinder und Jugendliche sollten bis zum Erwachsenenalter nicht operiert werden.", correct: false, explanation: "Falsch. Kinder und Jugendliche mit aktiver Colitis und Wachstumsstörungen trotz adäquater Therapie sollten nach Konsultation eines pädiatrischen Gastroenterologen und Ausschluss anderer Ursachen unter Anlage einer pouchanalen Anastomose proktokolektomiert werden." },
  ]},
  { id: 144, chapter: 13, number: 1, text: "Welche anatomischen Aussagen zum Analkanal sind zutreffend?", statements: [
    { letter: "a", text: "Der Analkanal ist histologisch aus unverhorntem Plattenepithel aufgebaut.", correct: false, explanation: "Falsch. Nur der untere Anteil besteht aus Plattenepithel (Anoderm). Der obere Abschnitt, durch die Linea dentata abgegrenzt, besteht aus einer etwa 1 cm breiten Übergangszone mit Übergangsepithel. In diesem Bereich befinden sich auch die Analkrypten." },
    { letter: "b", text: "Der Analkanal ist klinisch 3–4 cm lang und bei Frauen in der Regel etwas kürzer.", correct: true, explanation: "Richtig. Nach UICC-Definition ist der chirurgische Analkanal ein 3–4 cm langer Kanal vom oberen Rand des M. sphincter ani internus bis zur Linea anocutanea.\n\nLymphabfluss:\n• Untere Rektumabschnitte und oberster Teil des Analkanals: perirektale Lymphknoten und entlang der A. iliaca interna\n• Distal der Linea dentata: inguinale und externe iliakale Lymphknoten" },
    { letter: "c", text: "Der innere Schließmuskel (M. sphincter ani internus) geht aus der Beckenbodenmuskulatur hervor und der äußere Schließmuskel (M. sphincter ani externus) aus der inneren zirkulären Schicht der Muscularis propria der Rektumwand.", correct: false, explanation: "Falsch. Es ist umgekehrt. Der innere Schließmuskel geht aus der Muscularis propria der Rektumwand hervor, der äußere Schließmuskel aus der Beckenbodenmuskulatur. Zwischen beiden Muskeln existiert eine Bindegewebsschicht, die aus der äußeren Muskelschicht der Muscularis propria des Rektums hervorgeht." },
    { letter: "d", text: "Der M. sphincter ani externus besteht anatomisch aus zwei Anteilen, der Pars profunda und der Pars superficialis.", correct: false, explanation: "Falsch. Der M. sphincter ani externus besteht aus drei Anteilen: Pars profunda, Pars superficialis und Pars subcutanea. Durch die Pars subcutanea verlaufen Muskelfasern aus der intersphinktären Schicht, die an der Perianalhaut den M. corrugator ani bilden (typische Fältelung)." },
    { letter: "e", text: "Im Ultraschall des Analkanals zeigen sich sechs Schichten.", correct: true, explanation: "Richtig. Die sechs Schichten:\n1. Grenzflächenecho auf der Mukosaoberfläche (echoreich)\n2. Übrige Mukosa (echoarm)\n3. Subepitheliales Gewebe (echoreich)\n4. M. sphincter ani internus (echoarm)\n5. Ausläufer der longitudinalen Muskulatur des Rektums (echoreich)\n6. M. sphincter ani externus (gemischt echogen)" },
  ]},
  { id: 145, chapter: 13, number: 2, text: "Welche Aussagen zum Analekzem sind richtig?", statements: [
    { letter: "a", text: "Das Analekzem ist die häufigste proktologische Erkrankung.", correct: true, explanation: "Richtig. Es ist eine Dermatitis des Anoderms oder der Anal-/Perianalhaut mit Pruritus ani und Nässen oder Schuppen. Eingeteilt wird in atopisches, kontaktallergisches und kumulativ-toxisches Analekzem." },
    { letter: "b", text: "Das kumulativ-toxische Ekzem ist eine Reaktion der Haut ohne Entwicklung einer spezifischen Immunreaktion.", correct: true, explanation: "Richtig. Das kumulativ-toxische Ekzem (30 %) ist Folgeerscheinung von Hämorrhoidalleiden, Parasitosen, Hyperhidrose, Diarrhö oder falscher Analhygiene. Behandlung: operativ (Hämorrhoiden) oder kurzzeitig mit topischen Glukokortikoiden, langfristig z. B. mit Ichtyol-Salbe (Ammoniumbituminosulfonat)." },
    { letter: "c", text: "Das atopische Ekzem ist eine Überempfindlichkeit der Haut und Schleimhaut gegenüber Umweltstoffen.", correct: true, explanation: "Richtig. Das atopische Ekzem (30 %) wird auch als endogenes Ekzem oder Neurodermitis bezeichnet und ist eine Typ-I-Allergie mit erhöhter IgE-Bildung. Therapie: kurzfristige lokale Applikation eines Glukokortikoids." },
    { letter: "d", text: "Das allergische Kontaktekzem ist eine Hypersensitivitätsreaktion.", correct: true, explanation: "Richtig. Das kontaktallergische Analekzem (40 %) ist eine Typ-IV-Allergie mit spezifisch immunologisch vermittelter Entzündung auf externe Fremdstoffe (z. B. Chinin, Menthol, Mafenid) — aus proktologischen Pflegemitteln, Intimsprays, feuchtem Toilettenpapier. Therapie: Abduschen des Afters und Verzicht auf auslösende Stoffe." },
    { letter: "e", text: "Aus chronisch entzündeten Analekzemen können sich Karzinome entwickeln.", correct: true, explanation: "Richtig. Bei therapieresistenten Analekzemen sollte ein Plattenepithelkarzinom des Analkanals rektoskopisch/bioptisch abgeklärt werden." },
  ]},
  { id: 146, chapter: 13, number: 3, text: "Welche Aussagen zu Erkrankungen des äußeren Analbereichs sind richtig?", statements: [
    { letter: "a", text: "Condylomata accuminata (Feigwarzen) werden sexuell durch das Herpes-simplex-Virus übertragen.", correct: false, explanation: "Falsch. Kondylome werden durch das Humane Papillomvirus (HPV) übertragen. Meist low-risk DNA von HPV-6 und HPV-11, selten auch high-risk (onkogene) DNA des HPV-16, -18, -31, -33 und -35. Infektion als Schmierinfektion durch Haut-zu-Haut-Kontakt." },
    { letter: "b", text: "Die Acne inversa ist eine Entzündung der Talgdrüsen und Terminalhaarfollikel, die sich bevorzugt in den intertriginösen Arealen manifestiert.", correct: true, explanation: "Richtig. Es handelt sich um eine granulomatös-entzündliche Reaktion des Bindegewebes mit Ausbildung subkutaner Knoten und Fisteln." },
    { letter: "c", text: "Der Morbus Bowen manifestiert sich ausschließlich perianal als Carcinoma in situ.", correct: false, explanation: "Falsch. Morbus Bowen ist ein intraepidermales Carcinoma in situ und die Vorstufe eines Plattenepithelkarzinoms, welches sich peri- und intraanal manifestieren kann. Meist Solitärläsion: scharf begrenzt, schuppend, randbetont und bräunlich — leicht mit einem Ekzem zu verwechseln." },
    { letter: "d", text: "Die klinischen Begriffe wie Leukoplakie, Dysplasie, Carcinoma in situ und Präkanzerose sind durch die Definition der analen intraepithelialen Neoplasie (AIN) abgelöst worden. Eine AIN Grad III kann sich spontan zurückbilden.", correct: false, explanation: "Falsch. Grad III entspricht einem Carcinoma in situ und kann sich im Gegensatz zu Grad I und II NICHT spontan zurückbilden. Es besteht Gefahr des Übergangs in ein Karzinom.\n\n• AIN Grad I: leichte Dysplasie im unteren Epitheldrittel\n• AIN Grad II: mittelgradige Dysplasie im unteren und mittleren Drittel\n• AIN Grad III: hochgradige Dysplasie in der gesamten Epidermis" },
    { letter: "e", text: "Der anale Morbus Paget ist ein epidermotropes Schweißdrüsenkarzinom.", correct: true, explanation: "Richtig. Das Paget-Karzinom ist häufig mit einem Rektumkarzinom assoziiert. Einteilung in Typ 1 (mit Rektumkarzinom) und Typ 2 (nur kutan perianal). Perianal erscheint es als ekzemähnliche Läsion." },
  ]},
  { id: 147, chapter: 13, number: 4, text: "Welche allgemeinen Aussagen zum Hämorrhoidalleiden treffen zu?", statements: [
    { letter: "a", text: "Hämorrhoiden sind per se keine Erkrankungen, sondern gehören zum analen Verschlussapparat.", correct: true, explanation: "Richtig. Es wird erst bei Beschwerden von einem Hämorrhoidalleiden gesprochen. Typische Symptome: Schmerzen, Pruritus, Nässen, hellrote Blutungen und Gefühl der unvollständigen Stuhlentleerung." },
    { letter: "b", text: "Die Hämorrhoidalknoten werden aus den Endästen der A. rectalis superior gespeist.", correct: true, explanation: "Richtig. Hämorrhoiden werden über die A. rectalis superior versorgt." },
    { letter: "c", text: "Der Prolaps ist ein eigenes Krankheitsbild.", correct: true, explanation: "Richtig. Man unterscheidet zwischen einem kompletten Prolaps aller Wandschichten des Rektums und einem Analmukosaprolaps." },
    { letter: "d", text: "Der Durchtritt durch die Rektumwand in Steinschnittlage (SSL) ist in der Regel bei zwei, fünf und neun Uhr.", correct: false, explanation: "Falsch. In Steinschnittlage sind die Durchtrittspunkte bei drei, sieben und elf Uhr." },
    { letter: "e", text: "Wichtige Differenzialdiagnosen des Hämorrhoidalprolaps sind: Marisken, Rektumprolaps, perianale Venenthrombose, Fissuren, benigne und maligne Tumoren.", correct: true, explanation: "Richtig. Alle wichtigen Differenzialdiagnosen sollten bei der Diagnosestellung gekannt und ausgeschlossen werden. Insbesondere die perianale Venenthrombose ist ein häufig verwechseltes Krankheitsbild." },
  ]},
  { id: 148, chapter: 13, number: 5, text: "Welche Aussagen zur stadiengerechten Therapie des Hämorrhoidalleidens sind zutreffend?", statements: [
    { letter: "a", text: "Die Stadien I und II können konservativ behandelt werden.", correct: true, explanation: "Richtig.\n• Stadium I: innere Hämorrhoiden, kein Prolaps, oberhalb der Linea dentata lokalisiert\n• Stadium II: Prolaps beim Pressen, spontane Retraktion\n\nBeide können zunächst konservativ therapiert werden (stuhlregulatorische Maßnahmen, ausreichende Trinkmenge, physische Aktivität)." },
    { letter: "b", text: "Die Sklerosierungsmethode kann auch bei Hämorrhoiden III. Grades angewandt werden.", correct: false, explanation: "Falsch. Sklerosierung ist ein minimalinvasives Verfahren und Mittel der Wahl bei symptomatischen Hämorrhoiden 1. Grades. Bei Stadium III (Vorfall bei Defäkation/Pressen/Aktivität, keine spontane Retraktion, digitale Reposition möglich) oder Stadium IV (vor dem Analkanal gelegen, irreponibel) ist meist eine operative Therapie indiziert." },
    { letter: "c", text: "Die Gummibandligatur kann bei zweitgradigen Hämorrhoiden durchgeführt werden.", correct: true, explanation: "Richtig. Die Gummibandligatur ist bei Hämorrhoiden 2. Grades geeignet. Über einen Applikator wird unter Einsaugen ein Gummiband an der Basis der Hämorrhoide appliziert — Unterbindung des Blutflusses. Nach einigen Tagen stirbt der abgeschnürte Gewebeteil ab und wird mit dem Stuhlgang ausgeschieden." },
    { letter: "d", text: "Die operative Hämorrhoidektomie ist in den Stadien III und IV indiziert.", correct: true, explanation: "Richtig. OP-Verfahren:\n• Milligan-Morgan (offen): Hämorrhoidalpolster nach Hämorrhoidalarterienligatur exzidiert\n• Ferguson (geschlossen): zusätzliche Wundadaptation mit fortlaufender resorbierbarer Naht\n• Parks: Hämorrhoidalarterien unterbunden, Polster unter der Schleimhaut exzidiert, T-förmiger Verschluss\n• Longo (Stapler-Hämorrhoidopexie): bei zirkulären Hämorrhoiden 3.–4. Grades oder zirkulärem Analmukosaprolaps — zirkuläre Resektion der Rektalmukosa + Hämorrhoidopexie oberhalb der Linea dentata (keine komplette Hämorrhoidektomie)" },
    { letter: "e", text: "Nach der chirurgischen Exzision ist eine histologische Begutachtung notwendig.", correct: true, explanation: "Richtig. Exzidierte Hämorrhoidalknoten sollten immer histologisch untersucht werden — in ca. 0,1–2 % der Fälle gibt es maligne Entartungen." },
  ]},
  { id: 149, chapter: 13, number: 6, text: "Welche Aussagen zur Analfissur sind zutreffend?", statements: [
    { letter: "a", text: "Analfissuren beschreiben einen Defekt im Anoderm.", correct: true, explanation: "Richtig. Es handelt sich um einen zwischen der Linea dentata und dem Analkanalrand gelegenen länglichen Defekt im sensiblen Anoderm. Schmerzen bestehen insbesondere während und nach der Defäkation. Oft werden hellrote Blutauflagerungen beschrieben." },
    { letter: "b", text: "Man unterscheidet zwischen primären und sekundären Fissuren.", correct: true, explanation: "Richtig. Primäre Analfissuren treten spontan auf und sind meist traumatisch bedingt (in ca. 80 % bei 6 Uhr in SSL). Sekundäre Analfissuren sind oft an atypischer Stelle gelegen und treten z. B. im Rahmen von CED, Tumoren oder Infektionen auf. Bei Fissuren an atypischer Stelle ist die Abklärung einer CED empfohlen." },
    { letter: "c", text: "Ein akutes Stadium muss drei Monate anhalten, bevor von einer chronischen Analfissur gesprochen wird.", correct: false, explanation: "Falsch. Bis zu einer Dauer von acht Wochen gilt eine Analfissur als akut. Die akute Analfissur ist ein glatt berandeter Riss des Anoderms. Bei chronischen Verläufen geht der ulkusartige Defekt mit narbiger Wandberandung sowie mit einer Vorpostenfalte oder hypertropher Analpapille einher." },
    { letter: "d", text: "Die operative Versorgung der Analfissur ist zu bevorzugen.", correct: false, explanation: "Falsch. Die Therapie der Analfissur sollte primär konservativ erfolgen. Bei fehlendem Behandlungserfolg wird eine operative Therapie abhängig vom Leidensdruck erwogen.\n\nKonservative Optionen:\n• Nitroglycerin 0,2%-Salbe (senkt Sphinkterdruck, verbessert Durchblutung; Nachteil: Kopfschmerzen; 6–8 Wochen)\n• Kalziumantagonisten: 2% Diltiazem-Salbe oder 0,2% Nifedipin-Salbe (8 Wochen)\n• Rezidivraten: 15–40 %\n• Gute Stuhlregulation (ballaststoffreich, Flüssigkeit, Laxanzien wie Movicol/Makrogol/Flohsamen), Sitzbäder" },
    { letter: "e", text: "Die Fissurektomie nach Gabriel ist als operative Methode in Deutschland die Therapie der Wahl.", correct: true, explanation: "Richtig. Die Fissurektomie nach Gabriel beschreibt die flache Ausschneidung der Fissur mit allen Sekundärveränderungen oberhalb der Internusmuskulatur, mit primärem Wundverschluss unter Anlage eines peripheren Drainagedreiecks zum Abfluss von Wundsekret." },
  ]},
  { id: 150, chapter: 13, number: 7, text: "Welche Aussagen zu anorektalen Abszessen sind zutreffend?", statements: [
    { letter: "a", text: "Anorektale Abszesse treten eher bei jüngeren Frauen auf.", correct: false, explanation: "Falsch. Männer mit einem Altersgipfel von 30–50 Jahren sind dreimal häufiger betroffen als Frauen. Inzidenz: 35–75/100.000 Einwohner/Jahr. Neben M. Crohn erhöhen Diabetes und Adipositas das Risiko." },
    { letter: "b", text: "Die Pathogenese der anorektalen Abszesse hat in den meisten Fällen einen kryptoglandulären Ursprung.", correct: true, explanation: "Richtig. In über 90 % der Fälle entstehen Abszesse von einer infizierten Proktodealdrüse, deren Ausführungsgang im Analkanal auf Höhe der Linea dentata endet. Die Zahl der Drüsen ist bei Männern höher als bei Frauen. Bei Verlegung des Drüsenausgangs durch abgestorbenes Gewebe oder Stuhl → Infektion mit sekundärer Abszedierung entlang der Drüsengänge, bevorzugt über anatomische Spalträume." },
    { letter: "c", text: "Die Klassifikation der anorektalen Abszesse richtet sich nach der Lokalisation.", correct: true, explanation: "Richtig. Einteilung in subkutane, intersphinktäre, ischioanale und pelvirektale Abszesse." },
    { letter: "d", text: "Bei der Mehrzahl der Fälle reicht eine Inzision des Abszesses zur Therapie aus.", correct: false, explanation: "Falsch. Der Abszess sollte unter Schonung des Sphinkters exzidiert werden. Auf gute Entdeckelung ist zu achten. Die Wunde sollte von innen heilen, um ein Rezidiv zu vermeiden." },
    { letter: "e", text: "Bei der Abszesseröffnung sollte möglichst vorsichtig nach Fisteln als Ursprung der Infektion gesucht werden.", correct: true, explanation: "Richtig. Eine Fistulierung tritt bei ca. 30 % der Abszesse auf und sollte intraoperativ mit einer Fistelsonde ausgeschlossen werden. Die Fisteldarstellung sollte nicht erzwungen werden — ggf. den Patienten nach 4–6 Wochen erneut zur Kontrolle einbestellen." },
  ]},
  { id: 151, chapter: 13, number: 8, text: "Welche der folgenden Aussagen über Analfisteln sind zutreffend?", statements: [
    { letter: "a", text: "Die Einteilung erfolgt anhand der modifizierten Parks-Klassifikation und unterteilt vier Hauptgruppen.", correct: false, explanation: "Falsch. Es werden fünf Hauptgruppen nach Parks unterschieden:\n1. Intersphinktär (Typ I)\n2. Transsphinktär (Typ II)\n3. Suprasphinktär (Typ III)\n4. Extrasphinktär (Typ IV)\n5. Subanodermal (Typ V)\n\nKryptoglanduläre Analfisteln können nach Beziehung zum Sphinkterapparat in intersphinktäre, transsphinktäre und suprasphinktäre eingeteilt werden. Subanodermale und extrasphinktäre Fisteln sind keine typischen Analfisteln. Eine Sonderform ist die Hufeisenfistel (innere Öffnung bei 6 oder 12 Uhr SSL mit äußeren Öffnungen auf beiden Glutealseiten)." },
    { letter: "b", text: "Die Bildgebung hat in der Diagnostik der Analfistel einen hohen Stellenwert.", correct: false, explanation: "Falsch. Eine bildgebende Diagnostik ist nur in Ausnahmefällen erforderlich — z. B. bei trans- und suprasphinktären Rezidivfisteln oder ausgedehnten Befunden. Endosonographie und MRT sind gleichwertig. Die wichtigsten diagnostischen Maßnahmen sind die digitale Untersuchung und Sondierung der Fistel. Der Nachweis einer äußeren Fistelöffnung sollte die OP-Indikation darstellen (Sonderfall: CED)." },
    { letter: "c", text: "Die Spaltung des Fistelgangs ist die häufigste klassische Operation in der Analfistelchirurgie.", correct: true, explanation: "Richtig. Das häufigste OP-Verfahren ist die Spaltung der Fistel (Durchtrennung des zwischen Fistelgang und Analkanal gelegenen Gewebes).\n\nZwei Verfahren:\n• Fistelspaltung: reine Durchtrennung zwischen Fistelgang und Anoderm\n• Fistulektomie: radikale Entfernung des Fistelgangs\n\nPostoperative Inkontinenzraten sind niedrig, aber schwerwiegend. Das Inkontinenzrisiko steigt mit der Menge durchtrennten Sphinkteranteils." },
    { letter: "d", text: "Die Fadenbehandlung wird nur zur Drainage einer abszedierenden Fistel verwendet.", correct: false, explanation: "Falsch. Die wichtigste Funktion der Fadendrainage ist die Vorbereitung einer späteren definitiven Sanierung bei nachgewiesenen transsphinktären Analfisteln im Rahmen einer Abszessdrainage. Ziel: Stabilisierung des Fistelgangs während des Abklingens der akuten Entzündung und ein zweizeitiges Verfahren 8–12 Wochen nach dem Primäreingriff." },
    { letter: "e", text: "Die Risikofaktoren umfassen hauptsächlich das männliche Geschlecht und CED.", correct: false, explanation: "Falsch. Neben M. Crohn und männlichem Geschlecht werden Lebensstil, Adipositas, hoher Salzkonsum, Diabetes mellitus, Hyperlipidämie, Dermatosen, Rauchen, Alkoholkonsum, sitzende Tätigkeit, exzessiv scharfe Speisen, mangelnde Bewegung, längeres Sitzen auf der Toilette sowie psychosozialer Stress als Risikofaktoren beschrieben. Bei CED (insbesondere M. Crohn) finden sich atypische Abszessformen." },
  ]},
  { id: 152, chapter: 13, number: 9, text: "Welche Aussagen zum Analmukosaprolaps und Rektumprolaps treffen zu?", statements: [
    { letter: "a", text: "Der Rektumprolaps ist vom Analmukosaprolaps abzugrenzen.", correct: true, explanation: "Richtig. Der Analmukosaprolaps ist eine Vorstülpung des Analkanals vor den Schließmuskel — häufig auf Grundlage ausgeprägter Hämorrhoiden. Der Rektumprolaps ist ein Vorfall aller Wandschichten des Rektums, bedingt durch Beckenbodenschwäche.\n\nAbgrenzung über Fältelung:\n• Analprolaps: radiäre Schleimhautfalten\n• Rektumprolaps: zirkuläre Schleimhautfalten\n\nTherapie initial konservativ (abschwellend, Analgesie, Reposition), dauerhaft häufig chirurgisch." },
    { letter: "b", text: "Die häufigsten Symptome des Rektumprolaps sind der eigentliche Rektumvorfall, die Obstipation und die Blutung.", correct: true, explanation: "Richtig. Neben Obstipation, Prolaps und Blutungen tritt eine Schmierinkontinenz auf, da der Sphinkter nicht mehr vollständig den Anus verschließt. Weitere Symptome: Schleimabgänge, Tenesmen, Schmerzen, Nässen, Diarrhöen, Gefühl der unvollständigen Stuhlentleerung." },
    { letter: "c", text: "Defäkographie und Manometrie stellen wichtige Untersuchungen in der Diagnostik eines Rektumprolapses dar.", correct: true, explanation: "Richtig. Der Rektumprolaps ist in erster Linie eine klinische Diagnose. Apparative Diagnostik: konventionelle oder MR-Defäkographie. Der Kolonkontrasteinlauf sollte ein Sigma elongatum ausschließen (ansonsten mitresezieren). Koloskopie zum Malignomausschluss erwägen. Sphinktermanometrie bei Inkontinenz." },
    { letter: "d", text: "Der Analmukosaprolaps kann konservativ behandelt werden.", correct: true, explanation: "Richtig. Beim Analmukosaprolaps sollten konservative Maßnahmen versucht werden: manuelle Reposition, analgetisch-antiphlogistische Therapie, Stuhlregulation, lokale Kühlung. Bei Versagen: Stapler-Hämorrhoidektomie nach Longo oder konventionelle Hämorrhoidektomie." },
    { letter: "e", text: "Eine Operationsindikation sollte trotz erhöhten Alters der Patienten gestellt werden.", correct: true, explanation: "Richtig. Beim Rektumprolaps gibt es verschiedene Verfahren je nach OP-Fähigkeit und Schwere:\n• Laparoskopische Rektopexie (Mobilisation, Hochzug und Fixierung am Promontorium)\n• Resektionsrektopexie (Rektopexie mit partieller Sigmaresektion)\n• Lokal-äußerliche Verfahren: transperineale Rektosigmoidresektion nach Altemeier, STARR-Operation (stapled transanorectal resection)\n\nZiel: Beseitigung der Ursache durch Verbesserung der Beckenbodenstatik." },
  ]},
  { id: 153, chapter: 13, number: 10, text: "Welche grundlegenden Aussagen zur Inkontinenz sind zutreffend?", statements: [
    { letter: "a", text: "Inkontinenz kann kongenitale und erworbene Ursachen haben.", correct: true, explanation: "Richtig.\n• Kongenital: anorektale Anomalie, Spina bifida, M. Hirschsprung\n• Erworben: neurologisch (MS, M. Parkinson, Rückenmarksverletzung, zerebrovaskulärer Insult), autonomes Nervensystem (Diabetes), Alter, GI-Erkrankungen, Beckeneingriffe (Operationen, Bestrahlung), Schließmuskelverletzungen, Rektumentleerungsstörungen (Überlaufinkontinenz, Rektumprolaps)" },
    { letter: "b", text: "Die Einteilung der Stuhlinkontinenz erfolgt in vier Graden.", correct: false, explanation: "Falsch. Am häufigsten wird die klinische Einteilung nach Parks in drei Grade verwendet:\n• Grad 1: leichte Form — unkontrollierter Abgang von Winden\n• Grad 2: mittlere Form — unkontrollierter Abgang von dünnflüssigem Stuhl\n• Grad 3: schwere Form — unkontrollierter Abgang von geformtem Stuhl\n\nHäufigkeit der Stuhlverluste und Lebensqualität werden in dieser Einteilung nicht berücksichtigt." },
    { letter: "c", text: "Empfohlen wird bei inkontinenzspezifischen Untersuchungen u. a. die perianale Inspektion, die digitale Palpation, eine Rektoskopie oder rektale Endosonographie. Die Überprüfung des Anokutanreflexes gehört jedoch nicht dazu.", correct: false, explanation: "Falsch. Durch den Anokutanreflex wird der M. sphincter ani externus auf seine neuromuskuläre Intaktheit überprüft. Durch Berührung der perianalen Haut kommt es zur Kontraktion des M. sphincter ani externus. Bei Auslösung ist die Integrität des N. pudendus und des sakralen Plexus intakt. Bei neurogener Inkontinenz kann der Reflex fehlen." },
    { letter: "d", text: "Die Elektrostimulation ist eine erfolgversprechende Basistherapie innerhalb der konservativen Therapie der analen Inkontinenz.", correct: true, explanation: "Richtig. Konservative Therapieoptionen: stuhlregulierende Maßnahmen, medikamentöse Therapie (z. B. Phenylephrin-Gel zur Erhöhung des Schließmuskeldrucks), Beckenbodentraining, Magnetfeldtherapie. Bei der Elektrostimulation können Formen der analen Inkontinenz ohne größeren Sphinkterdefekt therapiert werden — durch wiederholte Stimulation mittels Sonde im Analkanal kann eine Stärkung der Muskulatur erfolgen." },
    { letter: "e", text: "Bei Sphinkterdefekten ist die Sphinkterrekonstruktion die Methode der Wahl.", correct: true, explanation: "Richtig. Bei traumatischen Verletzungen ist die Sphinkterrekonstruktion durch direkte Naht das Mittel der Wahl. Ohne umschriebenen Defekt war lange die dorsale (post-anal repair), ventrale (pre-anal repair) oder kombinierte Raffung (total pelvic floor repair) indiziert — Langzeitergebnisse zeigten jedoch hohe Inkontinenzraten, daher nur noch vereinzelt. Neuere Methoden: Graziloplastik (Sphinkterersatz), künstlicher Schließmuskel (artificial bowel sphincter), sakrale Nervenstimulation." },
  ]},
  { id: 154, chapter: 13, number: 11, text: "Welche Aussagen zum Analkarzinom treffen zu?", statements: [
    { letter: "a", text: "Es wird zwischen einem Analrandkarzinom und einem Analkanalkarzinom unterschieden.", correct: true, explanation: "Richtig. Die Differenzierung erfolgt aus anatomischen, therapeutischen und prognostischen Gründen.\n\n• Analrandkarzinom: in einem 5 cm großen perianalen Radius, geht an der Linea anocutanea in das Analkanalkarzinom über. Grenzlinie: Übergang vom Anoderm (nicht verhorntes Plattenepithel) zur Perianalhaut (verhorntes Plattenepithel)\n• Analkanalkarzinom: zwischen Ober- und Unterrand des M. sphincter ani internus" },
    { letter: "b", text: "Risikofaktoren für das Analkarzinom sind Infektionen mit dem humanen Papillomavirus und HIV-Infektionen.", correct: true, explanation: "Richtig. HPV-Stämme 16, 18 und 35 stehen im Vordergrund. Erhöhte Inzidenz bei HIV-Patienten. Hämorrhoiden, Abszesse, Fisteln und andere benigne Läsionen sind nicht mit einem langfristig erhöhten Analkarzinomrisiko assoziiert." },
    { letter: "c", text: "Tumoren bis 2 cm Größe können im Rahmen einer Biopsie zur Diagnosesicherung komplett abgetragen werden.", correct: false, explanation: "Falsch. Nur Tumoren < 1 cm sollten als Biopsie-Eingriff komplett abgetragen werden. Bei größeren Malignomen ist eine Probebiopsie indiziert. Zur Beurteilung der Tumorausdehnung und Lymphknotenbeteiligung: CT/MRT des Abdomens und Endosonographie. T1-Karzinome unter 2 cm können chirurgisch mit Sicherheitsabstand von 0,5 cm en bloc reseziert werden." },
    { letter: "d", text: "Die meisten Patienten erhalten eine Radiochemotherapie.", correct: true, explanation: "Richtig. Die Radiochemotherapie mit 5-Fluorouracil und Mitomycin C ist die Therapie der Wahl beim Analkarzinom. Eine primär-chirurgische Behandlung in kurativer Intention sollte nur bei gut differenzierten Analrandkarzinomen (T1, N0) vorgenommen werden. Die radikale abdominoperineale Rektumamputation wird bei fortgeschrittenen Tumoren nach Radiochemotherapie bei 10–30 % der Patienten durchgeführt." },
    { letter: "e", text: "Seltene maligne Tumoren im Anorektum sind das Melanom und das neuroendokrine Karzinom.", correct: true, explanation: "Richtig. Das maligne Melanom macht ungefähr 1 % aller Analkarzinome aus. Meist handelt es sich um eine Metastase der Haut. Die lokale Resektion mit Sicherheitsabstand erfolgt nach Umfelddiagnostik." },
  ]},
  { id: 155, chapter: 13, number: 12, text: "Welche Aussagen zum Analkanalkarzinom treffen zu?", statements: [
    { letter: "a", text: "Histologisch handelt es sich meist um ein Adenokarzinom.", correct: false, explanation: "Falsch. Es handelt sich zu 80 % um Plattenepithelkarzinome und zu 20 % um Adenokarzinome. Über 80 % der Karzinome sind mit einer HPV-Infektion assoziiert (insbesondere HPV 16, 18 und 33)." },
    { letter: "b", text: "In der Einteilung wird zwischen Analkanal- und Analrandkarzinomen unterschieden.", correct: true, explanation: "Richtig. Als Analkanalkarzinom wird ein Tumor zwischen Linea anorectalis und Linea anocutanea beschrieben. Als Analrandkarzinom ein Tumor distal der Linea anocutanea mit einem Radius bis zu 5 cm." },
    { letter: "c", text: "Die Therapie des Analkanalkarzinoms ist in erster Linie chirurgisch.", correct: false, explanation: "Falsch. Analog zu Plattenepithelkarzinomen des Ösophagus und des Mund-Rachen-Raums gilt diese Tumorentität als strahlensensibel. Die Therapie basiert in erster Linie auf kombinierter Radiochemotherapie. Die chirurgische Therapie erfolgt als Nachresektion von Tumorresiduen nach Radiochemotherapie als abdominoperineale Rektumexstirpation." },
    { letter: "d", text: "Oxaliplatin findet in Kombination mit einer Bestrahlung bei der Therapie des Analkanalkarzinoms eine Anwendung.", correct: false, explanation: "Falsch. Normalerweise erfolgt eine Radiochemotherapie mit 50–59 Gy in Kombination mit 5-FU und Mitomycin C. Oxaliplatin wird bei kolorektalen Adenokarzinomen angewandt." },
    { letter: "e", text: "Bei einem kleinen Tumor unter 2 cm ohne Sphinkterinfiltration kann eine primäre chirurgische Resektion erfolgen.", correct: true, explanation: "Richtig. Bei kleineren Tumoren (< 2 cm, T1, N0, M0), oberflächlich gelegen — insbesondere am Analrand und unteren Analkanal ohne Infiltration des M. sphincter ani externus und ohne Lymphknotenmetastasen — kann die primäre operative Entfernung mit einem Sicherheitsabstand von mindestens 0,5 cm erfolgen." },
  ]},
  { id: 156, chapter: 13, number: 13, text: "Welche Aussagen zur Versorgung eines Patienten mit Sinus pilonidalis treffen zu?", statements: [
    { letter: "a", text: "Der Sinus pilonidalis ist eine erworbene Erkrankung.", correct: true, explanation: "Richtig. Der Pilonidalsinus (pilus = Haar, nidus = Nest) ist eine akut oder chronisch verlaufende erworbene Entzündung im subkutanen Fettgewebe, überwiegend im Bereich der Steißbeinregion. Häufigkeit: 26/100.000 Einwohner/Jahr — aus unbekannten Gründen zunehmend." },
    { letter: "b", text: "Es werden die asymptomatische, die akute abszedierte und chronische Form unterschieden.", correct: true, explanation: "Richtig. Abgebrochene Haare wachsen mit ihren wurzelnahen Enden in die Haut hinein → Pori mit Haaren. Die Hornschuppen fungieren als Widerhaken, wodurch das Haar bis ins subkutane Fettgewebe eindringt. Dort entwickelt sich ein Fremdkörpergranulom, das nicht spontan heilt (asymptomatische Form), sich aber infizieren kann (abszedierende und chronische Form). Starke Behaarung und übermäßige Schweißsekretion begünstigen die Entstehung." },
    { letter: "c", text: "Die Behandlungsmethoden der verschiedenen Formen sind gleich.", correct: false, explanation: "Falsch. Ein asymptomatischer Pilonidalsinus persistiert lebenslang und kann in eine akute oder chronische Form übergehen. Prophylaktische Behandlung ist nicht erforderlich.\n\nTherapie:\n• Akute Abszedierung: zweizeitiges Vorgehen — Abszess eröffnen und drainieren, definitive Versorgung sekundär nach Abklingen der Infektion\n• Chronische Form: elektiver Eingriff mit plastischer Rekonstruktion" },
    { letter: "d", text: "Neben einer Limberg-Plastik besteht auch die Möglichkeit, eine Karydakis-Plastik zur plastischen Deckung des Defektes nach Exzision eines Sinus pilonidalis durchzuführen.", correct: true, explanation: "Richtig. Beide Plastiken werden in der Leitlinie empfohlen und haben vergleichbare Langzeitergebnisse.\n• Limberg-Plastik: rautenförmige Exzision des Sinus mit Bildung eines gleichartig gestalteten subkutanen Lappens\n• Karydakis-Plastik: ellipsenförmige Exzision des Sinus, Mobilisation von subkutanem Gewebe der Gegenseite zum Wundverschluss\n\nEine Mittelliniennaht geht mit Wundheilungsstörungen und erhöhter Rezidivrate einher und wird nicht empfohlen." },
    { letter: "e", text: "Als minimalinvasive Methode wird das sogenannte Pit Picking beschrieben.", correct: true, explanation: "Richtig. Das Pit Picking ist eine minimal-invasive Behandlungsoption für die chronische Form, allerdings mit höherer Rezidivrate im Vergleich zu plastischen Deckungen. Dabei werden die Primärfisteln in der Rima ani über 1 mm Breite und 2–3 mm Tiefe deepithelialisiert ('herausgepickt'), um deren Ausheilen zu ermöglichen. Geeignet für nicht voroperierte Patienten mit begrenztem Lokalbefund — in der Leitlinie wegen fehlender Langzeitdaten nur eingeschränkt empfohlen." },
  ]},
  { id: 157, chapter: 13, number: 14, text: "Welche Antworten zur chronischen Obstipation (obstructed defaecation syndrome, ODS) treffen zu?", statements: [
    { letter: "a", text: "Per definitionem müssen Symptome wie harter Stuhlgang und eine geringe Stuhlfrequenz unter 3 Mal/Woche über mindestens 12 Wochen vorliegen.", correct: true, explanation: "Richtig. Weitere Symptome: Notwendigkeit von starkem Pressen, Gefühl der analen Blockierung, manuelle Stimulation sowie das Gefühl der inkompletten Entleerung. Es müssen mindestens zwei der Symptome vorliegen." },
    { letter: "b", text: "Eine Harninkontinenz bzw. ein Deszensus uteri können assoziiert sein.", correct: true, explanation: "Richtig. Da das ODS die Folge einer Dysfunktion des Beckenbodens ist, können sowohl das urogenitale als auch das anorektale Kompartiment betroffen sein. Die Behandlung sollte interdisziplinär im Rahmen eines Beckenbodenzentrums erfolgen." },
    { letter: "c", text: "Ein totaler Rektumprolaps gehört zur Definition der ODS dazu.", correct: false, explanation: "Falsch. Bei dem ODS liegt häufig eine Intussuszeption (innerer Prolaps) vor, aber kein externer Prolaps." },
    { letter: "d", text: "Eine Rektozele kann allein zu einer ODS führen.", correct: true, explanation: "Richtig. Beim ODS kann entweder die Rektozele oder die Intussuszeption (oder beides) bestehen. Eine ausgeprägte Rektozele, die durch die Scheidenhinterwand nach außen prolabiert, ermöglicht nur nach digitaler Reposition eine Defäkation." },
    { letter: "e", text: "Die chirurgische Therapie beinhaltet endorektale Verfahren wie eine Operation nach STARR oder Altemeier und die laparoskopische Rektopexie bzw. Resektionsrektopexie.", correct: true, explanation: "Richtig. Die chirurgische Therapie beinhaltet endorektale Verfahren (STARR, Altemeier) und abdominalchirurgische Verfahren wie die laparoskopische Rektopexie bzw. Resektionsrektopexie." },
  ]},
  { id: 158, chapter: 14, number: 1, text: "Welche Aussagen zur Epidemiologie von Hernien sind richtig?", statements: [
    { letter: "a", text: "Es treten häufiger direkte als indirekte Leistenhernien auf.", correct: false, explanation: "Falsch. Die Leistenhernie ist die häufigste Hernienform des Menschen. Verteilung:\n• Indirekte (laterale): ca. 65 %\n• Direkte (mediale): ca. 20 %\n• Kombinierte Hernien: ca. 15 %" },
    { letter: "b", text: "Femoralhernien treten häufiger bei Frauen auf.", correct: true, explanation: "Richtig. Das Verhältnis Frauen/Männer beträgt 3:1. Überwiegend sind Frauen über 50 Jahre und adipöse Patientinnen betroffen." },
    { letter: "c", text: "Die Rektusdiastase ist die häufigste Form der epigastrischen Hernie.", correct: false, explanation: "Falsch. Die Rektusdiastase ist per definitionem keine Hernie, da sie keinen Bruchring aufweist. Daher besteht auch keine Inkarzerationsgefahr." },
    { letter: "d", text: "Die Inzidenz von epigastrischen Hernien im Erwachsenenalter liegt bei 15 %.", correct: false, explanation: "Falsch. Die Inzidenz beträgt bis zu 5 %. Meistens sind die Hernien durch einen erhöhten abdominellen Druck erworben." },
    { letter: "e", text: "Die Operation von Narbenhernien stellt einen bedeutenden sozioökonomischen Faktor dar, da 40 % aller laparotomierten Patienten wegen Narbenhernien erneut operiert werden müssen.", correct: false, explanation: "Falsch. Die Häufigkeit einer erneuten Operation wegen Narbenhernie nach Laparotomie beträgt lediglich 4–15 %, ist aber aufgrund der großen Fallzahlen dennoch ein wichtiger sozioökonomischer Faktor." },
  ]},
  { id: 159, chapter: 14, number: 2, text: "Welche Aussagen zur Ätiologie der Leistenhernie sind richtig?", statements: [
    { letter: "a", text: "Stoffwechselveränderungen, insbesondere des Kollagenstoffwechsels, können zu einer Schwächung der Fascia transversalis führen und die Entstehung einer Hernie begünstigen.", correct: true, explanation: "Richtig. Durch eine Bindegewebsschwäche wird die Entstehung von direkten Hernien begünstigt." },
    { letter: "b", text: "Indirekte Leistenhernien werden auch als laterale Hernien bezeichnet.", correct: true, explanation: "Richtig. Die Einteilung erfolgt anhand der epigastrischen Gefäße:\n• Lateral der Gefäße: indirekte (laterale) Hernien\n• Medial der Gefäße: direkte (mediale) Hernien" },
    { letter: "c", text: "Die direkte Leistenhernie tritt häufig bei jungen Männern auf.", correct: false, explanation: "Falsch. Junge Männer haben eher eine angeborene indirekte (laterale) Leistenhernie, die durch einen offenen Processus vaginalis begünstigt werden kann. Ältere Männer entwickeln eher direkte (mediale) Hernien aufgrund der Bindegewebsschwäche." },
    { letter: "d", text: "Raucher haben ein erhöhtes Risiko, ein Leistenhernienrezidiv zu entwickeln.", correct: true, explanation: "Richtig. Raucher haben ein erhöhtes Risiko für Leistenhernienrezidive. Der negative Einfluss des Rauchens auf die primäre Entstehung von Hernien ist bisher nicht nachgewiesen." },
    { letter: "e", text: "Übergewicht und Adipositas erhöhen das Risiko, eine Leistenhernie auszubilden.", correct: false, explanation: "Falsch. Eine große Kohortenstudie aus Schweden zeigte das Gegenteil. Adipöse Patienten haben ein geringeres Risiko, eine Leistenhernie auszubilden." },
  ]},
  { id: 160, chapter: 14, number: 3, text: "Welche Aussagen über die Anatomie der Leistenregion treffen zu?", statements: [
    { letter: "a", text: "An der sensiblen Versorgung der Leistenregion sind größtenteils der N. ilioinguinalis, N. iliohypogastricus und N. genitofemoralis beteiligt.", correct: true, explanation: "Richtig. Diese Nerven sind entscheidend für die Entwicklung neuralgischer Schmerzen und insbesondere für den chronischen Leistenschmerz.\n• R. genitalis des N. genitofemoralis: Schmerzen → Hoden/Schamlippe\n• N. cutaneus femoralis lateralis und R. femoralis des N. genitofemoralis: Schmerzen → Oberschenkel\n• N. ilioinguinalis und N. iliohypogastricus: Schmerzen → Unterleib und Flanke" },
    { letter: "b", text: "Im 'Triangle of Pain' sind der N. cutaneus femoris lateralis und der N. ilioinguinalis bei der Präparation gefährdet.", correct: false, explanation: "Falsch. Neben dem N. cutaneus femoris lateralis verläuft medial der N. genitofemoralis, der bei der Präparation gefährdet sein kann." },
    { letter: "c", text: "Das 'Triangle of Doom' bezeichnet einen dreieckigen Bezirk unterhalb des inneren Leistenrings, der die A. und V. iliaca externa beinhaltet.", correct: true, explanation: "Richtig. Im 'Triangle of Doom' muss aufgrund des Blutungsrisikos bei Gefäßverletzung sehr vorsichtig präpariert werden. Auf die lokale Verwendung von Klammergeräten ist zu verzichten." },
    { letter: "d", text: "Der Ductus deferens verläuft vom inneren Leistenring ausgehend nach lateral und die A. und V. testicularis nach medial.", correct: false, explanation: "Falsch. Der Ductus deferens verläuft nach medial/kaudal in Richtung Prostata, die Testikulargefäße nach lateral/kaudal." },
    { letter: "e", text: "Die sogenannte 'Corona mortis' ist ein lateral der epigastrischen Gefäße liegendes Kranzgefäß.", correct: false, explanation: "Falsch. Die 'Corona mortis' ist eine medial der epigastrischen Gefäße liegende starke Gefäßverbindung zwischen der A. epigastrica inferior und der A. obturatoria. Bei Verletzungen kann es zu unerwartet starken Blutungen kommen." },
  ]},
  { id: 161, chapter: 14, number: 4, text: "Die Europäische Herniengesellschaft (EHS) hat eine verbindliche Klassifikation der Leistenhernien publiziert, die sich auch in der Praxis durchgesetzt hat. Welche Aussagen sind in diesem Zusammenhang richtig?", statements: [
    { letter: "a", text: "Es erfolgt zunächst eine Einteilung in laterale, mediale und femorale Leistenhernien.", correct: true, explanation: "Richtig. Kombinierte laterale/mediale Brüche können auch angegeben werden." },
    { letter: "b", text: "Danach erfolgt die Angabe, ob es sich um eine Primär- oder Rezidivhernie handelt.", correct: true, explanation: "Richtig. Diese Angabe ist wichtig, um die Verfahren bei Rezidiveingriffen beurteilen zu können. So sollten nach offenen (anterioren) Operationen endoskopisch/laparoskopische (posteriore) Techniken verwendet werden und umgekehrt." },
    { letter: "c", text: "Die Bruchlücke der Leistenhernien wird in vier Größen eingeteilt.", correct: false, explanation: "Falsch. Es gibt drei Defektgrößen in der EHS-Klassifikation:\n• Kleine Defekte: < 1,5 cm\n• Mittlere Defekte: 1,5–3 cm\n• Große Defekte: > 3 cm" },
    { letter: "d", text: "Die Einteilung in eine laterale und mediale Hernie wird anhand der epigastrischen Gefäße vorgenommen.", correct: true, explanation: "Richtig. Lateral der Gefäße → laterale (indirekte) Hernie; medial → mediale (direkte) Hernie." },
    { letter: "e", text: "Eine Skrotalhernie wird nach der Klassifikation mit S abgekürzt.", correct: false, explanation: "Falsch. Die Skrotalhernie wird nach der EHS-Klassifikation nicht gesondert beschrieben." },
  ]},
  { id: 162, chapter: 14, number: 5, text: "Welche Aussagen der EHS in den Leitlinien für die operative Behandlung von Leistenhernien treffen zu?", statements: [
    { letter: "a", text: "Zur Versorgung der primären einseitigen Leistenhernie ist die Lichtenstein-Operation das Verfahren der Wahl.", correct: false, explanation: "Falsch. Das Verfahren der Wahl ist eine Operation mit Netzimplantation, wobei sowohl eine offene als auch eine minimal-invasive Operation erfolgen kann." },
    { letter: "b", text: "Zur Versorgung der primären beidseitigen Leistenhernie ist die Lichtenstein-Operation oder eine minimal-invasive Operation das Verfahren der Wahl.", correct: true, explanation: "Richtig. Wie bei der einseitigen Hernie sind beide Techniken möglich. Allerdings sollte aufgrund der frühzeitigen Belastbarkeit und geringeren Schmerzsymptomatik die minimal-invasive Variante bei beidseitigen Leistenhernien bevorzugt werden." },
    { letter: "c", text: "Bei der Rezidivhernie sollte eine zum primären Verfahren gegensätzliche OP-Methode (offen/endoskopisch) eingesetzt werden.", correct: true, explanation: "Richtig. Bei Rezidivleistenhernien sollte nach einem minimal-invasiven, posterioren Verfahren ein offenes, anteriores Verfahren erfolgen und umgekehrt." },
    { letter: "d", text: "Die Verwendung von Netzen in der Leistenhernienchirurgie führt zu einer signifikanten Reduktion von Rezidiven.", correct: true, explanation: "Richtig. Wenn jedoch z. B. bei jungen Patienten mit kleinem Bruch ein OP-Verfahren ohne Netzimplantation angewandt wird, ist die Shouldice-Operation zu bevorzugen." },
    { letter: "e", text: "Die minimal-invasiven Verfahren führen zu mehr Komplikationen als die offenen Leistenhernienreparationen.", correct: false, explanation: "Falsch. Die laparoskopischen Techniken führen zu einer geringeren Rate an Wundinfektionen, weniger Schmerzen und Hämatomen und einer früheren Vollbelastung." },
  ]},
  { id: 163, chapter: 14, number: 6, text: "Welche der Abkürzungen sind korrekt?", statements: [
    { letter: "a", text: "TEP = Total Extraperitoneale Patchplastik", correct: true, explanation: "Richtig. Extraperitoneales Verfahren. Auf dem hinteren Faszienblatt der Rektusscheide wird ein künstlicher Raum erschaffen, der streng extraperitoneal liegt. Postoperativ sollten somit auch keine intraabdominalen Adhäsionen auftreten." },
    { letter: "b", text: "IPOM = Intraperitoneales Onlay Mesh", correct: true, explanation: "Richtig. Wichtig ist die intraperitoneale Lage. Bei der offenen Herniotomie angewandten Onlay-Verfahren liegt das Netz immer extraperitoneal. Eine IPOM-Operation erfolgt laparoskopisch." },
    { letter: "c", text: "TIPP = Transinguinale Präperitoneale Plastik", correct: true, explanation: "Richtig. Bei dieser offenen Variante der Herniotomie besitzt das Netz einen verstärkten Rand und wird über den inneren Leistenring (transinguinal) eingebracht — liegt dementsprechend präperitoneal. Sehr selten angewandtes Verfahren. Die korrekte Netzlage kann nicht wie bei TAPP oder TEP visuell überprüft werden." },
    { letter: "d", text: "TAPP = Totale Abdominale Präperitoneale Patchplastik", correct: false, explanation: "Falsch. Richtig wäre der Begriff 'Transabdominale Präperitoneale Plastik' (oder Netzplastik). Im Gegensatz zur TEP ist der Zugang transabdominal und das Peritoneum muss eröffnet werden. In großen Studien konnte kein relevanter Unterschied zur TEP bezüglich des eröffneten Peritoneums festgestellt werden." },
    { letter: "e", text: "MILOS = Mini or Less Open Sublay", correct: true, explanation: "Richtig. MILOS ist ein endoskopisch-assistiertes Operationsverfahren, welches der klassischen Sublay-Operation ähnelt und für Bauchwandhernien entwickelt wurde." },
  ]},
  { id: 164, chapter: 14, number: 7, text: "Welche technischen Details treffen für das TAPP-Verfahren zu?", statements: [
    { letter: "a", text: "Ein offener Zugang bei der Anlage des Pneumoperitoneums ist zu bevorzugen, da er weniger Komplikationen aufweist.", correct: false, explanation: "Falsch. Es gibt keine definitive Evidenz, dass der offene Zugang weniger Komplikationen aufweist als z. B. die Anlage des Pneumoperitoneums mit einer Veress-Kanüle." },
    { letter: "b", text: "Es sollte nach Lipomen gesucht und, falls vorhanden, sollten diese entfernt werden.", correct: true, explanation: "Richtig. Verbliebene größere Lipome können ein Rezidiv vortäuschen und führen gehäuft zu weiteren Operationen und Unzufriedenheit der Patienten. Die Inspektion des inneren Leistenrings sollte zur Routine gehören." },
    { letter: "c", text: "Da bei der TAPP Netze eingebracht werden, sollte immer eine Antibiotikaprophylaxe erfolgen.", correct: false, explanation: "Falsch. Nach den Richtlinien der IEHS (International Endo Hernia Society) gibt es keine Empfehlung für eine Antibiotikaprophylaxe bei TAPP oder TEP." },
    { letter: "d", text: "Bei größeren direkten Hernien sollte die Fascia transversalis am Cooper'schen Ligament adaptiert werden, um einem Serom vorzubeugen.", correct: true, explanation: "Richtig. Dabei kann die Faszie z. B. mit einer Naht oder einer Schlinge fixiert werden." },
    { letter: "e", text: "Das Peritoneum muss am Ende der Operation immer komplett verschlossen werden.", correct: true, explanation: "Richtig. Das eröffnete Peritoneum sollte verständig verschlossen werden, um Adhäsionen des Netzes am Darm oder Netzdislokationen nach intraabdominell zu vermeiden. Dabei bleibt es dem Operateur überlassen, ob er das Peritoneum fortlaufend oder in Einzelknopftechnik verschließt." },
  ]},
  { id: 165, chapter: 14, number: 8, text: "Welche technischen Details treffen für die TEP zu?", statements: [
    { letter: "a", text: "Eine Ballondissektion sollte erfolgen, um den extraperitonealen Raum zu erschaffen.", correct: true, explanation: "Richtig. Die Ballondilatation ist insbesondere in der Lernphase hilfreich, um den richtigen Raum zu erschaffen. Sie führt zu signifikanter Schmerzreduktion innerhalb der ersten 6 Stunden postoperativ, geringerem Skrotalödem und verringerter Serombildung. Alternativ ist auch eine stumpfe Präparation möglich." },
    { letter: "b", text: "Bei der Trokarplatzierung werden alle Arbeitstrokare in der Mittellinie platziert.", correct: true, explanation: "Richtig. Entweder werden beide 5-mm-Arbeitstrokare in der Mittellinie oder ein 5-mm-Trokar in der Mittellinie und ein 5-mm-Trokar lateral platziert. Beide Techniken der Trokarplatzierung sind als gleichwertig anzusehen." },
    { letter: "c", text: "Bei einer Verletzung des Peritoneums im Rahmen der TEP und dessen Eröffnung muss dieser Defekt immer verschlossen werden.", correct: false, explanation: "Falsch. Bei kleineren Defekten kann das Peritoneum offen gelassen werden. Bei großen Defekten sollte jedoch das Peritoneum verschlossen werden, da es bei Nichtverschluss zu Darmadhäsionen im Falle von Netzdislokationen kommen kann." },
    { letter: "d", text: "Im Gegensatz zur TAPP muss bei der TEP die Fascia transversalis nicht an dem Cooper'schen Ligament zur Seromprophylaxe fixiert werden.", correct: false, explanation: "Falsch. Auch bei der TEP sollte nach Möglichkeit eine Fixierung durchgeführt werden." },
    { letter: "e", text: "Drainagen sollten immer eingelegt werden, um die Ausbildung eines Seroms oder Hämatoms zu verhindern.", correct: false, explanation: "Falsch. Drainagen müssen nicht eingelegt werden, können jedoch bei speziellen Indikationen wie Blutungen oder Koagulopathien verwendet werden." },
  ]},
  { id: 166, chapter: 14, number: 9, text: "Welche Aussagen zur Operation nach Shouldice treffen zu?", statements: [
    { letter: "a", text: "Prinzipiell ist es ein offenes, transinguinales Nahtverfahren zur Reparation von Defekten der Hinterwand des Leistenkanals.", correct: true, explanation: "Richtig. Die erstmals 1945 von Shouldice beschriebene Technik beinhaltet die Verstärkung der Hinterwand des Leistenkanals durch eine Doppelung der Fascia transversalis durch eine fortlaufende Naht." },
    { letter: "b", text: "Der Leistenschrägschnitt ist der klassische Zugang für eine offene Hernienoperation mit einem besseren kosmetischen Ergebnis als der Horizontalschnitt.", correct: false, explanation: "Falsch. Der Horizontalschnitt in der inguinalen Beugefalte führt zu einem besseren kosmetischen Ergebnis und sollte nicht mehr als 4–7 cm betragen." },
    { letter: "c", text: "Wenn der N. ilioinguinalis sichtbar ist, sollte er reseziert werden.", correct: false, explanation: "Falsch. Der Nerv sollte nur reseziert werden, wenn er nicht mehr in seiner Hüllfaszie liegt." },
    { letter: "d", text: "Zu der Operationstechnik gehören die Durchtrennung der Vasa cremasterica externa und die Spaltung des M. cremaster.", correct: true, explanation: "Richtig. Es erfolgt die Präparation der Vasa cremasterica externa medial am inneren Leistenring mit anschließender Durchtrennung. Der M. cremaster wird auf einer Länge von ca. 2 cm am inneren Leistenring längs gespalten und am inneren Leistenring ligiert." },
    { letter: "e", text: "Ein großer lateraler Bruchsack sollte nicht immer komplett reseziert werden.", correct: true, explanation: "Richtig. Bei großen lateralen Bruchsäcken besteht durch umfangreiche Präparation die Gefahr von Gefäßverletzungen im Plexus pampiniformis — es können postoperativ ischämische Orchitiden entstehen. Zur Vorbeugung kann der Bruchsack am inneren Leistenring durchtrennt und nach proximal verschlossen werden. Die Gefahr einer Serombildung im belassenen distalen Bruchsack ist gering." },
  ]},
  { id: 167, chapter: 14, number: 10, text: "Welche Aussagen zur Hernienversorgung nach Lichtenstein sind zutreffend?", statements: [
    { letter: "a", text: "Direkte Hernien sollten immer reseziert werden.", correct: false, explanation: "Falsch. Mediale Hernien werden reponiert, bei lateralen Hernien wird der Bruchsack reseziert. Bei größeren medialen Hernien (> 3 cm) kann der Bruchsack reseziert und spannungsfrei mit einer nicht-resorbierbaren Naht versorgt werden — dies führt zu besserer Übersicht und vereinfacht die Netzplatzierung." },
    { letter: "b", text: "Der Bruchsack sollte bei indirekten Hernien reseziert und mit einer Naht versenkt werden.", correct: true, explanation: "Richtig. Soweit dies möglich ist und den Plexus pampiniformis nicht schädigt." },
    { letter: "c", text: "Das Netz sollte die Hinterwand weit medial überlappen.", correct: true, explanation: "Richtig. Wichtig ist eine mindestens 2 cm lange Überlappung bis zum mittleren Schambeinast mit Fixierung an der Faszie des M. rectus abdominis, um medialen Rezidiven vorzubeugen. Das Periost sollte nicht mitgestochen werden." },
    { letter: "d", text: "Die Fixierung des Netzes muss mit einem resorbierbaren Faden erfolgen.", correct: false, explanation: "Falsch. Es sollte ein nicht-resorbierbarer Polypropylen-Faden der Stärke 3/0 oder 2/0 verwendet werden. Die Naht sollte ca. 2 cm mediokranial des Tuberculum pubicum starten. Das Netz wird an der lateralen Faszie des M. rectus abdominis fixiert und dann fortlaufend am Leistenband bis zum inneren Leistenring vernäht." },
    { letter: "e", text: "Das Netz muss spannungsfrei der Hinterwand aufliegen und sollte eine Länge von 6 cm aufweisen.", correct: false, explanation: "Falsch. Es empfiehlt sich, das in der Regel vorhandene Netz der Größe 15 × 10 cm während der Operation (und nicht vorher) individuell anzupassen, damit es spannungsfrei zu liegen kommt." },
  ]},
  { id: 168, chapter: 14, number: 11, text: "Welches der folgenden Krankheitsbilder stellt eine wichtige Differenzialdiagnose der Leistenhernie dar?", statements: [
    { letter: "a", text: "Hydrozele und Varikozele.", correct: true, explanation: "Richtig. Die Hydrozele ist eine schmerzlose Ansammlung seröser Flüssigkeit in den Hodenhüllen. Die Varikozele ist eine Krampfaderbildung im Bereich des von den Hodenvenen gebildeten Plexus pampiniformis. Aufgrund der ungünstigen Einstrombahn der linken V. testicularis in die linke V. renalis tritt die Varikozele auf der linken Seite häufiger auf." },
    { letter: "b", text: "Lipome", correct: true, explanation: "Richtig. Das Lipom ist nicht durch Husten verschieblich und von weicher Konsistenz, kann jedoch zu starkem Druckgefühl und Schmerzen führen." },
    { letter: "c", text: "Lymphadenitis.", correct: true, explanation: "Richtig. Die Lymphknoten können in kurzer Zeit stark anschwellen, sind sehr druckempfindlich und schmerzhaft. Durch Hustenreiz besteht keine Beweglichkeit, insgesamt sind die Lymphknoten kaum verschieblich." },
    { letter: "d", text: "Abszesse.", correct: true, explanation: "Richtig. Abszesse imponieren durch eine sehr druckdolente Schwellung mit palpabler Fluktuation/Rötung und starkem Krankheitsgefühl." },
    { letter: "e", text: "Zysten, Hodentumoren, Metastasen, Leistenhoden.", correct: true, explanation: "Richtig. Alle genannten Erkrankungen sind seltene, jedoch wichtige Differenzialdiagnosen, die zu Schmerzen führen können." },
  ]},
  { id: 169, chapter: 14, number: 12, text: "Welche Aussagen zur Klassifikation der EHS für primäre Bauchwand- und Narbenhernien sind richtig?", statements: [
    { letter: "a", text: "Primäre Bauchwandhernien werden nach ihrer Lokalisation in mediale und laterale Hernien unterteilt.", correct: true, explanation: "Richtig. Mediale Hernien: Nabel- und epigastrische Hernien. Laterale Hernien: lumbale und Spieghelhernien (zwischen dem lateralen Rand der Rektusscheide und der Linea semilunaris)." },
    { letter: "b", text: "Die Einteilung von Bauchwandhernien erfolgt nach dem Durchmesser des Defekts.", correct: true, explanation: "Richtig. Einteilung primäre Bauchwandhernien:\n• Kleine Defekte: < 2 cm\n• Mittlere Defekte: ≥ 2–4 cm\n• Große Defekte: > 4 cm" },
    { letter: "c", text: "Die Einteilung von Narbenhernien erfolgt nach dem Durchmesser des Defekts.", correct: true, explanation: "Richtig. Einteilung Narbenhernien:\n• Kleine Defekte: < 4 cm\n• Mittlere Defekte: 4–10 cm\n• Große Defekte: > 10 cm" },
    { letter: "d", text: "Zur Klassifikation von Narbenhernien wird die Bauchwand in einen mittleren Bereich zwischen den beiden äußeren Rändern des Rektusmuskels und einen lateral davon gelegenen Bereich eingeteilt.", correct: true, explanation: "Richtig. Medial wird anhand der Höhenlokalisation weiter unterteilt:\n• M1 (subxyphoidal), M2 (epigastrisch), M3 (umbilikal), M4 (infraumbilikal), M5 (suprapubisch)\n\nLateral:\n• L1 (subkostal), L2 (seitlich), L3 (iliakal), L4 (lumbal)" },
    { letter: "e", text: "Bei Narbenbrüchen mit multiplen kleineren Brüchen (sogenannten Gitterbrüchen) werden die Brüche einzeln klassifiziert.", correct: false, explanation: "Falsch. Multiple kleine Brüche werden zu einem großen Narbenbruch addiert und anschließend klassifiziert." },
  ]},
  { id: 170, chapter: 14, number: 13, text: "Welche Aussagen zu ventralen Bauchwandhernien treffen zu?", statements: [
    { letter: "a", text: "Primärdefekte von über 2 cm sowie Rezidivhernien sollten mit einem Netz versehen werden.", correct: true, explanation: "Richtig. Ab dieser Größe ist die alleinige Naht nicht ausreichend und führt häufig zu Rezidiven. Bei Rezidiven sollten auch kleinere Brüche mit einem Netz versorgt werden." },
    { letter: "b", text: "Die sogenannte Fasziendoppelung nach Mayo sollte nicht mehr durchgeführt werden.", correct: true, explanation: "Richtig. Die Fasziendoppelung zeigt gegenüber der Stoß-auf-Stoß-Naht keinen Vorteil und führt zu Mikrozirkulationsstörungen." },
    { letter: "c", text: "Bei Nabelhernien muss der Nabel abgesetzt werden, um den Bruchring komplett darzustellen.", correct: false, explanation: "Falsch. Wenn möglich, sollte der Nabel mit einer Overholt-Klemme umfahren und leicht luxiert werden, um die Durchblutung nicht zu gefährden und eine evtl. Nekrose zu verhindern." },
    { letter: "d", text: "Bei kleineren epigastrischen Brüchen sollte eine quere Inzision erfolgen.", correct: true, explanation: "Richtig. Entlang der Hautspaltlinien kommt es zu einer besseren Narbenbildung." },
    { letter: "e", text: "Bei der Nabelherniotomie nach Spitzy (direkte Naht) ist der verwendete Hautschnitt quer supraumbilikal.", correct: false, explanation: "Falsch. Bei der Nabelherniotomie nach Spitzy ist der Hautschnitt quer infraumbilikal." },
  ]},
  { id: 171, chapter: 14, number: 14, text: "Welche Aussagen zur laparoskopischen IPOM-Operation sind zutreffend?", statements: [
    { letter: "a", text: "Eine geeignete Lagerung ist die Rückenlage mit beidseits angelagerten Armen.", correct: true, explanation: "Richtig. Teilweise muss von beiden Seiten operiert werden, sodass diese Variante am flexibelsten ist." },
    { letter: "b", text: "Bei Ventral- und Narbenhernien sollte eine Antibiotikaprophylaxe erfolgen.", correct: true, explanation: "Richtig. Die Antibiotikaprophylaxe wurde als Grad-B-Empfehlung in den Leitlinien empfohlen (im Gegensatz zu Leistenhernienoperationen, bei denen keine Antibiotikaprophylaxe notwendig ist)." },
    { letter: "c", text: "Bei Narbenhernien sollte die Bruchlücke nicht verschlossen werden.", correct: false, explanation: "Falsch. Falls möglich, sollte die Bruchlücke immer verschlossen werden, um einem Serom vorzubeugen. Dies kann entweder intrakorporal oder von außen mit transfaszial angebrachten Nähten erfolgen. Bei zu großem Defekt sollte davon Abstand genommen werden, da die Spannung zu hoch ist." },
    { letter: "d", text: "Das Netz sollte an dem Bruchring gut adaptiert werden.", correct: false, explanation: "Falsch. Das Netz muss den Bruchring mindestens 5 cm (besser 7 cm) überlappen, um auch nach Schrumpfung eine ausreichende Überlappung zu gewährleisten." },
    { letter: "e", text: "Ausgeprägte Schmerzen nach einem laparoskopischen IPOM-Verfahren sind nicht selten.", correct: true, explanation: "Richtig. Die transfaszial eingeführten Nähte und die modernen resorbierbaren Tacker führen zu nicht unerheblichen Schmerzen, die einige Tage anhalten und einer guten Analgesie bedürfen." },
  ]},
  { id: 172, chapter: 14, number: 15, text: "Welche Aussagen zur MILOS-Operation (minimally invasive or less open sublay) treffen zu?", statements: [
    { letter: "a", text: "Die MILOS-Operation wird nur bei Bauchwandhernien angewandt.", correct: false, explanation: "Falsch. Die MILOS-Operation ist ein neues endoskopisch-assistiertes Verfahren, bei dem minimalinvasiv die Kunststoffnetzeinlage im extraperitonealen Raum bei Bauchwand- und Narbenhernien erfolgt." },
    { letter: "b", text: "Die MILOS-Technik eignet sich auch für die Versorgung großer Narbenhernien.", correct: true, explanation: "Richtig. Das Verfahren ist auch für große Hernien geeignet. Auch laterale Bauchwandhernien und die posteriore Komponentenseparation können in MILOS-Technik durchgeführt werden." },
    { letter: "c", text: "Die initiale Inzision erfolgt über dem größten Herniendefekt.", correct: true, explanation: "Richtig. Die OP beginnt mini-offen mit einem 2–6 cm langen Hautschnitt über dem Zentrum des größten Herniendefekts und der Freipräparation des Bruchsacks." },
    { letter: "d", text: "Die weitere Präparation erfolgt endoskopisch oder unter direkter Sicht extraperitoneal.", correct: true, explanation: "Richtig. Die weitere total extraperitoneale Präparation erfolgt transhernial entweder unter direkter Sicht mit laparoskopischen Instrumenten oder endoskopisch. Nach Freipräparation eines etwa 10 cm durchmessenden extraperitonealen Raums kann der Eingriff analog zur TEP endoskopisch fortgeführt werden. Die extraperitoneale Präparation vom Rektuskompartment kann bis in das laterale Kompartment ausgedehnt werden." },
    { letter: "e", text: "Das einzubringende Netz sollte die Hernie 4 cm überlappen.", correct: false, explanation: "Falsch. Das Kunststoffnetz sollte den Bruch ringsherum mindestens 5 cm überlappen. Auch die Implantation größerer Netze ist möglich." },
  ]},
  { id: 173, chapter: 14, number: 16, text: "Was trifft auf die Verfahren der Narbenhernienreparation zu?", statements: [
    { letter: "a", text: "Ein reines Nahtverfahren sollte bei der Narbenhernienreparation, wenn keine Kontraindikationen gegen ein Netz vorliegen, nicht mehr angewandt werden.", correct: true, explanation: "Richtig. Bei reinen Nahtverfahren liegen die Rezidivraten deutlich höher, sodass diese Therapie nicht mehr empfohlen werden kann." },
    { letter: "b", text: "Bei den alloplastischen Verfahren werden vier Methoden anhand der Netzlage unterschieden.", correct: true, explanation: "Richtig. Nach Netzposition werden vier Techniken unterschieden:\n• Onlay: Netz liegt subkutan auf der Faszie des M. rectus abdominis\n• Inlay: Netz liegt zwischen den beiden Mm. recti abdominis (Linea alba)\n• Sublay: Netz liegt retromuskulär auf dem hinteren Blatt der Rektusscheide\n• IPOM: Intraperitoneales Onlay-Mesh — beschichtetes Netz von intraabdominal auf das Peritoneum gelegt und transfaszial fixiert" },
    { letter: "c", text: "Die Onlay-Mesh-Methode führt zu einer häufigeren Serombildung.", correct: true, explanation: "Richtig. Aufgrund der ausgedehnten Präparation mit Ablösung des subkutanen Fettgewebes entstehen postoperativ gehäuft Wundheilungsstörungen mit Serombildung und Rezidiven. Die Onlay-Technik wird nur noch selten durchgeführt." },
    { letter: "d", text: "Das Sublay-Verfahren ist aktuell das Standardverfahren der offenen Narbenhernienreparation.", correct: true, explanation: "Richtig. Durch die retromuskuläre Lage stabilisiert sich das Netz durch den intraabdominellen Druck — sicherer Bruchlückenverschluss mit geringen Rezidiv- und Infektionsraten." },
    { letter: "e", text: "Bei der IPOM-Technik muss das Netz im Gegensatz zum Sublay-Verfahren besonders gut fixiert werden.", correct: true, explanation: "Richtig. Da das Netz intraperitoneal liegt, besteht das Risiko von Darmadhäsionen, Adhäsionsileus und Fistelungen, insbesondere wenn der Netzrand Lücken aufweist." },
  ]},
  { id: 174, chapter: 14, number: 17, text: "Welche Aussagen zum Bauchdeckenverschluss bei komplizierten Narbenhernien mit großem Bauchwanddefekt sind zutreffend?", statements: [
    { letter: "a", text: "Bei infizierten Polypropylen- oder Polyesternetzen ist eine sofortige Explantation indiziert.", correct: false, explanation: "Falsch. Bei Polypropylen- oder Polyesternetzen kann ein konservativer Versuch mit systemischer antibiotischer Therapie, lokaler Gabe von Antiseptika und offener Wundbehandlung versucht werden. Infizierte PTFE-Netze (Polytetrafluorethylen) sollten dagegen explantiert werden." },
    { letter: "b", text: "Das Risiko, eine enterokutane Fistel zu entwickeln, ist bei großen Bauchdeckenplastiken und bei Adhäsiolyse deutlich erhöht.", correct: true, explanation: "Richtig. Abhängig vom verwendeten Material:\n• Resorbierbare Netze: Fistelausbildung bis zu 4 %\n• Nicht-resorbierbare Netze: bis zu 25 %\n\nAm häufigsten bei Polyester-Netzen. Risiko erhöht bei Netzwanderung, Wundinfekten, präoperativem Ileus oder Inkarzeration. Alle zugelassenen Netze führen zu Adhäsionen unterschiedlicher Ausprägung. Verwendet werden dürfen derzeit nur PTFE- oder Composite-Netze (geringeres Adhäsionsrisiko)." },
    { letter: "c", text: "Mit der Technik der Komponentenseparation können Defekte von bis zu 8 cm umbilikal und bis zu 4 cm suprasymphysär überbrückt werden.", correct: false, explanation: "Falsch. Richtig angewandt können Defekte von bis zu 16 cm umbilikal und 6–8 cm suprasymphysär verschlossen werden." },
    { letter: "d", text: "Die Standardnetzgröße bei TEP/TAPP sollte 8 × 10 cm betragen.", correct: false, explanation: "Falsch. Die Standardgröße ist 10 × 15 cm. Bei direkten Hernien über 3 cm wird auch die Größe 12 × 17 cm empfohlen." },
    { letter: "e", text: "Netze müssen nicht unbedingt fixiert werden.", correct: true, explanation: "Richtig. Bei der TEP ist dies bei Hernien bis 3 cm nicht notwendig. Bei der TAPP gibt es unterschiedliche Ansätze. Falls eine Fixierung indiziert ist, erfolgt diese meist medial und/oder an der Symphyse, um die lateral gelegenen Nerven nicht zu gefährden. Es können Klebeverfahren oder resorbierbare Tacker verwendet werden." },
  ]},
  { id: 175, chapter: 14, number: 18, text: "Welche Aussagen über parastomale Hernien sind zutreffend?", statements: [
    { letter: "a", text: "Die Inzidenz von parastomalen Hernien ist gegenüber der Leisten- und den primären Bauchwandhernien sehr hoch.", correct: true, explanation: "Richtig. Die Inzidenz von parastomalen Hernien beträgt bis zu 50 %." },
    { letter: "b", text: "Die primäre Therapie besteht in dem direkten Nahtverschluss des Defektes.", correct: false, explanation: "Falsch. Bei der alleinigen Naht bestehen Rezidivraten von 50–76 %, sodass dieses Verfahren als obsolet gilt." },
    { letter: "c", text: "Als Methode der Wahl gilt das Sublay-Verfahren oder bei entsprechender Expertise die laparoskopische IPOM-Technik.", correct: true, explanation: "Richtig. Auch ein Onlay-Verfahren ist technisch möglich, hat aber die Nachteile einer Netzinfektion und Wundheilungsstörung. Das laparoskopische IPOM-Verfahren ist aufgrund der geringsten Kontaminationsgefahr zu empfehlen, erfordert jedoch wegen der Verwachsungen und der doppelten Netzplatzierung laparoskopische Erfahrung." },
    { letter: "d", text: "Bei der parastomalen Hernie reicht eine Überlappung des Netzes von 3 cm aus.", correct: false, explanation: "Falsch. Wie bei der Narbenhernie sollte eine Überlappung von 5 cm gewährleistet sein." },
    { letter: "e", text: "Bei multimorbiden Patienten können parastomale Hernien auch konservativ behandelt werden, solange die Versorgung des Stomas gewährleistet ist.", correct: true, explanation: "Richtig. Hier sollte die Indikation zur Operation zurückhaltend gestellt werden." },
  ]},
  { id: 176, chapter: 15, number: 1, text: "Welche Aussagen zur Diagnostik von Schilddrüsenerkrankungen treffen zu?", statements: [
    { letter: "a", text: "Bei einem erniedrigten basalen TSH-Spiegel und einer normalen fT4/fT3-Konzentration spricht man von einer manifesten Hyperthyreose.", correct: false, explanation: "Falsch. Ein erniedrigtes TSH mit einem normalen fT3/T4-Spiegel zeigt eine LATENTE Hyperthyreose an. Erst bei einer Erhöhung der fT3/fT4-Konzentration spricht man von einer manifesten Hyperthyreose." },
    { letter: "b", text: "Die Bestimmung von Calcitonin dient zur Erkennung eines medullären Schilddrüsenkarzinoms.", correct: true, explanation: "Richtig. Da die Früherkennung des medullären Karzinoms die Überlebenschancen verbessert und medulläre Mikrokarzinome durch Sonographie oder Feinnadelpunktion nicht sicher ausgeschlossen werden können, wird die präoperative Bestimmung von Calcitonin vor Schilddrüsenoperationen empfohlen." },
    { letter: "c", text: "Bei Verdacht auf Vorliegen einer autoimmunen Schilddrüsenerkrankung kann die Bestimmung von Autoantikörpern sinnvoll sein.", correct: true, explanation: "Richtig. Bei Verdacht auf eine autoimmune Schilddrüsenerkrankung sollten Antikörper bestimmt werden:\n• Morbus Basedow: Erhöhung der TSH-Rezeptor-Antikörper (TRAK)\n• Hashimoto-Thyreoiditis: Erhöhung der Thyreoperoxidase-Antikörper (TPO-AK)" },
    { letter: "d", text: "Feinnadelpunktionen der Schilddrüse zur Diagnosesicherung sollten aufgrund der Gefahr von Punktionskanalmetastasen nicht durchgeführt werden.", correct: false, explanation: "Falsch. Die Feinnadelpunktion hat einen Stellenwert bei der Diagnostik suspekter Schilddrüsenknoten und dient der Abschätzung des Malignitätsrisikos — insbesondere wenn eine nicht-operative Therapie erwogen wird. Metastasen im Punktionskanal sind extrem selten und haben keinen Einfluss auf die Prognose." },
    { letter: "e", text: "Die Bestimmung des Thyreoglobulin dient zum präoperativen Nachweis eines Karzinoms.", correct: false, explanation: "Falsch. Thyreoglobulin ist ein sehr spezifischer Tumormarker für differenzierte Schilddrüsenkarzinome, ist jedoch nicht zum präoperativen Nachweis geeignet. Die Bestimmung dient vor allem zur Rezidivdiagnostik im Rahmen der postoperativen Nachsorge." },
  ]},
  { id: 177, chapter: 15, number: 2, text: "Welche Aussagen zur Knotenstruma sind zutreffend?", statements: [
    { letter: "a", text: "Sobald eine Knotenstruma diagnostiziert wird, besteht die Indikation zur Operation.", correct: false, explanation: "Falsch. Je nach klinischer Symptomatik, Größe und laborchemischen Parametern (TSH) kann eine Knotenstruma einer medikamentösen, radiotherapeutischen oder operativen Therapie zugeführt werden. OP-Indikationen: lokale Beschwerden, subklinische/manifeste Hyperthyreose, Malignitätsverdacht." },
    { letter: "b", text: "Bei Solitärknoten ohne Malignitätsverdacht kann eine Knotenexzision ausreichend sein.", correct: true, explanation: "Richtig. Bei Solitärknoten ohne Malignitätshinweis ist je nach Knotengröße und intrathyreoidaler Lage eine Knotenexzision mit Entfernung des umgebenden Randsaumes normalen Schilddrüsengewebes, eine subtotale Resektion oder eine Hemithyreoidektomie angezeigt. Bei malignitätsverdächtigen Knoten sollte grundsätzlich eine Hemithyreoidektomie erfolgen." },
    { letter: "c", text: "Echoarme Knoten findet man vor allem bei Adenomen und Karzinomen.", correct: true, explanation: "Richtig. Autonome Adenome sowie Karzinome der Schilddrüse stellen sich sonographisch meist echoarm dar. Die Malignitätswahrscheinlichkeit erhöht sich bei irregulären echoarmen Knoten mit zentraler Hypervaskularisation und Mikroverkalkung auf bis zu 80 %." },
    { letter: "d", text: "Bei kalten Knoten kann eine Feinnadelpunktion (FNP) sinnvoll sein.", correct: true, explanation: "Richtig. Schilddrüsenkarzinome stellen sich in der Szintigraphie in der Regel als kalte Knoten dar. Da in 5–15 % dieser Fälle ein maligner Tumor vorliegen kann, ist bei sonographisch echoarmen und szintigraphisch kalten Knoten eine FNP indiziert. Ein sonographisch echoarmer und szintigraphisch kalter Knoten ist hochverdächtig für Malignität." },
    { letter: "e", text: "Eine Kombination von Morbus Basedow mit einer Knotenstruma ist pathophysiologisch nicht möglich.", correct: false, explanation: "Falsch. Selten kommt eine Kombination beider Entitäten vor: Das 'Marine-Lenhart-Syndrom' (David Marine und Carl H. Lenhart 1911) beschreibt das Auftreten einer Knotenstruma mit gleichzeitiger Schilddrüsenautonomie." },
  ]},
  { id: 178, chapter: 15, number: 3, text: "Welche Aussagen zu malignen Schilddrüsenerkrankungen treffen zu?", statements: [
    { letter: "a", text: "Die bevorzugte Bildgebung bei fortgeschrittenem Tumorwachstum ist ein Kontrastmittel-CT.", correct: false, explanation: "Falsch. Ein CT ist zwar zur Diagnostik geeignet, jedoch ist das MRT nach Möglichkeit die Bildgebung der Wahl. Ein Kontrastmittel-CT beeinträchtigt bei postoperativem Nachweis eines differenzierten Schilddrüsenkarzinoms die zeitgerechte Radiojodtherapie." },
    { letter: "b", text: "Das papilläre Schilddrüsenkarzinom metastasiert primär lymphogen.", correct: true, explanation: "Richtig. Papilläre Karzinome sind mit ca. 60 % die häufigsten Schilddrüsenkarzinome und prognostisch günstig (10-JÜR beim Mikrokarzinom > 99 %, ohne Fernmetastasierung > 90 %). Der Metastasierungsweg ist lymphogen — zunächst in zervikale, später auch in mediastinale Lymphknoten." },
    { letter: "c", text: "Die Inzidenz follikulärer Schilddrüsenkarzinome ist in Jodmangelgebieten erhöht.", correct: true, explanation: "Richtig. In Deutschland machen follikuläre Schilddrüsenkarzinome ca. 30 % aller Schilddrüsenkarzinome aus. Jodmangel begünstigt die Entstehung differenzierter Schilddrüsenkarzinome, besonders follikulärer. Der Metastasierungsweg ist hämatogen (Lunge, Knochen). 10-JÜR: minimal-invasive Formen 95 %, breit-invasive Formen 50 %." },
    { letter: "d", text: "Anaplastische Schilddrüsenkarzinome sind prognostisch günstig.", correct: false, explanation: "Falsch. Undifferenzierte, anaplastische Karzinome treten mit ca. 5 % aller Schilddrüsenkarzinome selten auf. Sie gehen mit einer sehr schlechten Prognose einher (mittlere Überlebensrate wenige Monate), wachsen schnell invasiv und zeigen früh Lymphknoten- und Fernmetastasen." },

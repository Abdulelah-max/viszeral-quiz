    { letter: "a", text: "Leitsymptom der Gallengangskarzinome ist der schmerzlose Ikterus mit Cholestase und Pruritus.", correct: true, explanation: "Richtig. Leitsymptom ist der schmerzlose Ikterus mit Cholestase und Pruritus. Zusätzlich können sich Fieber und Schüttelfrost als Zeichen einer Cholangitis einstellen. Außerdem können unspezifische Zeichen einer Tumorerkrankung wie Abgeschlagenheit, Gewichtsverlust, Appetitlosigkeit und Leistungsknick auftreten." },
    { letter: "b", text: "Ein Ikterus tritt bei Cholangiokarzinomen immer auf.", correct: false, explanation: "Falsch. Bei inkompletter oder segmentaler biliärer Obstruktion kann ein Ikterus zumindest initial fehlen. Meist sind aber alkalische Phosphatase und γ-Glutamyltransferase erhöht." },
    { letter: "c", text: "Die Erhöhung des CA 19-9 in Zusammenhang mit einer Cholestase ist beweisend für ein Cholangiokarzinom.", correct: false, explanation: "Falsch. Allein die Cholestase, unabhängig von der Ursache, kann eine Erhöhung des CA 19-9 induzieren. Der Wert eignet sich eher für die Verlaufskontrolle; ein ansteigender Wert über 500 U/ml ist hinweisend auf ein cholangiozelluläres Karzinom." },
    { letter: "d", text: "In der Diagnostik ist die Endosonographie der Goldstandard.", correct: false, explanation: "Falsch. Grundsätzlich sollten neben transabdomineller Sonographie und Dünnschicht-Spiral-CT mit i.v. KM vor allem eine ERCP durchgeführt werden. Hierbei kann neben einer Probengewinnung (Biopsie, Bürstenzytologie) ggf. auch eine Dekompression des Gallenwegsystems durch Stenteinlage erfolgen. Ergänzend kann die Endosonographie bei distalen Karzinomen zusätzliche Aussagen liefern. Zusätzlich kann eine MRCP durchgeführt werden." },
    { letter: "e", text: "Eine histologische Sicherung vor der Operation ist obligat.", correct: false, explanation: "Falsch. Zwar lässt sich in der Mehrzahl der Fälle die Diagnose histologisch/zytologisch sichern (im Gegensatz zum Pankreaskarzinom); ein negatives Ergebnis schließt ein Malignom allerdings nicht aus. Damit bleibt häufig nur die operative Exploration, wobei die abschließende Beurteilung vor allem bei hilären Karzinomen in einigen Fällen erst nach der Resektion getroffen werden kann." },
  ]},
  { id: 67, chapter: 5, number: 5, text: "Welche Aussagen zur Operation extrahepatischer Gallengangskarzinome treffen zu?", statements: [
    { letter: "a", text: "Bei distalen Gallengangskarzinomen kann eine zusätzliche partielle Duodenopankreatektomie erforderlich werden (Bismuth Typ I).", correct: true, explanation: "Richtig. Diese Tumoren erfordern eine komplette infrahiläre Resektion des Ductus hepatocholedochus einschließlich der Gallenblase mit gleichzeitiger En-bloc-Dissektion des angrenzenden pericholedochalen Weich- und Lymphgewebes. Bei tumorbefallenen distalen Schnitträndern kann eine R0-Resektion durch eine Erweiterung des Eingriffs im Sinne einer partiellen Duodenopankreatektomie noch realisiert werden." },
    { letter: "b", text: "Bei Bismuth-Typ-II-Tumoren sollte immer das Lebersegment I reseziert werden.", correct: true, explanation: "Richtig. Häufig sind die zum Lebersegment I ziehenden Gallenwegsäste tumorbefallen, sodass dieses Segment mitentfernt werden sollte." },
    { letter: "c", text: "Bismuth Typ III ist die häufigste Tumorvariante.", correct: true, explanation: "Richtig. Ca. 65 % der Gallengangskarzinome müssen diesem Typ zugerechnet werden. Die Resektion erfolgt in der Regel in Kombination mit der Hemihepatektomie der betroffenen Seite." },
    { letter: "d", text: "Bismuth-Typ-IV-Tumoren haben die beste Prognose.", correct: false, explanation: "Falsch. Typ-IV-Tumoren sind in der Regel einer kurativen Resektion (R0) nicht zugänglich." },
    { letter: "e", text: "Oberstes Ziel der kurativen Operation ist die Erreichung tumorfreier Resektionsränder.", correct: true, explanation: "Richtig. Die Operation ist bislang die einzige Behandlung mit potenzieller Aussicht auf Heilung. Voraussetzung ist eine R0-Resektion. Die Wahrscheinlichkeit einer R0-Situation nimmt umso mehr ab, je hilusnäher der Tumor gelegen ist, da die Einhaltung entsprechender Sicherheitsabstände (15–20 mm nach proximal sind ausreichend) aufgrund der anatomischen Verhältnisse zunehmend erschwert wird." },
  ]},
  { id: 68, chapter: 5, number: 6, text: "Welche Aussagen zur Operabilität und palliativen Therapie von Gallengangskarzinomen sind korrekt?", statements: [
    { letter: "a", text: "Ein kurativer Ansatz ist bei bis zu 50 % der Patienten möglich.", correct: false, explanation: "Falsch. Ein kurativer Ansatz ist in weniger als 25 % der Fälle möglich:\n• Intrahepatische Gallengangskarzinome: Leberteilresektion\n• Perihiläre Gallengangskarzinome: Resektion des DHC inkl. Hepatikusgabel und großer Gallengänge, ggf. Leberteilresektion, Hepatikojejunostomie und Roux-Y-Rekonstruktion\n• Distale extrahepatische Gallengangskarzinome: Resektion des DHC, Cholezystektomie, Hepatikojejunostomie und Roux-Y-Rekonstruktion\n• Papillenkarzinome: OP nach Kausch-Whipple\n\nBei über 75 % der Patienten besteht zum Diagnosezeitpunkt eine primäre Inoperabilität — daher nur noch palliativer Ansatz." },
    { letter: "b", text: "Bei Tumoren, die nicht resektabel sind, muss die Galleflüssigkeit abgeleitet werden.", correct: true, explanation: "Richtig. Bei nicht resektablen Tumoren muss die Galle abgeleitet werden. Möglich sind eine ERCP mit Stenteinlage oder eine äußere Ableitung durch PTCD (perkutane transhepatische Cholangiodrainage)." },
    { letter: "c", text: "Die TACE (transarterielle Chemoembolisation) kann bei extrahepatischen Karzinomen zur Anwendung kommen.", correct: false, explanation: "Falsch. Die TACE kann bei intrahepatischen cholangiozellulären Karzinomen erwogen werden. Hierbei erfolgt die lokale arterielle Embolisation und die gleichzeitige lokale Injektion eines Chemotherapeutikums. Das Verfahren erfolgt palliativ oder z. B. beim HCC auch zum Downsizing des Tumors." },
    { letter: "d", text: "Im Stadium IV ist eine palliative Chemotherapie Mittel der Wahl.", correct: true, explanation: "Richtig. Bei Patienten in gutem Allgemeinzustand ist im Tumorstadium IV die i.v. Gabe eines Chemotherapeutikums indiziert (Gemcitabin + Cisplatin; bei eingeschränkter Nierenfunktion wird Cisplatin durch Oxaliplatin ersetzt). Bei der Indikationsstellung sind neben dem Allgemeinzustand auch Komorbiditäten, Patientenpräferenzen sowie die Toxizität der Chemotherapeutika zu berücksichtigen." },
    { letter: "e", text: "Bei Patienten mit einem eingeschränkten Allgemeinzustand wird 'best supportive care' empfohlen.", correct: true, explanation: "Richtig. Bei Patienten mit einem eingeschränkten Allgemeinzustand (ECOG ≥ 2) wird 'best supportive care' empfohlen. Alternativ kann bei Patientenwunsch eine Monotherapie mit Gemcitabin erfolgen." },
  ]},
  { id: 69, chapter: 5, number: 7, text: "Welche Aussagen zur Anatomie der Gallenwege sind richtig?", statements: [
    { letter: "a", text: "Das Calot-Dreieck wird von Hauptgallengang, Gallenblasenfundus und Leberunterfläche gebildet.", correct: false, explanation: "Falsch. Die das Calot-Dreieck bildenden Gallenblasenanteile sind das Infundibulum und der Ductus cysticus." },
    { letter: "b", text: "Im Ligamentum hepatoduodenale liegt der Ductus choledochus ventral der V. portae und rechts der A. hepatica communis.", correct: false, explanation: "Falsch. In der Regel gibt die aus dem Truncus coeliacus entspringende A. hepatica communis vor dem Eintritt in das Ligamentum hepatoduodenale die A. gastroduodenalis ab und wird dann im Ligament zur A. hepatica propria. Es gibt zahlreiche Varianten der arteriellen Leberversorgung. Die Lagebeziehung ist im Übrigen korrekt wiedergegeben — die Formulierung der Frage enthält jedoch einen anatomischen Irrtum bezüglich der Einteilung." },
    { letter: "c", text: "In bis zu 25 % der Fälle gibt es einen längerstreckigen parallelen Verlauf des Ductus cysticus zum Ductus hepaticus communis, bevor dieser nach Einmündung des Cysticus zum Ductus choledochus wird.", correct: true, explanation: "Richtig. Besonders bei unübersichtlichen Verhältnissen besteht hierbei eine große Gefahr einer akzidentellen Hauptgallengangsverletzung." },
    { letter: "d", text: "Die arterielle Leberversorgung weist viele individuelle Unterschiede und anatomische Abweichungen auf.", correct: true, explanation: "Richtig. In bis zu 20 % aller Individuen existiert eine aberrierende linke Leberarterie aus der A. gastrica sinistra (die bei einer Magenresektion gefährdet sein kann); fast genauso oft entspringt die rechte Leberarterie der A. mesenterica superior." },
    { letter: "e", text: "Die Pfortader (V. portae hepatis) entsteht aus dem Zusammenfluss der V. mesenterica superior, der V. mesenterica inferior und der V. lienalis.", correct: true, explanation: "Richtig. Die Pfortader entsteht aus dem Zusammenfluss der V. mesenterica superior und der V. lienalis und verläuft im Lig. hepatoduodenale. Die V. mesenterica superior überkreuzt die Pars horizontalis des Duodenums und geht in die Pfortader über. Die V. lienalis mündet nach retropankreatischem Verlauf ein. Die V. mesenterica inferior mündet auf der dorsalen Seite des Magens in die V. lienalis." },
  ]},
  { id: 70, chapter: 5, number: 8, text: "Welche Aussagen zur Anatomie der Gallenwege sind richtig?", statements: [
    { letter: "a", text: "Der Ductus choledochus wird in drei Abschnitte unterteilt.", correct: true, explanation: "Richtig. Nach dem Abgang des Ductus cysticus aus dem Ductus hepaticus beginnt der supraduodenale Abschnitt des Ductus choledochus. Darauf folgen der retroduodenale Anteil und schließlich der intrapankreatische Abschnitt." },
    { letter: "b", text: "Operativ kann nur ein Abschnitt des Ductus choledochus dargestellt werden.", correct: false, explanation: "Falsch. Der supraduodenale Abschnitt lässt sich im Lig. hepatoduodenale präparieren. Durch Mobilisation des Duodenums nach Kocher lässt sich auch der retroduodenale Anteil darstellen. Der intrapankreatische Anteil des Gallengangs ist wegen des Pankreasparenchyms und der unmittelbaren Nachbarschaft mit der sich verzweigenden A. gastroduodenalis chirurgisch kaum angehbar." },
    { letter: "c", text: "Die Lymphe der Gallenblase fließt über die Lymphknoten im Leberhilus ab.", correct: false, explanation: "Falsch. Am Infundibulum der Gallenblase findet sich in der Regel ein größerer Lymphknoten (Mascagni-Lymphknoten). Der weitere Abfluss erfolgt über die Lymphgefäße und -knoten des Lig. hepatoduodenale und dann entlang der A. hepatica communis zu den zöliakalen Lymphknoten. Eine 'retrograde' Metastasierung in die hilären Lymphknoten ist selten und kann bei fortgeschrittenen Tumoren durch Verlegung der Lymphabflusswege erklärt werden." },
    { letter: "d", text: "Das Fassungsvermögen der Gallenblase beträgt etwa 500 ml.", correct: false, explanation: "Falsch. Das Fassungsvermögen einer normal-konfigurierten Gallenblase beträgt etwa 50–80 ml." },
    { letter: "e", text: "Die Gallenblase wird in drei Abschnitte eingeteilt.", correct: true, explanation: "Richtig. Die topographische Einteilung erfolgt in Fundus, Korpus und Infundibulum der Gallenblase. Das Infundibulum mündet dann in den Ductus cysticus." },
  ]},
  { id: 71, chapter: 5, number: 9, text: "Welche Aussagen zur Cholezystolithiasis sind richtig?", statements: [
    { letter: "a", text: "Die Cholezystolithiasis ist mit einer Prävalenz zwischen 8–20 % in der deutschen Bevölkerung eine sehr häufige Erkrankung.", correct: true, explanation: "Richtig. Etwa 10 Mio. Menschen in Deutschland haben Gallensteine. Die Prävalenz steigt mit zunehmendem Alter an und liegt bei 75-jährigen Frauen bei etwa 35 % (Männer 20 %)." },
    { letter: "b", text: "80 % der Gallensteinträger sind asymptomatisch. Von diesen werden durchschnittlich 80 % binnen 10 Jahren symptomatisch.", correct: false, explanation: "Falsch. Zwar sind 80 % der Gallensteinträger asymptomatisch, jedoch haben nur etwa 20 % der Gallensteinträger Symptome. Von den asymptomatischen Steinträgern entwickeln nur etwa 20–40 % im Laufe von 10 Jahren Beschwerden. In 1–3 % der Fälle treten Komplikationen wie eine akute Cholezystitis oder eine biliäre Pankreatitis auf." },
    { letter: "c", text: "Eine konservative Therapie mit oraler medikamentöser Litholyse ist in den meisten Fällen möglich, wurde aber zugunsten der wenig belastenden laparoskopischen Cholezystektomie weitgehend verlassen.", correct: false, explanation: "Falsch. Die orale medikamentöse Litholyse (Ursodeoxycholsäure), ggf. in Kombination mit extrakorporaler Stoßwellenlithotrypsie, ist nur in wenigen Fällen erfolgversprechend. Es sollte sich um Patienten mit unkomplizierter symptomatischer Cholezystolithiasis, kleinen Konkrementen und gut kontrahierender Gallenblase handeln. Nur ca. 5 % der symptomatischen Gallensteinträger kommen dafür in Frage. Es besteht eine Rezidivwahrscheinlichkeit von bis zu 50 % in den ersten 5 Jahren. Auf eine Operation sollte nur bei Ablehnung oder Kontraindikationen verzichtet werden." },
    { letter: "d", text: "Die häufigsten Komplikationen der symptomatischen Cholezystolithiasis sind die Cholezystitis, biliodigestive Fisteln und das Mirizzi-Syndrom.", correct: true, explanation: "Richtig. Die mit Abstand häufigste Komplikation ist die Cholezystitis. Biliodigestive Fisteln sind deutlich seltener. Das Mirizzi-Syndrom beschreibt eine Einengung des Ductus hepaticus durch einen Infundibulumstein." },
    { letter: "e", text: "Die Sensitivität der Ultraschalluntersuchung bei der Cholezystolithiasis beträgt annähernd 100 %.", correct: true, explanation: "Richtig. Die Sensitivität der Ultraschalluntersuchung bei der Cholezystolithiasis beträgt annähernd 100 %. Dagegen können im CT nur etwa 50 % der Gallensteine nachgewiesen werden." },
  ]},
  { id: 72, chapter: 5, number: 10, text: "Welche Aussagen zur Cholezystitis sind richtig?", statements: [
    { letter: "a", text: "95 % aller akuten Cholezystitiden treten beim Vorhandensein von Gallensteinen auf.", correct: true, explanation: "Richtig. Der wichtigste Faktor in der Pathogenese ist die mechanische Obstruktion am Gallenblasenausgang. Durch anhaltende Schleimproduktion kommt es zur Überdehnung und Mangeldurchblutung der Gallenblasenwand mit konsekutiver bakterieller Besiedlung." },
    { letter: "b", text: "Typisch sind kolikartige rechtsseitige Oberbauchbeschwerden.", correct: false, explanation: "Falsch. Häufig kann eine Anamnese früherer Koliken erhoben werden. Bei der akuten Entzündung kommt es jedoch meist zu einem persistierenden rechtsseitigen Oberbauchschmerz, häufig mit Ausstrahlung in den Rücken. Begleitend können Übelkeit und Erbrechen auftreten. Klinisch findet sich meist eine entsprechende Druckdolenz. Bei etwa einem Drittel der Fälle kann die Gallenblase als schmerzhafte Resistenz getastet werden. Randomisierte kontrollierte Studien zeigten, dass NSAR im Rahmen einer biliären Kolik die Wahrscheinlichkeit einer konsekutiven akuten Cholezystitis senken." },
    { letter: "c", text: "Die bildgebende Methode der Wahl ist die CT.", correct: false, explanation: "Falsch. Methode der Wahl ist die Sonographie. In bis zu 95 % der Fälle gelingt hiermit der Nachweis der akuten Cholezystitis. Typischerweise finden sich Steine, häufig zusätzliches echogenes Material in der Gallenblase und ein echoarmer Randsaum bei typischer Dreischichtung der Gallenblasenwand." },
    { letter: "d", text: "Bei der akuten Cholezystitis ist die Gallenblase meist groß.", correct: true, explanation: "Richtig. Durch die Obstruktion am Gallenblasenausgang ist die Gallenblase meist prall gefüllt. Sonographisch lässt sich häufig eine Länge > 10 cm und Wanddicke > 4–5 mm ausmessen." },
    { letter: "e", text: "Die akute Cholezystitis erfordert immer eine sofortige Notfalloperation.", correct: false, explanation: "Falsch. Die frühzeitige Cholezystektomie hat sich bewährt und verkürzt den Krankenhausaufenthalt ohne höhere Morbidität und Mortalität. Der Eingriff kann nach entsprechender Vorbereitung und konservativer antibiotischer Anbehandlung unter Routinebedingungen erfolgen (idealerweise innerhalb der ersten 24 Stunden nach stationärer Aufnahme). Bei Schmerzzunahme und Sepsiszeichen unter antibiotischer Therapie muss bei drohender oder stattgehabter Gallenblasenperforation eine Notfalloperation angestrebt werden." },
  ]},
  { id: 73, chapter: 5, number: 11, text: "Welche Aussagen bezüglich Gallenblasenpolypen treffen zu?", statements: [
    { letter: "a", text: "Bei Diagnose besteht immer eine OP-Indikation.", correct: false, explanation: "Falsch. Gallenblasenpolypen müssen nur operiert werden, wenn sie Beschwerden auslösen. Cholesterinpolypen können sich z. B. von der Gallenblasenwand lösen, sich wie Konkremente verhalten und Koliken verursachen. Eine weitere OP-Indikation besteht bei adenomatösen Polypen. Die Schwierigkeit liegt in der Differentialdiagnose Cholesterinpolyp / adenomatöser Polyp. Allgemein gilt: Polypen > 1 cm stellen aufgrund der Möglichkeit eines Adenoms eine OP-Indikation dar — unabhängig vom Vorhandensein von Symptomen." },
    { letter: "b", text: "Sie entstehen am häufigsten durch Cholesterinablagerungen in der Gallenblasenwand (Cholesterinpolypen).", correct: true, explanation: "Richtig. In der Regel bilden Cholesterinablagerungen die Polypen. Eine Porzellangallenblase entsteht nach dem gleichen pathophysiologischen Mechanismus." },
    { letter: "c", text: "Sie sind meistens asymptomatisch.", correct: true, explanation: "Richtig. Cholesterin- oder adenomatöse Polypen sind meist Zufallsbefunde und häufig asymptomatisch." },
    { letter: "d", text: "Sonographisch kann immer zwischen Adenom und Cholesterinpolyp unterschieden werden.", correct: false, explanation: "Falsch. Sonographisch können bei Schallschatten-werfenden Polypen Kalkablagerungen vorliegen, was für Cholesterinpolypen spricht. Ohne Verkalkungen kann ein Adenom jedoch nicht ausgeschlossen werden." },
    { letter: "e", text: "Es besteht in jedem Fall ein malignes Entartungsrisiko.", correct: false, explanation: "Falsch. Ein Entartungsrisiko besteht nur bei Adenomen." },
  ]},
  { id: 74, chapter: 5, number: 12, text: "Welche Aussagen zur laparoskopischen Cholezystektomie treffen zu?", statements: [
    { letter: "a", text: "Bei der laparoskopischen Cholezystektomie sollte der DHC immer dargestellt werden.", correct: false, explanation: "Falsch. Im Gegenteil: um Verletzungen des DHC zu vermeiden, sollte man gallenblasennah präparieren. Ein Freipräparieren des DHC kann zur Beeinträchtigung der Durchblutungsverhältnisse und zu späteren Stenosen führen." },
    { letter: "b", text: "Bei einer laparoskopischen Cholezystektomie sollte intraoperativ systematisch eine Darstellung der Gallenwege zum Ausschluss einer Choledocholithiasis erfolgen.", correct: false, explanation: "Falsch. Studien zufolge liegt das Risiko einer asymptomatischen Choledocholithiasis bei vorhandener Cholezystolithiasis bei 5–10 %. Das Risiko steigt bei vergrößertem DHC (> 10 mm in der Sonographie), erhöhten Cholestaseparametern oder Transaminasen, stattgehabtem Ikterus, Stuhlentfärbung, dunklem Urin oder nach einer Pankreatitis. In diesen Fällen sollte präoperativ der DHC mittels Endosonographie/ERCP abgeklärt werden. Bei intraoperativer atypischer Gallengangsanatomie sollte eine intraoperative Darstellung zur Vermeidung von Verletzungen erfolgen." },
    { letter: "c", text: "Bei 20 ml galligem Sekret in der Lokaldrainage am 1. Tag nach einer laparoskopischen Cholezystektomie sollte umgehend eine ERCP erfolgen.", correct: false, explanation: "Falsch. In den meisten Situationen sistiert die gallige Sekretion nach 1–2 Tagen spontan, häufig in Zusammenhang mit einem akzessorischen Luschka'schen Gang, der direkt von der Gallenblase ins Gallenblasenbett mündet. Eine ERCP sollte erfolgen, wenn die gallige Sekretion nicht sistiert oder zunimmt." },
    { letter: "d", text: "Bei akuter Cholezystitis sollte die Operation idealerweise nach 48 Stunden antibiotischer Vorbehandlung erfolgen.", correct: false, explanation: "Falsch. Das alte Dogma der 48- bis 72-stündigen Vorbehandlung ist heute nicht mehr aktuell. Eine akute Cholezystitis ist laut aktuellen Leitlinien eine Indikation zur frühzeitigen laparoskopischen Cholezystektomie innerhalb von 24 Stunden nach stationärer Aufnahme." },
    { letter: "e", text: "Aufgrund des Gallenblasenkarzinomrisikos sollte bei Diagnose einer Cholezystolithiasis die Cholezystektomie indiziert werden.", correct: false, explanation: "Falsch. Obwohl bei 75 % der Gallenblasenkarzinome eine Cholezystolithiasis mit einer chronischen Cholezystitis assoziiert ist, besteht beim Zufallsbefund einer asymptomatischen Cholezystolithiasis keine systematische Indikation zur Cholezystektomie. Die chronische Entzündung der Gallenblase bei Lithiasis ist der Risikofaktor zur malignen Entartung, nicht das Vorhandensein asymptomatischer Konkremente. Bei Konkrementen > 3 cm (Tonnenkonkrement) oder Gallenblasenwandverkalkung (Porzellangallenblase) ist das Entartungsrisiko deutlich höher — hier sollte die Cholezystektomie großzügig indiziert werden." },
  ]},
  { id: 75, chapter: 5, number: 13, text: "Welche Aussagen zur Cholezystektomie sind zutreffend?", statements: [
    { letter: "a", text: "Bei einer elektiven laparoskopischen Cholezystektomie ist eine perioperative Antibiotikaprophylaxe indiziert, um Wundinfektionen zu verhindern.", correct: false, explanation: "Falsch. Die perioperative Antibiotikaprophylaxe bei der laparoskopischen Cholezystektomie ist kontrovers diskutiert; ein eindeutiger Vorteil konnte bei der selektiven laparoskopischen Operation bisher nicht gezeigt werden. Die aktuellen Leitlinien empfehlen eine Routine-Antibiotikaprophylaxe bei Patienten mit niedrigem Risiko nicht mehr. Sinnvolle Indikationen: akute Cholezystitis, Notfalleingriffe, Operationen am Ductus hepatocholedochus, intraoperativ eröffnete Gallenblase, primär offene Cholezystektomie, Konversion." },
    { letter: "b", text: "Bei einer onkologischen Magen- oder Ösophagusresektion sollte simultan eine Cholezystektomie erfolgen.", correct: true, explanation: "Richtig. Nach Gastrektomie ist das Auftreten von Gallensteinen erhöht. Ursache ist möglicherweise eine Verletzung des N. vagus bei der Magenresektion oder die Magen-Darm-Rekonstruktion. Etwa 5 % der resezierten Patienten benötigen später eine Cholezystektomie, deren Morbidität aufgrund der Voroperation erhöht ist." },
    { letter: "c", text: "Bei einer akuten Cholezystitis sollte zunächst der akute Schub abgewartet werden, da das OP-Risiko in der Frühphase der Entzündung deutlich erhöht ist.", correct: false, explanation: "Falsch. Die akute Entzündung stellt eine Indikation für eine frühzeitige laparoskopische Cholezystektomie dar. Sie sollte innerhalb von 24 Stunden nach stationärer Aufnahme durchgeführt werden." },
    { letter: "d", text: "Der Nachweis von Gallenblasen-Sludge kann in der Regel nicht kolikartige Schmerzen im rechten Oberbauch erklären oder die Ursache für eine biliäre Pankreatitis darstellen, weil er viel zu klein ist, um Probleme auszulösen.", correct: false, explanation: "Falsch. Auch Sludge kann dieselben Beschwerden wie größere Konkremente oder eine biliäre Pankreatitis auslösen. In diesen Fällen besteht ebenfalls eine Indikation zur Cholezystektomie." },
    { letter: "e", text: "Bei immunsupprimierten oder transplantierten Patienten sollte nur bei schweren Entzündungen auf die Cholezystektomie als Ultima Ratio zurückgegriffen werden.", correct: false, explanation: "Falsch. Gerade bei immunsupprimierten Patienten sollte eine frühzeitige Cholezystektomie erfolgen, da die klinischen Beschwerden häufig verzögert auftreten und als Folge der Immunsuppression attenuiert sind." },
  ]},
  { id: 76, chapter: 5, number: 14, text: "Welche Aussagen zur Choledocholithiasis sind richtig?", statements: [
    { letter: "a", text: "Sie ist immer die Folge eines Steinabgangs aus der Gallenblase.", correct: false, explanation: "Falsch. Bei Papillenstenosen oder anderen chronischen Galleabflusshindernissen können sich auch Choledochuskonkremente vor Ort bilden. Auch Jahre nach einer Cholezystektomie können Choledochuskonkremente entstehen." },
    { letter: "b", text: "Die typischen Symptome der Choledocholithiasis werden als Charcot-Trias bezeichnet.", correct: false, explanation: "Falsch. Die Charcot-Trias (Schmerzen, Fieber, Ikterus) steht für eine Cholangitis. Die Choledocholithiasis kann asymptomatisch sein oder durch eine Cholestase (Labor, Erweiterung der Gallenwege) auffallen." },
    { letter: "c", text: "Nach Diagnose einer Choledocholithiasis muss immer eine notfallmäßige Therapiemaßnahme folgen.", correct: false, explanation: "Falsch. Eine Choledocholithiasis muss nur bei zusätzlicher Cholangitis sofort therapiert werden, ansonsten kann sie elektiv versorgt werden." },
    { letter: "d", text: "Eine biliäre Pankreatitis setzt eine vorhandene Choledocholithiasis voraus.", correct: false, explanation: "Falsch. Bei einer biliären Pankreatitis ist das Konkrement bei Diagnosestellung meistens nicht mehr im Ductus hepatocholedochus (DHC)." },
    { letter: "e", text: "Die Cholangitis ist eine lebensbedrohliche Komplikation der Choledocholithiasis.", correct: true, explanation: "Richtig. Schwere Cholangitiden können zum septischen Schock mit akutem Nierenversagen und Gerinnungsstörungen führen (Reynold'sche Pentade). Ursache ist der Übertritt hoch virulenter Darmkeime aus der infizierten gestauten Galle über die Leber in die Blutbahn. In diesen Fällen muss schnellstmöglich für den Galleabfluss gesorgt werden (ERCP, Operation, PTCD), der Schock behandelt und eine antibiotische Therapie begonnen werden." },
  ]},
  { id: 77, chapter: 5, number: 15, text: "Welche Aussagen zur biliären Pankreatitis treffen zu?", statements: [
    { letter: "a", text: "Die Prognose-Scores der akuten Pankreatitis sind bei der biliären Pankreatitis auch anzuwenden.", correct: true, explanation: "Richtig. Es gibt verschiedene Scores zur Evaluierung der Prognose einer akuten Pankreatitis (z. B. Ranson Score, Imrie Score, Blamey Score, IGS, SAPS). Ziel ist die Evaluation, wie kritisch krank ein Patient ist. Es gibt allgemeine Severity-Scores für Intensivpatienten und spezielle Scores für die biliäre Pankreatitis; sie unterscheiden sich prognostisch kaum voneinander und können alle angewandt werden." },
    { letter: "b", text: "Bei Beginn einer biliären Pankreatitis muss schnellstmöglich eine ERCP erfolgen.", correct: false, explanation: "Falsch. Eine ERCP muss nur dann erfolgen, wenn neben der Pankreatitis eine konkrementbedingte Galleabflussstörung (Choledocholithiasis) bzw. eine Cholangitis vorliegt." },
    { letter: "c", text: "Die ERCP verbessert den Verlauf der Pankreatitis, wenn sie biliärer Genese ist.", correct: false, explanation: "Falsch. Der Verlauf einer biliären Pankreatitis wird durch eine ERCP nicht verbessert. Ausnahme ist eine vorhandene konkrementbedingte Galleabflussstörung." },
    { letter: "d", text: "Nach einer biliären Pankreatitis sollte die Cholezystektomie im selben stationären Aufenthalt erfolgen.", correct: false, explanation: "Falsch. Die Cholezystektomie sollte nur bei einer ödematösen Pankreatitis im selben stationären Aufenthalt erfolgen, generell nach etwa einer Woche. Bei einer nekrotisierenden Pankreatitis sollte die 'restitutio ad integrum' des Pankreas abgewartet werden; diese kann mehrere Wochen oder Monate dauern." },
    { letter: "e", text: "Nach einer biliären Pankreatitis sollte wegen der stattgehabten Entzündung die offene Cholezystektomie bevorzugt werden.", correct: false, explanation: "Falsch. Nach einer ödematösen Pankreatitis ist nicht von postentzündlichen Verwachsungen auszugehen. Nach einer nekrotisierenden Pankreatitis kann die laparoskopische Cholezystektomie erschwert sein — das zwingt aber nicht zu einem primär offenen Verfahren." },
  ]},
  { id: 78, chapter: 5, number: 16, text: "Welche Aussage zu biliodigestiven Fisteln ist richtig?", statements: [
    { letter: "a", text: "Der Nachweis einer biliodigestiven Fistel stellt in der Regel eine Operationsindikation dar.", correct: true, explanation: "Richtig. Bei asymptomatischen Patienten im höheren Lebensalter kann allerdings auf eine primäre Operation verzichtet werden." },
    { letter: "b", text: "Die operative Versorgung ist meistens laparoskopisch problemlos möglich.", correct: false, explanation: "Falsch. Das Gegenteil ist der Fall. In Einzelfällen kann eine laparoskopische Versorgung durch einen versierten Operateur möglich sein. In der Regel sollte die Operation offen erfolgen, da es meist durch chronisch entzündliche Veränderungen mit Ausbildung einer Schrumpfgallenblase zu erheblich erschwerten Bedingungen kommt." },
    { letter: "c", text: "Bei einem Gallensteinileus ist die gleichzeitige Versorgung der biliodigestiven Fistel obligat.", correct: false, explanation: "Falsch. Zunächst sollte immer die Ileussituation versorgt werden. Das obstruierende Konkrement wird über eine Enterotomie aus einem gut durchbluteten oralwärts gelegenen Darmabschnitt geborgen. Zur Prophylaxe rezidivierender Obstruktionen sollte auch nach weiteren Steinen gesucht und diese entfernt werden. Bei stabilen Patienten kann die häufig technisch schwierige Cholezystektomie und der Fistelverschluss durchgeführt werden. Bei Risikopatienten sollte die Sanierung mit einem zweiten Eingriff geplant erfolgen; etwa ein Drittel dieser Patienten bleibt nach der Ileusoperation asymptomatisch und muss nicht zwingend operativ versorgt werden." },
    { letter: "d", text: "In der Diagnostik ist ein Luftcholangiogramm in der Röntgen-Abdomenaufnahme wegweisend.", correct: true, explanation: "Richtig. Zusätzlich zeigt sich beim Gallensteinileus typischerweise ein über 2,5 cm durchmessendes Konkrement, welches meist im Ileum zur Obstruktion führt." },
    { letter: "e", text: "In der Regel handelt es sich um cholezystokolische Fisteln.", correct: false, explanation: "Falsch. Etwa 75 % der Fisteln verbinden Gallenblase und Duodenum, etwa 15 % werden zum Dickdarm gebildet. In den übrigen Fällen sind Magen oder der Ductus choledochus betroffen." },
  ]},
  { id: 79, chapter: 5, number: 17, text: "Welche Aussagen zu Gallengangszysten und zur Caroli-Krankheit sind richtig?", statements: [
    { letter: "a", text: "Zystische Gallengangsveränderungen sind seltene angeborene Anomalien, die intra- und/oder extrahepatische Gallenwege betreffen können.", correct: true, explanation: "Richtig. Die Inzidenz wird zwischen 1:13.000 und 1:2.000.000 Geburten angegeben." },
    { letter: "b", text: "Typischerweise treten die zystischen Veränderungen im Kindes- und Jugendalter auf.", correct: true, explanation: "Richtig. Dennoch wird die Diagnose bei 20 % der Patienten erst im Erwachsenenalter gestellt." },
    { letter: "c", text: "Bei der Caroli-Krankheit treten intrahepatische Gallengangsektasien auf, die multipel oder solitär sind, aber immer auf ein Lebersegment beschränkt sind.", correct: false, explanation: "Falsch. Die Ektasien können auf ein Segment beschränkt sein, aber auch diffus die gesamte Leber betreffen." },
    { letter: "d", text: "Die Indikation zur operativen Behandlung ist typabhängig zu stellen.", correct: true, explanation: "Richtig. Es hat sich die Einteilung nach Todani in fünf Typen der Gallenwegsektasien durchgesetzt. Typ V beschreibt die Caroli-Krankheit und unterscheidet zwischen unilobulärem und diffusem Typ. Der unilobuläre Typ kann durch eine Leberresektion behandelt werden (in etwa 90 % ist der linke Leberlappen befallen), der diffuse Typ ggf. durch eine Lebertransplantation." },
    { letter: "e", text: "Häufige Komplikationen sind rezidivierende Cholangitiden, Steinbildungen und Leberabszesse.", correct: true, explanation: "Richtig. Häufige Komplikationen sind rezidivierende Cholangitiden, Steinbildungen und Leberabszesse. Darüber hinaus stellt vor allem die relativ hohe Gefahr der malignen Entartung einen Grund für die operative Behandlung dar." },
  ]},
  { id: 80, chapter: 5, number: 18, text: "Folgende Aussagen zu benignen Gallengangsstrikturen treffen zu?", statements: [
    { letter: "a", text: "Als Ursachen kommen vor allem vorangegangene Operationen, Pankreatitiden, Cholangitiden, Traumen sowie eine Radiatio in Frage.", correct: true, explanation: "Richtig. Bei den Operationen sind vor allem Cholezystektomien, Choledochotomien, biliobiliäre und biliodigestive Anastomosen sowie Leberteilresektionen zu benennen." },
    { letter: "b", text: "Die erste durchzuführende diagnostische Maßnahme ist die endoskopische retrograde Cholangiographie (ERC).", correct: false, explanation: "Falsch. Die ERC ist zwar eine sichere diagnostische Maßnahme, aber sehr invasiv. Sie sollte daher erst nach Laboruntersuchungen, Ultraschall und ggf. MRCP eingesetzt werden." },
    { letter: "c", text: "Die Unterscheidung zwischen benignen und malignen Stenosen stellt in der Regel kein Problem dar.", correct: false, explanation: "Falsch. Diese Unterscheidung ist das zentrale Problem der Diagnostik. Mit Hilfe der durch die ERC gewonnenen Zytologien lässt sich eine Sensitivität von maximal 70 % erreichen. Diese kann durch eine Biopsieentnahme unter Sicht (cholangioskopisch) oder endosonographisch gesteuert noch erhöht werden." },
    { letter: "d", text: "Eine konservative Therapie ist selten erfolgreich.", correct: false, explanation: "Falsch. Es gibt viele klinische Situationen, in denen eine endoskopische Therapie mit Papillotomie (EPT) und Stenteinlage sehr erfolgreich ist. Gelegentlich konkurrieren die Verfahren oder ergänzen sich. Die primäre Erfolgsrate der endoskopischen Therapie bei einer durch chronische Pankreatitis bedingten Choledochuseinengung liegt bei fast 100 %. Allerdings benötigen etwa 60 % der Patienten eine dauerhafte Stenttherapie mit den erforderlichen Wechseln, sodass eine entlastende Operation durchaus eine Alternative darstellt." },
    { letter: "e", text: "Für den Fall einer akzidentellen Durchtrennung des Hauptgallenganges im Rahmen einer laparoskopischen Cholezystektomie sollte immer eine End-zu-End-Anastomosierung angestrebt werden, um eine Stenosierung zu vermeiden.", correct: false, explanation: "Falsch. Diese Operation sollte nur bei sehr kleinen Defekten und bei absolut spannungsfreier Annäherung der Gallengangstümpfe sowie guter Durchblutungssituation durchgeführt werden. In allen anderen Fällen sollte einer biliodigestiven Anastomose der Vorzug gegeben werden, da die Stenosegefahr sonst sehr groß wäre." },
  ]},
  { id: 81, chapter: 8, number: 1, text: "Welche Aussagen zur Milzanatomie sind zutreffend?", statements: [
    { letter: "a", text: "Die Milz atrophiert mit steigendem Alter.", correct: true, explanation: "Richtig. Die Milz ist beim Erwachsenen etwa faustgroß und wiegt zwischen 150–250 g. Im Alter atrophiert das Organ physiologischerweise. Die Milz liegt im linken oberen abdominellen Quadranten im Hypochondrium und hat engen Kontakt zur 9., 10. und 11. Rippe links. Sie besitzt zwei Hauptoberflächen: Die parietale, konvexe Fläche liegt dem Zwerchfell an; die viszerale, konkave Fläche hat eine enge Lagebeziehung zu Pankreasschwanz und Magen." },
    { letter: "b", text: "Das splenogastrische Ligament enthält die Aa. gastricae breves.", correct: true, explanation: "Richtig. Das splenogastrische (splenoomentale) Ligament enthält die Aa. gastricae breves. Es zieht vom oberen Milzpol bis zum unteren Drittel der Milz. Das splenokolische Ligament zieht vom unteren Milzpol zur linken Kolonflexur und ist wenig vaskularisiert. Das splenorenale Ligament wird durch das dorsale Milzperitoneum gebildet und fixiert die Milz gegen das Retroperitoneum. Das splenophrenische Ligament verbindet die Milz mit dem Zwerchfell und kann bei inflammatorischen oder neoplastischen Milzerkrankungen breitflächig verwachsen sein." },
    { letter: "c", text: "Iatrogene Milzkapselverletzungen entstehen häufig durch Zug am splenoomentalen Ligament.", correct: true, explanation: "Richtig. Das splenoomentale Ligament zieht vom großen Netz separat zum unteren Milzpol und ist hauptsächlich für iatrogene Milzverletzungen bei Eingriffen im linken Oberbauch verantwortlich." },
    { letter: "d", text: "Die A. lienalis entspringt direkt der Aorta und verläuft entlang des Pankreasoberrandes.", correct: false, explanation: "Falsch. Die A. lienalis entspringt dem Truncus coeliacus und verläuft am Pankreasoberrand bis zum Milzhilus, wo sie sich in 5–10 Segmentäste verzweigt. Die hierdurch entstehenden Parenchymsegmente erlauben partielle Milzresektionen. Das venöse Blut sammelt sich in der V. lienalis, welche kaudal der Milzarterie dorsal von Pankreasschwanz und -korpus zusammen mit der V. mesenterica superior als venöser Konfluenz in die Pfortader einmündet." },
    { letter: "e", text: "Nebenmilzen kommen bei bis zu 50 % der Patienten vor.", correct: false, explanation: "Falsch. Nebenmilzen kommen etwa bei 10 % der Patienten vor. Sie befinden sich vor allem im Bereich des Milzhilus, der Ligamenta gastrosplenicum, splenocolicum und splenorenale, peripankreatisch und im Omentum majus." },
  ]},
  { id: 82, chapter: 8, number: 2, text: "Welche Aussagen zur Milz sind zutreffend?", statements: [
    { letter: "a", text: "Etwa 5 % des Herzminutenvolumens durchfließen die Milz.", correct: true, explanation: "Richtig. Die Milz durchfließt etwa 5 % des Herzminutenvolumens." },
    { letter: "b", text: "Das Milzparenchym besteht etwa 80 % aus weißer und 20 % aus roter Pulpa.", correct: false, explanation: "Falsch. Das Milzparenchym besteht zu 80 % aus roter und zu 20 % aus weißer Pulpa. Die weiße Pulpa (Pulpa alba) besteht aus Malpighi-Körperchen mit B-Lymphozyten und den um die Zentralarteriolen angeordneten periarteriolären lymphatischen Scheiden (PALS) mit T-Lymphozyten. Die rote Pulpa (Pulpa rubra) besteht aus retikulärem Bindegewebe und dient dem Abbau überalterter Erythrozyten durch Makrophagen." },
    { letter: "c", text: "Seltene Anomalien der Milz sind Polysplenie oder Asplenie.", correct: true, explanation: "Richtig. Die kongenitale Hyposplenie oder Asplenie tritt sehr selten auf. Bei der Polysplenie sind statt einem solitären Organ multiple kleine Milzknötchen vorhanden. Diese embryonale Fehlbildung ist wie die Asplenie mit schwerwiegenden kardiovaskulären Anomalien vergesellschaftet. Akzessorische Milzen sind hingegen häufige Anomalien." },
    { letter: "d", text: "Die Ursache der Asplenie ist die fehlende embryonale Anlage der Vasa splenica.", correct: true, explanation: "Richtig. Die Ursache der Asplenie ist die fehlende Anlage der Vasa splenica in der 2.–5. Embryonalwoche." },
    { letter: "e", text: "Die iatrogene Verletzung im Rahmen laparoskopischer oder konventioneller abdomineller Operationen ist die mit Abstand häufigste Ursache für eine Splenektomie.", correct: false, explanation: "Falsch. Ca. 55 % der Splenektomien werden aufgrund hämatologischer, immunologischer oder onkologischer Indikationen durchgeführt, 16 % sind durch ein Trauma bedingt. Iatrogene Verletzungen der Milz, die zur Splenektomie führen, sind selten." },
  ]},
  { id: 83, chapter: 8, number: 3, text: "Welche Aussagen zum Hypersplenismus sind zutreffend?", statements: [
    { letter: "a", text: "Bei Hypersplenismus sollte mit der Gabe von Thrombozytenaggregationshemmern begonnen werden.", correct: false, explanation: "Falsch. Beim Hyperspleniesyndrom besteht im Rahmen einer Splenomegalie bei zellreichem Knochenmark eine periphere Zytopenie. Es stellt die häufigste Indikation zur elektiven Splenektomie dar. Thrombozytenaggregationshemmer sind in diesem Fall kontraindiziert." },
    { letter: "b", text: "Die häufigste Ursache für einen Hypersplenismus ist die portale Hypertension.", correct: true, explanation: "Richtig. Die häufigste Ursache für einen Hypersplenismus ist die portale Hypertension im Rahmen einer Leberzirrhose oder Pfortaderthrombose." },
    { letter: "c", text: "Bei portaler Hypertension sollte eine Splenektomie möglichst vermieden werden.", correct: true, explanation: "Richtig. Bei portaler Hypertension sollte eine Splenektomie vermieden werden, da eine Verschlechterung der portalen Hypertension durch die Unterbindung spontaner portosystemischer Shunts auftreten bzw. eine Pfortaderthrombose entstehen kann." },
    { letter: "d", text: "Kommt es nach Splenektomie zu einem signifikanten Anstieg der Leukozyten, handelt es sich meist um ein Overwhelming-Postsplenectomy-Infection (OPSI).", correct: false, explanation: "Falsch. Unmittelbar nach Splenektomie kann es zu einer Leukozytose (bis zu 25.000/mm³) und auch zu einer Thrombozytose (bis zu 1 × 10⁶/mm³) kommen. Diese Veränderungen normalisieren sich üblicherweise nach 3–4 Wochen postoperativ. Im Langzeitverlauf zeigt das Blutbild nach Splenektomie nur geringe Veränderungen — diese beziehen sich auf die Erythrozytenmorphologie mit Anisozytose und Poikilozytose." },
    { letter: "e", text: "Nach Splenektomie besteht ein erhöhtes Risiko für thrombembolische Ereignisse.", correct: true, explanation: "Richtig. Nach Splenektomie besteht ein erhöhtes Risiko für Thrombosen des Venensystems im Bereich der V. cava superior und inferior." },
  ]},
  { id: 84, chapter: 8, number: 4, text: "Welche Aussagen zum Overwhelming-Postsplenectomy-Infection (OPSI bzw. Postsplenektomiesyndrom, PSS) sind zutreffend?", statements: [
    { letter: "a", text: "Die OPSI verläuft häufig asymptomatisch.", correct: false, explanation: "Falsch. Beim OPSI handelt es sich um eine schwere bakterielle Infektion mit Sepsis, die Tage bis Jahre nach Splenektomie auftreten kann. Es ist ein medizinischer Notfall, der eine unverzügliche Diagnose und Therapie erfordert. Die meisten Todesfälle werden innerhalb der ersten 24 Stunden nach Auftreten der ersten Symptome beobachtet." },
    { letter: "b", text: "Ältere Menschen erleiden häufiger ein OPSI.", correct: true, explanation: "Richtig. Ein erhöhtes Risiko für ein OPSI besteht bei Milzverlust, bei Kindern mit noch unreifem Immunsystem (< 6 Jahre) und im höheren Lebensalter (> 60 Jahre)." },
    { letter: "c", text: "Bei Asplenie-Patienten mit unklarem Fieber und Allgemeinsymptomen sollte dennoch eine empirische Antibiotikatherapie vermieden und nach Anfertigen einer Blutkultur ggf. die antibiogrammgerechte Therapie begonnen werden.", correct: false, explanation: "Falsch. Bei Asplenie-Patienten mit unklarem Fieber und reduziertem Allgemeinbefinden ist eine frühe empirische Antibiotikagabe indiziert. Laut Leitlinien werden gemäß dem erwarteten Erregerspektrum (Pneumokokken und Meningokokken) Cephalosporine der 3. Generation (Cefotaxim oder Ceftriaxon) und eine initiale Einmalgabe von Gentamicin empfohlen. Die Abnahme von Blutkulturen zur Keimidentifizierung vor der Antibiotikagabe ist sinnvoll." },
    { letter: "d", text: "Das OPSI geht mit einer Letalität von bis zu 5 % einher.", correct: false, explanation: "Falsch. Die Inzidenz des PSS beträgt 1–5 % Lebenszeitrisiko bei Splenektomie-Patienten, jedoch mit einer Letalität von 50–70 %." },
    { letter: "e", text: "Die empirische Antibiotikatherapie hat keinen Einfluss auf die Letalität.", correct: false, explanation: "Falsch. Nur bei frühzeitiger Diagnose und sofortigem Einsatz von Antibiotika kann die Letalität gesenkt werden." },
  ]},
  { id: 85, chapter: 8, number: 5, text: "Welche Aussagen zu Milzzysten sind zutreffend?", statements: [
    { letter: "a", text: "Die Echinokokkuszyste der Milz kommt selten vor.", correct: true, explanation: "Richtig. Aufgrund der portalvenösen Verbreitung der Parasiten mit bevorzugtem Befall der Leber wird die Milz nur bei 0,5–3,5 % der mit Echinokokkus infizierten Patienten befallen." },
    { letter: "b", text: "Bei Echinokokkuszysten der Milz ist immer die Splenektomie indiziert.", correct: false, explanation: "Falsch. In Abhängigkeit der Befunde sind milzerhaltende Eingriffe möglich. Wichtig ist, dass es intraoperativ nicht zur Perforation der Zyste und somit zur systemischen Freisetzung von Echinokokkusfinnen kommt. Der Patient sollte perioperativ mit einem Antihelmethikum (z. B. Mebendazol oder Albendazol) abgeschirmt werden." },
    { letter: "c", text: "Bei nicht-parasitären Milzzysten sollte ein milzerhaltendes Verfahren angestrebt werden.", correct: true, explanation: "Richtig. Die OP-Indikation wird in Abhängigkeit von Symptomatik und Größe der Zyste gestellt. Zysten können entweder komplett reseziert oder entdeckelt werden. Meist sind laparoskopische Verfahren möglich. Zysten ab 4 cm, die nicht operativ versorgt werden, sollten sonographisch kontrolliert werden." },
    { letter: "d", text: "'Echte' Milzzysten besitzen keine Epithelschicht.", correct: false, explanation: "Falsch. 'Echte' Zysten sind mit einer Epithelschicht ausgekleidet und kommen in allen Altersgruppen vor." },
    { letter: "e", text: "'Falsche' Milzzysten besitzen eine Epithelschicht.", correct: false, explanation: "Falsch. 'Falsche' Zysten besitzen keine Epithelschicht, sondern entstehen nach Traumata aus einem subkapsulären Hämatom." },
  ]},
  { id: 86, chapter: 8, number: 6, text: "Welche Aussagen zum Milzinfarkt treffen zu?", statements: [
    { letter: "a", text: "Milzinfarkte entstehen durch arterielle Verschlüsse.", correct: true, explanation: "Richtig. Milzinfarkte können durch arteriell-akute Verschlüsse bei Vorhofflimmern mit flottierendem Thrombus oder bei offenem Foramen ovale auftreten. Häufiger sind subakute Verschlüsse im Rahmen von onkologischen Erkrankungen wie myeloischer Leukämie." },
    { letter: "b", text: "Milzinfarkte entstehen durch venöse Thrombosen.", correct: true, explanation: "Richtig. Ein Verschluss der V. lienalis durch eine Thrombose führt zu einer Abflussstörung. Die Milz kann stark anschwellen und blutig infarzieren (hämorrhagischer Milzinfarkt). Ursächlich kann beispielsweise eine Pankreatitis sein." },
    { letter: "c", text: "Ein hämorrhagischer Milzinfarkt kann zu einer akuten, intraabdominalen Blutung führen.", correct: true, explanation: "Richtig. Bei größerer Ausprägung des Milzinfarkts kann sich ein akutes Abdomen mit Peritonitis oder Ileus entwickeln. Ein hämorrhagischer Milzinfarkt kann zu einer akuten intraabdominellen Blutung und hämorrhagischem Schock führen." },
    { letter: "d", text: "Ein Milzinfarkt bedarf oftmals keiner chirurgischen Therapie.", correct: true, explanation: "Richtig. Die Therapie richtet sich nach der Größe des Milzinfarkts. Bei kleinen bis mittelgroßen Infarktarealen kann zugewartet werden. Bei großen Infarkten ist je nach Ursache und Symptomatik (Sepsis, Blutung) die Splenektomie indiziert." },
    { letter: "e", text: "Auf dem Boden eines Milzinfarktes kann sich ein operationspflichtiger Milzabszess entwickeln.", correct: true, explanation: "Richtig. Milzabszesse entstehen hämatogen im Rahmen eines septischen Geschehens oder auf dem Boden eines Milzinfarktes mit Superinfektion. Bei einem Milzinfarkt als septischem Fokus ist die Splenektomie indiziert." },
  ]},
  { id: 87, chapter: 8, number: 7, text: "Welche Aussagen treffen zur immunthrombozytopenischen Purpura (Morbus Werlhof) zu?", statements: [
    { letter: "a", text: "Es handelt sich um eine Autoimmunerkrankung mit Antikörpern gegen Thrombozyten.", correct: true, explanation: "Richtig. M. Werlhof ist eine Autoimmunerkrankung, bei der Autoantikörper an Thrombozyten binden. Die Thrombozyten werden anschließend in der Milz vermehrt sequestriert." },
    { letter: "b", text: "Es besteht eine erhöhte Blutungsneigung.", correct: true, explanation: "Richtig. Als Folge des erhöhten Thrombozytenabbaus kommt es zu einer Thrombozytopenie und somit zu einer erhöhten Blutungsneigung. Petechien von Haut und Schleimhaut, vor allem im Rachenbereich, sind charakteristische Symptome. Diese treten oft erst bei Thrombozytenzahlen unter 30.000/μl auf." },
    { letter: "c", text: "Die Erkrankung geht mit einer Splenomegalie einher.", correct: false, explanation: "Falsch. Die Milz ist beim M. Werlhof meist nicht vergrößert." },
    { letter: "d", text: "Eine Steroidtherapie ist kontraindiziert.", correct: false, explanation: "Falsch. Die Gabe von Steroiden führt bei ca. 80 % der Patienten zur Remission." },
    { letter: "e", text: "Eine dauerhafte Heilung kann durch eine frühelektive Splenektomie erreicht werden.", correct: false, explanation: "Falsch. Die Splenektomie ist erst nach Therapieversagen nach 6-wöchiger Steroidbehandlung indiziert." },
  ]},
  { id: 88, chapter: 8, number: 8, text: "Welche Aussagen zu Milzarterienaneurysmen treffen zu?", statements: [
    { letter: "a", text: "Von den Aneurysmen der viszeralen Arterien treten die Milzarterienaneurysmen mit Abstand am häufigsten auf.", correct: true, explanation: "Richtig. 60 % aller viszeralen Aneurysmen sind in der A. lienalis lokalisiert. Die übrigen 40 % verteilen sich auf die A. hepatica, A. gastroduodenalis und die Segmentarterien der A. mesenterica superior und inferior." },
    { letter: "b", text: "Asymptomatische Milzarterienaneurysmen bis 5 cm Durchmesser bedürfen keiner Intervention, sollten jedoch jährlich kontrolliert werden.", correct: false, explanation: "Falsch. Milzarterienaneurysmen, deren Durchmesser größer 2 cm oder das drei- bis vierfache der Ursprungsarterie beträgt, sollten therapiert werden." },
    { letter: "c", text: "Das Rupturrisiko liegt bei bis zu 10 %, ist jedoch während einer Schwangerschaft deutlich erhöht.", correct: true, explanation: "Richtig. Das Rupturrisiko wird mit 3–10 % angegeben und liegt in der Schwangerschaft bei 25–45 %. Am höchsten ist die Wahrscheinlichkeit einer Ruptur im letzten Trimester oder in der frühen postpartalen Phase. Die Letalitätsrate bei Ruptur eines Milzarterienaneurysmas liegt für Mutter und Fetus dann bei bis zu 75 % bzw. 95 %." },
    { letter: "d", text: "In der Regel sind Milzarterienaneurysmen aufgrund der anatomischen Verhältnisse und der oft starken Schlängelung ungeeignet für endovaskuläre Interventionen.", correct: false, explanation: "Falsch. Endovaskuläre Verfahren haben sich inzwischen etabliert. Insbesondere bei sacciformen Aneurysmen werden sie als minimal-invasives Verfahren gegenüber einer Operation bevorzugt. Die betroffenen Arterien können entweder mit einem gecoverten Stent geschient oder durch ein Coiling embolisiert werden." },
    { letter: "e", text: "Bei hilusnahen Aneurysmen ist die Splenektomie kaum zu vermeiden.", correct: true, explanation: "Richtig. Je nach Lokalisation kann das Aneurysma reseziert und die Milzarterie End-zu-End rekonstruiert werden. Gelingt dies nicht spannungsfrei, kann ein Interponat zur Überbrückung eingenäht werden (autologe Interponate wie V. saphena magna oder Kunststoffprothesen wie PTFE, Dacron). Bei hilusnahen Aneurysmen erfolgt aufgrund der fehlenden Rekonstruktionsmöglichkeit die Splenektomie." },
  ]},
  { id: 89, chapter: 8, number: 9, text: "Welche Aussagen zur traumatischen Milzruptur treffen zu?", statements: [
    { letter: "a", text: "Bei interventionspflichtigen Milzverletzungen kann bei kreislaufstabilen Patienten statt einer operativen Therapie eine selektive Angioembolisation erfolgen.", correct: true, explanation: "Richtig. In der Erstversion der S3-Leitlinie von 2011 wurde die Empfehlung zur Angioembolisation auf interventionspflichtige Milzverletzungen Grad 1–3 beschränkt. Die aktualisierte Version der AWMF-S3-Leitlinie Polytrauma von 2016 empfiehlt eine Angioembolisation bei kreislaufstabilen Patienten auch mit höhergradigen Verletzungen." },
    { letter: "b", text: "Der Vorteil des interventionellen Managements ist der Erhalt der immunologischen Funktion der Milz.", correct: true, explanation: "Richtig. Vorteile des interventionellen Managements sind: Vermeidung der mit Laparotomie bzw. Laparoskopie assoziierten Morbidität, geringere Mortalität, Erhalt der immunologischen Funktion der Milz, geringere systemische Infektionsraten und Vermeidung eines postoperativen PSS-Syndroms." },
    { letter: "c", text: "Eine absolute Notfallindikation zur OP besteht bei hämodynamisch instabilen Patienten mit bildmorphologisch nachgewiesenem Hämatoperitoneum.", correct: true, explanation: "Richtig. Hämodynamisch instabile Patienten mit Hämatoperitoneum werden sofort laparotomiert. Nach Möglichkeit ist das verletzte Organ zu präservieren." },
    { letter: "d", text: "Idealerweise erfolgt der Notfalleingriff bei stumpfem Bauchtrauma mit Hämatoperitoneum über einen linksseitigen Rippenbogenrandschnitt.", correct: false, explanation: "Falsch. Der linksseitige Rippenbogenrandschnitt verspricht die beste Exposition der Milz. Bei stumpfem Bauchtrauma mit Hämatoperitoneum ermöglicht die Medianlaparotomie jedoch eine bessere Exploration des gesamten Abdomens und ggf. den Zugang zu zusätzlichen Blutungsquellen." },
    { letter: "e", text: "Nach Möglichkeit sind milzerhaltende OP-Methoden vorzuziehen.", correct: true, explanation: "Richtig. Eine milzerhaltende Operation sollte bei operationspflichtigen Milzverletzungen der Schweregrade 1–3 nach AAST angestrebt werden. Bei leichteren Kapselverletzungen ist die Argon-Koagulation, Infrarotdiathermie oder die Applikation von Zellulose, Kollagen oder Fibrinkleber möglich. Eine weitere Option ist das Mesh-Repair (resorbierbares komprimierendes Netz). Bei segmentalen Verletzungen, insbesondere in den Polbereichen, bietet sich die Milzresektion an. Bei operationspflichtigen Milzverletzungen der Schweregrade 4–5 nach AAST sollte die Splenektomie bevorzugt werden.\n\nAAST-Schweregrade (Milzverletzung):\n• Grad I: Kapselrisse, subkapsuläres nicht-expandierendes Hämatom\n• Grad II: Kapsel + Parenchym ohne Segmentarterienverletzung\n• Grad III: Kapsel + Parenchym + Segmentarterien\n• Grad IV: Kapsel + Parenchym + Segment-/Hilusgefäße, Gefäßstiel-Abriss\n• Grad V: Organausriss im Milzhilus mit Devaskularisation" },
  ]},
  { id: 90, chapter: 8, number: 10, text: "Welche Aussagen zu Impfungen nach Splenektomie bzw. bei Asplenie treffen zu?", statements: [
    { letter: "a", text: "Impfungen nach Splenektomie können am Operationstag verabreicht werden.", correct: false, explanation: "Falsch. Bei einer elektiven Splenektomie sollten die Impfungen bis spätestens zwei Wochen vor dem Eingriff erfolgen. Falls dies nicht möglich ist, kann bis zu 3 Tage präoperativ geimpft werden. Postoperativ können die Impfungen erfolgen, sobald der Patient in einem stabilen Allgemeinzustand ist." },
    { letter: "b", text: "Impfungen gegen Meningokokken sollten alle 10 Jahre wiederholt werden.", correct: false, explanation: "Falsch. Asplenische Patienten sollten mit einem 4-valenten Meningokokken-Konjugatimpfstoff geimpft werden. Auffrischimpfungen werden alle 5 Jahre empfohlen." },
    { letter: "c", text: "Die Auffrischung der Pneumokokken-Impfung ist alle 5 Jahre notwendig.", correct: false, explanation: "Falsch. Grundsätzlich wird für Personen mit Asplenie eine sequenzielle Impfung mit einem Konjugatimpfstoff (PCV10, Synflorix® oder PCV13, Prevenar 13®) gegen Pneumokokken empfohlen. Wiederholungsimpfungen sind mit einem Polysaccharidimpfstoff (PPSV23, Pneumovax® 23) zur breiteren Serotypenabdeckung im Abstand von 6 Jahren empfohlen." },
    { letter: "d", text: "Eine Impfung gegen Haemophilus influenzae wird jährlich empfohlen.", correct: true, explanation: "Richtig. Die jährliche Impfung gegen Haemophilus influenzae Typ b (Hib) im Herbst wird empfohlen, da eine Influenza-Infektion das Risiko einer bakteriellen Sekundärinfektion, insbesondere mit Pneumokokken, erhöht." },
    { letter: "e", text: "Die Asplenie an sich stellt keine schwerwiegende Immundefizienz dar.", correct: true, explanation: "Richtig. Die Asplenie an sich stellt keine schwerwiegende Immundefizienz dar (außer sie besteht im Rahmen einer das Immunsystem beeinträchtigenden Grunderkrankung). Es sollten jedoch bei Asplenie alle von der STIKO empfohlenen Impfungen durchgeführt werden." },
  ]},
  { id: 91, chapter: 8, number: 11, text: "Welche Aussagen zum operativen Vorgehen bei Splenektomie treffen zu?", statements: [
    { letter: "a", text: "Bei elektiven konventionellen Eingriffen ist die quere Oberbauchlaparotomie Standard.", correct: true, explanation: "Richtig. Für die elektive Splenektomie eignet sich die quere Oberbauchlaparotomie links. Alternativ kann auch ein Rippenbogenrandschnitt links erfolgen. Inzwischen etabliert sich die laparoskopische Splenektomie an immer mehr Kliniken als Standard bei elektiven Eingriffen." },
    { letter: "b", text: "Das Ligamentum gastrocolicum wird intraoperativ durchtrennt.", correct: true, explanation: "Richtig. Es erfolgt die Durchtrennung des Ligamentum gastrocolicum und Eingehen in die Bursa omentalis. Anschließend wird die linke Kolonflexur mobilisiert. Das Ligamentum colicolienale wird ebenfalls durchtrennt. Das Ligamentum phrenicocolicum sollte intakt bleiben — es verhindert, dass die linke Colonflexur in den freien Raum der Milzloge gleitet (Abknicken des Darms)." },
    { letter: "c", text: "Die Milz wird üblicherweise von ventral mobilisiert.", correct: false, explanation: "Falsch. Prinzipiell kann die Milz von ventral oder dorsal mobilisiert werden. Die dorsale Mobilisation ist der Standard bei der Splenektomie, insbesondere in der Notfallsituation. Die ventrale Mobilisation kann bei sehr großen Organen oder tumorösen Veränderungen von Vorteil sein. Beide Vorgehensweisen sind möglich und situativ zu entscheiden." },
    { letter: "d", text: "Die Vasa gastricae breves werden möglichst erhalten.", correct: false, explanation: "Falsch. Es werden die gastrolienalen Bänder einschließlich der Vasa gastricae breves durchtrennt." },
    { letter: "e", text: "Die Durchtrennung der lienalen Gefäße im Milzhilus erfolgt nach Identifizierung der Grenze zum Pankreasschwanz.", correct: true, explanation: "Richtig. Die Präparation des Pankreasschwanzes mit sorgfältiger Separation der lienalen Gefäße ist notwendig. Diese werden durchtrennt und ligiert oder umstochen. Die Milz wird anschließend ausgelöst und entfernt." },
  ]},
  { id: 92, chapter: 9, number: 1, text: "Welche Aussagen zur Anatomie des Dünndarms treffen zu?", statements: [
    { letter: "a", text: "Der Dünndarm reicht chirurgisch betrachtet von der Flexura duodenojejunalis bis zur Valvula ileocaecalis.", correct: true, explanation: "Richtig. Chirurgisch betrachtet reicht der Dünndarm von der Flexura duodenojejunalis (Treitz'sches Band) bis zur Valvula ileocaecalis (Bauhin'sche Klappe). Anatomisch gesehen besteht der Dünndarm aus Duodenum, Jejunum und Ileum." },
    { letter: "b", text: "Der Dünndarm liegt intraperitoneal.", correct: false, explanation: "Falsch. Jejunum und Ileum liegen intraperitoneal und sind aufgrund des flexiblen Mesenteriums sehr beweglich. Das Duodenum liegt bis auf die Pars superior sekundär retroperitoneal. Der Lymphabfluss des Dünndarms erfolgt entlang der Arterien." },
    { letter: "c", text: "Die Gefäßversorgung des Dünndarms erfolgt über Äste der A. mesenterica superior.", correct: true, explanation: "Richtig. Die A. mesenterica superior gibt die Aa. jejunales und Aa. ileales mit jeweiligen Gefäßarkaden ab. Das Duodenum wird über Äste des Truncus coeliacus versorgt." },
    { letter: "d", text: "Der venöse Abfluss des Ileums und Jejunums erfolgt über die V. mesenterica inferior.", correct: false, explanation: "Falsch. Der venöse Abfluss erfolgt über die V. mesenterica superior in die V. portae." },
    { letter: "e", text: "Die Hauptaufgabe des Dünndarms dient der Resorption.", correct: true, explanation: "Richtig. Das Duodenum dient der Neutralisation des Magensaftes und der Resorption der Nahrung. Jejunum und Ileum dienen der Resorption, der enzymatischen Aufspaltung und Durchmischung der Nahrung." },
  ]},
  { id: 93, chapter: 9, number: 2, text: "Welche Aussagen zur Histologie des Dünndarms sind zutreffend?", statements: [
    { letter: "a", text: "Der Dünndarm besteht aus vier Schichten.", correct: true, explanation: "Richtig. Von innen nach außen: Tunica mucosa, Tunica submucosa, Tunica muscularis und Tunica serosa." },
    { letter: "b", text: "Der Dünndarm hat aufgrund der histologischen Struktur eine große Oberfläche.", correct: true, explanation: "Richtig. Die Hauptaufgabe des Dünndarms ist die Resorption. Daher haben das Duodenum (25 cm Länge) und Jejunum/Ileum (3–5 m Länge) durch die Kerckring-Falten, Zotten und Krypten eine verhältnismäßig große Oberfläche." },
    { letter: "c", text: "Die sogenannten Kerckring-Falten sind typisch und nehmen zum Ileum hin zu.", correct: false, explanation: "Falsch. Die Kerckring-Falten (Plicae circulares) der Tunica mucosa nehmen vom Jejunum zum Ileum hin ab." },
    { letter: "d", text: "Die Zotten werden im Verlauf zum Ileum hin kürzer und die Krypten tiefer.", correct: true, explanation: "Richtig. Die Zotten werden im Verlauf zum Ileum hin kürzer und die Krypten tiefer." },
    { letter: "e", text: "Im Verlauf kommt es zu einer zunehmenden Ansammlung von Lymphfollikeln.", correct: true, explanation: "Richtig. Diese sind ebenfalls typisch und werden Peyer'sche Plaques genannt. Sie stellen Mukosa-assoziiertes lymphatisches Gewebe dar." },
  ]},
  { id: 94, chapter: 9, number: 3, text: "Welche Aussagen zum Meckel-Divertikel sind richtig?", statements: [
    { letter: "a", text: "Meckel-Divertikel entstehen durch eine ausbleibende Obliteration des Ductus omphaloentericus.", correct: true, explanation: "Richtig. Das Meckel-Divertikel wird auch als fetaler Dottergangrest bezeichnet. Es ist bei 2–3 % der Bevölkerung vorhanden." },
    { letter: "b", text: "Die Lage des Meckel-Divertikels ist innerhalb des Dünndarms sehr variabel.", correct: false, explanation: "Falsch. Üblicherweise liegen Meckel-Divertikel im Bereich des Ileums, ca. 60–90 cm aboral und antimesenterial zur Bauhin'schen Klappe." },
    { letter: "c", text: "Bei Appendizitis-typischer Klinik ohne intraoperatives Korrelat sollte ein sogenanntes Meckel-Manöver durchgeführt werden.", correct: true, explanation: "Richtig. Meist ist ein Meckel-Divertikel ein Zufallsbefund bei Appendizitis-typischer Klinik. Beim Meckel-Manöver wird das terminale Ileum auf der Suche nach einem Divertikel durchgemustert." },
    { letter: "d", text: "Die Komplikationsrate des Meckel-Divertikels nimmt mit steigendem Alter zu.", correct: false, explanation: "Falsch. Die Komplikationsrate (Perforation, Entzündung, Blutung, Invagination) nimmt mit steigendem Alter ab. Bei Appendizitis-typischer Klinik ohne Appendizitis-Korrelat und bei Kindern sollte es immer reseziert werden. Bei Erwachsenen kann ein reizloses, zufällig entdecktes Meckel-Divertikel belassen werden. Es sollte allerdings gut dokumentiert werden." },
    { letter: "e", text: "Dünndarmdivertikel sind selten.", correct: true, explanation: "Richtig. Dünndarmdivertikel kommen bei 0,5–1 % der Bevölkerung vor und sind meist asymptomatisch im oberen Jejunum als Divertikulose vorhanden." },
  ]},
  { id: 95, chapter: 9, number: 4, text: "Welche Aussagen zum Adenokarzinom des Dünndarms treffen zu?", statements: [
    { letter: "a", text: "Bösartige Neubildungen des Dünndarms sind selten.", correct: true, explanation: "Richtig. Lediglich 2 % aller Tumoren des Magen-Darm-Traktes sind bösartige Dünndarmtumoren. 98 % aller Dünndarmtumoren sind benigne." },
    { letter: "b", text: "Morbus Crohn, Familiäre Adenomatöse Polyposis (FAP) und Peutz-Jeghers-Syndrom erhöhen das Risiko, ein Adenokarzinom des Dünndarms auszubilden.", correct: true, explanation: "Richtig. Der M. Crohn erhöht durch die chronische Entzündung nach 10 Jahren das Risiko, ein Adenokarzinom des Dünndarms auszubilden. Bei der FAP und dem Peutz-Jeghers-Syndrom wird das Risiko für ein Karzinom durch die Ausbildung von Dünndarmpolypen erhöht." },
    { letter: "c", text: "Die Diagnosestellung erfolgt meist spät.", correct: true, explanation: "Richtig. Die Symptomatik bei Dünndarmtumoren ist unspezifisch. Es können Gewichtsabnahme, Krämpfe und Schmerzen im Mittelbauch auftreten. Ca. 40 % aller Dünndarmtumoren sind zum Diagnosezeitpunkt bereits metastasiert. Aufgrund des geringen Lumendurchmessers des Dünndarms stellen der Dünndarmileus und die Perforation mögliche Komplikationen dar." },
    { letter: "d", text: "Differentialdiagnostisch kommen bei Raumforderungen im Dünndarm Sarkome, Lymphome und Karzinoide in Frage.", correct: true, explanation: "Richtig. Bei malignen Dünndarmkarzinomen findet man zu ca. 40 % Adenokarzinome, 30 % neuroendokrine Tumoren, 20 % Lymphome und zu 10 % GIST, Leiomyosarkome, Liposarkome oder Metastasen." },
    { letter: "e", text: "Die Therapie der Adenokarzinome des Dünndarms ist an die Therapie der Magenkarzinome angelehnt.", correct: false, explanation: "Falsch. Die Chemotherapie der Adenokarzinome des Dünndarms ist an die des kolorektalen Karzinoms angelehnt. Sie umfasst eine primäre Tumorresektion sowie eine adjuvante Chemotherapie bei Lymphknotenbefall nach dem FOLFOX-Schema. Die 5-Jahres-Überlebensrate beträgt ca. 20 %." },
  ]},
  { id: 96, chapter: 9, number: 5, text: "Welche Aussagen zum akuten Mesenterialinfarkt treffen zu?", statements: [
    { letter: "a", text: "Meist handelt es sich um einen Verschluss der A. mesenterica inferior.", correct: false, explanation: "Falsch. Aufgrund ihres Abgangswinkels aus der Aorta ist in über 90 % der Fälle die A. mesenterica superior betroffen. Es besteht somit hauptsächlich die Gefahr einer Ischämie von Jejunum und Ileum." },
    { letter: "b", text: "Als Hauptrisikofaktor wird Vorhofflimmern beschrieben.", correct: true, explanation: "Richtig. Neben Vorhofflimmern als Hauptrisikofaktor gibt es weitere Risikofaktoren: Myokardischämie, Klappenvitien, Endokarditis, Aortenaneurysma und akute arterielle Embolien." },
    { letter: "c", text: "Der akute Mesenterialinfarkt kann in drei Stadien eingeteilt werden.", correct: true, explanation: "Richtig. Der akute Mesenterialinfarkt umfasst drei Stadien:\n• Stadium I — Initialstadium (0–6 h): starker, plötzlicher abdomineller Schmerz, ggf. Übelkeit, Erbrechen, Diarrhö\n• Stadium II — Latenzstadium (6–12 h): Nachlassen der Schmerzen, Abnahme der Peristaltik ('fauler Frieden')\n• Stadium III — Spätstadium (> 12 h): akutes Abdomen mit stärksten Schmerzen, paralytischer Ileus" },
    { letter: "d", text: "Zur chirurgischen Thrombembolektomie wird die A. mesenterica superior rechts in der Mesenterialwurzel freigelegt.", correct: false, explanation: "Falsch. Die A. mesenterica superior wird von links in der Mesenterialwurzel freigelegt. Rechts befindet sich die V. mesenterica superior." },
    { letter: "e", text: "Zur Embolektomie sollte die Arteriotomie der A. mesenterica superior quer erfolgen.", correct: true, explanation: "Richtig. Die Arteriotomie sollte quer erfolgen. Nach Längsarteriotomien muss eventuell eine Patchplastik erfolgen, da eine Direktnaht zu Stenosen des Gefäßes führen kann." },
  ]},
  { id: 97, chapter: 9, number: 6, text: "Welche Aussagen zum chronischen Mesenterialarterienverschluss treffen zu?", statements: [
    { letter: "a", text: "Es handelt sich meist um eine chronisch-progrediente Stenose bei Mesenterialarteriosklerose.", correct: true, explanation: "Richtig. Meist ist die A. mesenterica superior betroffen. Die Perfusion des Dünndarms wird dann über die sogenannte Riolan-Arkade (Kollateralisierung zwischen A. mesenterica superior und inferior) oder die Rio-Branco-Arkade (Kollateralisierung zwischen Truncus coeliacus und A. mesenterica superior) aufrechterhalten." },
    { letter: "b", text: "Die Angina abdominalis ist das Leitsymptom.", correct: true, explanation: "Richtig. Postprandial wird die Dehnung des Darms und der Strömungswiderstand der Gefäße erhöht. Es kommt zu einer Minderperfusion, die sich in abdominellen Schmerzen und Krämpfen äußert und ca. 1–3 Stunden postprandial anhält." },
    { letter: "c", text: "Es werden drei Stadien unterschieden.", correct: false, explanation: "Falsch. Der chronische Mesenterialinfarkt umfasst vier Stadien:\n• Stadium I: symptomlos\n• Stadium II: Angina abdominalis\n• Stadium III: Dauerschmerz, ggf. ischämische Kolitis\n• Stadium IV: akute Mesenterialischämie" },
    { letter: "d", text: "Die Diagnose wird durch eine Digitale Subtraktions-Angiographie (DSA) gestellt.", correct: false, explanation: "Falsch. Die Standarduntersuchung ist das abdominelle Angio-CT mit sagittalen Rekonstruktionen, die die Gefäßabgänge seitlich aus der Aorta zeigen. Die Angiographie ist für angioplastische Interventionen zur Therapie sinnvoll." },
    { letter: "e", text: "Die Therapie ist üblicherweise chirurgisch.", correct: false, explanation: "Falsch. Die Therapie ist vom Ausmaß der Stenose abhängig. Eine symptomarme chronische mesenteriale Ischämie kann konservativ diätisch (kleine, ballaststoffarme Mahlzeiten) behandelt werden. Kurzstreckige Stenosen können interventionell aufgedehnt (PTA, Stent) werden. Langstreckige Stenosen können operativ-chirurgisch durch Thrombendarteriektomie und Revaskularisierung (aorto-mesenterialer/truncaler Bypass) behandelt werden." },
  ]},
  { id: 98, chapter: 9, number: 7, text: "Welche Aussagen zum non-okklusiven Mesenterialinfarkt (NOMI) treffen zu?", statements: [
    { letter: "a", text: "NOMI steht im Zusammenhang mit einem verlangsamten venösen Rückstrom im Mesenterialgebiet bei offenen arteriellen Strombahnen.", correct: false, explanation: "Falsch. Per definitionem sind bei einem NOMI sowohl afferente arterielle als auch efferente venöse Strombahnen offen." },
    { letter: "b", text: "NOMI kommt durch ein prolongiertes vermindertes Herzzeitvolumen zustande.", correct: true, explanation: "Richtig. Das verminderte Herzzeitvolumen mit mesenterialer Vasokonstriktion der Mikrozirkulation bei intakter Makrozirkulation ist ursächlich für ein NOMI. Dies kann insbesondere in einer Schocksituation, bei Herzinsuffizienz oder Hämodialyse, aber auch bei einer Digitalis-Überdosierung vorkommen." },
    { letter: "c", text: "Die Therapie ist in der Regel operativ.", correct: false, explanation: "Falsch. Die Therapie ist in erster Linie konservativ und dient dazu, Kreislaufverhältnisse herzustellen. Bei einem persistierenden NOMI sollte bei der Gefahr einer Darmischämie eine chirurgische Exploration erfolgen." },
    { letter: "d", text: "NOMI hat eine Letalität von bis zu 50 %.", correct: false, explanation: "Falsch. Da oft alte, multimorbide Patienten betroffen sind, liegt die Letalität bei 70–90 %." },
    { letter: "e", text: "Differentialdiagnostisch kommt auch eine akute Mesenterialvenenthrombose in Betracht.", correct: true, explanation: "Richtig. Ätiologisch ist die Mesenterialvenenthrombose häufig paraneoplastisch bedingt und liegt Pankreas- oder Leberzellkarzinomen zugrunde." },
  ]},
  { id: 99, chapter: 10, number: 1, text: "Welche Antwort bezüglich Kolonpolypen ist zutreffend?", statements: [
    { letter: "a", text: "Kolonpolypen sind bei ca. 50 % aller Menschen über 60 Jahre vorhanden.", correct: false, explanation: "Falsch. Bei ca. 30 % der Menschen über 60 Jahre treten Polypen auf. Nach Abtragung von Polypen ist ein geringeres Koloskopie-Intervall notwendig: Bei low-grade intraepithelialen Neoplasien (IEN) wird eine Koloskopie nach 3 Jahren, bei high-grade IEN deutlich kurzfristiger (z. B. nach einem Jahr) empfohlen." },
    { letter: "b", text: "Das tubuläre Adenom tritt am häufigsten auf.", correct: true, explanation: "Richtig. Das tubuläre Adenom findet man bei bis zu 60–65 % der abgetragenen Adenome. Es hat ein geringes Entartungsrisiko von ca. 4 %." },
    { letter: "c", text: "Beim tubulovillösen Adenom handelt es sich um eine Mischform.", correct: true, explanation: "Richtig. Das tubulovillöse Adenom tritt in 20–25 % der Fälle auf. Es hat ein Entartungsrisiko von bis zu 10 %." },
    { letter: "d", text: "Villöse Adenome haben das geringste Entartungsrisiko.", correct: false, explanation: "Falsch. Villöse Adenome treten am seltensten auf (5–10 %), haben jedoch das höchste Entartungsrisiko von ca. 50 %." },
    { letter: "e", text: "Das sessil-serratierte Adenom ist selten, besitzt jedoch ein hohes Entartungsrisiko.", correct: true, explanation: "Richtig. Die Lokalisation ist meist im rechtsseitigen Kolon. Der Übergang in ein Adenokarzinom ist möglich. Bei endoskopisch nicht abzutragenden sessil-serratierten Adenomen oder Malignitätsverdacht ist eine chirurgische Resektion indiziert." },
  ]},
  { id: 100, chapter: 10, number: 2, text: "Welche Fakten über die Epidemiologie des kolorektalen Karzinoms (KRK) sind zutreffend?", statements: [
    { letter: "a", text: "In Deutschland ist das KRK das häufigste Karzinom des Mannes und das dritthäufigste Karzinom der Frau.", correct: false, explanation: "Falsch. Es ist das dritthäufigste Karzinom des Mannes (nach Prostata- und Lungenkarzinom) und das zweithäufigste Karzinom der Frau (nach Mammakarzinom). Es treten in Deutschland ca. 60.000 Neuerkrankungen pro Jahr auf." },
    { letter: "b", text: "Die häufigste Lokalisation des KRK ist das Rektum.", correct: true, explanation: "Richtig. 50 % der Karzinome betreffen das Rektum und 30 % das Colon sigmoideum." },
    { letter: "c", text: "90 % der Kolonkarzinome werden nach dem 75. Lebensjahr diagnostiziert.", correct: false, explanation: "Falsch. 90 % der Kolonkarzinome werden nach dem 50. Lebensjahr diagnostiziert. Das mediane Alter bei Diagnose ist bei Männern 73 Jahre, bei Frauen 75 Jahre. Die meisten Fälle treten bei Männern in den Altersgruppen 70–80 Jahre, bei Frauen in der Altersgruppe > 85 Jahre auf." },
    { letter: "d", text: "Das kolorektale Karzinom stellt in Deutschland die zweithäufigste karzinombedingte Todesursache dar.", correct: true, explanation: "Richtig. Insgesamt ist das KRK die zweithäufigste karzinombedingte Todesursache (bei Frauen: nach Mamma- und Lungenkarzinom; bei Männern: nach Lungenkarzinom)." },
    { letter: "e", text: "Kolorektale Karzinome als Todesursache sind insgesamt rückläufig.", correct: true, explanation: "Richtig. Die Inzidenz- und Mortalitätsraten sinken seit 10–15 Jahren kontinuierlich. Seit 2005 sind die Inzidenzraten des KRK um ca. 2 % jährlich zurückgegangen. Grund für den Rückgang ist die flächendeckende Durchführung von Vorsorgekoloskopien und bessere Aufklärung über mögliche Symptome." },
  ]},
  { id: 101, chapter: 10, number: 3, text: "Welche Aussagen zu prädisponierenden Faktoren und Prävention des KRK sind zutreffend?", statements: [
    { letter: "a", text: "Der Ernährungsstil kann als Einflussfaktor bei der Entstehung von KRK vernachlässigt werden.", correct: false, explanation: "Falsch. Insbesondere fleisch- und fetthaltige sowie ballaststoffarme Kost, Nikotin- und Alkoholkonsum haben einen negativen Einfluss auf die Ausbildung eines KRK." },
    { letter: "b", text: "Als genetisch-prädisponierende Faktoren können insbesondere drei Krankheitsbilder genannt werden.", correct: false, explanation: "Falsch. Es gibt folgende genetisch-prädisponierende Faktoren für die Ausbildung kolorektaler Karzinome: HNPCC-Syndrom (Hereditäres nicht-polypöses Kolonkarzinom), FAP-Syndrom (Familiäre adenomatöse Polyposis), attenuierte Familiäre Adenomatöse Polyposis (AAPC), Peutz-Jeghers-Syndrom, Cowden-Syndrom und kolorektale Karzinome im familiären Umfeld (insbesondere Verwandte 1. Grades vor dem 50. Lebensjahr)." },
    { letter: "c", text: "Diabetes mellitus Typ 2 gilt nicht als prädisponierender Faktor.", correct: false, explanation: "Falsch. Verschiedene Vorerkrankungen zählen zu den prädisponierenden Faktoren: chronisch-entzündliche Darmerkrankungen (Colitis ulcerosa, M. Crohn), andere Malignome (z. B. Mamma-, Ovarial-, Magenkarzinom), Diabetes mellitus Typ 2, Alter über 40 Jahre und kolorektale Adenome." },
    { letter: "d", text: "Adipositas gilt als protektiver Faktor.", correct: false, explanation: "Falsch. Adipositas und Bewegungsmangel gehen mit einem erhöhten Risiko für KRK einher." },
    { letter: "e", text: "Körperliche Aktivität ist kein protektiver Faktor.", correct: false, explanation: "Falsch. Körperliche Aktivität, ballaststoffreiche und fettarme Ernährung, hoher Anteil an Gemüse und niedriger Anteil an rotem Fleisch, eine zügige Stuhlpassage und geringer/kein Nikotin- und Alkoholkonsum gelten als günstig." },
  ]},
  { id: 102, chapter: 10, number: 4, text: "Welche Präventions- und Vorsorgemaßnahmen zur Prävention eines kolorektalen KRK sind sinnvoll?", statements: [
    { letter: "a", text: "Regelmäßige körperliche Aktivitäten senken das Risiko.", correct: true, explanation: "Richtig. In Studien konnte gezeigt werden, dass Personen mit höherer körperlicher Bewegung weniger Kolonadenome sowie ein um bis zu 30 % geringeres Karzinomrisiko aufwiesen. Die erforderliche tägliche körperliche Aktivität sollte mindestens 30–60 Minuten umfassen." },
    { letter: "b", text: "Ein hoher Kaffeekonsum erhöht das Risiko.", correct: false, explanation: "Falsch. Ein Zusammenhang zwischen KRK und Kaffee-/Teekonsum (Coffein/Teein) ist nicht belegt. Hingegen ist ein hoher Fleischkonsum sowie Nikotinkonsum mit einem erhöhten Risiko für die Ausbildung eines KRK assoziiert." },
    { letter: "c", text: "Ballaststoffreiche Ernährung senkt das Risiko.", correct: true, explanation: "Richtig. Es findet sich ausreichende Evidenz für die Empfehlung einer täglichen Ballaststoffaufnahme von 30 g. Hierdurch ließ sich das Karzinomrisiko um bis zu 30 % reduzieren." },
    { letter: "d", text: "Die Einnahme von Acetylsalicylsäure (ASS) wird zur Primärprävention empfohlen.", correct: false, explanation: "Falsch. Aufgrund der erhöhten Inzidenz gastrointestinaler Blutungen bei Dauertherapie mit ASS gibt es derzeit keine Empfehlung zur Primärprävention mit ASS oder NSAR. Dennoch zeigen Studien, dass bei regelmäßiger Einnahme von ASS in einer Dosis von ≥ 75 mg/Tag die Rate kolorektaler Karzinome um etwa die Hälfte sinkt. Die Studienlage ist aber nicht ausreichend für eine spezifische positive Empfehlung." },
    { letter: "e", text: "Vorsorgeuntersuchungen werden ab dem 60. Lebensjahr empfohlen.", correct: false, explanation: "Falsch. Ab dem 50. Lebensjahr werden ein jährlicher Hämoccult-Test und digital-rektale Untersuchungen empfohlen (falls positiv, Indikation zur Koloskopie). In Deutschland werden für Männer ab dem 50., für Frauen ab dem 55. Lebensjahr Vorsorgekoloskopien erstattet (bei unauffälligem Befund Wiederholung alle 10 Jahre). Bei erblicher Vorbelastung sollte der Vorsorgebeginn 10 Jahre vor dem Manifestationsalter des betroffenen Verwandten liegen." },
  ]},
  { id: 103, chapter: 10, number: 5, text: "Welche Aussagen zu den Tumormarkern des KRK treffen zu?", statements: [
    { letter: "a", text: "Der Tumormarker CEA ist bei Erstdiagnose in 50 % der Fälle erhöht.", correct: false, explanation: "Falsch. Bei etwa 30 % aller KRK ist der Tumormarker CEA zum Zeitpunkt der Erstdiagnose erhöht. Bei starken Rauchern kann das CEA ebenfalls ohne diagnostischen Wert erhöht sein." },
    { letter: "b", text: "Die Bestimmung des Tumormarkers CEA ist für die Tumornachsorge wichtig.", correct: true, explanation: "Richtig. Insbesondere in der Tumornachsorge ist das CEA ein Hinweis für die Rezidivprognose. Beim Vorliegen von Lebermetastasen ist das CEA ein unabhängiger Prognosefaktor." },
    { letter: "c", text: "Der Tumormarker CA 19-9 kann sowohl bei kolorektalen als auch bei Gallengangs- und Pankreaskarzinomen erhöht sein.", correct: true, explanation: "Richtig. Die höchste Sensitivität des CA 19-9 besteht beim Pankreaskarzinom. Er kann jedoch auch beim Gallengangskarzinom oder KRK erhöht sein." },
    { letter: "d", text: "Der Tumormarker CA 125 ist ein Indiz für eine Peritonealkarzinose.", correct: true, explanation: "Richtig. Das CA 125 ist primär bei Ovarialkarzinomen erhöht. Ein Anstieg kann ebenfalls ein Hinweis auf das Vorliegen einer Peritonealkarzinose sein." },
